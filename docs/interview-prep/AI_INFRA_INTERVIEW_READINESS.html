    "detail_html": "<h2>11｜并发、异步与状态机详细知识列表<\/h2>\n<blockquote>优先级：P0 当前状态：已敲定范围与手写契约，原理复习、源码 trace 与闭卷手写待完成 目标熟练度：原理 L3 / 源码 L1 / 手写 L3 / 实验 L0 预计投入：集中学习约 10-14 小时，实际完成以验收证据为准 支持：<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/04-llm-engine-scheduling.md\">LLM 推理引擎与调度<\/a>、<a href=\"topics/09-disaggregated-serving-data-path-and-pd.md\">分布式 Serving 数据路径与 PD 分离<\/a>、<a href=\"topics/10-serving-routing-and-control-plane.md\">Serving 路由与平台控制面<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能从以下五层解释一次异步操作：<\/p>\n<pre><code class=\"language-text\">执行单元：process / thread / coroutine\n                    ↓\n调度与等待：preemption / cooperative yield / I/O readiness\n                    ↓\n同步与容量：lock / condition / queue / semaphore / backpressure\n                    ↓\n生命周期：queued / running / terminal / timeout / cancellation\n                    ↓\n正确性：identity / epoch / idempotence / fencing / cleanup<\/code><\/pre>\n<p>回答不能停留在“协程比线程轻量”或“<code>await<\/code> 不阻塞”。必须说明：<\/p>\n<ul>\n<li>谁被挂起，event-loop thread 是否仍能运行其他 Task；<\/li>\n<li>被等待对象在哪里登记恢复条件；<\/li>\n<li>timeout 后底层工作是否仍可能继续；<\/li>\n<li>cancel、timeout、failure 与 success 竞争时谁冻结对外终态；<\/li>\n<li>late completion 怎样被 fencing；<\/li>\n<li>队列、worker slot、Future、Task 和领域资源怎样最终清理。<\/li>\n<\/ul>\n<p>本节点的实现切片固定为 Python <code>asyncio<\/code>。Go 并发已经在既有学习中覆盖，不纳入秋招知识地图、完成门槛或详情展开；只有目标 JD 明确要求时才临时补充。<\/p>\n<h3>与领域节点的责任边界<\/h3>\n<p>本节点提供通用并发语义和 Python 控制流，不替代领域状态机：<\/p>\n<ol>\n<li>Topic 03 负责 KV 生命周期、物理资源所有权、restore/fallback 和 block cleanup；<\/li>\n<li>Topic 04 负责请求队列、token/KV budget、Continuous Batching 和抢占恢复；<\/li>\n<li>Topic 09 负责跨实例 KV handoff、readiness 和 Decode admission；<\/li>\n<li>Topic 10 负责集群级 admission、Endpoint selection、retry 和全局背压；<\/li>\n<li>本节点负责这些系统共同依赖的等待、取消、容量限制、终态竞争、幂等和 fencing。<\/li>\n<\/ol>\n<p>例如，本节点要解释 epoch 为什么能拒绝旧 completion；Topic 03 仍需解释旧 restore completion 对 block ownership、visibility 和 cleanup 的具体影响。拒绝旧结果与释放旧操作占有的资源是两个独立问题。<\/p>\n<h3>原理 L3 详细知识列表<\/h3>\n<h4>并发执行模型<\/h4>\n<ul>\n<li>concurrency 与 parallelism 的区别；<\/li>\n<li>process、thread、coroutine 的隔离、共享、创建和切换成本；<\/li>\n<li>抢占式线程调度与协作式协程让出；<\/li>\n<li>CPU-bound 与 I/O-bound 工作负载；<\/li>\n<li>async、线程池和多进程的选择边界；<\/li>\n<li>共享状态与消息传递的正确性和工程 trade-off；<\/li>\n<li>并发提高资源利用率，不保证单任务延迟一定下降。<\/li>\n<\/ul>\n<p>只要求建立服务端心智模型，不深入 Linux CFS、进程地址空间实现或上下文切换汇编。<\/p>\n<h4>同步原语与正确性<\/h4>\n<ul>\n<li>mutex、read-write lock、semaphore、condition variable、event 和 bounded queue 的职责差异；<\/li>\n<li>临界区、不变量、锁粒度和锁顺序；<\/li>\n<li>race condition、deadlock、livelock、starvation 和 priority inversion；<\/li>\n<li>producer-consumer、容量上限和背压传播；<\/li>\n<li>原子操作与 CAS 的基本语义及适用边界；<\/li>\n<li>GIL 约束 Python 字节码执行，不等于业务状态天然线程安全；<\/li>\n<li>check-then-act、read-modify-write 和跨 <code>await<\/code> 不变量为何仍会产生竞态；<\/li>\n<li>为什么不应持锁执行不受控 I/O 或长耗时工作。<\/li>\n<\/ul>\n<p>不要求形式化学习 C++ memory model、lock-free queue、hazard pointer 或 RCU。<\/p>\n<h4>Python <code>asyncio<\/code> 运行机制<\/h4>\n<ul>\n<li>coroutine object、Task、Future 和 event loop 的职责关系；<\/li>\n<li>调用 <code>async def<\/code> 与真正调度 coroutine 执行的区别；<\/li>\n<li><code>await<\/code> 怎样挂起当前 coroutine，并在被等待对象完成后恢复；<\/li>\n<li><code>await<\/code> 是协作式让出点，不等于创建新线程；<\/li>\n<li>连续两个 <code>await<\/code>、<code>create_task<\/code> 后再等待和批量并发等待的时序差异；<\/li>\n<li>event loop 等待 I/O readiness、timer 和 callback 的高层机制；<\/li>\n<li>blocking function 为什么会阻塞 event-loop thread；<\/li>\n<li>Queue、Lock、Semaphore、Event 与 Future 的基本用途和失败边界；<\/li>\n<li>timeout、cancellation、exception propagation 与 <code>finally<\/code> cleanup；<\/li>\n<li>structured concurrency 的目标：约束父子任务生命周期和失败传播，而不是背完整 API 清单。<\/li>\n<\/ul>\n<p>不要求 CPython bytecode、解释器调度、GIL 源码、生成器演进史或从零实现 event loop。<\/p>\n<h4>异步失败与状态机<\/h4>\n<ul>\n<li>timeout 表示调用方等待边界，不证明底层工作已经停止；<\/li>\n<li>cancellation 通常是 cooperative，需要操作到达可取消点并执行清理；<\/li>\n<li>queued cancellation 与 running cancellation 的资源语义不同；<\/li>\n<li>cancel、timeout、failure 和 success 竞争时必须冻结一个对外可见终态；<\/li>\n<li>request/job identity、attempt 和 monotonic epoch 用于区分重试与旧操作；<\/li>\n<li>late/duplicate completion 不得覆盖终态或重新激活已取消对象；<\/li>\n<li>幂等 completion 和 cleanup 防止重复返回、double free 和 permit 泄漏；<\/li>\n<li>bounded queue 的 block、defer、reject、drop 是不同 admission 契约；<\/li>\n<li>shutdown 必须明确 stop accepting、drain、cancel 和 force-close 的顺序；<\/li>\n<li>exactly-once 不能靠状态枚举获得，还涉及持久化、去重与外部副作用边界。<\/li>\n<\/ul>\n<h4>Serving 场景映射<\/h4>\n<ul>\n<li>请求取消时 KV restore/offload 仍在进行；<\/li>\n<li>scheduler 已超时，但后台 completion 随后到达；<\/li>\n<li>producer 产生任务的速度长期高于 GPU/worker 消费速度；<\/li>\n<li>semaphore permit、KV block、Future 或后台 Task 泄漏；<\/li>\n<li>retry attempt 与旧 attempt 同时完成；<\/li>\n<li>client disconnect 后 engine 请求怎样终止和清理；<\/li>\n<li>shutdown 时新请求、排队请求和运行请求分别怎样处理；<\/li>\n<li>为什么只观察成功路径无法证明并发系统正确。<\/li>\n<\/ul>\n<h3>源码 L1 契约<\/h3>\n<h4>Python 异步链路<\/h4>\n<p>学习开始时固定一个 Python 版本，沿以下概念链完成一次轻量 source trace：<\/p>\n<pre><code class=\"language-text\">asyncio.run\n  -&gt; event loop lifecycle\n  -&gt; create_task\n  -&gt; Task waits on Future\n  -&gt; timer / I/O / callback marks completion\n  -&gt; Task becomes runnable again\n  -&gt; result / exception / cancellation propagates<\/code><\/pre>\n<p>源码笔记必须记录：<\/p>\n<ul>\n<li>Python 版本与 commit/tag；<\/li>\n<li>公开入口和关键对象；<\/li>\n<li>Task 与 Future 的等待关系；<\/li>\n<li>恢复条件在哪里登记并触发；<\/li>\n<li>cancellation 怎样注入和传播；<\/li>\n<li>exception/result 怎样回到调用方；<\/li>\n<li>event loop 和 Task 在何处清理。<\/li>\n<\/ul>\n<p>目标是把 <code>await<\/code> 的控制流映射到真实实现，不读遍 selector/proactor、解释器和操作系统内核。<\/p>\n<h4>真实 Serving 异步请求链<\/h4>\n<p>固定一个 vLLM release/commit，定位一条请求取消链：<\/p>\n<pre><code class=\"language-text\">API request\n  -&gt; async generation / request stream\n  -&gt; engine request submission\n  -&gt; client disconnect or cancellation\n  -&gt; request termination\n  -&gt; resource and stream cleanup<\/code><\/pre>\n<p>读完必须说明：<\/p>\n<ul>\n<li>API 入口、async generator、Task/Future 和 request stream 边界；<\/li>\n<li>请求 ID 在各层怎样传递；<\/li>\n<li>谁检测 client disconnect，谁发起取消；<\/li>\n<li>termination 怎样进入 engine；<\/li>\n<li>输出流、后台 Task 与 engine-side request 的清理方向；<\/li>\n<li>哪些路径只取消调用方等待，哪些路径会请求底层终止。<\/li>\n<\/ul>\n<p>不重复 Topic 04 的完整 <code>schedule -&gt; execute -&gt; update<\/code> 源码阅读，也不把源码笔记描述成 ToolGap-KV 已完成集成。<\/p>\n<h3>手写 L3 契约<\/h3>\n<h4>有界异步执行器<\/h4>\n<p>从空文件实现：<\/p>\n<pre><code class=\"language-python\">class BoundedAsyncExecutor:\n    async def start(self): ...\n    async def submit(self, job_id, operation, timeout) -&gt; asyncio.Future: ...\n    async def cancel(self, job_id): ...\n    async def shutdown(self): ...<\/code><\/pre>\n<p>核心代码约 80-120 行，不含测试，只包含：<\/p>\n<ul>\n<li>bounded <code>asyncio.Queue<\/code>；<\/li>\n<li>固定数量 worker tasks；<\/li>\n<li><code>JobRecord<\/code>、job identity/attempt 和明确状态机；<\/li>\n<li>每个 job 的对外结果 Future；<\/li>\n<li>timeout、cancel、exception 与 cleanup；<\/li>\n<li>late/duplicate completion fencing；<\/li>\n<li>冻结的 queue-full 契约：立即抛出 <code>ExecutorOverloaded<\/code>。<\/li>\n<\/ul>\n<p><code>submit<\/code> 只负责 admission：成功时入队并返回代表对外结果的 Future；队列已满时立即拒绝，不在调用方积累无限个等待 queue space 的 coroutine。调用方再等待返回的 Future 获取成功、失败、超时或取消结果。<\/p>\n<h4>状态机与 timeout 语义<\/h4>\n<p>只允许以下转换：<\/p>\n<pre><code class=\"language-text\">QUEUED -&gt; RUNNING -&gt; SUCCEEDED\n                  -&gt; FAILED\n                  -&gt; TIMED_OUT\n                  -&gt; CANCELLED\n\nQUEUED -&gt; CANCELLED<\/code><\/pre>\n<p>所有终态不可再次变化。timeout 到达后：<\/p>\n<ol>\n<li>executor 冻结对外状态为 <code>TIMED_OUT<\/code>；<\/li>\n<li>executor 请求取消 operation，但不假设它已经停止；<\/li>\n<li>worker slot 在 operation 真正退出前保持占用；<\/li>\n<li>若 operation 抑制取消并晚到返回，其结果被丢弃；<\/li>\n<li>operation 退出并完成清理后才释放并发槽位。<\/li>\n<\/ol>\n<p>永久不响应取消的工作需要进程隔离或外部强制终止，不属于本手写题。不能为了“恢复容量”而在底层工作仍运行时提前释放 slot，否则实际并发会突破上限。<\/p>\n<h4>必须保持的不变量<\/h4>\n<ul>\n<li>同时运行数量不超过配置上限；<\/li>\n<li>队列容量有限，生产长期快于消费时不会无限积压；<\/li>\n<li>每个 admitted job 只有一个对外可见终态；<\/li>\n<li>timeout/cancel 后的 completion 不能覆盖终态；<\/li>\n<li>operation 异常不能杀死整个 worker loop；<\/li>\n<li>queue slot、worker、Future 和任务句柄最终被清理；<\/li>\n<li>duplicate cancel/complete 保持幂等；<\/li>\n<li>shutdown 后不再接收任务，且不遗留后台 Task。<\/li>\n<\/ul>\n<h4>六个确定性测试<\/h4>\n<p>优先使用 <code>Event<\/code>、受控 Future 或 barrier 主动控制交错，不用大量 <code>sleep<\/code> 猜测时序：<\/p>\n<ol>\n<li>同时运行数不超过上限；<\/li>\n<li>queue full 时立即返回 <code>ExecutorOverloaded<\/code>；<\/li>\n<li>queued job 能被取消且不再运行；<\/li>\n<li>running job 超时后，晚到 completion 不能改写终态，并且 operation 退出前不提前释放 slot；<\/li>\n<li>operation 抛异常后 worker 继续工作且容量许可不泄漏；<\/li>\n<li>shutdown 正确处理 queued/running jobs，且没有悬挂任务。<\/li>\n<\/ol>\n<p>duplicate cancel、terminal immutability 和 cleanup 断言合并进上述测试，不再新增重复测试。<\/p>\n<h4>时间限制<\/h4>\n<ul>\n<li>45-60 分钟完成正常链路、状态机和基础错误处理；<\/li>\n<li>30-45 分钟补齐确定性故障测试；<\/li>\n<li>面试只要求大意代码时，先写状态、不变量和核心控制流；<\/li>\n<li>正式复习验收仍要求本地测试通过。<\/li>\n<\/ul>\n<p>该练习验证通用异步控制能力，不实现网络服务器、线程池、完整 RPC 框架、分布式任务系统或生产级 executor。<\/p>\n<h3>实验 L0 契约<\/h3>\n<p>本节点不要求吞吐 benchmark、event-loop 对比、真实多实例服务或独立故障注入平台：<\/p>\n<ul>\n<li>六个测试属于手写正确性验收，不提升实验等级；<\/li>\n<li>example、mock operation 和受控交错最多是 <code>simulated<\/code> 学习证据；<\/li>\n<li>没有固定 workload、运行环境和原始测量产物时，不声称吞吐、延迟或资源利用率改善；<\/li>\n<li>若未来 JD 明确要求 Python runtime 或高并发网关性能，再单独提升实验和源码深度。<\/li>\n<\/ul>\n<h3>面试连续追问<\/h3>\n<p>必须脱稿回答：<\/p>\n<ol>\n<li><code>await<\/code> 做了什么，为什么不等于启动线程；<\/li>\n<li>连续写两个 <code>await<\/code> 为什么可能仍然串行；<\/li>\n<li>blocking function 为什么会卡住同一 event loop 上的其他 coroutine；<\/li>\n<li>GIL 为什么不能保证业务状态线程安全；<\/li>\n<li>timeout 以后底层工作是否一定停止；<\/li>\n<li>cancel 与 completion 同时发生时怎样冻结终态；<\/li>\n<li>Semaphore 和 bounded Queue 分别限制什么；<\/li>\n<li>无限队列为什么会把过载转化为内存压力和尾延迟；<\/li>\n<li>怎样证明资源只释放一次；<\/li>\n<li>epoch 为什么能拒绝旧完成，却不能自动保证资源已清理。<\/li>\n<\/ol>\n<p>至少完成一道 15 分钟连续场景题：<\/p>\n<blockquote>一个异步 KV restore 任务有并发上限和有界队列。请求超时并触发 recompute 后，旧 restore completion 晚到；同时客户端取消，系统准备 shutdown。说明任务、请求、KV 可见性和资源所有者，给出合法状态转换、终态竞争规则、fencing、backpressure 和 cleanup 顺序。<\/blockquote>\n<p>回答必须区分“拒绝旧 completion 影响可见状态”和“回收旧 operation 已占资源”，不能把 epoch 当作自动清理机制。<\/p>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>本节点为 ToolGap-KV 的 lifecycle identity/epoch、异步 completion fencing、fallback、cancellation、cleanup 和 DecisionTrace 提供通用基础，但不改变当前能力状态：<\/p>\n<ul>\n<li>Python/vLLM 源码阅读不是 ToolGap-KV runtime <code>shipped<\/code>；<\/li>\n<li><code>BoundedAsyncExecutor<\/code> 是独立学习练习，不自动成为项目实现；<\/li>\n<li>mock operation、受控 Future 和确定性交错最多是 <code>simulated<\/code>；<\/li>\n<li>只有仓库内候选人拥有的生命周期实现、测试与证据存在后，才能提升项目声明；<\/li>\n<li>不用本节点替代 CT1-CT3 对真实 runtime ownership 的完成要求。<\/li>\n<\/ul>\n<h3>明确不要求<\/h3>\n<ul>\n<li>Go 并发、goroutine、channel、<code>select<\/code>、context、Go scheduler 或 GC；<\/li>\n<li>Python 完整语法、元类、descriptor、完整 GC 或所有 <code>asyncio<\/code> API；<\/li>\n<li>CPython bytecode、解释器、GIL 源码或完整 event-loop 内部实现；<\/li>\n<li>Linux CFS、futex、epoll 内核实现和上下文切换汇编；<\/li>\n<li>C++ 内存模型形式化细节；<\/li>\n<li>lock-free queue、hazard pointer、RCU 和无锁内存回收；<\/li>\n<li>手写 event loop、线程池、网络服务器或生产 RPC 框架；<\/li>\n<li>分布式共识、事务消息或把 exactly-once 当成单机状态机问题；<\/li>\n<li>独立性能实验、吞吐优化或生产集成声明。<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<p>只有以下材料齐全，节点才能标记为完成：<\/p>\n<ul>\n<li>一份 <code>async/await<\/code> 执行时序说明；<\/li>\n<li>有界异步执行器和六个确定性测试；<\/li>\n<li>固定 Python 版本的 <code>asyncio<\/code> source trace；<\/li>\n<li>固定 vLLM 版本的异步请求 source trace；<\/li>\n<li>一次闭卷限时手写记录；<\/li>\n<li>一轮口述追问、场景题作答和错误修正记录。<\/li>\n<\/ul>\n<p>验收顺序建议是：先原理与最小 asyncio 练习，再手写执行器和故障测试，最后做源码 trace 与闭卷复测。源码阅读放在能够运行和修改最小代码之后，避免把“看懂调用链”误当成“能独立处理并发正确性”。<\/p>",
    "search_text": "11 并发、异步与状态机 p0 已敲定范围与手写契约，原理复习、源码 trace 与闭卷手写待完成 能从执行单元、调度等待、同步容量、生命周期和正确性五层解释 serving 异步控制流，讲清 python `async/await`、timeout/cancellation、背压与 fencing，并限时手写带六个确定性测试的有界异步执行器。 以跨语言并发语义和 python `asyncio` 为主；不展开 go 并发、cpython/event-loop 深层实现、无锁结构、网络服务器/rpc 框架或独立性能实验。 # 11｜并发、异步与状态机详细知识列表 > 优先级：p0 > > 当前状态：已敲定范围与手写契约，原理复习、源码 trace 与闭卷手写待完成 > > 目标熟练度：原理 l3 / 源码 l1 / 手写 l3 / 实验 l0 > > 预计投入：集中学习约 10-14 小时，实际完成以验收证据为准 > > 支持：[kv cache 与内存系统](03-kv-cache-memory-system.md)、[llm 推理引擎与调度](04-llm-engine-scheduling.md)、[分布式 serving 数据路径与 pd 分离](09-disaggregated-serving-data-path-and-pd.md)、[serving 路由与平台控制面](10-serving-routing-and-control-plane.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能从以下五层解释一次异步操作： ```text 执行单元：process / thread / coroutine ↓ 调度与等待：preemption / cooperative yield / i/o readiness ↓ 同步与容量：lock / condition / queue / semaphore / backpressure ↓ 生命周期：queued / running / terminal / timeout / cancellation ↓ 正确性：identity / epoch / idempotence / fencing / cleanup ``` 回答不能停留在“协程比线程轻量”或“`await` 不阻塞”。必须说明： - 谁被挂起，event-loop thread 是否仍能运行其他 task； - 被等待对象在哪里登记恢复条件； - timeout 后底层工作是否仍可能继续； - cancel、timeout、failure 与 success 竞争时谁冻结对外终态； - late completion 怎样被 fencing； - 队列、worker slot、future、task 和领域资源怎样最终清理。 本节点的实现切片固定为 python `asyncio`。go 并发已经在既有学习中覆盖，不纳入秋招知识地图、完成门槛或详情展开；只有目标 jd 明确要求时才临时补充。 ## 与领域节点的责任边界 本节点提供通用并发语义和 python 控制流，不替代领域状态机： 1. topic 03 负责 kv 生命周期、物理资源所有权、restore/fallback 和 block cleanup； 2. topic 04 负责请求队列、token/kv budget、continuous batching 和抢占恢复； 3. topic 09 负责跨实例 kv handoff、readiness 和 decode admission； 4. topic 10 负责集群级 admission、endpoint selection、retry 和全局背压； 5. 本节点负责这些系统共同依赖的等待、取消、容量限制、终态竞争、幂等和 fencing。 例如，本节点要解释 epoch 为什么能拒绝旧 completion；topic 03 仍需解释旧 restore completion 对 block ownership、visibility 和 cleanup 的具体影响。拒绝旧结果与释放旧操作占有的资源是两个独立问题。 ## 原理 l3 详细知识列表 ### 并发执行模型 - concurrency 与 parallelism 的区别； - process、thread、coroutine 的隔离、共享、创建和切换成本； - 抢占式线程调度与协作式协程让出； - cpu-bound 与 i/o-bound 工作负载； - async、线程池和多进程的选择边界； - 共享状态与消息传递的正确性和工程 trade-off； - 并发提高资源利用率，不保证单任务延迟一定下降。 只要求建立服务端心智模型，不深入 linux cfs、进程地址空间实现或上下文切换汇编。 ### 同步原语与正确性 - mutex、read-write lock、semaphore、condition variable、event 和 bounded queue 的职责差异； - 临界区、不变量、锁粒度和锁顺序； - race condition、deadlock、livelock、starvation 和 priority inversion； - producer-consumer、容量上限和背压传播； - 原子操作与 cas 的基本语义及适用边界； - gil 约束 python 字节码执行，不等于业务状态天然线程安全； - check-then-act、read-modify-write 和跨 `await` 不变量为何仍会产生竞态； - 为什么不应持锁执行不受控 i/o 或长耗时工作。 不要求形式化学习 c++ memory model、lock-free queue、hazard pointer 或 rcu。 ### python `asyncio` 运行机制 - coroutine object、task、future 和 event loop 的职责关系； - 调用 `async def` 与真正调度 coroutine 执行的区别； - `await` 怎样挂起当前 coroutine，并在被等待对象完成后恢复； - `await` 是协作式让出点，不等于创建新线程； - 连续两个 `await`、`create_task` 后再等待和批量并发等待的时序差异； - event loop 等待 i/o readiness、timer 和 callback 的高层机制； - blocking function 为什么会阻塞 event-loop thread； - queue、lock、semaphore、event 与 future 的基本用途和失败边界； - timeout、cancellation、exception propagation 与 `finally` cleanup； - structured concurrency 的目标：约束父子任务生命周期和失败传播，而不是背完整 api 清单。 不要求 cpython bytecode、解释器调度、gil 源码、生成器演进史或从零实现 event loop。 ### 异步失败与状态机 - timeout 表示调用方等待边界，不证明底层工作已经停止； - cancellation 通常是 cooperative，需要操作到达可取消点并执行清理； - queued cancellation 与 running cancellation 的资源语义不同； - cancel、timeout、failure 和 success 竞争时必须冻结一个对外可见终态； - request/job identity、attempt 和 monotonic epoch 用于区分重试与旧操作； - late/duplicate completion 不得覆盖终态或重新激活已取消对象； - 幂等 completion 和 cleanup 防止重复返回、double free 和 permit 泄漏； - bounded queue 的 block、defer、reject、drop 是不同 admission 契约； - shutdown 必须明确 stop accepting、drain、cancel 和 force-close 的顺序； - exactly-once 不能靠状态枚举获得，还涉及持久化、去重与外部副作用边界。 ### serving 场景映射 - 请求取消时 kv restore/offload 仍在进行； - scheduler 已超时，但后台 completion 随后到达； - producer 产生任务的速度长期高于 gpu/worker 消费速度； - semaphore permit、kv block、future 或后台 task 泄漏； - retry attempt 与旧 attempt 同时完成； - client disconnect 后 engine 请求怎样终止和清理； - shutdown 时新请求、排队请求和运行请求分别怎样处理； - 为什么只观察成功路径无法证明并发系统正确。 ## 源码 l1 契约 ### python 异步链路 学习开始时固定一个 python 版本，沿以下概念链完成一次轻量 source trace： ```text asyncio.run -> event loop lifecycle -> create_task -> task waits on future -> timer / i/o / callback marks completion -> task becomes runnable again -> result / exception / cancellation propagates ``` 源码笔记必须记录： - python 版本与 commit/tag； - 公开入口和关键对象； - task 与 future 的等待关系； - 恢复条件在哪里登记并触发； - cancellation 怎样注入和传播； - exception/result 怎样回到调用方； - event loop 和 task 在何处清理。 目标是把 `await` 的控制流映射到真实实现，不读遍 selector/proactor、解释器和操作系统内核。 ### 真实 serving 异步请求链 固定一个 vllm release/commit，定位一条请求取消链： ```text api request -> async generation / request stream -> engine request submission -> client disconnect or cancellation -> request termination -> resource and stream cleanup ``` 读完必须说明： - api 入口、async generator、task/future 和 request stream 边界； - 请求 id 在各层怎样传递； - 谁检测 client disconnect，谁发起取消； - termination 怎样进入 engine； - 输出流、后台 task 与 engine-side request 的清理方向； - 哪些路径只取消调用方等待，哪些路径会请求底层终止。 不重复 topic 04 的完整 `schedule -> execute -> update` 源码阅读，也不把源码笔记描述成 toolgap-kv 已完成集成。 ## 手写 l3 契约 ### 有界异步执行器 从空文件实现： ```python class boundedasyncexecutor: async def start(self): ... async def submit(self, job_id, operation, timeout) -> asyncio.future: ... async def cancel(self, job_id): ... async def shutdown(self): ... ``` 核心代码约 80-120 行，不含测试，只包含： - bounded `asyncio.queue`； - 固定数量 worker tasks； - `jobrecord`、job identity/attempt 和明确状态机； - 每个 job 的对外结果 future； - timeout、cancel、exception 与 cleanup； - late/duplicate completion fencing； - 冻结的 queue-full 契约：立即抛出 `executoroverloaded`。 `submit` 只负责 admission：成功时入队并返回代表对外结果的 future；队列已满时立即拒绝，不在调用方积累无限个等待 queue space 的 coroutine。调用方再等待返回的 future 获取成功、失败、超时或取消结果。 ### 状态机与 timeout 语义 只允许以下转换： ```text queued -> running -> succeeded -> failed -> timed_out -> cancelled queued -> cancelled ``` 所有终态不可再次变化。timeout 到达后： 1. executor 冻结对外状态为 `timed_out`； 2. executor 请求取消 operation，但不假设它已经停止； 3. worker slot 在 operation 真正退出前保持占用； 4. 若 operation 抑制取消并晚到返回，其结果被丢弃； 5. operation 退出并完成清理后才释放并发槽位。 永久不响应取消的工作需要进程隔离或外部强制终止，不属于本手写题。不能为了“恢复容量”而在底层工作仍运行时提前释放 slot，否则实际并发会突破上限。 ### 必须保持的不变量 - 同时运行数量不超过配置上限； - 队列容量有限，生产长期快于消费时不会无限积压； - 每个 admitted job 只有一个对外可见终态； - timeout/cancel 后的 completion 不能覆盖终态； - operation 异常不能杀死整个 worker loop； - queue slot、worker、future 和任务句柄最终被清理； - duplicate cancel/complete 保持幂等； - shutdown 后不再接收任务，且不遗留后台 task。 ### 六个确定性测试 优先使用 `event`、受控 future 或 barrier 主动控制交错，不用大量 `sleep` 猜测时序： 1. 同时运行数不超过上限； 2. queue full 时立即返回 `executoroverloaded`； 3. queued job 能被取消且不再运行； 4. running job 超时后，晚到 completion 不能改写终态，并且 operation 退出前不提前释放 slot； 5. operation 抛异常后 worker 继续工作且容量许可不泄漏； 6. shutdown 正确处理 queued/running jobs，且没有悬挂任务。 duplicate cancel、terminal immutability 和 cleanup 断言合并进上述测试，不再新增重复测试。 ### 时间限制 - 45-60 分钟完成正常链路、状态机和基础错误处理； - 30-45 分钟补齐确定性故障测试； - 面试只要求大意代码时，先写状态、不变量和核心控制流； - 正式复习验收仍要求本地测试通过。 该练习验证通用异步控制能力，不实现网络服务器、线程池、完整 rpc 框架、分布式任务系统或生产级 executor。 ## 实验 l0 契约 本节点不要求吞吐 benchmark、event-loop 对比、真实多实例服务或独立故障注入平台： - 六个测试属于手写正确性验收，不提升实验等级； - example、mock operation 和受控交错最多是 `simulated` 学习证据； - 没有固定 workload、运行环境和原始测量产物时，不声称吞吐、延迟或资源利用率改善； - 若未来 jd 明确要求 python runtime 或高并发网关性能，再单独提升实验和源码深度。 ## 面试连续追问 必须脱稿回答： 1. `await` 做了什么，为什么不等于启动线程； 2. 连续写两个 `await` 为什么可能仍然串行； 3. blocking function 为什么会卡住同一 event loop 上的其他 coroutine； 4. gil 为什么不能保证业务状态线程安全； 5. timeout 以后底层工作是否一定停止； 6. cancel 与 completion 同时发生时怎样冻结终态； 7. semaphore 和 bounded queue 分别限制什么； 8. 无限队列为什么会把过载转化为内存压力和尾延迟； 9. 怎样证明资源只释放一次； 10. epoch 为什么能拒绝旧完成，却不能自动保证资源已清理。 至少完成一道 15 分钟连续场景题： > 一个异步 kv restore 任务有并发上限和有界队列。请求超时并触发 recompute 后，旧 restore completion 晚到；同时客户端取消，系统准备 shutdown。说明任务、请求、kv 可见性和资源所有者，给出合法状态转换、终态竞争规则、fencing、backpressure 和 cleanup 顺序。 回答必须区分“拒绝旧 completion 影响可见状态”和“回收旧 operation 已占资源”，不能把 epoch 当作自动清理机制。 ## 与 toolgap-kv 的边界 本节点为 toolgap-kv 的 lifecycle identity/epoch、异步 completion fencing、fallback、cancellation、cleanup 和 decisiontrace 提供通用基础，但不改变当前能力状态： - python/vllm 源码阅读不是 toolgap-kv runtime `shipped`； - `boundedasyncexecutor` 是独立学习练习，不自动成为项目实现； - mock operation、受控 future 和确定性交错最多是 `simulated`； - 只有仓库内候选人拥有的生命周期实现、测试与证据存在后，才能提升项目声明； - 不用本节点替代 ct1-ct3 对真实 runtime ownership 的完成要求。 ## 明确不要求 - go 并发、goroutine、channel、`select`、context、go scheduler 或 gc； - python 完整语法、元类、descriptor、完整 gc 或所有 `asyncio` api； - cpython bytecode、解释器、gil 源码或完整 event-loop 内部实现； - linux cfs、futex、epoll 内核实现和上下文切换汇编； - c++ 内存模型形式化细节； - lock-free queue、hazard pointer、rcu 和无锁内存回收； - 手写 event loop、线程池、网络服务器或生产 rpc 框架； - 分布式共识、事务消息或把 exactly-once 当成单机状态机问题； - 独立性能实验、吞吐优化或生产集成声明。 ## 完成证据 只有以下材料齐全，节点才能标记为完成： - 一份 `async/await` 执行时序说明； - 有界异步执行器和六个确定性测试； - 固定 python 版本的 `asyncio` source trace； - 固定 vllm 版本的异步请求 source trace； - 一次闭卷限时手写记录； - 一轮口述追问、场景题作答和错误修正记录。 验收顺序建议是：先原理与最小 asyncio 练习，再手写执行器和故障测试，最后做源码 trace 与闭卷复测。源码阅读放在能够运行和修改最小代码之后，避免把“看懂调用链”误当成“能独立处理并发正确性”。 "

    "detail_html": "<h2>12｜模型加载、权重管理与推理引擎启动链路详细知识列表<\/h2>\n<blockquote>优先级：P1；包含面试启动前必须完成的 P0 防守子集 当前状态：已敲定源码主线与最小复现，原理、源码 trace 和正常/失败/修正运行待完成 目标熟练度：原理 L2 / 源码 L2 / 手写 L0 / 实验 L1 预计投入：集中学习约 6-10 小时，实际完成以验收证据为准 依赖：<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/05-performance-analysis-and-gpu-literacy.md\">性能分析与 GPU 最小认知<\/a>、<a href=\"topics/07-quantization-and-low-precision-inference.md\">量化与低精度推理<\/a>、<a href=\"topics/08-multi-gpu-model-execution-and-collectives.md\">多 GPU 模型执行与集合通信<\/a>、<a href=\"topics/10-serving-routing-and-control-plane.md\">Serving 路由与平台控制面<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能沿固定版本 vLLM 的真实链路解释初始化的数据流、控制流、内存变化与失败边界：<\/p>\n<pre><code class=\"language-text\">CLI / EngineArgs\n  -&gt; 模型、dtype、量化和并行配置校验\n  -&gt; device / distributed environment 初始化\n  -&gt; worker / model runner 创建\n  -&gt; model loader 选择\n  -&gt; 模型结构创建与权重加载\n  -&gt; rank-local weight shard 映射\n  -&gt; memory profiling\n  -&gt; KV Cache 容量计算与初始化\n  -&gt; warmup / CUDA Graph 准备\n  -&gt; engine ready<\/code><\/pre>\n<p>回答必须区分：<\/p>\n<ul>\n<li>进程已经启动；<\/li>\n<li>模型配置已经解析；<\/li>\n<li>模型对象已经创建；<\/li>\n<li>权重已经加载；<\/li>\n<li>KV Cache 已经初始化；<\/li>\n<li>warmup/可选 graph capture 已经完成；<\/li>\n<li>服务真正 ready 并能完成请求。<\/li>\n<\/ul>\n<p>本节点采用“启动全链路源码 + 单次故障复现”。不只整理配置参数，也不建设加载性能工程项目。<\/p>\n<h3>与已有节点的责任边界<\/h3>\n<ol>\n<li>Topic 07 负责量化数值语义、兼容性和 kernel dispatch；本节点只解释量化配置与权重怎样进入 loader；<\/li>\n<li>Topic 08 负责 TP 数学、rank/group 和 collective；本节点只解释 rank 怎样获得自己的 weight shard；<\/li>\n<li>Topic 05 负责 benchmark 可信度；本节点不比较冷启动性能；<\/li>\n<li>Topic 03 负责运行时 KV block 生命周期；本节点只负责启动时 KV 容量的计算与分配；<\/li>\n<li>Topic 10 负责副本扩容、placement 和 readiness 消费；本节点只负责单个 engine 何时能够声明 ready。<\/li>\n<\/ol>\n<p>知道 rank 怎样调用 loader 不等于掌握 TP 数学；知道量化 loader 成功也不等于证明目标 quantized kernel 已经执行。各节点必须分别完成自己的证据门槛。<\/p>\n<h3>P0 防守要求<\/h3>\n<p>开始目标岗位面试前，应能脱稿回答：<\/p>\n<ol>\n<li>为什么模型权重文件大小、CPU 内存峰值、GPU 显存峰值和 steady-state 显存不同；<\/li>\n<li>模型权重理论上能够放入 GPU，为什么启动时仍可能 OOM；<\/li>\n<li>Safetensors 与 PyTorch checkpoint 在安全性、元数据和加载方式上的基本差异；<\/li>\n<li>FP32、BF16、FP16 和量化权重怎样影响文件大小、加载路径和运行 dtype；<\/li>\n<li>为什么使用 meta device、empty initialization 或 shard-aware loading；<\/li>\n<li>TP 模型完整加载后切分与每个 rank 只加载自己的 shard 有什么内存和 I/O trade-off；<\/li>\n<li>model config、revision、tokenizer、权重 shape 或量化配置不兼容时可能在哪里失败；<\/li>\n<li><code>gpu_memory_utilization<\/code>、<code>max_model_len<\/code>、KV Cache block 数和并发容量之间有什么因果关系；<\/li>\n<li>为什么权重加载完成后还要进行 memory profiling、KV Cache 初始化和 warmup；<\/li>\n<li>CUDA Graph 为什么可能降低运行开销，却增加启动时间、显存占用和 shape 约束；<\/li>\n<li>为什么“进程启动”“模型加载完成”和“服务 ready”不是同一个状态；<\/li>\n<li>怎样根据日志与显存变化判断失败发生在权重加载、KV Cache 分配还是 warmup 阶段。<\/li>\n<\/ol>\n<p>P0 防守不要求背全部参数或精确类名。通过标准是能够画出启动链、解释主要资源项，并完成后文的连续故障场景题。<\/p>\n<h3>原理 L2 详细知识列表<\/h3>\n<h4>模型身份与配置<\/h4>\n<ul>\n<li>model ID、本地路径、revision、config revision 和 tokenizer revision 的关系；<\/li>\n<li>architecture、hidden size、layer/head 数、context length 和 vocabulary 怎样约束权重 shape；<\/li>\n<li>dtype 自动选择、显式覆盖和硬件兼容性；<\/li>\n<li>quantization、load format、trust-remote-code 和模型实现选择在配置阶段的作用；<\/li>\n<li>TP/PP degree、rank/world size 与模型结构整除条件；<\/li>\n<li>配置校验应尽早拒绝不兼容组合，避免加载大量权重后才失败；<\/li>\n<li>固定模型 revision、引擎 commit 和启动参数是可复现 trace 的前提。<\/li>\n<\/ul>\n<h4>权重格式与加载路径<\/h4>\n<ul>\n<li>checkpoint index、单文件和多 shard 文件的组织直觉；<\/li>\n<li>Safetensors 与 pickle-based checkpoint 的基本安全和加载差异；<\/li>\n<li>loader 怎样根据 load format、模型类型、量化方法或可选依赖选择路径；<\/li>\n<li>模型参数名、checkpoint key 和运行时 module 之间需要映射；<\/li>\n<li>tied weights、stacked parameters、QKV 或 gate/up 等布局可能需要特殊映射；<\/li>\n<li>missing、unexpected 或 shape-mismatched weights 应显式失败或遵循可解释规则；<\/li>\n<li>lazy、streaming 或 shard-aware load 的目标是降低峰值复制和无关 I/O，不保证启动时间一定更短。<\/li>\n<\/ul>\n<p>只理解格式和 loader 契约，不实现 Safetensors parser、checkpoint index 或 converter。<\/p>\n<h4>加载期间的内存生命周期<\/h4>\n<ul>\n<li>磁盘文件大小不等于 CPU RSS、GPU allocated、GPU reserved 或启动峰值；<\/li>\n<li>checkpoint buffer、反序列化对象、模型参数、临时转换张量和 allocator cache 可能同时存在；<\/li>\n<li>meta/empty initialization 用无存储参数结构避免先随机初始化完整模型；<\/li>\n<li>dtype cast、layout conversion、parameter packing 或设备搬运可能产生临时峰值；<\/li>\n<li>权重、KV Cache、workspace、CUDA Graph pool 和运行时保留显存共同竞争 HBM；<\/li>\n<li>allocated、reserved、device free memory 与框架可安全使用预算不是同一指标；<\/li>\n<li>worker 或部分 rank 初始化失败时，需要考虑进程组和显存资源清理。<\/li>\n<\/ul>\n<p>只要求根据日志和阶段内存快照归因，不学习 CUDA allocator 源码、mmap 或 page-cache 实现。<\/p>\n<h4>TP 与量化权重映射<\/h4>\n<ul>\n<li>每个 rank 建立相同逻辑模型，但可能只物化本地参数 shard；<\/li>\n<li>load-then-slice、每 rank 重复读取和 shard-aware load 具有不同峰值内存与 I/O；<\/li>\n<li>Column/Row/QKV/Embedding 的切分数学归入 Topic 08，本节点只追踪 loader 怎样获得 rank-local tensor；<\/li>\n<li>checkpoint 原始 shard 边界不一定等于 TP rank 边界，可能需要重新切片或映射；<\/li>\n<li>quantized weight、scale、zero point 或 packing metadata 必须与运行时 module 和 kernel contract 匹配；<\/li>\n<li>量化 loader 成功不证明目标 kernel 被使用，dispatch/fallback 归入 Topic 07；<\/li>\n<li>多 rank 中任一加载失败都可能阻止 engine ready，需要保存 rank-specific 日志。<\/li>\n<\/ul>\n<h4>KV Cache 初始化、warmup 与 readiness<\/h4>\n<ul>\n<li>权重加载后通过 profiling 或预算计算估计可供 KV Cache 使用的显存；<\/li>\n<li><code>gpu_memory_utilization<\/code> 是预算策略的一部分，不等于实际业务显存占用比例；<\/li>\n<li>bytes per token、layer 数、KV heads、head size、dtype 和 block size 共同决定 KV 容量；<\/li>\n<li><code>max_model_len<\/code>、最大并发、block 数和调度容量必须在同一预算下成立；<\/li>\n<li>KV block pool 创建后仍可能需要 workspace、warmup 和可选 CUDA Graph 资源；<\/li>\n<li>warmup 用代表性 shape 初始化执行路径、触发必要的 lazy work 或验证模型运行；<\/li>\n<li>CUDA Graph 只要求理解捕获前置条件、额外内存和静态 shape/地址约束；<\/li>\n<li>ready 必须晚于必要 worker、模型、KV Cache 和执行路径全部准备完成；<\/li>\n<li>失败时要明确 fail fast、降级 eager、缩小容量还是停止服务，不能错误暴露 readiness。<\/li>\n<\/ul>\n<h3>源码 L2 契约<\/h3>\n<h4>固定主实现<\/h4>\n<p>学习开始时固定一个 vLLM release/commit、一个 model revision 和一套真实启动参数。具体类名和函数名以该版本为准，不追逐浮动 <code>main<\/code>。<\/p>\n<p>沿以下链路完成一次 source trace：<\/p>\n<pre><code class=\"language-text\">CLI / EngineArgs\n  -&gt; engine/model/cache/parallel configuration\n  -&gt; device and distributed initialization\n  -&gt; worker / executor / model runner construction\n  -&gt; model loader selection\n  -&gt; model construction and load_weights\n  -&gt; rank-local parameter mapping\n  -&gt; memory profiling / available-memory decision\n  -&gt; cache configuration and allocation\n  -&gt; warmup / optional graph capture\n  -&gt; ready or initialization failure<\/code><\/pre>\n<p>源码笔记必须保存项目、release/commit、model revision、入口、关键对象、控制流、内存所有者、失败传播和阶段图，并回答：<\/p>\n<ul>\n<li>用户参数怎样进入最终 engine、model、parallel 和 cache 配置；<\/li>\n<li>哪个对象创建模型，哪个对象选择 loader，哪个对象执行权重映射；<\/li>\n<li>load format 和量化配置怎样选择真实路径；<\/li>\n<li>加载期间哪些对象可能同时持有 CPU/GPU 权重或临时张量；<\/li>\n<li>rank identity 怎样影响参数 shard；<\/li>\n<li>引擎怎样得到可用显存并换算为 KV block 数；<\/li>\n<li><code>max_model_len<\/code> 与 cache capacity 在哪里校验；<\/li>\n<li>warmup/CUDA Graph 在 ready 前完成什么；<\/li>\n<li>初始化异常怎样跨 worker/executor 传播并触发清理；<\/li>\n<li>哪些步骤属于 vLLM，哪些属于 Transformers、PyTorch、量化库或 CUDA runtime。<\/li>\n<\/ul>\n<p>不精读 Transformers 全部加载实现、PyTorch serialization、CUDA allocator、NCCL 初始化或 CUDA Graph 内部捕获逻辑。<\/p>\n<h3>手写 L0 契约<\/h3>\n<p>不要求从空文件实现：<\/p>\n<ul>\n<li>model loader、checkpoint parser 或 tensor-name mapper；<\/li>\n<li>meta-device 模型构造框架；<\/li>\n<li>TP/PP checkpoint resharding；<\/li>\n<li>显存 allocator、KV Cache allocator 或 CUDA Graph manager；<\/li>\n<li>checkpoint converter、下载器或分布式加载服务。<\/li>\n<\/ul>\n<p>面试要求伪代码时，只需画阶段状态机、资源项和失败分支。源码 trace 与故障复现已经能够验证本节点需要的工程判断，独立手写上述组件的性价比过低。<\/p>\n<h3>实验 L1 契约<\/h3>\n<h4>固定环境清单<\/h4>\n<p>使用现有本地或云端环境能够稳定运行的小模型，不强制目标大模型、多 GPU、量化模型或生产部署。记录：<\/p>\n<ul>\n<li>vLLM release/commit 与安装方式；<\/li>\n<li>model ID 和 revision；<\/li>\n<li>GPU/CPU、显存/内存、driver/runtime 和 dtype；<\/li>\n<li>完整启动命令与环境变量；<\/li>\n<li>是否启用 TP、量化、eager/CUDA Graph；<\/li>\n<li>原始日志和观察时间点。<\/li>\n<\/ul>\n<h4>正常启动 trace<\/h4>\n<p>完成一次从命令启动到 ready 的真实运行，保存：<\/p>\n<ul>\n<li>各阶段关键日志和时间顺序；<\/li>\n<li>config、worker/model runner、loader、memory profiling、KV Cache 与 warmup 的源码锚点；<\/li>\n<li>进程 CPU 内存与 GPU 显存的阶段性变化；<\/li>\n<li>最终 ready 证据和一个最小请求成功证据；<\/li>\n<li>一张阶段表：<\/li>\n<\/ul>\n<div class=\"table-wrap\"><table><thead><tr>\n<th>阶段<\/th>\n<th>关键对象<\/th>\n<th>内存变化<\/th>\n<th>成功证据<\/th>\n<th>可能失败<\/th>\n<\/tr><\/thead><tbody>\n<tr>\n<td>配置校验<\/td>\n<td>Engine/model config<\/td>\n<td>小<\/td>\n<td>配置构造完成<\/td>\n<td>revision/dtype/并行配置不兼容<\/td>\n<\/tr>\n<tr>\n<td>权重加载<\/td>\n<td>Loader/model runner<\/td>\n<td>大<\/td>\n<td>参数加载完成<\/td>\n<td>OOM、missing/shape mismatch<\/td>\n<\/tr>\n<tr>\n<td>KV 初始化<\/td>\n<td>Cache config/allocator<\/td>\n<td>大<\/td>\n<td>block 数确定并分配<\/td>\n<td>context 或容量不足<\/td>\n<\/tr>\n<tr>\n<td>Warmup<\/td>\n<td>Model runner<\/td>\n<td>额外开销<\/td>\n<td>engine ready<\/td>\n<td>graph、shape 或显存失败<\/td>\n<\/tr>\n<\/tbody><\/table><\/div>\n<p>不要求高精度测量加载时间，也不比较多个 loader 或配置的性能。<\/p>\n<h4>主动失败与修正复测<\/h4>\n<p>优先通过过大的 <code>max_model_len<\/code> 或不合理的 KV 显存预算，使固定环境在 KV capacity 校验附近产生可解释失败。如果固定版本更早在配置阶段拒绝该组合，同样属于有效证据；必须以真实日志为准，不能为符合预想强行解释。<\/p>\n<p>完成以下闭环：<\/p>\n<ol>\n<li>运行前预测失败阶段和原因；<\/li>\n<li>保存命令、原始日志、显存状态和异常；<\/li>\n<li>根据源码确认属于配置、权重、KV capacity 还是 warmup；<\/li>\n<li>只修改一个直接相关变量，并说明牺牲的 context、并发、精度、graph 能力或硬件成本；<\/li>\n<li>重新运行到 ready，并完成一个最小请求；<\/li>\n<li>记录预测与实际不一致之处。<\/li>\n<\/ol>\n<p>真实运行只能标记为该固定环境启动行为的 <code>experimentally validated<\/code>；mock、他人日志或只读源码最多是 <code>simulated<\/code>。单次启动不能外推为冷启动性能、所有模型兼容性或生产可靠性结论。<\/p>\n<h3>场景题验收<\/h3>\n<p>至少完成一道 15 分钟连续场景题：<\/p>\n<blockquote>一个 BF16 模型的权重能够成功加载到 24 GB GPU，但随后引擎在 KV Cache 初始化或 warmup 阶段失败。日志显示剩余可用显存不足，同时配置了较大的 <code>max_model_len<\/code> 和较高并发目标。请定位失败阶段，解释显存组成，给出调整顺序，并说明每种调整牺牲了什么。<\/blockquote>\n<p>回答必须建立资源式：<\/p>\n<pre><code class=\"language-text\">权重显存\n+ KV Cache\n+ 临时 workspace\n+ CUDA Graph / warmup 额外占用\n+ allocator reserved / fragmentation\n= 实际启动显存需求<\/code><\/pre>\n<p>并覆盖：<\/p>\n<ol>\n<li>从日志确认失败阶段，而不是把所有失败归因于权重；<\/li>\n<li>验证 model revision、dtype、量化和 TP 配置；<\/li>\n<li>区分 <code>max_model_len<\/code>、KV block 数、最大并发和实际 workload；<\/li>\n<li>根据目标调整 context、并发、dtype/量化、TP 或 graph 配置；<\/li>\n<li>重新运行并验证服务真正进入 ready；<\/li>\n<li>不把“成功启动”描述成性能更优。<\/li>\n<\/ol>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>本节点可以为 ToolGap-KV 提供模型配置兼容性、KV 容量和 engine-ready 前置条件的理解，也能帮助解释为什么生命周期 runtime 只能在物理 KV 数据面可用后开始工作。<\/p>\n<p>当前能力状态保持：<\/p>\n<ul>\n<li>模型加载、checkpoint 格式和 CUDA Graph 不属于 ToolGap-KV CT1-CT3；<\/li>\n<li>阅读 vLLM loader 或完成 Topic 12 实验不能标记为 ToolGap-KV <code>shipped<\/code>；<\/li>\n<li>不为 ToolGap-KV 新增自定义 model loader、checkpoint converter 或启动优化功能；<\/li>\n<li>固定环境的真实运行只验证该环境中的启动行为；<\/li>\n<li>只有仓库出现候选人拥有的接口、测试和证据后，才能提升对应项目声明。<\/li>\n<\/ul>\n<h3>明确不要求<\/h3>\n<ul>\n<li>手写 Safetensors、pickle/checkpoint parser 或 checkpoint index；<\/li>\n<li>实现 Hugging Face 模型转换、下载和缓存工具链；<\/li>\n<li>深入 mmap、page cache、direct I/O 或文件系统实现；<\/li>\n<li>深入 PyTorch serialization、CUDA allocator 或 CUDA Graph 源码；<\/li>\n<li>完整恢复 vLLM 支持的全部 loader、model architecture 或量化格式；<\/li>\n<li>多节点并行加载、distributed checkpoint、对象存储和远端 streaming load；<\/li>\n<li>model loader、KV allocator 或 graph manager 手写；<\/li>\n<li>多模型、多 GPU、多 loader 的冷启动 benchmark；<\/li>\n<li>Kubernetes/Ray autoscaling、镜像分发或生产 rollout；<\/li>\n<li>把单次启动结果包装成通用性能、兼容性或生产可靠性结论。<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<p>只有以下材料齐全，节点才能标记为完成：<\/p>\n<ul>\n<li>一张固定版本 vLLM 启动链路图；<\/li>\n<li>一份关键源码路径、对象所有权、失败传播和清理笔记；<\/li>\n<li>一次正常启动的完整命令、原始日志和阶段显存表；<\/li>\n<li>一次主动制造的启动失败及根因分析；<\/li>\n<li>一次修正配置后的成功复测和最小请求；<\/li>\n<li>一轮十二道 P0 口述题、连续场景题和错误修正记录。<\/li>\n<\/ul>\n<p>建议顺序是：先建立内存构成和阶段模型，再运行正常启动建立日志锚点，然后读通对应源码，最后制造失败并复测。这样源码阅读有真实现象作为索引，不会退化为无边界浏览 vLLM 仓库。<\/p>",
    "search_text": "12 模型加载、权重管理与推理引擎启动链路 p1；其中启动阶段、内存构成、kv 容量关系和失败定位属于面试启动前的 p0 防守要求 已敲定源码主线与最小复现，原理、源码 trace 和正常/失败/修正运行待完成 能沿固定版本 vllm 解释配置校验、worker/model runner、loader、rank-local 权重映射、显存 profiling、kv cache 初始化、warmup 和 ready/failure，并根据日志与显存变化定位启动失败。 聚焦单引擎从进程启动到 ready；不手写 model loader/checkpoint parser，不做冷启动 benchmark、多节点加载、cuda allocator 深挖或 kubernetes/ray rollout。 # 12｜模型加载、权重管理与推理引擎启动链路详细知识列表 > 优先级：p1；包含面试启动前必须完成的 p0 防守子集 > > 当前状态：已敲定源码主线与最小复现，原理、源码 trace 和正常/失败/修正运行待完成 > > 目标熟练度：原理 l2 / 源码 l2 / 手写 l0 / 实验 l1 > > 预计投入：集中学习约 6-10 小时，实际完成以验收证据为准 > > 依赖：[kv cache 与内存系统](03-kv-cache-memory-system.md)、[性能分析与 gpu 最小认知](05-performance-analysis-and-gpu-literacy.md)、[量化与低精度推理](07-quantization-and-low-precision-inference.md)、[多 gpu 模型执行与集合通信](08-multi-gpu-model-execution-and-collectives.md)、[serving 路由与平台控制面](10-serving-routing-and-control-plane.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能沿固定版本 vllm 的真实链路解释初始化的数据流、控制流、内存变化与失败边界： ```text cli / engineargs -> 模型、dtype、量化和并行配置校验 -> device / distributed environment 初始化 -> worker / model runner 创建 -> model loader 选择 -> 模型结构创建与权重加载 -> rank-local weight shard 映射 -> memory profiling -> kv cache 容量计算与初始化 -> warmup / cuda graph 准备 -> engine ready ``` 回答必须区分： - 进程已经启动； - 模型配置已经解析； - 模型对象已经创建； - 权重已经加载； - kv cache 已经初始化； - warmup/可选 graph capture 已经完成； - 服务真正 ready 并能完成请求。 本节点采用“启动全链路源码 + 单次故障复现”。不只整理配置参数，也不建设加载性能工程项目。 ## 与已有节点的责任边界 1. topic 07 负责量化数值语义、兼容性和 kernel dispatch；本节点只解释量化配置与权重怎样进入 loader； 2. topic 08 负责 tp 数学、rank/group 和 collective；本节点只解释 rank 怎样获得自己的 weight shard； 3. topic 05 负责 benchmark 可信度；本节点不比较冷启动性能； 4. topic 03 负责运行时 kv block 生命周期；本节点只负责启动时 kv 容量的计算与分配； 5. topic 10 负责副本扩容、placement 和 readiness 消费；本节点只负责单个 engine 何时能够声明 ready。 知道 rank 怎样调用 loader 不等于掌握 tp 数学；知道量化 loader 成功也不等于证明目标 quantized kernel 已经执行。各节点必须分别完成自己的证据门槛。 ## p0 防守要求 开始目标岗位面试前，应能脱稿回答： 1. 为什么模型权重文件大小、cpu 内存峰值、gpu 显存峰值和 steady-state 显存不同； 2. 模型权重理论上能够放入 gpu，为什么启动时仍可能 oom； 3. safetensors 与 pytorch checkpoint 在安全性、元数据和加载方式上的基本差异； 4. fp32、bf16、fp16 和量化权重怎样影响文件大小、加载路径和运行 dtype； 5. 为什么使用 meta device、empty initialization 或 shard-aware loading； 6. tp 模型完整加载后切分与每个 rank 只加载自己的 shard 有什么内存和 i/o trade-off； 7. model config、revision、tokenizer、权重 shape 或量化配置不兼容时可能在哪里失败； 8. `gpu_memory_utilization`、`max_model_len`、kv cache block 数和并发容量之间有什么因果关系； 9. 为什么权重加载完成后还要进行 memory profiling、kv cache 初始化和 warmup； 10. cuda graph 为什么可能降低运行开销，却增加启动时间、显存占用和 shape 约束； 11. 为什么“进程启动”“模型加载完成”和“服务 ready”不是同一个状态； 12. 怎样根据日志与显存变化判断失败发生在权重加载、kv cache 分配还是 warmup 阶段。 p0 防守不要求背全部参数或精确类名。通过标准是能够画出启动链、解释主要资源项，并完成后文的连续故障场景题。 ## 原理 l2 详细知识列表 ### 模型身份与配置 - model id、本地路径、revision、config revision 和 tokenizer revision 的关系； - architecture、hidden size、layer/head 数、context length 和 vocabulary 怎样约束权重 shape； - dtype 自动选择、显式覆盖和硬件兼容性； - quantization、load format、trust-remote-code 和模型实现选择在配置阶段的作用； - tp/pp degree、rank/world size 与模型结构整除条件； - 配置校验应尽早拒绝不兼容组合，避免加载大量权重后才失败； - 固定模型 revision、引擎 commit 和启动参数是可复现 trace 的前提。 ### 权重格式与加载路径 - checkpoint index、单文件和多 shard 文件的组织直觉； - safetensors 与 pickle-based checkpoint 的基本安全和加载差异； - loader 怎样根据 load format、模型类型、量化方法或可选依赖选择路径； - 模型参数名、checkpoint key 和运行时 module 之间需要映射； - tied weights、stacked parameters、qkv 或 gate/up 等布局可能需要特殊映射； - missing、unexpected 或 shape-mismatched weights 应显式失败或遵循可解释规则； - lazy、streaming 或 shard-aware load 的目标是降低峰值复制和无关 i/o，不保证启动时间一定更短。 只理解格式和 loader 契约，不实现 safetensors parser、checkpoint index 或 converter。 ### 加载期间的内存生命周期 - 磁盘文件大小不等于 cpu rss、gpu allocated、gpu reserved 或启动峰值； - checkpoint buffer、反序列化对象、模型参数、临时转换张量和 allocator cache 可能同时存在； - meta/empty initialization 用无存储参数结构避免先随机初始化完整模型； - dtype cast、layout conversion、parameter packing 或设备搬运可能产生临时峰值； - 权重、kv cache、workspace、cuda graph pool 和运行时保留显存共同竞争 hbm； - allocated、reserved、device free memory 与框架可安全使用预算不是同一指标； - worker 或部分 rank 初始化失败时，需要考虑进程组和显存资源清理。 只要求根据日志和阶段内存快照归因，不学习 cuda allocator 源码、mmap 或 page-cache 实现。 ### tp 与量化权重映射 - 每个 rank 建立相同逻辑模型，但可能只物化本地参数 shard； - load-then-slice、每 rank 重复读取和 shard-aware load 具有不同峰值内存与 i/o； - column/row/qkv/embedding 的切分数学归入 topic 08，本节点只追踪 loader 怎样获得 rank-local tensor； - checkpoint 原始 shard 边界不一定等于 tp rank 边界，可能需要重新切片或映射； - quantized weight、scale、zero point 或 packing metadata 必须与运行时 module 和 kernel contract 匹配； - 量化 loader 成功不证明目标 kernel 被使用，dispatch/fallback 归入 topic 07； - 多 rank 中任一加载失败都可能阻止 engine ready，需要保存 rank-specific 日志。 ### kv cache 初始化、warmup 与 readiness - 权重加载后通过 profiling 或预算计算估计可供 kv cache 使用的显存； - `gpu_memory_utilization` 是预算策略的一部分，不等于实际业务显存占用比例； - bytes per token、layer 数、kv heads、head size、dtype 和 block size 共同决定 kv 容量； - `max_model_len`、最大并发、block 数和调度容量必须在同一预算下成立； - kv block pool 创建后仍可能需要 workspace、warmup 和可选 cuda graph 资源； - warmup 用代表性 shape 初始化执行路径、触发必要的 lazy work 或验证模型运行； - cuda graph 只要求理解捕获前置条件、额外内存和静态 shape/地址约束； - ready 必须晚于必要 worker、模型、kv cache 和执行路径全部准备完成； - 失败时要明确 fail fast、降级 eager、缩小容量还是停止服务，不能错误暴露 readiness。 ## 源码 l2 契约 ### 固定主实现 学习开始时固定一个 vllm release/commit、一个 model revision 和一套真实启动参数。具体类名和函数名以该版本为准，不追逐浮动 `main`。 沿以下链路完成一次 source trace： ```text cli / engineargs -> engine/model/cache/parallel configuration -> device and distributed initialization -> worker / executor / model runner construction -> model loader selection -> model construction and load_weights -> rank-local parameter mapping -> memory profiling / available-memory decision -> cache configuration and allocation -> warmup / optional graph capture -> ready or initialization failure ``` 源码笔记必须保存项目、release/commit、model revision、入口、关键对象、控制流、内存所有者、失败传播和阶段图，并回答： - 用户参数怎样进入最终 engine、model、parallel 和 cache 配置； - 哪个对象创建模型，哪个对象选择 loader，哪个对象执行权重映射； - load format 和量化配置怎样选择真实路径； - 加载期间哪些对象可能同时持有 cpu/gpu 权重或临时张量； - rank identity 怎样影响参数 shard； - 引擎怎样得到可用显存并换算为 kv block 数； - `max_model_len` 与 cache capacity 在哪里校验； - warmup/cuda graph 在 ready 前完成什么； - 初始化异常怎样跨 worker/executor 传播并触发清理； - 哪些步骤属于 vllm，哪些属于 transformers、pytorch、量化库或 cuda runtime。 不精读 transformers 全部加载实现、pytorch serialization、cuda allocator、nccl 初始化或 cuda graph 内部捕获逻辑。 ## 手写 l0 契约 不要求从空文件实现： - model loader、checkpoint parser 或 tensor-name mapper； - meta-device 模型构造框架； - tp/pp checkpoint resharding； - 显存 allocator、kv cache allocator 或 cuda graph manager； - checkpoint converter、下载器或分布式加载服务。 面试要求伪代码时，只需画阶段状态机、资源项和失败分支。源码 trace 与故障复现已经能够验证本节点需要的工程判断，独立手写上述组件的性价比过低。 ## 实验 l1 契约 ### 固定环境清单 使用现有本地或云端环境能够稳定运行的小模型，不强制目标大模型、多 gpu、量化模型或生产部署。记录： - vllm release/commit 与安装方式； - model id 和 revision； - gpu/cpu、显存/内存、driver/runtime 和 dtype； - 完整启动命令与环境变量； - 是否启用 tp、量化、eager/cuda graph； - 原始日志和观察时间点。 ### 正常启动 trace 完成一次从命令启动到 ready 的真实运行，保存： - 各阶段关键日志和时间顺序； - config、worker/model runner、loader、memory profiling、kv cache 与 warmup 的源码锚点； - 进程 cpu 内存与 gpu 显存的阶段性变化； - 最终 ready 证据和一个最小请求成功证据； - 一张阶段表： | 阶段 | 关键对象 | 内存变化 | 成功证据 | 可能失败 | |---|---|---:|---|---| | 配置校验 | engine/model config | 小 | 配置构造完成 | revision/dtype/并行配置不兼容 | | 权重加载 | loader/model runner | 大 | 参数加载完成 | oom、missing/shape mismatch | | kv 初始化 | cache config/allocator | 大 | block 数确定并分配 | context 或容量不足 | | warmup | model runner | 额外开销 | engine ready | graph、shape 或显存失败 | 不要求高精度测量加载时间，也不比较多个 loader 或配置的性能。 ### 主动失败与修正复测 优先通过过大的 `max_model_len` 或不合理的 kv 显存预算，使固定环境在 kv capacity 校验附近产生可解释失败。如果固定版本更早在配置阶段拒绝该组合，同样属于有效证据；必须以真实日志为准，不能为符合预想强行解释。 完成以下闭环： 1. 运行前预测失败阶段和原因； 2. 保存命令、原始日志、显存状态和异常； 3. 根据源码确认属于配置、权重、kv capacity 还是 warmup； 4. 只修改一个直接相关变量，并说明牺牲的 context、并发、精度、graph 能力或硬件成本； 5. 重新运行到 ready，并完成一个最小请求； 6. 记录预测与实际不一致之处。 真实运行只能标记为该固定环境启动行为的 `experimentally validated`；mock、他人日志或只读源码最多是 `simulated`。单次启动不能外推为冷启动性能、所有模型兼容性或生产可靠性结论。 ## 场景题验收 至少完成一道 15 分钟连续场景题： > 一个 bf16 模型的权重能够成功加载到 24 gb gpu，但随后引擎在 kv cache 初始化或 warmup 阶段失败。日志显示剩余可用显存不足，同时配置了较大的 `max_model_len` 和较高并发目标。请定位失败阶段，解释显存组成，给出调整顺序，并说明每种调整牺牲了什么。 回答必须建立资源式： ```text 权重显存 + kv cache + 临时 workspace + cuda graph / warmup 额外占用 + allocator reserved / fragmentation = 实际启动显存需求 ``` 并覆盖： 1. 从日志确认失败阶段，而不是把所有失败归因于权重； 2. 验证 model revision、dtype、量化和 tp 配置； 3. 区分 `max_model_len`、kv block 数、最大并发和实际 workload； 4. 根据目标调整 context、并发、dtype/量化、tp 或 graph 配置； 5. 重新运行并验证服务真正进入 ready； 6. 不把“成功启动”描述成性能更优。 ## 与 toolgap-kv 的边界 本节点可以为 toolgap-kv 提供模型配置兼容性、kv 容量和 engine-ready 前置条件的理解，也能帮助解释为什么生命周期 runtime 只能在物理 kv 数据面可用后开始工作。 当前能力状态保持： - 模型加载、checkpoint 格式和 cuda graph 不属于 toolgap-kv ct1-ct3； - 阅读 vllm loader 或完成 topic 12 实验不能标记为 toolgap-kv `shipped`； - 不为 toolgap-kv 新增自定义 model loader、checkpoint converter 或启动优化功能； - 固定环境的真实运行只验证该环境中的启动行为； - 只有仓库出现候选人拥有的接口、测试和证据后，才能提升对应项目声明。 ## 明确不要求 - 手写 safetensors、pickle/checkpoint parser 或 checkpoint index； - 实现 hugging face 模型转换、下载和缓存工具链； - 深入 mmap、page cache、direct i/o 或文件系统实现； - 深入 pytorch serialization、cuda allocator 或 cuda graph 源码； - 完整恢复 vllm 支持的全部 loader、model architecture 或量化格式； - 多节点并行加载、distributed checkpoint、对象存储和远端 streaming load； - model loader、kv allocator 或 graph manager 手写； - 多模型、多 gpu、多 loader 的冷启动 benchmark； - kubernetes/ray autoscaling、镜像分发或生产 rollout； - 把单次启动结果包装成通用性能、兼容性或生产可靠性结论。 ## 完成证据 只有以下材料齐全，节点才能标记为完成： - 一张固定版本 vllm 启动链路图； - 一份关键源码路径、对象所有权、失败传播和清理笔记； - 一次正常启动的完整命令、原始日志和阶段显存表； - 一次主动制造的启动失败及根因分析； - 一次修正配置后的成功复测和最小请求； - 一轮十二道 p0 口述题、连续场景题和错误修正记录。 建议顺序是：先建立内存构成和阶段模型，再运行正常启动建立日志锚点，然后读通对应源码，最后制造失败并复测。这样源码阅读有真实现象作为索引，不会退化为无边界浏览 vllm 仓库。 "

    "detail_html": "<h2>13｜C++ 系统编程防守详细知识列表<\/h2>\n<blockquote>优先级：P1；资源所有权、对象生命周期和基础同步属于面试启动前的 P0 防守要求 当前状态：已有算法题、WebServer 小项目和基础知识经历；长期未使用，待恢复与限时验收 目标熟练度：原理 L2 / 源码 L0 / 手写 L2 / 实验 L0 建议投入：10-15 小时 关联：<a href=\"topics/11-concurrency-async-state-machines.md\">并发、异步与状态机<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能恢复 C++ 系统编程的面试表达与小型实现能力：从对象生命周期和资源所有权解释 RAII、智能指针、拷贝/移动、容器失效和同步；在 Serving 场景中识别 buffer 提前释放、异步完成、数据竞争和关闭清理问题；限时完成一个 move-only RAII wrapper 和一个可关闭的 <code>BlockingQueue&lt;T&gt;<\/code>。<\/p>\n<p>本主题不是从零学习 C++，也不建立新的 C++ 项目。算法题继续使用 C++，但 LeetCode 训练与本主题的非算法系统手写分别验收。<\/p>\n<h3>当前基础与恢复原则<\/h3>\n<p>已有基础：<\/p>\n<ul>\n<li>使用 C++ 完成算法题；<\/li>\n<li>写过 WebServer 等小型项目；<\/li>\n<li>准备过 <code>malloc/free<\/code>、智能指针、虚函数等基础知识。<\/li>\n<\/ul>\n<p>恢复原则：<\/p>\n<ul>\n<li>先通过连续追问定位遗忘点，不按教程顺序重学全部语言；<\/li>\n<li>只恢复与资源所有权、并发正确性和系统代码阅读相关的语义；<\/li>\n<li>通过两项小型手写证明能力恢复，不重写 WebServer、线程池或内存池；<\/li>\n<li>不因为 C++ 出现在推理框架底层，就把路线扩张到 CUDA/operator 或编译器岗位。<\/li>\n<\/ul>\n<h3>面试启动前的 P0 防守子集<\/h3>\n<h4>对象生命周期与资源所有权<\/h4>\n<ul>\n<li>自动、静态、线程和动态存储期的基本区别；<\/li>\n<li>构造、析构、作用域退出、异常展开与 RAII；<\/li>\n<li><code>new/delete<\/code> 会建立和结束对象生命周期，<code>malloc/free<\/code> 只管理原始存储；<\/li>\n<li><code>new[]/delete[]<\/code>、placement new 和释放方式匹配的边界；<\/li>\n<li>裸指针、引用、observer 与 owner 的语义区别；<\/li>\n<li><code>unique_ptr<\/code> 的独占所有权、移动与自定义 deleter；<\/li>\n<li><code>shared_ptr<\/code> 的控制块、引用计数和线程安全边界；<\/li>\n<li><code>weak_ptr<\/code> 打破循环引用，以及 <code>lock()<\/code> 的失败语义；<\/li>\n<li>fd、socket、heap buffer、锁和线程句柄如何通过 RAII 管理；<\/li>\n<li>double free、use-after-free、泄漏和悬空引用的典型形成路径。<\/li>\n<\/ul>\n<p>通过标准：能够为一个异步 buffer 处理场景明确 owner、borrower、转移点和最终释放者，而不是只说“使用智能指针”。<\/p>\n<h4>拷贝、移动与异常安全<\/h4>\n<ul>\n<li>lvalue/rvalue、引用折叠不作为主线，但要能解释移动发生的基本条件；<\/li>\n<li>拷贝构造/赋值与移动构造/赋值的职责；<\/li>\n<li>Rule of Zero、Rule of Five 和资源类为什么通常禁止拷贝；<\/li>\n<li>moved-from 对象必须保持可析构、可赋值的有效但未指定状态；<\/li>\n<li>self-assignment、先获取后释放和 copy-and-swap 的正确性直觉；<\/li>\n<li><code>std::move<\/code> 只是转换，不保证一定发生移动；<\/li>\n<li><code>noexcept<\/code> 如何影响容器扩容时选择移动还是拷贝；<\/li>\n<li>basic/strong/no-throw exception guarantee 只要求建立边界，不要求系统证明。<\/li>\n<\/ul>\n<h4>多态、对象布局与类型边界<\/h4>\n<ul>\n<li>静态分派与动态分派；<\/li>\n<li>虚函数、vptr/vtable 的典型实现模型和一次间接调用成本；<\/li>\n<li>基类析构函数为什么在多态删除场景中需要是 virtual；<\/li>\n<li>object slicing、override 与 overload 的区别；<\/li>\n<li><code>static_cast<\/code>、<code>dynamic_cast<\/code>、<code>reinterpret_cast<\/code> 的风险边界；<\/li>\n<li>不依赖特定 ABI 声称对象布局的绝对细节。<\/li>\n<\/ul>\n<h4>STL、内存布局与失效规则<\/h4>\n<ul>\n<li><code>vector<\/code>、<code>deque<\/code>、<code>list<\/code>、<code>map<\/code>、<code>unordered_map<\/code> 的主要布局和复杂度；<\/li>\n<li>连续内存、pointer chasing、缓存局部性与系统性能的关系；<\/li>\n<li><code>vector<\/code> 扩容导致 iterator/reference/pointer 失效；<\/li>\n<li>erase、rehash、insert 等操作的典型失效边界，并以容器契约为准；<\/li>\n<li><code>reserve<\/code> 与 <code>resize<\/code> 的区别；<\/li>\n<li><code>emplace_back<\/code> 不自动保证比 <code>push_back<\/code> 更快或更正确；<\/li>\n<li>哈希表负载因子、rehash 和最坏复杂度的防守解释。<\/li>\n<\/ul>\n<h4>mutex、condition variable 与 atomic<\/h4>\n<ul>\n<li>data race 与普通的业务竞态不是同一概念；<\/li>\n<li>mutex 保护共享不变量，而不只是“保护一行代码”；<\/li>\n<li><code>lock_guard<\/code>、<code>unique_lock<\/code> 的职责区别；<\/li>\n<li>condition variable 必须配合共享谓词和 mutex；<\/li>\n<li>wait 应使用循环或谓词版本处理虚假唤醒；<\/li>\n<li>notify 不保存事件，状态必须由共享谓词表达；<\/li>\n<li>atomic 保证某个对象的原子操作，不自动维护跨对象不变量；<\/li>\n<li>基本 happens-before、可见性、<code>seq_cst<\/code> 与 acquire/release 直觉；<\/li>\n<li>不要求推导复杂 memory order 或实现无锁结构。<\/li>\n<\/ul>\n<p>通过标准：能够解释为什么 <code>if (queue.empty()) cv.wait(lock)<\/code> 错误，以及为什么只把计数器改成 atomic 不能让整个队列线程安全。<\/p>\n<h4>关闭、取消与清理<\/h4>\n<ul>\n<li>producer/consumer 的正常关闭语义；<\/li>\n<li>close 后是否允许 drain 已入队元素必须明确；<\/li>\n<li>等待线程必须能被关闭或取消事件唤醒；<\/li>\n<li>析构前需要证明没有线程仍访问对象；<\/li>\n<li>join、detach 和线程所有权的风险；<\/li>\n<li>异步 completion 晚到时不得访问已析构状态；<\/li>\n<li>C++ 同步原语只负责表达机制，生命周期 epoch/fencing 等系统语义仍见 Topic 11。<\/li>\n<\/ul>\n<h4>编译与链接宏观链路<\/h4>\n<ul>\n<li>预处理、编译、汇编和链接的职责；<\/li>\n<li>declaration、definition、translation unit 与 ODR 的基本含义；<\/li>\n<li>header guard/<code>#pragma once<\/code>、inline 和模板定义通常放在头文件的原因；<\/li>\n<li>静态库与动态库的加载和符号解析直觉；<\/li>\n<li>编译错误、链接错误和运行期动态库错误的区分；<\/li>\n<li>不要求深入 ABI、name mangling 规则、linker script 或复杂 CMake 工程。<\/li>\n<\/ul>\n<h3>P1 补充防守<\/h3>\n<ul>\n<li>allocator、free list 和碎片的高层原理，只用于解释 <code>malloc/free<\/code> 与容器分配成本；<\/li>\n<li>false sharing 和 cache line 的基本直觉；<\/li>\n<li><code>shared_ptr<\/code> 原子引用计数不等于 pointee 线程安全；<\/li>\n<li><code>std::span<\/code>、<code>string_view<\/code> 等非 owning view 的生命周期风险；<\/li>\n<li>动态库全局变量、进程地址空间和内存映射的宏观边界；<\/li>\n<li>C API 与 C++ RAII wrapper 的接口封装思路。<\/li>\n<\/ul>\n<p>这些内容只要求讲清原理。没有具体 JD 或真题时，不继续深入 allocator、ABI 或 lock-free 源码。<\/p>\n<h3>两项系统手写契约<\/h3>\n<h4>A. Move-only RAII 资源封装<\/h4>\n<p>实现一个 fd 或 heap buffer wrapper，接口可按题目调整，但必须满足：<\/p>\n<ul>\n<li>默认状态不拥有资源；<\/li>\n<li>构造后拥有且只拥有一个资源；<\/li>\n<li>析构时只释放一次；<\/li>\n<li>删除拷贝构造和拷贝赋值；<\/li>\n<li>移动构造与移动赋值转移所有权，并把源对象置为无资源状态；<\/li>\n<li>移动赋值先正确释放当前资源，再接管新资源；<\/li>\n<li>提供 <code>get()<\/code>、<code>release()<\/code>、<code>reset()<\/code> 中与题目相关的最小接口；<\/li>\n<li>self move-assignment 不产生泄漏或 double free。<\/li>\n<\/ul>\n<p>时间限制：20-30 分钟。<\/p>\n<p>最低测试：<\/p>\n<ol>\n<li>默认构造不释放无效资源；<\/li>\n<li>正常析构只释放一次；<\/li>\n<li>移动构造转移所有权；<\/li>\n<li>移动赋值释放旧资源并接管新资源；<\/li>\n<li><code>release/reset<\/code> 语义正确；<\/li>\n<li>容器或异常路径下无重复释放。<\/li>\n<\/ol>\n<h4>B. 可关闭的 <code>BlockingQueue&lt;T&gt;<\/code><\/h4>\n<p>固定面试接口：<\/p>\n<pre><code class=\"language-cpp\">template &lt;class T&gt;\nclass BlockingQueue {\n public:\n  explicit BlockingQueue(std::size_t capacity);\n  bool push(T value);\n  std::optional&lt;T&gt; pop();\n  void close();\n};<\/code><\/pre>\n<p>固定语义：<\/p>\n<ul>\n<li><code>capacity &gt; 0<\/code>，队列满时 <code>push<\/code> 等待；<\/li>\n<li><code>close()<\/code> 幂等，并唤醒所有 producer/consumer；<\/li>\n<li>close 后禁止新 push，等待中的 push 返回 <code>false<\/code>；<\/li>\n<li>close 后 consumer 继续 drain 已有元素；<\/li>\n<li>close 且队列为空时，<code>pop()<\/code> 返回 <code>std::nullopt<\/code>；<\/li>\n<li>所有共享状态都在同一互斥保护下维护；<\/li>\n<li>wait 使用谓词，同时检查容量/数据与 closed 状态；<\/li>\n<li>不要求 timeout、优先级、公平队列或 lock-free。<\/li>\n<\/ul>\n<p>时间限制：45-60 分钟。<\/p>\n<p>最低确定性测试：<\/p>\n<ol>\n<li>单线程 push/pop 保持 FIFO；<\/li>\n<li>空队列 consumer 被后续 push 唤醒；<\/li>\n<li>满队列 producer 被后续 pop 唤醒；<\/li>\n<li>close 唤醒空队列上的 consumer；<\/li>\n<li>close 唤醒满队列上的 producer，并拒绝写入；<\/li>\n<li>close 后 drain 现有元素，再返回 <code>nullopt<\/code>；<\/li>\n<li>多等待者最终都退出；<\/li>\n<li>重复 close 不破坏终态。<\/li>\n<\/ol>\n<h3>原理连续追问<\/h3>\n<h4>资源与对象<\/h4>\n<ul>\n<li><code>malloc/free<\/code> 与 <code>new/delete<\/code> 的核心差异是什么？为什么不能随意混用？<\/li>\n<li>RAII 为什么能覆盖普通 return 和异常路径？它不能自动解决哪些共享所有权问题？<\/li>\n<li><code>unique_ptr<\/code> 和 <code>shared_ptr<\/code> 应如何选择？为什么不应默认全部使用 <code>shared_ptr<\/code>？<\/li>\n<li><code>shared_ptr<\/code> 的引用计数线程安全是否意味着对象本身线程安全？<\/li>\n<li><code>weak_ptr<\/code> 如何解决循环引用？<code>lock()<\/code> 为什么可能失败？<\/li>\n<li><code>std::move<\/code> 为什么可能仍然触发拷贝？<\/li>\n<li>为什么多态基类析构函数通常需要是 virtual？<\/li>\n<\/ul>\n<h4>容器与性能<\/h4>\n<ul>\n<li><code>vector<\/code> 扩容时发生什么？哪些 iterator/reference 会失效？<\/li>\n<li>为什么 <code>vector<\/code> 常常比 <code>list<\/code> 更快，即使中间插入的理论复杂度更差？<\/li>\n<li><code>reserve<\/code> 与 <code>resize<\/code> 的语义区别是什么？<\/li>\n<li><code>unordered_map<\/code> 为什么不能保证严格 O(1)？rehash 会影响什么？<\/li>\n<\/ul>\n<h4>并发与 Serving<\/h4>\n<ul>\n<li>condition variable 为什么必须检查谓词？notify 为什么不是可靠的事件缓存？<\/li>\n<li>mutex、atomic 和 condition variable 分别解决什么问题？<\/li>\n<li>一个异步 GPU/IO 操作仍在读取 buffer 时，调用方如何保证 buffer 不被提前释放或复用？<\/li>\n<li><code>BlockingQueue<\/code> close 时怎样保证所有等待者退出，同时不丢弃已入队任务？<\/li>\n<li>为什么对象析构和异步 completion 之间可能发生 use-after-free？应该由谁持有生命周期？<\/li>\n<li>为什么只把队列索引改成 atomic 不能得到一个正确的无锁队列？<\/li>\n<\/ul>\n<h3>明确不要求<\/h3>\n<ul>\n<li>重写 WebServer、线程池、内存池或网络框架；<\/li>\n<li>手写 <code>shared_ptr<\/code>、<code>malloc<\/code>、STL 容器或生产级 allocator；<\/li>\n<li>模板元编程、复杂 ABI、编译器实现和完整 CMake 工程体系；<\/li>\n<li>lock-free、ABA、hazard pointer、RCU 等高级并发回收；<\/li>\n<li>CUDA/C++ kernel、PyTorch dispatcher 或推理框架 C++ 内核源码深挖；<\/li>\n<li>独立性能 benchmark 或新的 C++ 项目；<\/li>\n<li>用 C++ 重写 Transformer、KV Cache 或调度器领域手写。<\/li>\n<\/ul>\n<h3>与其他知识及项目的边界<\/h3>\n<ul>\n<li><a href=\"topics/11-concurrency-async-state-machines.md\">并发、异步与状态机<\/a> 负责跨语言并发语义、Python <code>asyncio<\/code> 和 Serving 生命周期状态机；本主题只恢复 C++ 的资源与同步表达能力；<\/li>\n<li>LeetCode 继续使用 C++，但算法正确率、题型覆盖和刷题计划另行管理；<\/li>\n<li>ToolGap-KV 项目答辩树独立维护在 <code>docs/agent-kv/INTERVIEW_MAP.md<\/code>，不并入本知识地图；<\/li>\n<li>本主题练习与答题记录不能标记为 ToolGap-KV 的 <code>shipped<\/code> 或 <code>experimentally validated<\/code> 证据。<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一次 20-30 分钟语言与资源所有权连续追问记录；<\/li>\n<li>一次 20-30 分钟 move-only RAII wrapper 限时手写及测试；<\/li>\n<li>一次 45-60 分钟 <code>BlockingQueue&lt;T&gt;<\/code> 限时手写及八项测试；<\/li>\n<li>一份错题/遗忘点修正记录；<\/li>\n<li>能把 buffer 生命周期、异步完成、关闭和数据竞争连接到 Serving 场景；<\/li>\n<li>回答没有扩张成候选人拥有 CUDA/kernel、allocator 或生产 C++ runtime 经验。<\/li>\n<\/ul>",
    "search_text": "13 c++ 系统编程防守 p1；其中资源所有权、对象生命周期和基础同步属于面试启动前的 p0 防守要求 已敲定恢复范围；原理复习、连续追问和两项闭卷手写待完成 恢复 c++ 系统编程的面试表达与小型实现能力，能讲清 raii、智能指针、拷贝/移动、虚函数、stl 失效、mutex/condition variable/atomic 和构建链路，并限时手写 move-only raii wrapper 与可关闭的 `blockingqueue<t>`。 不重写 webserver、线程池或内存池，不手写 allocator/stl/`shared_ptr`，不深入模板元编程、复杂 abi、lock-free 或 cuda/c++ kernel；算法题继续使用 c++，但与本节点的系统手写分别验收。 # 13｜c++ 系统编程防守详细知识列表 > 优先级：p1；资源所有权、对象生命周期和基础同步属于面试启动前的 p0 防守要求 > > 当前状态：已有算法题、webserver 小项目和基础知识经历；长期未使用，待恢复与限时验收 > > 目标熟练度：原理 l2 / 源码 l0 / 手写 l2 / 实验 l0 > > 建议投入：10-15 小时 > > 关联：[并发、异步与状态机](11-concurrency-async-state-machines.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能恢复 c++ 系统编程的面试表达与小型实现能力：从对象生命周期和资源所有权解释 raii、智能指针、拷贝/移动、容器失效和同步；在 serving 场景中识别 buffer 提前释放、异步完成、数据竞争和关闭清理问题；限时完成一个 move-only raii wrapper 和一个可关闭的 `blockingqueue<t>`。 本主题不是从零学习 c++，也不建立新的 c++ 项目。算法题继续使用 c++，但 leetcode 训练与本主题的非算法系统手写分别验收。 ## 当前基础与恢复原则 已有基础： - 使用 c++ 完成算法题； - 写过 webserver 等小型项目； - 准备过 `malloc/free`、智能指针、虚函数等基础知识。 恢复原则： - 先通过连续追问定位遗忘点，不按教程顺序重学全部语言； - 只恢复与资源所有权、并发正确性和系统代码阅读相关的语义； - 通过两项小型手写证明能力恢复，不重写 webserver、线程池或内存池； - 不因为 c++ 出现在推理框架底层，就把路线扩张到 cuda/operator 或编译器岗位。 ## 面试启动前的 p0 防守子集 ### 对象生命周期与资源所有权 - 自动、静态、线程和动态存储期的基本区别； - 构造、析构、作用域退出、异常展开与 raii； - `new/delete` 会建立和结束对象生命周期，`malloc/free` 只管理原始存储； - `new[]/delete[]`、placement new 和释放方式匹配的边界； - 裸指针、引用、observer 与 owner 的语义区别； - `unique_ptr` 的独占所有权、移动与自定义 deleter； - `shared_ptr` 的控制块、引用计数和线程安全边界； - `weak_ptr` 打破循环引用，以及 `lock()` 的失败语义； - fd、socket、heap buffer、锁和线程句柄如何通过 raii 管理； - double free、use-after-free、泄漏和悬空引用的典型形成路径。 通过标准：能够为一个异步 buffer 处理场景明确 owner、borrower、转移点和最终释放者，而不是只说“使用智能指针”。 ### 拷贝、移动与异常安全 - lvalue/rvalue、引用折叠不作为主线，但要能解释移动发生的基本条件； - 拷贝构造/赋值与移动构造/赋值的职责； - rule of zero、rule of five 和资源类为什么通常禁止拷贝； - moved-from 对象必须保持可析构、可赋值的有效但未指定状态； - self-assignment、先获取后释放和 copy-and-swap 的正确性直觉； - `std::move` 只是转换，不保证一定发生移动； - `noexcept` 如何影响容器扩容时选择移动还是拷贝； - basic/strong/no-throw exception guarantee 只要求建立边界，不要求系统证明。 ### 多态、对象布局与类型边界 - 静态分派与动态分派； - 虚函数、vptr/vtable 的典型实现模型和一次间接调用成本； - 基类析构函数为什么在多态删除场景中需要是 virtual； - object slicing、override 与 overload 的区别； - `static_cast`、`dynamic_cast`、`reinterpret_cast` 的风险边界； - 不依赖特定 abi 声称对象布局的绝对细节。 ### stl、内存布局与失效规则 - `vector`、`deque`、`list`、`map`、`unordered_map` 的主要布局和复杂度； - 连续内存、pointer chasing、缓存局部性与系统性能的关系； - `vector` 扩容导致 iterator/reference/pointer 失效； - erase、rehash、insert 等操作的典型失效边界，并以容器契约为准； - `reserve` 与 `resize` 的区别； - `emplace_back` 不自动保证比 `push_back` 更快或更正确； - 哈希表负载因子、rehash 和最坏复杂度的防守解释。 ### mutex、condition variable 与 atomic - data race 与普通的业务竞态不是同一概念； - mutex 保护共享不变量，而不只是“保护一行代码”； - `lock_guard`、`unique_lock` 的职责区别； - condition variable 必须配合共享谓词和 mutex； - wait 应使用循环或谓词版本处理虚假唤醒； - notify 不保存事件，状态必须由共享谓词表达； - atomic 保证某个对象的原子操作，不自动维护跨对象不变量； - 基本 happens-before、可见性、`seq_cst` 与 acquire/release 直觉； - 不要求推导复杂 memory order 或实现无锁结构。 通过标准：能够解释为什么 `if (queue.empty()) cv.wait(lock)` 错误，以及为什么只把计数器改成 atomic 不能让整个队列线程安全。 ### 关闭、取消与清理 - producer/consumer 的正常关闭语义； - close 后是否允许 drain 已入队元素必须明确； - 等待线程必须能被关闭或取消事件唤醒； - 析构前需要证明没有线程仍访问对象； - join、detach 和线程所有权的风险； - 异步 completion 晚到时不得访问已析构状态； - c++ 同步原语只负责表达机制，生命周期 epoch/fencing 等系统语义仍见 topic 11。 ### 编译与链接宏观链路 - 预处理、编译、汇编和链接的职责； - declaration、definition、translation unit 与 odr 的基本含义； - header guard/`#pragma once`、inline 和模板定义通常放在头文件的原因； - 静态库与动态库的加载和符号解析直觉； - 编译错误、链接错误和运行期动态库错误的区分； - 不要求深入 abi、name mangling 规则、linker script 或复杂 cmake 工程。 ## p1 补充防守 - allocator、free list 和碎片的高层原理，只用于解释 `malloc/free` 与容器分配成本； - false sharing 和 cache line 的基本直觉； - `shared_ptr` 原子引用计数不等于 pointee 线程安全； - `std::span`、`string_view` 等非 owning view 的生命周期风险； - 动态库全局变量、进程地址空间和内存映射的宏观边界； - c api 与 c++ raii wrapper 的接口封装思路。 这些内容只要求讲清原理。没有具体 jd 或真题时，不继续深入 allocator、abi 或 lock-free 源码。 ## 两项系统手写契约 ### a. move-only raii 资源封装 实现一个 fd 或 heap buffer wrapper，接口可按题目调整，但必须满足： - 默认状态不拥有资源； - 构造后拥有且只拥有一个资源； - 析构时只释放一次； - 删除拷贝构造和拷贝赋值； - 移动构造与移动赋值转移所有权，并把源对象置为无资源状态； - 移动赋值先正确释放当前资源，再接管新资源； - 提供 `get()`、`release()`、`reset()` 中与题目相关的最小接口； - self move-assignment 不产 机](11-concurrency-async-state-machines.md) 负责跨语言并发语义、python `asyncio` 和 serving 生命周期状态机；本主题只恢复 c++ 的资源与同步表达能力； - leetcode 继续使用 c++，但算法正确率、题型覆盖和刷题计划另行管理； - toolgap-kv 项目答辩树独立维护在 `docs/agent-kv/interview_map.md`，不并入本知识地图； - 本主题练习与答题记录不能标记为 toolgap-kv 的 `shipped` 或 `experimentally validated` 证据。 ## 完成证据 - 一次 20-30 分钟语言与资源所有权连续追问记录； - 一次 20-30 分钟 move-only raii wrapper 限时手写及测试； - 一次 45-60 分钟 `blockingqueue<t>` 限时手写及八项测试； - 一份错题/遗忘点修正记录； - 能把 buffer 生命周期、异步完成、关闭和数据竞争连接到 serving 场景； - 回答没有扩张成候选人拥有 cuda/kernel、allocator 或生产 c++ runtime 经验。 "

      if (filters.priority.value !== "all" && topic.priority !== filters.priority.value) return false;
      if (filters.status.value !== "all" && topic.status_group !== filters.status.value) return false;
      if (filters.mastery.value !== "all") {
        const [dimension, level] = filters.mastery.value.split(":");
        if (topic.mastery[dimension] !== level) return false;
      }
      return true;
    }

    function edge(x1, y1, x2, y2, priority) {
      const bend = (x2 - x1) * .5;
      return el("path", {
        d: `M ${x1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2} ${y2}`,
        class: `edge ${priority.toLowerCase()}`
      });
    }

    function nodeBox({ x, y, width, height, fill, stroke, title, subtitle, kind, dataId, priority }) {
      const group = el("g", { class: `node ${kind}`, transform: `translate(${x},${y})`, tabindex: "0", role: "treeitem" });
      group.appendChild(el("rect", { width, height, rx: 13, fill, stroke, "stroke-width": 1.4 }));
      const lines = shortLines(title, kind === "topic" ? 18 : 20);
      lines.forEach((line, index) => {
        group.appendChild(el("text", { x: 14, y: 24 + index * 18, fill: "#17201d", "font-size": kind === "root" ? 16 : 14, "font-weight": "700" }, line));
      });
      if (subtitle) group.appendChild(el("text", { x: 14, y: height - 11, fill: "#68736e", "font-size": 10.5 }, subtitle));
      const activate = () => {
        if (kind === "group") {
          groups[priority].expanded = !groups[priority].expanded;
          renderMindmap();
        } else if (kind === "topic") {
          showTopic(dataId);
        } else {
          showOverview();
        }
      };
      group.addEventListener("click", (event) => { event.stopPropagation(); activate(); });
      group.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") { event.preventDefault(); activate(); }
      });
      return group;
    }

    function renderMindmap() {
      viewport.replaceChildren();
      const visible = topics.filter(matches);
      document.getElementById("result-count").textContent = `${visible.length} / ${topics.length} 个主题`;
      const byPriority = { P0: visible.filter(t => t.priority === "P0"), P1: visible.filter(t => t.priority === "P1") };
      const layout = [];
      let cursorY = 0;
      Object.keys(groups).forEach(priority => {
        const group = groups[priority];
        const children = group.expanded ? byPriority[priority] : [];
        const span = Math.max(84, children.length * 86);
        const center = cursorY + span / 2;
        layout.push({ priority, group, children, center });
        cursorY += span + 38;
      });
      const activeGroups = layout.filter(item => byPriority[item.priority].length || filters.priority.value === "all");
      const rootY = activeGroups.length ? activeGroups.reduce((sum, item) => sum + item.center, 0) / activeGroups.length : 100;
      const rootX = 20, groupX = 340, topicX = 680;
      viewport.appendChild(nodeBox({ x: rootX, y: rootY - 38, width: 244, height: 76, fill: "#fffdf7", stroke: "#274d62", title: "AI Infra 面试就绪", subtitle: "点击查看完成门槛", kind: "root" }));
      if (!visible.length) {
        viewport.appendChild(el("text", { x: 560, y: rootY, class: "empty-map" }, "没有匹配的主题，请调整筛选条件"));
      }
      layout.forEach(item => {
        const { priority, group, children, center } = item;
        if (!byPriority[priority].length && filters.priority.value !== "all") return;
        viewport.insertBefore(edge(rootX + 244, rootY, groupX, center, priority), viewport.firstChild);
        const arrow = group.expanded ? "−" : "+";
        viewport.appendChild(nodeBox({ x: groupX, y: center - 34, width: 230, height: 68, fill: group.soft, stroke: group.color, title: `${arrow} ${group.label}`, subtitle: `${byPriority[priority].length} 个主题`, kind: "group", priority }));
        children.forEach((topic, index) => {
          const childY = center - ((children.length - 1) * 86) / 2 + index * 86;
          viewport.insertBefore(edge(groupX + 230, center, topicX, childY, priority), viewport.firstChild);
          const defense = topic.has_p0_defense ? " · 含 P0 防守" : "";
          viewport.appendChild(nodeBox({ x: topicX, y: childY - 35, width: 286, height: 70, fill: "#fffefb", stroke: group.color, title: `${topic.id}｜${topic.title}`, subtitle: `${topic.mastery.原理}/${topic.mastery.源码}/${topic.mastery.手写}/${topic.mastery.实验}${defense}`, kind: "topic", dataId: topic.id, priority }));
        });
      });
      applyTransform();
    }

    function badges(topic) {
      const mastery = Object.entries(topic.mastery).map(([key, value]) => `<span class="badge">${key} ${value}</span>`).join("");
      const defense = topic.has_p0_defense ? '<span class="badge p0">面试启动前 P0 防守</span>' : "";
      return `<span class="badge ${topic.priority.toLowerCase()}">${topic.priority}</span>${defense}${mastery}`;
    }

    function showTopic(id) {
      const topic = topics.find(item => item.id === id);
      if (!topic) return;
      document.getElementById("detail-title").textContent = `${topic.id}｜${topic.title}`;
      document.getElementById("detail-badges").innerHTML = badges(topic);
      document.getElementById("detail-body").innerHTML = `
        <div class="summary-card"><strong>能力结果</strong>${topic.capability}</div>
        <div class="summary-card"><strong>当前状态</strong>${topic.state}</div>
        <div class="summary-card"><strong>范围边界</strong>${topic.boundary}</div>
        ${topic.detail_html}`;
      document.getElementById("detail-body").scrollTop = 0;
      panel.classList.add("open");
    }

    function showOverview() {
      const p0 = topics.filter(topic => topic.priority === "P0").length;
      const p1 = topics.filter(topic => topic.priority === "P1").length;
      document.getElementById("detail-title").textContent = "使用说明";
      document.getElementById("detail-badges").innerHTML = '<span class="badge">知识体系总览</span>';
      document.getElementById("detail-body").innerHTML = `
        <div class="overview">
          <p>点击主题节点查看完整知识列表；点击 P0/P1 分支可以展开或收起。搜索会覆盖主题摘要和详情正文。</p>
          <div class="overview-grid">
            <div class="metric"><b>${topics.length}</b><span>知识主题</span></div>
            <div class="metric"><b>${p0}</b><span>P0 核心节点</span></div>
            <div class="metric"><b>${p1}</b><span>P1 深挖节点</span></div>
            <div class="metric"><b>4D</b><span>原理 / 源码 / 手写 / 实验</span></div>
          </div>
          <div class="notice"><strong>证据边界</strong><br>“范围已敲定”不等于能力已经完成。项目表述继续使用 roadmap、shipped、experimentally validated、simulated 四种状态。</div>
          <div class="summary-card"><strong>ToolGap-KV 保持独立</strong>本图只展示通用 AI Infra 知识体系。ToolGap-KV 项目答辩树在 <code>docs/agent-kv/INTERVIEW_MAP.md</code> 独立维护，不合并进本图。</div>
          <div class="summary-card"><strong>内容更新方式</strong>修改索引或专题 Markdown 后，运行 <code>python3 scripts/build_interview_readiness_html.py</code> 重新生成本文件。</div>
        </div>`;
    }

    function applyTransform() {
      viewport.setAttribute("transform", `translate(${transform.x} ${transform.y}) scale(${transform.scale})`);
    }

    function zoomAt(factor, clientX = svg.clientWidth / 2, clientY = svg.clientHeight / 2) {
      const rect = svg.getBoundingClientRect();
      const x = clientX - rect.left, y = clientY - rect.top;
      const next = Math.min(2.2, Math.max(.42, transform.scale * factor));
      const ratio = next / transform.scale;
      transform.x = x - (x - transform.x) * ratio;
      transform.y = y - (y - transform.y) * ratio;
      transform.scale = next;
      applyTransform();
    }

    function fitView() {
      const bounds = viewport.getBBox();
      const width = Math.max(1, svg.clientWidth - 80), height = Math.max(1, svg.clientHeight - 80);
      const scale = Math.min(1.15, width / Math.max(bounds.width, 1), height / Math.max(bounds.height, 1));
      transform = { x: (svg.clientWidth - bounds.width * scale) / 2 - bounds.x * scale, y: (svg.clientHeight - bounds.height * scale) / 2 - bounds.y * scale, scale };
      applyTransform();
    }

    svg.addEventListener("wheel", event => { event.preventDefault(); zoomAt(event.deltaY < 0 ? 1.1 : .9, event.clientX, event.clientY); }, { passive: false });
    svg.addEventListener("pointerdown", event => {
      if (event.target.closest && event.target.closest(".node")) return;
      dragging = true; dragOrigin = { x: event.clientX - transform.x, y: event.clientY - transform.y };
      svg.classList.add("dragging"); svg.setPointerCapture(event.pointerId);
    });
    svg.addEventListener("pointermove", event => {
      if (!dragging) return;
      transform.x = event.clientX - dragOrigin.x; transform.y = event.clientY - dragOrigin.y; applyTransform();
    });
    svg.addEventListener("pointerup", event => { dragging = false; svg.classList.remove("dragging"); if (svg.hasPointerCapture(event.pointerId)) svg.releasePointerCapture(event.pointerId); });
    svg.addEventListener("pointercancel", () => { dragging = false; svg.classList.remove("dragging"); });

    Object.values(filters).forEach(control => control.addEventListener("input", () => { renderMindmap(); requestAnimationFrame(fitView); }));
    document.getElementById("expand-all").addEventListener("click", () => { Object.values(groups).forEach(group => group.expanded = true); renderMindmap(); requestAnimationFrame(fitView); });
    document.getElementById("collapse-all").addEventListener("click", () => { Object.values(groups).forEach(group => group.expanded = false); renderMindmap(); requestAnimationFrame(fitView); });
    document.getElementById("zoom-in").addEventListener("click", () => zoomAt(1.15));
    document.getElementById("zoom-out").addEventListener("click", () => zoomAt(.85));
    document.getElementById("fit-view").addEventListener("click", fitView);
    document.getElementById("detail-head").addEventListener("click", () => { if (window.innerWidth <= 780) panel.classList.toggle("open"); });
    document.addEventListener("keydown", event => {
      if (event.key === "/" && document.activeElement !== filters.search) { event.preventDefault(); filters.search.focus(); }
      if (event.key === "Escape") { filters.search.value = ""; renderMindmap(); }
    });
    window.addEventListener("resize", () => requestAnimationFrame(fitView));

    showOverview();
    renderMindmap();
    requestAnimationFrame(fitView);
  </script>
</body>
</html>

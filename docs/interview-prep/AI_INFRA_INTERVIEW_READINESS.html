    "detail_html": "<h2>04｜LLM 推理引擎与调度详细知识列表<\/h2>\n<blockquote>优先级：P0 当前状态：已建立 Continuous Batching 和混合调度直觉；主循环、源码、手写与实验未完成 目标熟练度：原理 L3 / 源码 L3 / 手写 L3 / 实验 L3 依赖：<a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a>、<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能把 LLM 推理引擎解释成一个持续运行的在线系统：请求不断到达、进入队列、获得 token 和 KV budget、执行 Prefill/Decode、被抢占或恢复、产生输出并清理资源。能够从空文件手写简化调度主循环，并通过 workload 实验解释吞吐、TTFT、ITL/TPOT、尾延迟和公平性的 trade-off。<\/p>\n<h3>当前基础与需要修正的表达<\/h3>\n<p>已有笔记证明以下直觉曾经建立：<\/p>\n<ul>\n<li>batching 通过合并请求提高 GPU 利用率；<\/li>\n<li>static batching 的固定 cohort 会在请求长度异质时发生 batch 退化；<\/li>\n<li>Continuous Batching 允许请求在迭代边界动态进入和退出；<\/li>\n<li>Prefill 与 Decode 的资源画像不同，混合调度是多目标 trade-off；<\/li>\n<li>调度与 KV Cache 分配、扩容、回收存在直接耦合。<\/li>\n<\/ul>\n<p>但需要修正和深化：<\/p>\n<ul>\n<li>“短请求结束后仍一直占用显存”不是所有 static batching 实现的必然语义；核心问题是固定 cohort 无法及时补位，已完成 lane 不再产生有效工作或 batch 逐渐缩小；<\/li>\n<li>Chunked Prefill 不只是“长请求一次放不进 GPU”的兜底，还用于 token budget、抢占粒度、TTFT/ITL 权衡和 Prefill/Decode 混批；<\/li>\n<li>概念上区分 Prefill/Decode 有帮助，但当前 vLLM V1 源码可能用统一 token progress 表达调度，而不是维护两个完全独立的阶段调度器；<\/li>\n<li>旧笔记处于 L1-L2，Continuous Batching 主循环伪代码仍标记未开始。<\/li>\n<\/ul>\n<h3>源码与复现契约<\/h3>\n<h4>触发依据<\/h4>\n<ul>\n<li><strong>真题证据门槛已触发<\/strong>：题库不仅询问 Continuous Batching 原理和调度决策，也存在 Continuous Batching 源码与 KV Cache 命中的直接追问。<\/li>\n<li><strong>核心模块门槛已触发<\/strong>：迭代级调度决定请求何时获得 token/KV budget、何时抢占和恢复，直接影响吞吐、TTFT、ITL 与正确清理，是推理引擎主循环而非外围知识。<\/li>\n<\/ul>\n<h4>主实现与条件式对比<\/h4>\n<ul>\n<li><strong>主实现：vLLM V1<\/strong>。固定 release/commit，沿 request queues、scheduler output、token progress、KV allocation、model execution 和 completion update 完成 source trace。<\/li>\n<li><strong>对比实现：SGLang，按需加入<\/strong>。只有目标 JD/真题明确要求，或需要比较 scheduling policy、chunked prefill、prefix reuse 与执行组织的具体差异时才读对应路径；不要求并行精读两个完整 scheduler。<\/li>\n<li>ToolGap-KV 只学习并复用 vLLM 的真实调度/KV contract，不因此宣称拥有或重写整个 scheduler。<\/li>\n<\/ul>\n<h4>双层本地复现<\/h4>\n<ol>\n<li><strong>机制复现<\/strong>：从空文件实现 deterministic Continuous Batching、token/KV budget、Chunked Prefill、preemption/resume 和清理，以本地 workload/test 验证不变量和 trade-off。<\/li>\n<li><strong>真实映射<\/strong>：在固定版本 vLLM 上 trace 一轮 <code>schedule -&gt; execute -&gt; update<\/code>，并用真实引擎验证至少一个 simulator 结论和一个 losing workload。<\/li>\n<\/ol>\n<p>完成标准：留下固定 commit、源码路径图、简化 scheduler 代码与测试、真实运行命令、原始指标、模拟与真实系统偏差，以及至少一个失败或反例。<\/p>\n<p>明确不要求：默写完整 vLLM/SGLang scheduler，或实现 speculative decode、multimodal、LoRA、DP 等与核心 contract 无关的生产分支。<\/p>\n<h3>P0 详细知识列表<\/h3>\n<h4>引擎请求生命周期<\/h4>\n<ul>\n<li>request 到达、校验、排队、运行、抢占、恢复、完成、取消和失败；<\/li>\n<li>waiting、running、preempted/resumed、finished 的状态与合法转移；<\/li>\n<li>prompt tokens、computed tokens、output/speculative tokens 的进度；<\/li>\n<li>每轮 scheduler output、model execution、sampling 与状态更新；<\/li>\n<li>streaming output、stop condition 与最终资源清理；<\/li>\n<li>请求身份与一次 engine request/lifecycle 的边界。<\/li>\n<\/ul>\n<h4>Static、Dynamic 与 Continuous Batching<\/h4>\n<ul>\n<li>request-level、batch-level、iteration/token-level 调度粒度；<\/li>\n<li>static batching 的实现简单性、padding/cohort 固定与 batch 退化；<\/li>\n<li>dynamic batching 的等待窗口和组批条件；<\/li>\n<li>Continuous Batching 的迭代边界、动态补位和完成请求移除；<\/li>\n<li>请求长度、到达时间、prompt/output 比例对 batch 组成的影响；<\/li>\n<li>batch size 不是唯一约束，token 数、KV block 和模型限制共同决定可运行集合；<\/li>\n<li>提高设备利用率不保证每个请求的延迟都改善。<\/li>\n<\/ul>\n<h4>每轮调度约束<\/h4>\n<ul>\n<li>token/compute budget；<\/li>\n<li>max running sequences；<\/li>\n<li>KV block/capacity admission；<\/li>\n<li>model max length；<\/li>\n<li>当前 running 请求与 waiting 请求的选择顺序；<\/li>\n<li>新请求、恢复请求和已有 running 请求；<\/li>\n<li>lookahead/speculative tokens 对预算的影响边界；<\/li>\n<li>无法分配 KV 时的 skip、wait、preempt 或 reject；<\/li>\n<li>调度输出必须与本轮实际执行和内存分配一致。<\/li>\n<\/ul>\n<h4>Prefill、Decode 与 Chunked Prefill<\/h4>\n<ul>\n<li>Prefill 对 TTFT 的影响；<\/li>\n<li>Decode 对 ITL/TPOT 和流式平滑度的影响；<\/li>\n<li>只优先 Prefill 与只优先 Decode 的失败模式；<\/li>\n<li>将长 Prefill 切成 token chunks；<\/li>\n<li>chunk 边界、已有 computed tokens 和 KV 状态；<\/li>\n<li>用剩余 token budget 调度 Prefill chunk；<\/li>\n<li>Decode 优先与剩余预算填入 Prefill 的一种策略；<\/li>\n<li>token budget 大小对 TTFT、ITL、吞吐和显存压力的影响；<\/li>\n<li>长请求独占、短请求插队与 starvation 风险。<\/li>\n<\/ul>\n<h4>抢占、恢复与过载<\/h4>\n<ul>\n<li>KV 不足时为什么需要抢占；<\/li>\n<li>recompute、swap/offload 等恢复策略的适用边界；<\/li>\n<li>抢占后释放哪些资源、保留哪些逻辑状态；<\/li>\n<li>恢复请求如何重新进入 waiting/running；<\/li>\n<li>repeated preemption、thrashing 和 watermark/headroom；<\/li>\n<li>admission control、queue limit、timeout、load shedding；<\/li>\n<li>过载下保护 active decode 与接纳新请求之间的权衡；<\/li>\n<li>取消和失败不能留下 scheduler/KV 状态泄漏。<\/li>\n<\/ul>\n<h4>调度策略与公平性<\/h4>\n<ul>\n<li>FCFS、priority、shortest-job-like 启发式的目标与风险；<\/li>\n<li>已知输入长度与未知输出长度；<\/li>\n<li>arrival time、priority、remaining tokens、age；<\/li>\n<li>starvation、priority inversion 和 aging；<\/li>\n<li>多租户 quota/SLO 的基本设计；<\/li>\n<li>平均延迟、尾延迟和吞吐不能同时无条件最优；<\/li>\n<li>策略公平比较需要相同 executor、workload 和预算。<\/li>\n<\/ul>\n<h4>引擎指标与归因<\/h4>\n<ul>\n<li>TTFT、ITL、TPOT、end-to-end latency；<\/li>\n<li>request throughput 与 token throughput；<\/li>\n<li>queue time、Prefill time、Decode time、restore time；<\/li>\n<li>running/waiting 数量、batch tokens、KV usage；<\/li>\n<li>preemption、recompute、cache hit/miss；<\/li>\n<li>p50/p95/p99 与 workload arrival/length distribution；<\/li>\n<li>goodput/SLO attainment；<\/li>\n<li>throughput 上升但 TTFT 或 ITL 恶化的负面结果。<\/li>\n<\/ul>\n<h4>vLLM V1 源码阅读<\/h4>\n<ul>\n<li>固定 release/commit 后再记录具体路径；<\/li>\n<li>scheduler 输入、request queues 和 schedule output；<\/li>\n<li>token progress 如何统一表达 chunked prefill、decode、prefix hit 和 speculative tokens；<\/li>\n<li>running 优先、waiting admission、token budget 和 KV slot allocation；<\/li>\n<li>preemption、free、requeue 和 resume；<\/li>\n<li>scheduler 与 KV cache manager、model runner、output processor 的边界；<\/li>\n<li>V0/V1 或版本差异只按固定源码作答，不背旧文章类名。<\/li>\n<\/ul>\n<h3>P1 补充<\/h3>\n<ul>\n<li>asynchronous scheduling 与 CPU/GPU pipeline gap；<\/li>\n<li>Prefix Cache hit 对 computed tokens 和 admission 的影响；<\/li>\n<li>speculative decoding 对 lookahead/token budget 的影响；<\/li>\n<li>LoRA adapter batch 限制；<\/li>\n<li>multimodal encoder input/cache budget；<\/li>\n<li>data-parallel prefill balancing；<\/li>\n<li>Prefill/Decode disaggregation；<\/li>\n<li>SLO-aware、deadline-aware 或 cost-aware policy；<\/li>\n<li>scheduler trace/replay 与离线 policy 对比。<\/li>\n<\/ul>\n<h3>P2 延后<\/h3>\n<ul>\n<li>集群级副本路由、弹性伸缩和全局 placement；<\/li>\n<li>生产级多租户配额控制面；<\/li>\n<li>未经实验支持的复杂强化学习调度；<\/li>\n<li>为关键词覆盖同时实现多个独立策略；<\/li>\n<li>与目标岗位无关的 GPU kernel scheduler 细节。<\/li>\n<\/ul>\n<h3>训练顺序与验收<\/h3>\n<h4>A. 最小请求状态机<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>request 数据结构和合法状态；<\/li>\n<li>waiting/running/finished 队列或集合；<\/li>\n<li>add、schedule、step、finish、cancel；<\/li>\n<li>非法重复完成、取消和状态迁移测试；<\/li>\n<li>资源清理 hook。<\/li>\n<\/ol>\n<p>通过标准：所有状态转移可枚举，finished/cancelled 请求不会再次被调度。<\/p>\n<h4>B. Continuous Batching 主循环<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>每轮接收新请求；<\/li>\n<li>先推进已有 running；<\/li>\n<li>移除完成请求；<\/li>\n<li>在预算允许时从 waiting 补位；<\/li>\n<li>生成本轮 batch 并更新 token progress；<\/li>\n<li>可重复输入下输出确定。<\/li>\n<\/ol>\n<p>通过标准：45 分钟内手写最小版本；用不同到达时间和输出长度证明 dynamic refill 生效。<\/p>\n<h4>C. Token/KV Budget 与抢占<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li><code>max_num_scheduled_tokens<\/code>；<\/li>\n<li><code>max_num_running_reqs<\/code>；<\/li>\n<li>KV block admission 接口；<\/li>\n<li>无法分配时的 wait/preempt；<\/li>\n<li>preempt 后 free、reset/recompute 和 requeue；<\/li>\n<li>repeated preemption 与容量回收测试。<\/li>\n<\/ol>\n<p>通过标准：60 分钟完成给定接口；总 scheduled tokens、running 数和 KV blocks 永远不越界。<\/p>\n<h4>D. Chunked Prefill<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>统一 <code>num_computed_tokens<\/code> 与 <code>num_target_tokens<\/code>；<\/li>\n<li>running Decode 先消耗预算；<\/li>\n<li>剩余预算分配给 Prefill；<\/li>\n<li>长 Prefill 截断为 chunk；<\/li>\n<li>下轮从已计算位置继续；<\/li>\n<li>记录每请求 TTFT/ITL。<\/li>\n<\/ol>\n<p>通过标准：给定 workload 能展示 token budget 改变带来的 TTFT/ITL trade-off，而不是只展示吞吐。<\/p>\n<h4>E. 仿真、真实源码与实验<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>用离散事件或 deterministic step simulator 比较 static/continuous batching；<\/li>\n<li>workload 包含到达时间、prompt 长度和输出长度分布；<\/li>\n<li>对比不同 token budget、max sequences 和 policy；<\/li>\n<li>记录吞吐、TTFT、ITL、queue 和 preemption；<\/li>\n<li>固定 vLLM release/commit，沿真实 scheduler 完成一轮 source trace；<\/li>\n<li>在真实引擎上验证至少一个 simulator 结论，并记录校准偏差。<\/li>\n<\/ol>\n<p>通过标准：明确区分 simulator 的 <code>simulated<\/code> 结论与真实 vLLM 的 <code>experimentally validated<\/code> 结论。<\/p>\n<h3>必须通过的领域手撕<\/h3>\n<div class=\"table-wrap\"><table><thead><tr>\n<th>题目<\/th>\n<th>时间限制<\/th>\n<th>最低要求<\/th>\n<\/tr><\/thead><tbody>\n<tr>\n<td>请求生命周期状态机<\/td>\n<td>30 分钟<\/td>\n<td>合法转移、取消、终态幂等<\/td>\n<\/tr>\n<tr>\n<td>Continuous Batching 主循环<\/td>\n<td>45 分钟<\/td>\n<td>动态进入退出、补位和完成<\/td>\n<\/tr>\n<tr>\n<td>Token Budget Scheduler<\/td>\n<td>45 分钟<\/td>\n<td>token/sequence 预算不越界<\/td>\n<\/tr>\n<tr>\n<td>KV-aware Admission<\/td>\n<td>45 分钟<\/td>\n<td>allocate、wait/preempt、rollback<\/td>\n<\/tr>\n<tr>\n<td>Chunked Prefill Scheduler<\/td>\n<td>60 分钟<\/td>\n<td>computed progress、chunk、混批和指标<\/td>\n<\/tr>\n<tr>\n<td>Preemption/Resume<\/td>\n<td>60 分钟<\/td>\n<td>free、requeue、recompute 与清理正确<\/td>\n<\/tr>\n<\/tbody><\/table><\/div>\n<p>不要求默写整个 vLLM scheduler。面试手撕应实现清楚的核心 contract，并主动说明删除了 speculative decode、multimodal、LoRA、DP 等生产分支。<\/p>\n<h3>原理连续追问<\/h3>\n<h4>Batching 与预算<\/h4>\n<ul>\n<li>Static、Dynamic、Continuous Batching 的调度粒度分别是什么？<\/li>\n<li>Continuous Batching 为什么提高利用率，却可能恶化某些请求延迟？<\/li>\n<li>batch size、batch tokens 和 KV capacity 为什么不是同一个限制？<\/li>\n<li>为什么当前 vLLM scheduler 可以不显式维护“Prefill 阶段队列”和“Decode 阶段队列”？<\/li>\n<li><code>num_computed_tokens<\/code> 一类进度变量如何统一多个特性？<\/li>\n<\/ul>\n<h4>Chunked Prefill 与混合调度<\/h4>\n<ul>\n<li>Chunked Prefill 除了防止 OOM，还解决什么问题？<\/li>\n<li>token budget 变大为什么可能改善 TTFT、恶化 ITL？<\/li>\n<li>为什么 Decode 优先不等于 Decode 永远独占？<\/li>\n<li>长 Prefill 如何避免饿死？短请求插队是否公平？<\/li>\n<li>Prefill/Decode 混批一定更快吗？负面 workload 是什么？<\/li>\n<\/ul>\n<h4>抢占与过载<\/h4>\n<ul>\n<li>KV 不足时应该 wait、reject、preempt、offload 还是 recompute？<\/li>\n<li>抢占为什么可能导致 thrashing？如何观测？<\/li>\n<li>watermark/headroom 解决什么问题，代价是什么？<\/li>\n<li>为什么平均吞吐不能代表用户体验？<\/li>\n<li>系统过载时首先保护 TTFT、ITL、goodput 还是公平性？依据是什么？<\/li>\n<\/ul>\n<h4>源码与项目<\/h4>\n<ul>\n<li>固定版本 vLLM 一轮 <code>schedule -&gt; execute -&gt; update<\/code> 的数据流是什么？<\/li>\n<li>scheduler 和 KV cache manager 分别拥有哪类状态？<\/li>\n<li>ToolGap-KV 的 restore completion 如何安全地影响请求可调度性？<\/li>\n<li>为什么外部 proxy 无法独自保证 engine 内部 lifecycle/KV 正确性？<\/li>\n<li>哪项调度行为来自 vLLM，哪项是候选人 controller 拥有的？<\/li>\n<\/ul>\n<h3>与 ToolGap-KV 的连接<\/h3>\n<ul>\n<li>CT1 需要找到 lifecycle event 与 scheduler/KV connector 的最小真实接缝；<\/li>\n<li>CT2 的 restore failure、cancellation 和 late completion 最终必须落到合法请求状态和清理；<\/li>\n<li>CT3 的 offload/restore 会与 active Decode 争用资源，必须测 active-request p95/p99；<\/li>\n<li>scheduler trace 必须区分 queue、store、restore、Prefill 和 first token；<\/li>\n<li>ToolGap-KV 不拥有 vLLM 整体调度器，除非 Gate A 证明存在一个窄缺失 contract；<\/li>\n<li>Dynamic policy 仍属于 CT4，不能因为学会调度就提前扩张项目范围。<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>可测试请求状态机；<\/li>\n<li>Continuous Batching、token budget、Chunked Prefill 和 preemption 手写实现；<\/li>\n<li>static/continuous simulator 与 workload manifest；<\/li>\n<li>指标包含 TTFT、ITL、吞吐、queue 和 preemption；<\/li>\n<li>固定版本 vLLM scheduler source trace；<\/li>\n<li>至少一个真实引擎实验和一个 losing workload；<\/li>\n<li>一次 60 分钟调度手撕；<\/li>\n<li>一次 30 分钟源码/系统连续追问；<\/li>\n<li>simulated 与 experimentally validated 结论清楚分离。<\/li>\n<\/ul>\n<h3>现有个人笔记与真题<\/h3>\n<ul>\n<li><a href=\"https://app.notion.com/p/3885d315c09080b79697e2afdb37775d\" target=\"_blank\" rel=\"noopener noreferrer\">Continuous Batching 主笔记<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/3415d315c0908130803af01da4d6cd62\" target=\"_blank\" rel=\"noopener noreferrer\">Batching 与混合调度阶段学习记录<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c09081cab048f6af56fa7359\" target=\"_blank\" rel=\"noopener noreferrer\">Continuous Batching 的原理是什么，调度器如何决定批次<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/33c5d315c090815694f5e795a737aca5\" target=\"_blank\" rel=\"noopener noreferrer\">Continuous Batching 主循环伪代码<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/3415d315c09081458e69e4a36c8d642e\" target=\"_blank\" rel=\"noopener noreferrer\">continuous batching 的调度与内存复杂度<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c09081a287d3ec2a8e5085e3\" target=\"_blank\" rel=\"noopener noreferrer\">Continuous Batching 源码与 KV Cache 命中真题记录<\/a><\/li>\n<\/ul>\n<h3>当前 vLLM 官方参考<\/h3>\n<p>以下 latest/stable 页面只用于定位当前概念。源码学习必须固定具体 release/commit。<\/p>\n<ul>\n<li><a href=\"https://docs.vllm.ai/en/stable/api/vllm/v1/core/sched/scheduler/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM V1 Scheduler API<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/stable/api/vllm/config/scheduler/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM SchedulerConfig<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/stable/configuration/optimization/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM Optimization and Tuning<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/stable/configuration/engine_args/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM Engine Arguments<\/a><\/li>\n<li><a href=\"https://github.com/sgl-project/sglang\" target=\"_blank\" rel=\"noopener noreferrer\">SGLang repository（条件式调度对比入口）<\/a><\/li>\n<\/ul>",
    "search_text": "04 llm 推理引擎与调度 p0 已建立 continuous batching 和 prefill/decode 混合调度直觉；调度主循环、源码、手写与实验待完成 能沿请求生命周期解释 continuous batching、token/kv budget、chunked prefill、抢占、准入、调度策略和指标权衡，并手写可测试的迭代级调度器。 聚焦单引擎 runtime；集群级路由、弹性伸缩和多租户控制面另设平台主题，不在此节点无限扩张。 # 04｜llm 推理引擎与调度详细知识列表 > 优先级：p0 > > 当前状态：已建立 continuous batching 和混合调度直觉；主循环、源码、手写与实验未完成 > > 目标熟练度：原理 l3 / 源码 l3 / 手写 l3 / 实验 l3 > > 依赖：[transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md)、[kv cache 与内存系统](03-kv-cache-memory-system.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能把 llm 推理引擎解释成一个持续运行的在线系统：请求不断到达、进入队列、获得 token 和 kv budget、执行 prefill/decode、被抢占或恢复、产生输出并清理资源。能够从空文件手写简化调度主循环，并通过 workload 实验解释吞吐、ttft、itl/tpot、尾延迟和公平性的 trade-off。 ## 当前基础与需要修正的表达 已有笔记证明以下直觉曾经建立： - batching 通过合并请求提高 gpu 利用率； - static batching 的固定 cohort 会在请求长度异质时发生 batch 退化； - continuous batching 允许请求在迭代边界动态进入和退出； - prefill 与 decode 的资源画像不同，混合调度是多目标 trade-off； - 调度与 kv cache 分配、扩容、回收存在直接耦合。 但需要修正和深化： - “短请求结束后仍一直占用显存”不是所有 static batching 实现的必然语义；核心问题是固定 cohort 无法及时补位，已完成 lane 不再产生有效工作或 batch 逐渐缩小； - chunked prefill 不只是“长请求一次放不进 gpu”的兜底，还用于 token budget、抢占粒度、ttft/itl 权衡和 prefill/decode 混批； - 概念上区分 prefill/decode 有帮助，但当前 vllm v1 源码可能用统一 token progress 表达调度，而不是维护两个完全独立的阶段调度器； - 旧笔记处于 l1-l2，continuous batching 主循环伪代码仍标记未开始。 ## 源码与复现契约 ### 触发依据 - **真题证据门槛已触发**：题库不仅询问 continuous batching 原理和调度决策，也存在 continuous batching 源码与 kv cache 命中的直接追问。 - **核心模块门槛已触发**：迭代级调度决定请求何时获得 token/kv budget、何时抢占和恢复，直接影响吞吐、ttft、itl 与正确清理，是推理引擎主循环而非外围知识。 ### 主实现与条件式对比 - **主实现：vllm v1**。固定 release/commit，沿 request queues、scheduler output、token progress、kv allocation、model execution 和 completion update 完成 source trace。 - **对比实现：sglang，按需加入**。只有目标 jd/真题明确要求，或需要比较 scheduling policy、chunked prefill、prefix reuse 与执行组织的具体差异时才读对应路径；不要求并行精读两个完整 scheduler。 - toolgap-kv 只学习并复用 vllm 的真实调度/kv contract，不因此宣称拥有或重写整个 scheduler。 ### 双层本地复现 1. **机制复现**：从空文件实现 deterministic continuous batching、token/kv budget、chunked prefill、preemption/resume 和清理，以本地 workload/test 验证不变量和 trade-off。 2. **真实映射**：在固定版本 vllm 上 trace 一轮 `schedule -> execute -> update`，并用真实引擎验证至少一个 simulator 结论和一个 losing workload。 完成标准：留下固定 commit、源码路径图、简化 scheduler 代码与测试、真实运行命令、原始指标、模拟与真实系统偏差，以及至少一个失败或反例。 明确不要求：默写完整 vllm/sglang scheduler，或实现 speculative decode、multimodal、lora、dp 等与核心 contract 无关的生产分支。 ## p0 详细知识列表 ### 引擎请求生命周期 - request 到达、校验、排队、运行、抢占、恢复、完成、取消和失败； - waiting、running、preempted/resumed、finished 的状态与合法转移； - prompt tokens、computed tokens、output/speculative tokens 的进度； - 每轮 scheduler output、model execution、sampling 与状态更新； - streaming output、stop condition 与最终资源清理； - 请求身份与一次 engine request/lifecycle 的边界。 ### static、dynamic 与 continuous batching - request-level、batch-level、iteration/token-level 调度粒度； - static batching 的实现简单性、padding/cohort 固定与 batch 退化； - dynamic batching 的等待窗口和组批条件； - continuous batching 的迭代边界、动态补位和完成请求移除； - 请求长度、到达时间、prompt/output 比例对 batch 组成的影响； - batch size 不是唯一约束，token 数、kv block 和模型限制共同决定可运行集合； - 提高设备利用率不保证每个请求的延迟都改善。 ### 每轮调度约束 - token/compute budget； - max running sequences； - kv block/capacity admission； - model max length； - 当前 running 请求与 waiting 请求的选择顺序； - 新请求、恢复请求和已有 running 请求； - lookahead/speculative tokens 对预算的影响边界； - 无法分配 kv 时的 skip、wait、preempt 或 reject； - 调度输出必须与本轮实际执行和内存分配一致。 ### prefill、decode 与 chunked prefill - prefill 对 ttft 的影响； - decode 对 itl/tpot 和流式平滑度的影响； - 只优先 prefill 与只优先 decode 的失败模式； - 将长 prefill 切成 token chunks； - chunk 边界、已有 computed tokens 和 kv 状态； - 用剩余 token budget 调度 prefill chunk； - decode 优先与剩余预算填入 prefill 的一种策略； - token budget 大小对 ttft、itl、吞吐和显存压力的影响； - 长请求独占、短请求插队与 starvation 风险。 ### 抢占、恢复与过载 - kv 不足时为什么需要抢占； - recompute、swap/offload 等恢复策略的适用边界； - 抢占后释放哪些资源、保留哪些逻辑状态； - 恢复请求如何重新进入 waiting/running； - repeated preemption、thrashing 和 watermark/headroom； - admission control、queue limit、timeout、load shedding； - 过载下保护 active decode 与接纳新请求之间的权衡； - 取消和失败不能留下 scheduler/kv 状态泄漏。 ### 调度策略与公平性 - fcfs、priority、shortest-job-like 启发式的目标与风险； - 已知输入长度与未知输出长度； - arrival time、priority、remaining tokens、age； - starvation、priority inversion 和 aging； - 多租户 quota/slo 的基本设计； - 平均延迟、尾延迟和吞吐不能同时无条件最优； - 策略公平比较需要相同 executor、workload 和预算。 ### 引擎指标与归因 - ttft、itl、tpot、end-to-end latency； - request throughput 与 token throughput； - queue time、prefill time、decode time、restore time； - running/waiting 数量、batch tokens、kv usage； - preemption、recompute、cache hit/miss； - p50/p95/p99 与 workload arrival/length distribution； - goodput/slo attainment； - throughput 上升但 ttft 或 itl 恶化的负面结果。 ### vllm v1 源码阅读 - 固定 release/commit 后再记录具体路径； - scheduler 输入、request queues 和 schedule output； - token progress 如何统一表达 chunked prefill、decode、prefix hit 和 speculative tokens； - running 优先、waiting admission、token budget 和 kv slot allocation； - preemption、free、requeue 和 resume； - scheduler 与 kv cache manager、model runner、output processor 的边界； - v0/v1 或版本差异只按固定源码作答，不背旧文章类名。 ## p1 补充 - asynchronous scheduling 与 cpu/gpu pipeline gap； - prefix cache hit 对 computed tokens 和 admission 的影响； - speculative decoding 对 lookahead/token budget 的影响； - lora adapter batch 限制； - multimodal encoder input/cache budget； - data-parallel prefill balancing； - prefill/decode disaggregation； - slo-aware、deadline-aware 或 cost-aware policy； - scheduler trace/replay 与离线 policy 对比。 ## p2 延后 - 集群级副本路由、弹性伸缩和全局 placement； - 生产级多租户配额控制面； - 未经实验支持的复杂强化学习调度； - 为关键词覆盖同时实现多个独立策略； - 与目标岗位无关的 gpu kernel scheduler 细节。 ## 训练顺序与验收 ### a. 最小请求状态机 必须完成： 1. request 数据结构和合法状态； 2. waiting/running/finished 队列或集合； 3. add、schedule、step、finish、cancel； 4. 非法重复完成、取消和状态迁移测试； 5. 资源清理 hook。 通过标准：所有状态转移可枚举，finished/cancelled 请求不会再次被调度。 ### b. continuous batching 主循环 必须完成： 1. 每轮接收新请求； 2. 先推进已有 running； 3. 移除完成请求； 4. 在预算允许时从 waiting 补位； 5. 生成本轮 batch 并更新 token progress； 6. 可重复输入下输出确定。 通过标准：45 分钟内手写最小版本；用不同到达时间和输出长度证明 dynamic refill 生效。 ### c. token/kv budget 与抢占 必须完成： 1. `max_num_scheduled_tokens`； 2. `max_num_running_reqs`； 3. kv block admission 接口； 4. 无法分配时的 wait/preempt； 5. preempt 后 free、reset/recompute 和 requeue； 6. repeated preemption 与容量回收测试。 通过标准：60 分钟完成给定接口；总 scheduled tokens、running 数和 kv blocks 永远不越界。 ### d. chunked prefill 必须完成： 1. 统一 `num_computed_tokens` 与 `num_target_tokens`； 2. running decode 先消耗预算； 3. 剩余预算分配给 prefill； 4. 长 prefill 截断为 chunk； 5. 下轮从已计算位置继续； 6. 记录每请求 ttft/itl。 通过标准：给定 workload 能展示 token budget 改变带来的 ttft/itl trade-off，而不是只展示吞吐。 ### e. 仿真、真实源码与实验 必须完成： 1. 用离散事件或 deterministic step simulator 比较 static/continuous batching； 2. workload 包含到达时间、prompt 长度和输出长度分布； 3. 对比不同 token budget、max sequences 和 policy； 4. 记录吞吐、ttft、itl、queue 和 preemption； 5. 固定 vllm release/commit，沿真实 scheduler 完成一轮 source trace； 6. 在真实引擎上验证至少一个 simulator 结论，并记录校准偏差。 通过标准：明确区分 simulator 的 `simulated` 结论与真实 vllm 的 `experimentally validated` 结论。 ## 必须通过的领域手撕 | 题目 | 时间限制 | 最低要求 | |---|---:|---| | 请求生命周期状态机 | 30 分钟 | 合法转移、取消、终态幂等 | | continuous batching 主循环 | 45 分钟 | 动态进入退出、补位和完成 | | token budget scheduler | 45 分钟 | token/sequence 预算不越界 | | kv-aware admission | 45 分钟 | allocate、wait/preempt、rollback | | chunked prefill scheduler | 60 分钟 | computed progress、chunk、混批和指标 | | preemption/resume | 60 分钟 | free、requeue、recompute 与清理正确 | 不要求默写整个 vllm scheduler。面试手撕应实现清楚的核心 contract，并主动说明删除了 speculative decode、multimodal、lora、dp 等生产分支。 ## 原理连续追问 ### batching 与预算 - static、dynamic、continuous batching 的调度粒度分别是什么？ - continuous batching 为什么提高利用率，却可能恶化某些请求延迟？ - batch size、batch tokens 和 kv capacity 为什么不是同一个限制？ - 为什么当前 vllm scheduler 可以不显式维护“prefill 阶段队列”和“decode 阶段队列”？ - `num_computed_tokens` 一类进度变量如何统一多个特性？ ### chunked prefill 与混合调度 - chunked prefill 除了防止 oom，还解决什么问题？ - token budget 变大为什么可能改善 ttft、恶化 itl？ - 为什么 decode 优先不等于 decode 永远独占？ - 长 prefill 如何避免饿死？短请求插队是否公平？ - prefill/decode 混批一定更快吗？负面 workload 是什么？ ### 抢占与过载 - kv 不足时应该 wait、reject、preempt、offload 还是 recompute？ - 抢占为什么可能导致 thrashing？如何观测？ - watermark/headroom 解决什么问题，代价是什么？ - 为什么平均吞吐不能代表用户体验？ - 系统过载时首先保护 ttft、itl、goodput 还是公平性？依据是什么？ ### 源码与项目 - 固定版本 vllm 一轮 `schedule -> execute -> update` 的数据流是什么？ - scheduler 和 kv cache manager 分别拥有哪类状态？ - toolgap-kv 的 restore completion 如何安全地影响请求可调度性？ - 为什么外部 proxy 无法独自保证 engine 内部 lifecycle/kv 正确性？ - 哪项调度行为来自 vllm，哪项是候选人 controller 拥有的？ ## 与 toolgap-kv 的连接 - ct1 需要找到 lifecycle event 与 scheduler/kv connector 的最小真实接缝； - ct2 的 restore failure、cancellation 和 late completion 最终必须落到合法请求状态和清理； - ct3 的 offload/restore 会与 active decode 争用资源，必须测 active-request p95/p99； - scheduler trace 必须区分 queue、store、restore、prefill 和 first token； - toolgap-kv 不拥有 vllm 整体调度器，除非 gate a 证明存在一个窄缺失 contract； - dynamic policy 仍属于 ct4，不能因为学会调度就提前扩张项目范围。 ## 完成证据 - 可测试请求状态机； - continuous batching、token budget、chunked prefill 和 preemption 手写实现； - static/continuous simulator 与 workload manifest； - 指标包含 ttft、itl、吞吐、queue 和 preemption； - 固定版本 vllm scheduler source trace； - 至少一个真实引擎实验和一个 losing workload； - 一次 60 分钟调度手撕； - 一次 30 分钟源码/系统连续追问； - simulated 与 experimentally validated 结论清楚分离。 ## 现有个人笔记与真题 - [continuous batching 主笔记](https://app.notion.com/p/3885d315c09080b79697e2afdb37775d) - [batching 与混合调度阶段学习记录](https://app.notion.com/p/3415d315c0908130803af01da4d6cd62) - [continuous batching 的原理是什么，调度器如何决定批次](https://app.notion.com/p/39d5d315c09081cab048f6af56fa7359) - [continuous batching 主循环伪代码](https://app.notion.com/p/33c5d315c090815694f5e795a737aca5) - [continuous batching 的调度与内存复杂度](https://app.notion.com/p/3415d315c09081458e69e4a36c8d642e) - [continuous batching 源码与 kv cache 命中真题记录](https://app.notion.com/p/39d5d315c09081a287d3ec2a8e5085e3) ## 当前 vllm 官方参考 以下 latest/stable 页面只用于定位当前概念。源码学习必须固定具体 release/commit。 - [vllm v1 scheduler api](https://docs.vllm.ai/en/stable/api/vllm/v1/core/sched/scheduler/) - [vllm schedulerconfig](https://docs.vllm.ai/en/stable/api/vllm/config/scheduler/) - [vllm optimization and tuning](https://docs.vllm.ai/en/stable/configuration/optimization/) - [vllm engine arguments](https://docs.vllm.ai/en/stable/configuration/engine_args/) - [sglang repository（条件式调度对比入口）](https://github.com/sgl-project/sglang) "

    "detail_html": "<h2>05｜性能分析与 GPU 最小认知详细知识列表<\/h2>\n<blockquote>优先级：P0 当前状态：已有零散 benchmark 要求，尚未形成统一方法并完成验收 目标熟练度：原理 L2 / 源码 L0 / 手写 L0 / 实验 L2 依赖：<a href=\"topics/01-pytorch-tensor-programming.md\">PyTorch 与张量编程<\/a>、<a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能用最小但正确的 GPU 性能模型解释 LLM Serving：知道计算、HBM 容量/带宽、CPU-GPU 数据移动、异步执行和排队分别如何影响 Prefill、Decode、KV Cache 与 restore；能够设计可复现的 benchmark，并拒绝由错误计时、错误 workload 或单一平均值导出的结论。<\/p>\n<p>这是一个紧凑的防守节点，预计集中投入约 6-10 小时。它不要求源码阅读或领域手写，也不单独建设新项目；验收直接复用其他主题的实验产物。<\/p>\n<h3>为什么保留、为什么不继续深入<\/h3>\n<p>完全不了解 GPU 会导致无法回答：为什么 Decode 常受带宽和容量约束、为什么 KV Cache 占用 HBM、为什么 CUDA 朴素计时错误、为什么 D2H/H2D 可能伤害 active decode，以及低精度为什么影响容量和吞吐。<\/p>\n<p>但目标岗位不负责算子实现，因此学习目标停在“解释系统行为并正确测量”。能够指出问题更可能来自计算、访存、数据搬运、同步还是调度即可；不要求独立优化 kernel。<\/p>\n<h3>P0 详细知识列表<\/h3>\n<h4>计算与内存直觉<\/h4>\n<ul>\n<li>CPU 与 GPU 在顺序控制、并行吞吐和任务粒度上的基本差异；<\/li>\n<li>kernel、thread block、warp、SM 之间的概念关系，只要求能画出层次；<\/li>\n<li>HBM 的容量与带宽是两个不同约束；<\/li>\n<li>register、shared memory、cache 只需知道比 HBM 更靠近计算，不背硬件参数；<\/li>\n<li>计算量、内存访问量和 Arithmetic Intensity 的定性关系；<\/li>\n<li>compute-bound、memory-bound 与 latency/launch-bound 的基本判断；<\/li>\n<li>batch、sequence length 和并发变化可能改变瓶颈，不能给 Prefill/Decode 贴永恒标签。<\/li>\n<\/ul>\n<h4>映射到 LLM Serving<\/h4>\n<ul>\n<li>Prefill 通常具有更高并行度和矩阵乘强度，为什么更容易利用算力；<\/li>\n<li>单 token Decode 为什么反复读取权重和历史 KV，更容易受带宽、batch 和调度影响；<\/li>\n<li>KV Cache 消耗的是 HBM 容量，也会产生读取流量；<\/li>\n<li>PagedAttention 解决管理和寻址问题，不自动消除 HBM 带宽成本；<\/li>\n<li>Continuous Batching 如何改变有效 batch、设备利用率和尾延迟；<\/li>\n<li>offload/restore 引入 D2H/H2D、排队、同步与 active-request 干扰；<\/li>\n<li>优化可能减少计算、减少访存、隐藏传输或改善调度，必须区分归因。<\/li>\n<\/ul>\n<h4>CUDA 异步与数据移动常识<\/h4>\n<ul>\n<li>CPU 发起 GPU 工作后通常不会等待其立刻完成；<\/li>\n<li>为什么不做同步的 <code>time.time()<\/code> 可能只测到 launch；<\/li>\n<li>warmup、显式同步、重复和分位数的用途；<\/li>\n<li>stream/event 只要求理解顺序、并发与依赖，不要求手写复杂多流程序；<\/li>\n<li>CPU↔GPU 数据移动经过的基本路径；<\/li>\n<li>pageable 与 pinned host memory 的用途和代价，只需会解释实验现象；<\/li>\n<li>PCIe/NVLink 只要求理解它们约束设备间传输，具体带宽以现场环境测量为准。<\/li>\n<\/ul>\n<h4>精度与容量直觉<\/h4>\n<ul>\n<li>FP32、FP16、BF16 的字节数、动态范围和精度基本差异；<\/li>\n<li>FP8、INT8、INT4 能减少权重/KV 容量和传输量，但会引入 scale、kernel 支持和质量边界；<\/li>\n<li>dtype 变小不保证端到端等比例加速；<\/li>\n<li>量化算法、校准、量化 kernel 和质量评估留给独立量化主题。<\/li>\n<\/ul>\n<h4>可信实验方法<\/h4>\n<ul>\n<li>固定模型、版本/commit、硬件、driver/runtime、dtype 和启动参数；<\/li>\n<li>保存 exact command、workload manifest 和原始结果；<\/li>\n<li>分离 cold start、warmup 与 steady state；<\/li>\n<li>同时报告请求/token 吞吐、TTFT、ITL/TPOT 和端到端延迟；<\/li>\n<li>使用 p50/p95/p99，并记录样本量和重复次数；<\/li>\n<li>对显存区分逻辑容量、allocated、reserved 和进程/设备可见值；<\/li>\n<li>比较策略时保持 executor、workload、预算和测量窗口一致；<\/li>\n<li>保留 losing workload、负面结果和无法归因的结果；<\/li>\n<li>simulator 结论标记为 <code>simulated<\/code>，真实路径证据才可标记为 <code>experimentally validated<\/code>。<\/li>\n<\/ul>\n<h3>P1 补充<\/h3>\n<ul>\n<li>用 PyTorch Profiler 或 Nsight Systems 定位 CPU gap、kernel 时间和数据搬运；<\/li>\n<li>CUDA Graph 降低 launch/CPU overhead 的基本收益与静态约束；<\/li>\n<li>stream/event overlap 的小实验；<\/li>\n<li>pinned/pageable memory 与不同传输尺寸的带宽实验；<\/li>\n<li>Roofline 的定量计算；<\/li>\n<li>多 GPU 拓扑、PCIe/NVLink、NUMA 对通信和 offload 的影响；<\/li>\n<li>GPU utilization、memory utilization 等监控指标的误读边界。<\/li>\n<\/ul>\n<h3>P2/P3 延后<\/h3>\n<ul>\n<li>CUDA C++ 或 Triton kernel 手写；<\/li>\n<li>PTX/SASS 和指令级分析；<\/li>\n<li>warp scheduler、occupancy calculator 与寄存器压力调优；<\/li>\n<li>shared-memory bank conflict 深入优化；<\/li>\n<li>Tensor Core MMA/WGMMA 指令和 layout 编程；<\/li>\n<li>针对特定 GPU 微架构的算子极致调优。<\/li>\n<\/ul>\n<h3>验收任务<\/h3>\n<h4>A. 修正错误 CUDA 计时<\/h4>\n<ol>\n<li>对同一 PyTorch CUDA 操作分别使用错误的朴素计时和正确的同步计时；<\/li>\n<li>加入 warmup、重复与 p50/p95；<\/li>\n<li>说明两组数字差异来自什么；<\/li>\n<li>无可用 GPU 时保留脚本和预期现象，但不能把它标记为 <code>experimentally validated<\/code>。<\/li>\n<\/ol>\n<p>通过标准：能够现场指出缺少 warmup、同步、重复或 workload 描述的 benchmark 为什么不可信。<\/p>\n<h4>B. Serving 瓶颈归因<\/h4>\n<p>从 Transformer、KV Cache 或调度主题选择一个已有实验，回答：<\/p>\n<ol>\n<li>改动主要改变计算、HBM 容量/流量、CPU-GPU 传输还是调度排队；<\/li>\n<li>哪些观测支持该归因；<\/li>\n<li>哪个替代解释尚未排除；<\/li>\n<li>至少给出一个预期不获益或变差的 workload。<\/li>\n<\/ol>\n<p>通过标准：不使用“GPU 利用率提高所以整体更快”一类单指标结论。<\/p>\n<h4>C. ToolGap-KV 实验清单审查<\/h4>\n<p>对一条 retain/offload/recompute 实验记录检查：<\/p>\n<ul>\n<li>pinned vLLM/model/environment；<\/li>\n<li>workload、并发、上下文和 tool-gap 分布；<\/li>\n<li>queue/store/restore/recompute/first-token 分解；<\/li>\n<li>active request 与 resumed request 的 p50/p95/p99；<\/li>\n<li>输出正确性、清理和容量回到基线；<\/li>\n<li><code>roadmap<\/code>、<code>simulated<\/code>、<code>experimentally validated<\/code> 状态正确。<\/li>\n<\/ul>\n<p>通过标准：能够拒绝环境不固定、只报平均值、只报 winning case 或无法区分 requested/observed path 的结论。<\/p>\n<h3>面试连续追问<\/h3>\n<ul>\n<li>为什么 Prefill 常被称为 compute-bound，Decode 常被称为 memory-bound？哪些场景会例外？<\/li>\n<li>HBM 容量和 HBM 带宽分别限制什么？<\/li>\n<li>为什么 PagedAttention 减少碎片不等于 Attention 不再受带宽约束？<\/li>\n<li>CUDA 异步执行为什么会让朴素计时过小？<\/li>\n<li>warmup 在排除什么？为什么还需要多次重复和分位数？<\/li>\n<li>FP16/BF16/FP8/INT8 变小后为什么不保证端到端等比例加速？<\/li>\n<li>D2H/H2D restore 为什么可能拖慢正在 Decode 的请求？<\/li>\n<li>GPU utilization 很低或很高分别能证明什么、不能证明什么？<\/li>\n<li>throughput 提升但 TTFT/p99 变差时，优化是否成功？<\/li>\n<li>simulator 与真实引擎结果偏差时，应该相信哪个，如何校准？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一份错误/正确 CUDA 计时对照；<\/li>\n<li>一份包含环境、命令、workload、重复和分位数的 benchmark 记录；<\/li>\n<li>一次 Serving 瓶颈归因与替代解释；<\/li>\n<li>一个 losing workload；<\/li>\n<li>一次 ToolGap-KV 实验清单审查；<\/li>\n<li>一次 15 分钟 GPU/测量防守追问；<\/li>\n<li>所有性能表述保持仓库 claim state 边界。<\/li>\n<\/ul>\n<h3>当前官方参考<\/h3>\n<ul>\n<li><a href=\"https://docs.pytorch.org/docs/stable/notes/cuda.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch CUDA semantics<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/tutorials/recipes/recipes/benchmark.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch benchmark recipe<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/tutorials/recipes/recipes/profiler_recipe.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch Profiler recipe<\/a><\/li>\n<li><a href=\"https://docs.nvidia.com/cuda/cuda-c-programming-guide/\" target=\"_blank\" rel=\"noopener noreferrer\">NVIDIA CUDA C++ Programming Guide<\/a><\/li>\n<\/ul>",
    "search_text": "05 性能分析与实验方法 p0 pytorch/transformer 主题已有零散测量要求；尚未形成统一实验方法并完成验收 具备用于 llm serving 的最小 gpu 与性能认知，能正确测量和解释 prefill、decode、kv cache 与数据搬运，不因异步执行、workload 或统计错误得出伪结论。 这是性能实验防守节点，不是 cuda/算子学习路线；不要求 kernel 源码、cuda/triton 手写、ptx/sass、occupancy 调优或 tensor core 指令。 # 05｜性能分析与 gpu 最小认知详细知识列表 > 优先级：p0 > > 当前状态：已有零散 benchmark 要求，尚未形成统一方法并完成验收 > > 目标熟练度：原理 l2 / 源码 l0 / 手写 l0 / 实验 l2 > > 依赖：[pytorch 与张量编程](01-pytorch-tensor-programming.md)、[transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能用最小但正确的 gpu 性能模型解释 llm serving：知道计算、hbm 容量/带宽、cpu-gpu 数据移动、异步执行和排队分别如何影响 prefill、decode、kv cache 与 restore；能够设计可复现的 benchmark，并拒绝由错误计时、错误 workload 或单一平均值导出的结论。 这是一个紧凑的防守节点，预计集中投入约 6-10 小时。它不要求源码阅读或领域手写，也不单独建设新项目；验收直接复用其他主题的实验产物。 ## 为什么保留、为什么不继续深入 完全不了解 gpu 会导致无法回答：为什么 decode 常受带宽和容量约束、为什么 kv cache 占用 hbm、为什么 cuda 朴素计时错误、为什么 d2h/h2d 可能伤害 active decode，以及低精度为什么影响容量和吞吐。 但目标岗位不负责算子实现，因此学习目标停在“解释系统行为并正确测量”。能够指出问题更可能来自计算、访存、数据搬运、同步还是调度即可；不要求独立优化 kernel。 ## p0 详细知识列表 ### 计算与内存直觉 - cpu 与 gpu 在顺序控制、并行吞吐和任务粒度上的基本差异； - kernel、thread block、warp、sm 之间的概念关系，只要求能画出层次； - hbm 的容量与带宽是两个不同约束； - register、shared memory、cache 只需知道比 hbm 更靠近计算，不背硬件参数； - 计算量、内存访问量和 arithmetic intensity 的定性关系； - compute-bound、memory-bound 与 latency/launch-bound 的基本判断； - batch、sequence length 和并发变化可能改变瓶颈，不能给 prefill/decode 贴永恒标签。 ### 映射到 llm serving - prefill 通常具有更高并行度和矩阵乘强度，为什么更容易利用算力； - 单 token decode 为什么反复读取权重和历史 kv，更容易受带宽、batch 和调度影响； - kv cache 消耗的是 hbm 容量，也会产生读取流量； - pagedattention 解决管理和寻址问题，不自动消除 hbm 带宽成本； - continuous batching 如何改变有效 batch、设备利用率和尾延迟； - offload/restore 引入 d2h/h2d、排队、同步与 active-request 干扰； - 优化可能减少计算、减少访存、隐藏传输或改善调度，必须区分归因。 ### cuda 异步与数据移动常识 - cpu 发起 gpu 工作后通常不会等待其立刻完成； - 为什么不做同步的 `time.time()` 可能只测到 launch； - warmup、显式同步、重复和分位数的用途； - stream/event 只要求理解顺序、并发与依赖，不要求手写复杂多流程序； - cpu↔gpu 数据移动经过的基本路径； - pageable 与 pinned host memory 的用途和代价，只需会解释实验现象； - pcie/nvlink 只要求理解它们约束设备间传输，具体带宽以现场环境测量为准。 ### 精度与容量直觉 - fp32、fp16、bf16 的字节数、动态范围和精度基本差异； - fp8、int8、int4 能减少权重/kv 容量和传输量，但会引入 scale、kernel 支持和质量边界； - dtype 变小不保证端到端等比例加速； - 量化算法、校准、量化 kernel 和质量评估留给独立量化主题。 ### 可信实验方法 - 固定模型、版本/commit、硬件、driver/runtime、dtype 和启动参数； - 保存 exact command、workload manifest 和原始结果； - 分离 cold start、warmup 与 steady state； - 同时报告请求/token 吞吐、ttft、itl/tpot 和端到端延迟； - 使用 p50/p95/p99，并记录样本量和重复次数； - 对显存区分逻辑容量、allocated、reserved 和进程/设备可见值； - 比较策略时保持 executor、workload、预算和测量窗口一致； - 保留 losing workload、负面结果和无法归因的结果； - simulator 结论标记为 `simulated`，真实路径证据才可标记为 `experimentally validated`。 ## p1 补充 - 用 pytorch profiler 或 nsight systems 定位 cpu gap、kernel 时间和数据搬运； - cuda graph 降低 launch/cpu overhead 的基本收益与静态约束； - stream/event overlap 的小实验； - pinned/pageable memory 与不同传输尺寸的带宽实验； - roofline 的定量计算； - 多 gpu 拓扑、pcie/nvlink、numa 对通信和 offload 的影响； - gpu utilization、memory utilization 等监控指标的误读边界。 ## p2/p3 延后 - cuda c++ 或 triton kernel 手写； - ptx/sass 和指令级分析； - warp scheduler、occupancy calculator 与寄存器压力调优； - shared-memory bank conflict 深入优化； - tensor core mma/wgmma 指令和 layout 编程； - 针对特定 gpu 微架构的算子极致调优。 ## 验收任务 ### a. 修正错误 cuda 计时 1. 对同一 pytorch cuda 操作分别使用错误的朴素计时和正确的同步计时； 2. 加入 warmup、重复与 p50/p95； 3. 说明两组数字差异来自什么； 4. 无可用 gpu 时保留脚本和预期现象，但不能把它标记为 `experimentally validated`。 通过标准：能够现场指出缺少 warmup、同步、重复或 workload 描述的 benchmark 为什么不可信。 ### b. serving 瓶颈归因 从 transformer、kv cache 或调度主题选择一个已有实验，回答： 1. 改动主要改变计算、hbm 容量/流量、cpu-gpu 传输还是调度排队； 2. 哪些观测支持该归因； 3. 哪个替代解释尚未排除； 4. 至少给出一个预期不获益或变差的 workload。 通过标准：不使用“gpu 利用率提高所以整体更快”一类单指标结论。 ### c. toolgap-kv 实验清单审查 对一条 retain/offload/recompute 实验记录检查： - pinned vllm/model/environment； - workload、并发、上下文和 tool-gap 分布； - queue/store/restore/recompute/first-token 分解； - active request 与 resumed request 的 p50/p95/p99； - 输出正确性、清理和容量回到基线； - `roadmap`、`simulated`、`experimentally validated` 状态正确。 通过标准：能够拒绝环境不固定、只报平均值、只报 winning case 或无法区分 requested/observed path 的结论。 ## 面试连续追问 - 为什么 prefill 常被称为 compute-bound，decode 常被称为 memory-bound？哪些场景会例外？ - hbm 容量和 hbm 带宽分别限制什么？ - 为什么 pagedattention 减少碎片不等于 attention 不再受带宽约束？ - cuda 异步执行为什么会让朴素计时过小？ - warmup 在排除什么？为什么还需要多次重复和分位数？ - fp16/bf16/fp8/int8 变小后为什么不保证端到端等比例加速？ - d2h/h2d restore 为什么可能拖慢正在 decode 的请求？ - gpu utilization 很低或很高分别能证明什么、不能证明什么？ - throughput 提升但 ttft/p99 变差时，优化是否成功？ - simulator 与真实引擎结果偏差时，应该相信哪个，如何校准？ ## 完成证据 - 一份错误/正确 cuda 计时对照； - 一份包含环境、命令、workload、重复和分位数的 benchmark 记录； - 一次 serving 瓶颈归因与替代解释； - 一个 losing workload； - 一次 toolgap-kv 实验清单审查； - 一次 15 分钟 gpu/测量防守追问； - 所有性能表述保持仓库 claim state 边界。 ## 当前官方参考 - [pytorch cuda semantics](https://docs.pytorch.org/docs/stable/notes/cuda.html) - [pytorch benchmark recipe](https://docs.pytorch.org/tutorials/recipes/recipes/benchmark.html) - [pytorch profiler recipe](https://docs.pytorch.org/tutorials/recipes/recipes/profiler_recipe.html) - [nvidia cuda c++ programming guide](https://docs.nvidia.com/cuda/cuda-c-programming-guide/) "

    "detail_html": "<h2>06｜投机解码详细知识列表<\/h2>\n<blockquote>优先级：P1；包含面试启动前必须完成的 P0 防守子集 当前状态：已敲定非 kernel 岗位的减负范围，原理、源码、手写与实验均待完成 目标熟练度：原理 L3 / 源码 L2 / 手写 L2 / 实验 L2 依赖：<a href=\"topics/01-pytorch-tensor-programming.md\">PyTorch 与张量编程<\/a>、<a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a>、<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/04-llm-engine-scheduling.md\">LLM 推理引擎与调度<\/a>、<a href=\"topics/05-performance-analysis-and-gpu-literacy.md\">性能分析与 GPU 最小认知<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能解释经典 speculative sampling 为什么在减少 target model 串行调用次数的同时保持目标分布不变，能够分析 draft 成本、接受长度、验证成本、并发、KV 占用和调度开销之间的收益边界；能够手写并测试简化 draft-verify 和 cache cursor 控制流，并把它映射到固定版本 vLLM 的真实请求链路和有界对照实验。<\/p>\n<p>这是独立的 P1 深挖节点，预计在完成其前置主题后集中投入约 10-16 小时。为了避免 P1 未完成时形成明显面试漏洞，其中一小部分被定义为 P0 防守要求，但不会因此把整个节点升级为面试启动阻塞项。<\/p>\n<h3>P0 防守要求<\/h3>\n<p>开始目标岗位面试前，应能在白板上脱稿回答以下问题，不要求此时已经完成生产源码阅读和本地复现：<\/p>\n<ol>\n<li>解释 draft proposal、target parallel verification、accept/reject、修正采样和继续生成的完整链路；<\/li>\n<li>解释为什么一次 target forward 可以验证多个候选位置，以及减少的是哪一种串行瓶颈；<\/li>\n<li>区分 greedy decoding 和随机采样的正确性要求，知道“预测相同就接受”不足以保证随机采样分布正确；<\/li>\n<li>用直觉解释接受概率和拒绝后的 residual distribution 为什么能够恢复 target 分布；<\/li>\n<li>说明接受率/接受长度、draft 开销、target 验证开销和系统 overhead 如何共同决定是否加速；<\/li>\n<li>给出低接受率、draft 过重、输出过短、小 batch 或资源竞争导致不加速甚至退化的场景；<\/li>\n<li>解释全部接受、部分接受和首 token 拒绝时，target/draft KV Cache 应如何提交、截断或丢弃未接受状态；<\/li>\n<li>解释 lookahead/speculative tokens 为什么需要占用 scheduler 的 token budget 和 KV block 预算。<\/li>\n<\/ol>\n<p>通过标准：完成一次 10 分钟连续追问，能够画出请求、proposal、verification、sampler、KV 状态和 scheduler progress 的关系；不能只背“用小模型猜、大模型验证”。<\/p>\n<h3>P1 详细知识列表<\/h3>\n<h4>算法与概率正确性<\/h4>\n<ul>\n<li>普通自回归生成为什么受 target model 逐 token 串行调用限制；<\/li>\n<li>draft model/方法生成一段候选 token，target model 对相应位置做批量验证的张量关系；<\/li>\n<li>target 分布 <code>p<\/code>、draft 分布 <code>q<\/code> 和逐 token 条件概率；<\/li>\n<li>经典 speculative sampling 的接受概率 <code>min(1, p(x) / q(x))<\/code>；<\/li>\n<li>拒绝后从归一化的 <code>max(0, p - q)<\/code> residual distribution 采样的原因；<\/li>\n<li>全部候选被接受后，为什么还可以从 target 分布生成一个额外 token；<\/li>\n<li>接受一段前缀并在首次拒绝处停止的控制流；<\/li>\n<li>greedy verification 与 stochastic verification 的算法差异；<\/li>\n<li>正确性结论依赖的前提，包括一致的 tokenizer/词表、条件上下文和数值实现语义；<\/li>\n<li>近似变体与精确分布保持算法必须分开表述。<\/li>\n<\/ul>\n<p>要求不是背公式，而是能从“最终输出必须仍服从 target model 分布”这一不变量重新推导接受和修正逻辑。<\/p>\n<h4>成本模型与收益边界<\/h4>\n<ul>\n<li>proposal length、acceptance rate、accepted length 和 acceptance histogram 的区别；<\/li>\n<li>draft 每轮成本、target verification 成本、sampler/scheduler overhead 和额外内存成本；<\/li>\n<li>每次 target 调用推进的有效 token 数为什么比单独看接受率更接近收益；<\/li>\n<li>draft 越强通常接受更多，但 draft 自身成本也可能更高；<\/li>\n<li>prompt length、output length、batch/concurrency 和采样参数如何改变收益；<\/li>\n<li>target/draft 是否共享层、设备和并行策略如何改变资源占用；<\/li>\n<li>throughput 提升不代表 TTFT、ITL/TPOT 或 p99 同时改善；<\/li>\n<li>benchmark 必须包含 losing workload，不能只展示高接受率样本。<\/li>\n<\/ul>\n<h4>KV Cache 与调度交互<\/h4>\n<ul>\n<li>target cache 与 draft cache 分别代表什么进度，不能把 proposal 直接当作 target 已提交状态；<\/li>\n<li>全接受、部分接受和拒绝时，逻辑 token cursor 与物理 KV block 的提交/截断关系；<\/li>\n<li>生产系统可以通过元数据移动或 block 复用处理回滚，不等于必须搬动整段 KV 张量；<\/li>\n<li>speculative/lookahead tokens 如何影响 token budget、KV block reservation 和 admission；<\/li>\n<li>Continuous Batching 下不同请求接受长度不同，scheduler 如何更新各自进度；<\/li>\n<li>显存压力、抢占、prefix cache、chunked prefill 与投机预算之间的潜在竞争；<\/li>\n<li>额外 draft 权重和 KV 占用可能减少可服务并发；<\/li>\n<li>指标应区分 proposed、accepted、rejected、verified 和最终 committed tokens。<\/li>\n<\/ul>\n<h4>变体认知<\/h4>\n<p>以下变体只要求说明 proposal 从哪里来、需要什么额外状态、主要收益和限制，不要求逐一源码复现：<\/p>\n<ul>\n<li>独立 draft model 的经典 speculative decoding；<\/li>\n<li>n-gram/prompt lookup speculation；<\/li>\n<li>multi-token prediction；<\/li>\n<li>Medusa/EAGLE 类多候选或特征级预测；<\/li>\n<li>self-speculative/layer skipping 等复用 target 部分能力的方法。<\/li>\n<\/ul>\n<p>面试时应先说清当前讨论的是哪一种模式，不能把内部 MTP、外部 draft model 和 n-gram proposal 混成同一条实现链路。<\/p>\n<h3>源码与复现契约<\/h3>\n<p>触发依据：已收集问题会追问投机解码原理、实现和系统适配；同时它会跨越 sampling、scheduler、KV budget 和 model execution，是推理引擎的重要相邻机制。两个门槛均触发。<\/p>\n<h4>主实现锚点<\/h4>\n<ul>\n<li>主实现选择 vLLM，并在正式学习开始时记录固定 release/commit，不追随浮动 <code>main<\/code>；<\/li>\n<li>与 ToolGap-KV 使用的引擎版本存在明显差异时，分别记录“学习锚点”和“项目锚点”，不混用源码结论；<\/li>\n<li>SGLang 只在目标 JD 明确要求，或需要回答一个具体 proposal/scheduler trade-off 时作为对比实现。<\/li>\n<\/ul>\n<h4>源码深度<\/h4>\n<p>需要能够从一次请求追踪：<\/p>\n<pre><code class=\"language-text\">request/config\n  -&gt; scheduler 预留 speculative token 与 KV budget\n  -&gt; proposer 生成候选\n  -&gt; target model 批量验证\n  -&gt; rejection sampler / greedy verifier\n  -&gt; accepted token 与 KV 状态提交\n  -&gt; request progress 和下一轮调度<\/code><\/pre>\n<p>完成源码阅读后必须记录真实路径和对象，说明：<\/p>\n<ul>\n<li>特性如何配置并进入请求/引擎；<\/li>\n<li>proposal 长度和预算由谁决定；<\/li>\n<li>proposer 与 target runner 之间传递什么张量和元数据；<\/li>\n<li>acceptance/rejection 由谁计算；<\/li>\n<li>scheduler 如何接收 accepted token 数并更新进度；<\/li>\n<li>KV slot/block 如何为 speculative tokens 预留和回收；<\/li>\n<li>metrics 如何暴露接受效果和性能；<\/li>\n<li>哪些分支属于兼容性、并行、CUDA Graph 或模型特例，为什么不纳入本次手写。<\/li>\n<\/ul>\n<h4>有界控制流复现<\/h4>\n<p>投机解码的控制流、KV 状态和 scheduler 进度与目标 Serving 岗位直接相关，因此不把手写整体降为 L0；但完整随机采样系统从零恢复的边际收益不足，手写范围限定为：<\/p>\n<ul>\n<li>从空文件实现简化 draft-verify 循环，能定位首个拒绝位置并只提交合法前缀；<\/li>\n<li>记录 proposed、accepted、rejected 和 committed token；<\/li>\n<li>用逻辑 cache cursor 实现全接受、部分接受和首 token 拒绝后的 commit/truncate；<\/li>\n<li>独立写出单个 token 的 acceptance probability 和 residual distribution 核心函数，说明归一化与数值边界；<\/li>\n<li>能读懂、运行并主动修改一份完整 stochastic speculative sampling 参考实现，但不要求脱稿从零恢复全部细节；<\/li>\n<li>不依赖现成 speculative decoding 库完成简化控制流与 cache cursor。<\/li>\n<\/ul>\n<p>限时标准：在完成学习后，能在 30-45 分钟内写出并调通简化控制流和 cache cursor；概率函数可作为独立小题，不与生产引擎骨架捆绑。<\/p>\n<h4>本地测试<\/h4>\n<ul>\n<li>greedy 模式与 target-only autoregressive decoding 的 token 序列完全一致；<\/li>\n<li><code>q == p<\/code> 时高接受路径正确；<\/li>\n<li>draft 很差时首 token 拒绝路径正确；<\/li>\n<li>部分接受后只提交合法 token，逻辑 cache cursor 不越过 committed progress；<\/li>\n<li>零 proposal length、EOS 和最大长度边界行为明确。<\/li>\n<\/ul>\n<p>完整参考实现应有固定 seed 的可重复测试；经验分布一致性测试属于推荐深挖证据，不再阻塞本节点完成。<\/p>\n<h4>真实框架映射<\/h4>\n<p>在固定环境中使用一组兼容的 target/draft 组合，对比相同 target model 的普通生成和投机生成：<\/p>\n<ul>\n<li>固定框架 commit、模型 revision、硬件、dtype、并行配置和启动参数；<\/li>\n<li>固定 prompt 集、输入/输出长度、并发和采样参数；<\/li>\n<li>报告 proposed/accepted token、平均接受长度或等价接受指标；<\/li>\n<li>报告请求/token throughput、TTFT、ITL/TPOT、端到端延迟和显存；<\/li>\n<li>主动改动一个 proposal length、draft 方法或并发变量，说明它对接受与系统成本的影响；<\/li>\n<li>至少保留一个获益 workload 和一个不开启投机更优的 workload；<\/li>\n<li>结合 source trace 解释一次典型请求的 accepted progress、调度预算与 KV 变化。<\/li>\n<\/ul>\n<p>不要求完成短/长输出、低/高并发和多种 proposal 质量的全因子矩阵；如后续将投机解码变成项目主线，再把该矩阵升级为必做。toy 实现证明控制流理解，不证明生产集成或性能；只运行官方示例也不证明理解内部状态。真实固定环境对照完成后，性能结论才能标记为 <code>experimentally validated<\/code>。<\/p>\n<h3>明确不要求<\/h3>\n<ul>\n<li>训练或微调 draft model、MTP head、Medusa 或 EAGLE；<\/li>\n<li>从零实现 CUDA/Triton speculative decoding kernel；<\/li>\n<li>深挖 CUDA Graph 捕获和重放内部实现；<\/li>\n<li>维护完整生产级 scheduler fork；<\/li>\n<li>多机投机解码、跨节点 draft/target 通信优化；<\/li>\n<li>为所有变体建立源码路径图和本地复现；<\/li>\n<li>把某个固定 acceptance rate 或 speedup 当作跨模型、硬件和 workload 的通用结论。<\/li>\n<\/ul>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>投机解码可能增加临时 token、KV block reservation、回滚和显存压力，并影响 retain/offload/recompute 的可用预算，因此需要在项目深挖中能够回答两者如何相互作用。<\/p>\n<p>但它不是 CT1-CT3 主线的一部分。除非仓库出现真实接口、测试和实验产物，否则：<\/p>\n<ul>\n<li>不实现 speculative scheduler 或 kernel；<\/li>\n<li>不把“兼容投机解码”描述为 <code>shipped<\/code>；<\/li>\n<li>不把 toy 实现结果外推为 ToolGap-KV 已完成集成；<\/li>\n<li>可以把潜在冲突记录为 <code>roadmap<\/code> 或实验控制变量。<\/li>\n<\/ul>\n<h3>面试连续追问<\/h3>\n<ul>\n<li>为什么投机解码能够加速自回归生成？它没有减少哪些计算或成本？<\/li>\n<li>一次 target forward 为什么能够验证多枚 draft token？<\/li>\n<li>greedy verification 和随机 speculative sampling 有什么本质差异？<\/li>\n<li>为什么接受概率不是简单判断 <code>argmax<\/code> 是否相同？<\/li>\n<li>token 被拒绝后为什么不能直接从原始 target 分布继续采样？<\/li>\n<li>residual distribution 如何保证最终输出仍服从 target model？<\/li>\n<li>draft model 越强是否一定越快？<\/li>\n<li>acceptance rate 很高但端到端变慢，可能是什么原因？<\/li>\n<li>全接受、部分接受和首 token 拒绝时，两套 KV Cache 分别如何变化？<\/li>\n<li>speculative tokens 如何影响 scheduler token budget、KV block 预算和并发？<\/li>\n<li>投机解码如何与 Continuous Batching、Chunked Prefill、Prefix Cache 或抢占交互？<\/li>\n<li>你会如何给 vLLM 增加一种新的 proposer，并验证没有破坏正确性？<\/li>\n<li>线上应该监控哪些指标，如何判断是 proposal 质量还是系统开销导致退化？<\/li>\n<li>为什么某个模型和硬件上的 speedup 不能直接外推到另一组 workload？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一次通过的 P0 十分钟防守追问记录；<\/li>\n<li>一张固定版本 vLLM 请求级源码路径图；<\/li>\n<li>一份独立写成的 PyTorch draft-verify 与 cache cursor 简化实现；<\/li>\n<li>一份已读懂、运行并主动修改的 stochastic speculative sampling 参考实现；<\/li>\n<li>覆盖全接受、首 token 拒绝、部分接受和 cache cursor 不变量的本地测试；<\/li>\n<li>一份固定环境 target-only 与 speculative 对照实验；<\/li>\n<li>一个明确的 winning workload 和一个 losing workload；<\/li>\n<li>一次 acceptance、调度预算、KV 状态与性能结果的联合归因；<\/li>\n<li>所有 ToolGap-KV 关联表述保持 <code>roadmap<\/code>、<code>shipped<\/code>、<code>experimentally validated<\/code>、<code>simulated<\/code> 的证据边界。<\/li>\n<\/ul>",
    "search_text": "06 投机解码 p1；其中基础链路、正确性直觉、收益条件和系统交互属于面试启动前的 p0 防守要求 已敲定非 kernel 岗位的减负范围，原理、源码、手写与实验均待完成 能从概率正确性、成本模型、kv 状态和调度预算解释投机解码，手写简化 draft-verify 与 cache commit/truncate 控制流，并通过固定版本 vllm 对照实验解释一个获益和一个退化边界。 不训练 draft/mtp/eagle 模型，不手写 cuda/triton kernel，不维护生产级 scheduler fork；其他投机解码变体只做有问题导向的设计比较。 # 06｜投机解码详细知识列表 > 优先级：p1；包含面试启动前必须完成的 p0 防守子集 > > 当前状态：已敲定非 kernel 岗位的减负范围，原理、源码、手写与实验均待完成 > > 目标熟练度：原理 l3 / 源码 l2 / 手写 l2 / 实验 l2 > > 依赖：[pytorch 与张量编程](01-pytorch-tensor-programming.md)、[transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md)、[kv cache 与内存系统](03-kv-cache-memory-system.md)、[llm 推理引擎与调度](04-llm-engine-scheduling.md)、[性能分析与 gpu 最小认知](05-performance-analysis-and-gpu-literacy.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能解释经典 speculative sampling 为什么在减少 target model 串行调用次数的同时保持目标分布不变，能够分析 draft 成本、接受长度、验证成本、并发、kv 占用和调度开销之间的收益边界；能够手写并测试简化 draft-verify 和 cache cursor 控制流，并把它映射到固定版本 vllm 的真实请求链路和有界对照实验。 这是独立的 p1 深挖节点，预计在完成其前置主题后集中投入约 10-16 小时。为了避免 p1 未完成时形成明显面试漏洞，其中一小部分被定义为 p0 防守要求，但不会因此把整个节点升级为面试启动阻塞项。 ## p0 防守要求 开始目标岗位面试前，应能在白板上脱稿回答以下问题，不要求此时已经完成生产源码阅读和本地复现： 1. 解释 draft proposal、target parallel verification、accept/reject、修正采样和继续生成的完整链路； 2. 解释为什么一次 target forward 可以验证多个候选位置，以及减少的是哪一种串行瓶颈； 3. 区分 greedy decoding 和随机采样的正确性要求，知道“预测相同就接受”不足以保证随机采样分布正确； 4. 用直觉解释接受概率和拒绝后的 residual distribution 为什么能够恢复 target 分布； 5. 说明接受率/接受长度、draft 开销、target 验证开销和系统 overhead 如何共同决定是否加速； 6. 给出低接受率、draft 过重、输出过短、小 batch 或资源竞争导致不加速甚至退化的场景； 7. 解释全部接受、部分接受和首 token 拒绝时，target/draft kv cache 应如何提交、截断或丢弃未接受状态； 8. 解释 lookahead/speculative tokens 为什么需要占用 scheduler 的 token budget 和 kv block 预算。 通过标准：完成一次 10 分钟连续追问，能够画出请求、proposal、verification、sampler、kv 状态和 scheduler progress 的关系；不能只背“用小模型猜、大模型验证”。 ## p1 详细知识列表 ### 算法与概率正确性 - 普通自回归生成为什么受 target model 逐 token 串行调用限制； - draft model/方法生成一段候选 token，target model 对相应位置做批量验证的张量关系； - target 分布 `p`、draft 分布 `q` 和逐 token 条件概率； - 经典 speculative sampling 的接受概率 `min(1, p(x) / q(x))`； - 拒绝后从归一化的 `max(0, p - q)` residual distribution 采样的原因； - 全部候选被接受后，为什么还可以从 target 分布生成一个额外 token； - 接受一段前缀并在首次拒绝处停止的控制流； - greedy verification 与 stochastic verification 的算法差异； - 正确性结论依赖的前提，包括一致的 tokenizer/词表、条件上下文和数值实现语义； - 近似变体与精确分布保持算法必须分开表述。 要求不是背公式，而是能从“最终输出必须仍服从 target model 分布”这一不变量重新推导接受和修正逻辑。 ### 成本模型与收益边界 - proposal length、acceptance rate、accepted length 和 acceptance histogram 的区别； - draft 每轮成本、target verification 成本、sampler/scheduler overhead 和额外内存成本； - 每次 target 调用推进的有效 token 数为什么比单独看接受率更接近收益； - draft 越强通常接受更多，但 draft 自身成本也可能更高； - prompt length、output length、batch/concurrency 和采样参数如何改变收益； - target/draft 是否共享层、设备和并行策略如何改变资源占用； - throughput 提升不代表 ttft、itl/tpot 或 p99 同时改善； - benchmark 必须包含 losing workload，不能只展示高接受率样本。 ### kv cache 与调度交互 - target cache 与 draft cache 分别代表什么进度，不能把 proposal 直接当作 target 已提交状态； - 全接受、部分接受和拒绝时，逻辑 token cursor 与物理 kv block 的提交/截断关系； - 生产系统可以通过元数据移动或 block 复用处理回滚，不等于必须搬动整段 kv 张量； - speculative/lookahead tokens 如何影响 token budget、kv block reservation 和 admission； - continuous batching 下不同请求接受长度不同，scheduler 如何更新各自进度； - 显存压力、抢占、prefix cache、chunked prefill 与投机预算之间的潜在竞争； - 额外 draft 权重和 kv 占用可能减少可服务并发； - 指标应区分 proposed、accepted、rejected、verified 和最终 committed tokens。 ### 变体认知 以下变体只要求说明 proposal 从哪里来、需要什么额外状态、主要收益和限制，不要求逐一源码复现： - 独立 draft model 的经典 speculative decoding； - n-gram/prompt lookup speculation； - multi-token prediction； - medusa/eagle 类多候选或特征级预测； - self-speculative/layer skipping 等复用 target 部分能力的方法。 面试时应先说清当前讨论的是哪一种模式，不能把内部 mtp、外部 draft model 和 n-gram proposal 混成同一条实现链路。 ## 源码与复现契约 触发依据：已收集问题会追问投机解码原理、实现和系统适配；同时它会跨越 sampling、scheduler、kv budget 和 model execution，是推理引擎的重要相邻机制。两个门槛均触发。 ### 主实现锚点 - 主实现选择 vllm，并在正式学习开始时记录固定 release/commit，不追随浮动 `main`； - 与 toolgap-kv 使用的引擎版本存在明显差异时，分别记录“学习锚点”和“项目锚点”，不混用源码结论； - sglang 只在目标 jd 明确要求，或需要回答一个具体 proposal/scheduler trade-off 时作为对比实现。 ### 源码深度 需要能够从一次请求追踪： ```text request/config -> scheduler 预留 speculative token 与 kv budget -> proposer 生成候选 -> target model 批量验证 -> rejection sampler / greedy verifier -> accepted token 与 kv 状态提交 -> request progress 和下一轮调度 ``` 完成源码阅读后必须记录真实路径和对象，说明： - 特性如何配置并进入请求/引擎； - proposal 长度和预算由谁决定； - proposer 与 target runner 之间传递什么张量和元数据； - acceptance/rejection 由谁计算； - scheduler 如何接收 accepted token 数并更新进度； - kv slot/block 如何为 speculative tokens 预留和回收； - metrics 如何暴露接受效果和性能； - 哪些分支属于兼容性、并行、cuda graph 或模型特例，为什么不纳入本次手写。 ### 有界控制流复现 投机解码的控制流、kv 状态和 scheduler 进度与目标 serving 岗位直接相关，因此不把手写整体降为 l0；但完整随机采样系统从零恢复的边际收益不足，手写范围限定为： - 从空文件实现简化 draft-verify 循环，能定位首个拒绝位置并只提交合法前缀； - 记录 proposed、accepted、rejected 和 committed token； - 用逻辑 cache cursor 实现全接受、部分接受和首 token 拒绝后的 commit/truncate； - 独立写出单个 token 的 acceptance probability 和 residual distribution 核心函数，说明归一化与数值边界； - 能读懂、运行并主动修改一份完整 stochastic speculative sampling 参考实现，但不要求脱稿从零恢复全部细节； - 不依赖现成 speculative decoding 库完成简化控制流与 cache cursor。 限时标准：在完成学习后，能在 30-45 分钟内写出并调通简化控制流和 cache cursor；概率函数可作为独立小题，不与生产引擎骨架捆绑。 ### 本地测试 - greedy 模式与 target-only autoregressive decoding 的 token 序列完全一致； - `q == p` 时高接受路径正确； - draft 很差时首 token 拒绝路径正确； - 部分接受后只提交合法 token，逻辑 cache cursor 不越过 committed progress； - 零 proposal length、eos 和最大长度边界行为明确。 完整参考实现应有固定 seed 的可重复测试；经验分布一致性测试属于推荐深挖证据，不再阻塞本节点完成。 ### 真实框架映射 在固定环境中使用一组兼容的 target/draft 组合，对比相同 target model 的普通生成和投机生成： - 固定框架 commit、模型 revision、硬件、dtype、并行配置和启动参数； - 固定 prompt 集、输入/输出长度、并发和采样参数； - 报告 proposed/accepted token、平均接受长度或等价接受指标； - 报告请求/token throughput、ttft、itl/tpot、端到端延迟和显存； - 主动改动一个 proposal length、draft 方法或并发变量，说明它对接受与系统成本的影响； - 至少保留一个获益 workload 和一个不开启投机更优的 workload； - 结合 source trace 解释一次典型请求的 accepted progress、调度预算与 kv 变化。 不要求完成短/长输出、低/高并发和多种 proposal 质量的全因子矩阵；如后续将投机解码变成项目主线，再把该矩阵升级为必做。toy 实现证明控制流理解，不证明生产集成或性能；只运行官方示例也不证明理解内部状态。真实固定环境对照完成后，性能结论才能标记为 `experimentally validated`。 ## 明确不要求 - 训练或微调 draft model、mtp head、medusa 或 eagle； - 从零实现 cuda/triton speculative decoding kernel； - 深挖 cuda graph 捕获和重放内部实现； - 维护完整生产级 scheduler fork； - 多机投机解码、跨节点 draft/target 通信优化； - 为所有变体建立源码路径图和本地复现； - 把某个固定 acceptance rate 或 speedup 当作跨模型、硬件和 workload 的通用结论。 ## 与 toolgap-kv 的边界 投机解码可能增加临时 token、kv block reservation、回滚和显存压力，并影响 retain/offload/recompute 的可用预算，因此需要在项目深挖中能够回答两者如何相互作用。 但它不是 ct1-ct3 主线的一部分。除非仓库出现真实接口、测试和实验产物，否则： - 不实现 speculative scheduler 或 kernel； - 不把“兼容投机解码”描述为 `shipped`； - 不把 toy 实现结果外推为 toolgap-kv 已完成集成； - 可以把潜在冲突记录为 `roadmap` 或实验控制变量。 ## 面试连续追问 - 为什么投机解码能够加速自回归生成？它没有减少哪些计算或成本？ - 一次 target forward 为什么能够验证多枚 draft token？ - greedy verification 和随机 speculative sampling 有什么本质差异？ - 为什么接受概率不是简单判断 `argmax` 是否相同？ - token 被拒绝后为什么不能直接从原始 target 分布继续采样？ - residual distribution 如何保证最终输出仍服从 target model？ - draft model 越强是否一定越快？ - acceptance rate 很高但端到端变慢，可能是什么原因？ - 全接受、部分接受和首 token 拒绝时，两套 kv cache 分别如何变化？ - speculative tokens 如何影响 scheduler token budget、kv block 预算和并发？ - 投机解码如何与 continuous batching、chunked prefill、prefix cache 或抢占交互？ - 你会如何给 vllm 增加一种新的 proposer，并验证没有破坏正确性？ - 线上应该监控哪些指标，如何判断是 proposal 质量还是系统开销导致退化？ - 为什么某个模型和硬件上的 speedup 不能直接外推到另一组 workload？ ## 完成证据 - 一次通过的 p0 十分钟防守追问记录； - 一张固定版本 vllm 请求级源码路径图； - 一份独立写成的 pytorch draft-verify 与 cache cursor 简化实现； - 一份已读懂、运行并主动修改的 stochastic speculative sampling 参考实现； - 覆盖全接受、首 token 拒绝、部分接受和 cache cursor 不变量的本地测试； - 一份固定环境 target-only 与 speculative 对照实验； - 一个明确的 winning workload 和一个 losing workload； - 一次 acceptance、调度预算、kv 状态与性能结果的联合归因； - 所有 toolgap-kv 关联表述保持 `roadmap`、`shipped`、`experimentally validated`、`simulated` 的证据边界。 "

    "detail_html": "<h2>07｜量化与低精度推理详细知识列表<\/h2>\n<blockquote>优先级：P1；包含面试启动前必须完成的 P0 防守子集 当前状态：已敲定非 kernel 岗位范围，原理、源码阅读与实验均待完成 目标熟练度：原理 L3 / 源码 L2 / 手写 L0 / 实验 L2 依赖：<a href=\"topics/01-pytorch-tensor-programming.md\">PyTorch 与张量编程<\/a>、<a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a>、<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/05-performance-analysis-and-gpu-literacy.md\">性能分析与 GPU 最小认知<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能从有限数值表示出发解释量化误差、粒度、校准和异常值处理，区分权重、激活与 KV Cache 量化，说明存储 dtype、计算 dtype、累加 dtype 和 kernel 支持如何共同影响显存、吞吐、延迟与质量；能够读懂固定版本 vLLM 的量化集成路径，并运行、修改和解释一份完整复现实验。<\/p>\n<p>这是独立的 P1 工程实践节点，预计集中投入约 10-16 小时。节点不以算子开发为目标，手写维度为 L0；完成标准是形成原理、源码集成和实验判断能力，而不是重写生产量化实现。<\/p>\n<h3>P0 防守要求<\/h3>\n<p>开始目标岗位面试前，应能脱稿回答以下问题：<\/p>\n<ol>\n<li>浮点张量为什么能够映射到有限整数范围，<code>scale<\/code>、<code>zero_point<\/code>、round、clip 和 dequantize 分别做什么；<\/li>\n<li>symmetric 与 asymmetric quantization 的表示、误差和元数据差异；<\/li>\n<li>per-tensor、per-channel 与 group-wise 量化的精度、scale 数量和执行代价；<\/li>\n<li>PTQ 与 QAT、static 与 dynamic quantization 的目的和适用边界；<\/li>\n<li>weight-only、weight-activation 与 KV Cache 量化分别减少什么资源；<\/li>\n<li>W8A8、W4A16、FP8 等写法分别描述了哪些表示或计算路径；<\/li>\n<li>calibration dataset、outlier 和敏感层为什么会影响量化质量；<\/li>\n<li>模型文件或显存变小为什么不保证端到端吞吐提高；<\/li>\n<li>缺少匹配硬件、shape 或 kernel 时可能发生什么 fallback，以及为什么可能比 BF16 更慢；<\/li>\n<li>量化结果为什么必须同时检查质量指标和 Serving 指标。<\/li>\n<\/ol>\n<p>通过标准：完成一次 10 分钟连续追问，并能手算一个简单张量的 scale、量化值、反量化值和误差。不要求现场写代码。<\/p>\n<h3>P1 详细知识列表<\/h3>\n<h4>数值表示与误差<\/h4>\n<ul>\n<li>浮点与定点/整数表示的动态范围、精度和存储差异；<\/li>\n<li>线性 uniform quantization 的 quantize/dequantize 语义；<\/li>\n<li>舍入误差、截断、饱和和 clipping range；<\/li>\n<li>symmetric/asymmetric 与 signed/unsigned 表示；<\/li>\n<li>scale、zero point、group metadata 的存储成本；<\/li>\n<li>per-tensor、per-token、per-channel、group-wise 等粒度共享 scale 的含义；<\/li>\n<li>group size 变小时精度、元数据、访存和 kernel 效率可能发生的变化；<\/li>\n<li>存储 dtype、输入 dtype、计算 dtype、累加 dtype 和输出 dtype 必须分别说明。<\/li>\n<\/ul>\n<p>要求不是背诵量化名词，而是能从“有限编码范围如何近似原始分布”推导误差来源和设计取舍。<\/p>\n<h4>量化阶段与对象<\/h4>\n<ul>\n<li>PTQ、QAT、static calibration 和 runtime dynamic quantization；<\/li>\n<li>weight-only quantization 主要减少权重容量和读取流量，但激活通常仍保持较高精度；<\/li>\n<li>weight-activation quantization 对激活分布、outlier 和校准提出额外要求；<\/li>\n<li>KV Cache 量化改变历史 K/V 的容量、读取/传输字节、scale 元数据和数值误差；<\/li>\n<li>KV Cache 量化与权重量化使用不同配置和数据路径，不能混为一种能力；<\/li>\n<li>FP8 与 INT8/INT4 在编码、动态范围、scale、硬件支持和 kernel 路径上的基本差异；<\/li>\n<li>mixed precision 和保留敏感层高精度的原因。<\/li>\n<\/ul>\n<h4>常见方法的定位<\/h4>\n<p>只要求能够说明各方法主要解决的问题、作用阶段和工程代价，不要求逐一推导论文或复现算法：<\/p>\n<ul>\n<li>GPTQ：面向权重的离线量化和误差补偿直觉；<\/li>\n<li>AWQ：利用激活统计保护重要权重的直觉；<\/li>\n<li>SmoothQuant：在权重与激活之间平滑/迁移 outlier 难度的直觉；<\/li>\n<li>常见 weight-only、W8A8 和 FP8 路线如何映射到不同硬件与 Serving 条件。<\/li>\n<\/ul>\n<p>面试回答必须先声明讨论的是权重、激活还是 KV Cache，以及量化发生在离线转换、加载阶段还是运行时。<\/p>\n<h4>Serving 性能与质量边界<\/h4>\n<ul>\n<li>权重存储变小、HBM 读取量减少与真实 kernel 加速之间的区别；<\/li>\n<li>packed weights、fused dequantize/GEMM 和专用 kernel 为什么决定运行时收益；<\/li>\n<li>dequantize、scale 读取、layout 转换和 launch overhead 可能抵消收益；<\/li>\n<li>batch、矩阵 shape、GPU 架构和并行方式会改变量化 kernel 的适用区间；<\/li>\n<li>更大的可用 KV 容量或 batch 可能带来间接吞吐收益，不能错误归因为单 kernel 加速；<\/li>\n<li>throughput、TTFT、ITL/TPOT、端到端延迟和显存必须联合报告；<\/li>\n<li>perplexity、标准任务或领域评测与“生成文本看起来正常”的证据强度不同；<\/li>\n<li>长上下文、特定层和异常输入可能暴露平均质量指标遗漏的问题；<\/li>\n<li>fallback、部分层回退高精度和 unsupported configuration 必须被观测，而不是只看启动参数。<\/li>\n<\/ul>\n<h3>源码阅读与参考复现实验契约<\/h3>\n<h4>触发与边界<\/h4>\n<p>量化在已收集问题中主要作为原理和工程 trade-off 出现；对当前非 kernel 岗位，它不是需要候选人拥有生产算子实现的核心控制流模块。因此不要求从空文件重写量化 Linear 或 kernel，但源码 L2 和实验 L2 仍要求把数值语义映射到真实引擎。<\/p>\n<h4>主实现锚点<\/h4>\n<ul>\n<li>主实现选择 vLLM，并在正式学习开始时记录固定 release/commit，不追随浮动 <code>main<\/code>；<\/li>\n<li>选择一个与该版本、模型和实际硬件兼容的代表性量化方案完成主实验；<\/li>\n<li>第二种算法、框架或第三方量化库只有在 JD 明确要求，或需要回答一个具体质量/性能 trade-off 时才加入；<\/li>\n<li>与 ToolGap-KV 使用的引擎版本不一致时，分别保存学习锚点与项目锚点。<\/li>\n<\/ul>\n<h4>源码深度<\/h4>\n<p>需要能够沿以下路径定位真实对象和分支：<\/p>\n<pre><code class=\"language-text\">model/config metadata\n  -&gt; quantization method 选择与兼容性检查\n  -&gt; quantized weight / scale / zero-point 加载\n  -&gt; layer quant method 绑定或替换\n  -&gt; hardware、dtype、shape 与 kernel capability 检查\n  -&gt; kernel dispatch / fallback\n  -&gt; model execution 与观测结果<\/code><\/pre>\n<p>完成源码阅读后必须回答：<\/p>\n<ul>\n<li>模型声明的量化格式如何进入引擎配置；<\/li>\n<li>权重、scale、zero point 或其他元数据如何加载和校验；<\/li>\n<li>Linear/Attention 等层如何选择量化执行方法；<\/li>\n<li>kernel dispatch 依赖哪些硬件、dtype、shape 或可选依赖；<\/li>\n<li>unsupported configuration 是显式失败、静默回退还是部分层回退；<\/li>\n<li>权重量化配置与 KV Cache dtype 配置为什么进入不同路径；<\/li>\n<li>哪些代码属于 vLLM glue，哪些属于第三方库或 CUDA kernel；<\/li>\n<li>当前学习为什么停在 kernel 接口、输入输出和性能边界，而不进入 kernel 内循环。<\/li>\n<\/ul>\n<h4>完整参考实验<\/h4>\n<p>可以使用官方或可信实现，不要求独立重写量化算法，但必须完成：<\/p>\n<ol>\n<li>从环境、模型、量化配置到评测结果完整运行一次；<\/li>\n<li>逐段解释量化表示、scale/metadata、加载、dispatch、推理和评测发生在哪里；<\/li>\n<li>主动修改至少一个变量，例如 bit width、group size、量化粒度或执行配置；<\/li>\n<li>在运行前预测容量、误差或性能的变化，并用结果修正判断；<\/li>\n<li>保存 exact command、版本、模型 revision、硬件、原始结果和失败/回退信息。<\/li>\n<\/ol>\n<p>只复制命令并得到输出不算完成；能够解释实现但没有实际运行，也不满足实验 L2。<\/p>\n<h4>Baseline 与量化对照<\/h4>\n<p>使用相同 target model 或可证明等价的基线，比较 BF16/FP16 与一种量化权重方案：<\/p>\n<ul>\n<li>固定框架 commit、模型 revision、硬件、并行配置、workload 和测量窗口；<\/li>\n<li>记录磁盘模型大小、加载时间和 GPU 显存；<\/li>\n<li>记录请求/token throughput、TTFT、ITL/TPOT 和端到端延迟；<\/li>\n<li>至少使用一种 perplexity、标准任务或明确的领域质量指标；<\/li>\n<li>记录实际 dispatch 的 quantization method/kernel 或 fallback；<\/li>\n<li>至少保留一个“容量下降但性能没有提高”或发生回退的案例；<\/li>\n<li>解释改变来自权重字节、可用 batch、kernel、额外 dequantize 还是其他因素。<\/li>\n<\/ul>\n<p>KV Cache 量化实验是 ToolGap-KV 相关的 P1 加分项；只有固定引擎与硬件确实支持并能记录质量/格式边界时才执行，不阻塞本节点完成。<\/p>\n<h4>可选数值练习<\/h4>\n<p>可以写一个约 20 行的 <code>quantize -&gt; dequantize -&gt; error<\/code> notebook，对比不同粒度或 clipping range。它只用于固化公式，不是量化算子，不设限时要求，也不计入节点完成门槛。<\/p>\n<h3>明确不要求<\/h3>\n<ul>\n<li>手写 quantized Linear、整数 GEMM 或 fused dequantize/GEMM；<\/li>\n<li>INT4 bit packing、layout 编码或模型文件格式实现；<\/li>\n<li>自定义 PyTorch/C++ operator；<\/li>\n<li>CUDA/Triton kernel、PTX/SASS 或 Tensor Core 指令；<\/li>\n<li>独立复现 GPTQ、AWQ、SmoothQuant 或完整模型转换工具链；<\/li>\n<li>建立 QAT 训练体系；<\/li>\n<li>为所有硬件和量化方案建立 benchmark 矩阵；<\/li>\n<li>把某个模型、GPU 或 workload 的质量/性能结果外推为通用结论。<\/li>\n<\/ul>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>KV Cache 低精度表示可能改变 HBM 容量、D2H/H2D 传输字节、scale/格式元数据、restore 后的可消费性和长上下文输出质量，因此项目深挖需要能解释它与 retain/offload/recompute 的潜在交互。<\/p>\n<p>但量化不是 CT1-CT3 主线。除非仓库出现真实接口、兼容性测试、质量评测和实验产物，否则：<\/p>\n<ul>\n<li>不实现量化 kernel 或模型转换；<\/li>\n<li>不把“支持 KV Cache 量化”描述为 <code>shipped<\/code>；<\/li>\n<li>不把参考实验结果外推为 ToolGap-KV 已完成集成；<\/li>\n<li>可以把 KV dtype 作为 <code>roadmap<\/code>、兼容性风险或实验控制变量。<\/li>\n<\/ul>\n<h3>面试连续追问<\/h3>\n<ul>\n<li>scale 和 zero point 是什么？为什么 asymmetric quantization 需要 zero point？<\/li>\n<li>per-tensor、per-channel 和 group-wise 分别有什么 trade-off？<\/li>\n<li>group size 越小是否一定越好？<\/li>\n<li>PTQ、QAT、static 和 dynamic quantization 如何区分？<\/li>\n<li>W4A16 和 W8A8 分别意味着什么？真正计算时一定使用 INT4/INT8 吗？<\/li>\n<li>weight-only 量化减少了什么，为什么不一定减少激活或 KV Cache？<\/li>\n<li>激活 outlier 为什么会破坏低比特量化？AWQ 与 SmoothQuant 的处理方向有什么不同？<\/li>\n<li>FP8 与 INT8 的主要表示和硬件差异是什么？<\/li>\n<li>为什么模型显存下降一半，吞吐可能几乎不变甚至下降？<\/li>\n<li>如何确认 vLLM 实际选择了量化 kernel，而不是 fallback？<\/li>\n<li>为什么权重量化和 KV Cache 量化需要分别配置与验证？<\/li>\n<li>KV Cache 量化可能如何影响长上下文质量和 restore 格式兼容性？<\/li>\n<li>你会用哪些指标判断量化方案可以上线？<\/li>\n<li>不同模型、硬件和 workload 上的量化结论为什么不能直接迁移？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一次通过的 P0 十分钟防守追问和一次简单数值手算；<\/li>\n<li>一张固定版本 vLLM 量化集成与 dispatch 路径图；<\/li>\n<li>一份完整参考实验解读，包含主动变量修改与预测复盘；<\/li>\n<li>一份 BF16/FP16 与量化方案的固定环境对照；<\/li>\n<li>至少一项质量指标和一组 Serving 指标；<\/li>\n<li>一个容量下降但没有性能收益或发生 fallback 的案例；<\/li>\n<li>一份生产依赖说明，明确哪些能力来自框架、第三方库和 kernel；<\/li>\n<li>所有 ToolGap-KV 关联表述保持 <code>roadmap<\/code>、<code>shipped<\/code>、<code>experimentally validated<\/code>、<code>simulated<\/code> 的证据边界。<\/li>\n<\/ul>",
    "search_text": "07 量化与低精度推理 p1；其中数值映射、常见方案、质量边界和性能条件属于面试启动前的 p0 防守要求 已敲定非 kernel 岗位范围，原理、源码阅读与实验均待完成 能解释权重、激活和 kv cache 量化的数值语义与 serving trade-off，读懂固定版本 vllm 的集成与 dispatch 路径，并通过完整复现实验判断容量、性能和质量边界。 不要求量化 linear、int4 packing、自定义 operator、cuda/triton kernel 或完整复现 gptq/awq/smoothquant；可选数值 notebook 不作为限时手撕门槛。 # 07｜量化与低精度推理详细知识列表 > 优先级：p1；包含面试启动前必须完成的 p0 防守子集 > > 当前状态：已敲定非 kernel 岗位范围，原理、源码阅读与实验均待完成 > > 目标熟练度：原理 l3 / 源码 l2 / 手写 l0 / 实验 l2 > > 依赖：[pytorch 与张量编程](01-pytorch-tensor-programming.md)、[transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md)、[kv cache 与内存系统](03-kv-cache-memory-system.md)、[性能分析与 gpu 最小认知](05-performance-analysis-and-gpu-literacy.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能从有限数值表示出发解释量化误差、粒度、校准和异常值处理，区分权重、激活与 kv cache 量化，说明存储 dtype、计算 dtype、累加 dtype 和 kernel 支持如何共同影响显存、吞吐、延迟与质量；能够读懂固定版本 vllm 的量化集成路径，并运行、修改和解释一份完整复现实验。 这是独立的 p1 工程实践节点，预计集中投入约 10-16 小时。节点不以算子开发为目标，手写维度为 l0；完成标准是形成原理、源码集成和实验判断能力，而不是重写生产量化实现。 ## p0 防守要求 开始目标岗位面试前，应能脱稿回答以下问题： 1. 浮点张量为什么能够映射到有限整数范围，`scale`、`zero_point`、round、clip 和 dequantize 分别做什么； 2. symmetric 与 asymmetric quantization 的表示、误差和元数据差异； 3. per-tensor、per-channel 与 group-wise 量化的精度、scale 数量和执行代价； 4. ptq 与 qat、static 与 dynamic quantization 的目的和适用边界； 5. weight-only、weight-activation 与 kv cache 量化分别减少什么资源； 6. w8a8、w4a16、fp8 等写法分别描述了哪些表示或计算路径； 7. calibration dataset、outlier 和敏感层为什么会影响量化质量； 8. 模型文件或显存变小为什么不保证端到端吞吐提高； 9. 缺少匹配硬件、shape 或 kernel 时可能发生什么 fallback，以及为什么可能比 bf16 更慢； 10. 量化结果为什么必须同时检查质量指标和 serving 指标。 通过标准：完成一次 10 分钟连续追问，并能手算一个简单张量的 scale、量化值、反量化值和误差。不要求现场写代码。 ## p1 详细知识列表 ### 数值表示与误差 - 浮点与定点/整数表示的动态范围、精度和存储差异； - 线性 uniform quantization 的 quantize/dequantize 语义； - 舍入误差、截断、饱和和 clipping range； - symmetric/asymmetric 与 signed/unsigned 表示； - scale、zero point、group metadata 的存储成本； - per-tensor、per-token、per-channel、group-wise 等粒度共享 scale 的含义； - group size 变小时精度、元数据、访存和 kernel 效率可能发生的变化； - 存储 dtype、输入 dtype、计算 dtype、累加 dtype 和输出 dtype 必须分别说明。 要求不是背诵量化名词，而是能从“有限编码范围如何近似原始分布”推导误差来源和设计取舍。 ### 量化阶段与对象 - ptq、qat、static calibration 和 runtime dynamic quantization； - weight-only quantization 主要减少权重容量和读取流量，但激活通常仍保持较高精度； - weight-activation quantization 对激活分布、outlier 和校准提出额外要求； - kv cache 量化改变历史 k/v 的容量、读取/传输字节、scale 元数据和数值误差； - kv cache 量化与权重量化使用不同配置和数据路径，不能混为一种能力； - fp8 与 int8/int4 在编码、动态范围、scale、硬件支持和 kernel 路径上的基本差异； - mixed precision 和保留敏感层高精度的原因。 ### 常见方法的定位 只要求能够说明各方法主要解决的问题、作用阶段和工程代价，不要求逐一推导论文或复现算法： - gptq：面向权重的离线量化和误差补偿直觉； - awq：利用激活统计保护重要权重的直觉； - smoothquant：在权重与激活之间平滑/迁移 outlier 难度的直觉； - 常见 weight-only、w8a8 和 fp8 路线如何映射到不同硬件与 serving 条件。 面试回答必须先声明讨论的是权重、激活还是 kv cache，以及量化发生在离线转换、加载阶段还是运行时。 ### serving 性能与质量边界 - 权重存储变小、hbm 读取量减少与真实 kernel 加速之间的区别； - packed weights、fused dequantize/gemm 和专用 kernel 为什么决定运行时收益； - dequantize、scale 读取、layout 转换和 launch overhead 可能抵消收益； - batch、矩阵 shape、gpu 架构和并行方式会改变量化 kernel 的适用区间； - 更大的可用 kv 容量或 batch 可能带来间接吞吐收益，不能错误归因为单 kernel 加速； - throughput、ttft、itl/tpot、端到端延迟和显存必须联合报告； - perplexity、标准任务或领域评测与“生成文本看起来正常”的证据强度不同； - 长上下文、特定层和异常输入可能暴露平均质量指标遗漏的问题； - fallback、部分层回退高精度和 unsupported configuration 必须被观测，而不是只看启动参数。 ## 源码阅读与参考复现实验契约 ### 触发与边界 量化在已收集问题中主要作为原理和工程 trade-off 出现；对当前非 kernel 岗位，它不是需要候选人拥有生产算子实现的核心控制流模块。因此不要求从空文件重写量化 linear 或 kernel，但源码 l2 和实验 l2 仍要求把数值语义映射到真实引擎。 ### 主实现锚点 - 主实现选择 vllm，并在正式学习开始时记录固定 release/commit，不追随浮动 `main`； - 选择一个与该版本、模型和实际硬件兼容的代表性量化方案完成主实验； - 第二种算法、框架或第三方量化库只有在 jd 明确要求，或需要回答一个具体质量/性能 trade-off 时才加入； - 与 toolgap-kv 使用的引擎版本不一致时，分别保存学习锚点与项目锚点。 ### 源码深度 需要能够沿以下路径定位真实对象和分支： ```text model/config metadata -> quantization method 选择与兼容性检查 -> quantized weight / scale / zero-point 加载 -> layer quant method 绑定或替换 -> hardware、dtype、shape 与 kernel capability 检查 -> kernel dispatch / fallback -> model execution 与观测结果 ``` 完成源码阅读后必须回答： - 模型声明的量化格式如何进入引擎配置； - 权重、scale、zero point 或其他元数据如何加载和校验； - linear/attention 等层如何选择量化执行方法； - kernel dispatch 依赖哪些硬件、dtype、shape 或可选依赖； - unsupported configuration 是显式失败、静默回退还是部分层回退； - 权重量化配置与 kv cache dtype 配置为什么进入不同路径； - 哪些代码属于 vllm glue，哪些属于第三方库或 cuda kernel； - 当前学习为什么停在 kernel 接口、输入输出和性能边界，而不进入 kernel 内循环。 ### 完整参考实验 可以使用官方或可信实现，不要求独立重写量化算法，但必须完成： 1. 从环境、模型、量化配置到评测结果完整运行一次； 2. 逐段解释量化表示、scale/metadata、加载、dispatch、推理和评测发生在哪里； 3. 主动修改至少一个变量，例如 bit width、group size、量化粒度或执行配置； 4. 在运行前预测容量、误差或性能的变化，并用结果修正判断； 5. 保存 exact command、版本、模型 revision、硬件、原始结果和失败/回退信息。 只复制命令并得到输出不算完成；能够解释实现但没有实际运行，也不满足实验 l2。 ### baseline 与量化对照 使用相同 target model 或可证明等价的基线，比较 bf16/fp16 与一种量化权重方案： - 固定框架 commit、模型 revision、硬件、并行配置、workload 和测量窗口； - 记录磁盘模型大小、加载时间和 gpu 显存； - 记录请求/token throughput、ttft、itl/tpot 和端到端延迟； - 至少使用一种 perplexity、标准任务或明确的领域质量指标； - 记录实际 dispatch 的 quantization method/kernel 或 fallback； - 至少保留一个“容量下降但性能没有提高”或发生回退的案例； - 解释改变来自权重字节、可用 batch、kernel、额外 dequantize 还是其他因素。 kv cache 量化实验是 toolgap-kv 相关的 p1 加分项；只有固定引擎与硬件确实支持并能记录质量/格式边界时才执行，不阻塞本节点完成。 ### 可选数值练习 可以写一个约 20 行的 `quantize -> dequantize -> error` notebook，对比不同粒度或 clipping range。它只用于固化公式，不是量化算子，不设限时要求，也不计入节点完成门槛。 ## 明确不要求 - 手写 quantized linear、整数 gemm 或 fused dequantize/gemm； - int4 bit packing、layout 编码或模型文件格式实现； - 自定义 pytorch/c++ operator； - cuda/triton kernel、ptx/sass 或 tensor core 指令； - 独立复现 gptq、awq、smoothquant 或完整模型转换工具链； - 建立 qat 训练体系； - 为所有硬件和量化方案建立 benchmark 矩阵； - 把某个模型、gpu 或 workload 的质量/性能结果外推为通用结论。 ## 与 toolgap-kv 的边界 kv cache 低精度表示可能改变 hbm 容量、d2h/h2d 传输字节、scale/格式元数据、restore 后的可消费性和长上下文输出质量，因此项目深挖需要能解释它与 retain/offload/recompute 的潜在交互。 但量化不是 ct1-ct3 主线。除非仓库出现真实接口、兼容性测试、质量评测和实验产物，否则： - 不实现量化 kernel 或模型转换； - 不把“支持 kv cache 量化”描述为 `shipped`； - 不把参考实验结果外推为 toolgap-kv 已完成集成； - 可以把 kv dtype 作为 `roadmap`、兼容性风险或实验控制变量。 ## 面试连续追问 - scale 和 zero point 是什么？为什么 asymmetric quantization 需要 zero point？ - per-tensor、per-channel 和 group-wise 分别有什么 trade-off？ - group size 越小是否一定越好？ - ptq、qat、static 和 dynamic quantization 如何区分？ - w4a16 和 w8a8 分别意味着什么？真正计算时一定使用 int4/int8 吗？ - weight-only 量化减少了什么，为什么不一定减少激活或 kv cache？ - 激活 outlier 为什么会破坏低比特量化？awq 与 smoothquant 的处理方向有什么不同？ - fp8 与 int8 的主要表示和硬件差异是什么？ - 为什么模型显存下降一半，吞吐可能几乎不变甚至下降？ - 如何确认 vllm 实际选择了量化 kernel，而不是 fallback？ - 为什么权重量化和 kv cache 量化需要分别

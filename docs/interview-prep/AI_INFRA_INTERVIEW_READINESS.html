    .table-wrap { overflow-x: auto; margin: 12px 0; }

    th, td { padding: 8px; border: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { background: #ece9df; }
    .summary-card { margin: 18px 0; padding: 15px; border: 1px solid var(--line); border-radius: 12px; background: #faf9f4; }
    .summary-card strong { display: block; margin-bottom: 5px; }

  <script id="topic-data" type="application/json">[
  {
    "id": "01",
    "title": "PyTorch 与张量编程",
    "priority": "P0",
    "priority_text": "P0",
    "state": "已敲定，待训练与验收",
    "mastery": {
      "原理": "L2",
      "源码": "L1",
      "手写": "L3",
      "实验": "L2"
    },
    "capability": "掌握表达 Transformer 推理所需的 PyTorch 基础，能够正确处理张量形状、内存布局、模型组件、推理模式和 GPU 测量，并为 Attention、Decoder Block 与 KV Cache 手写提供工具能力。",
    "boundary": "不系统学习数据集、训练循环、DDP/FSDP、`torch.compile` 或自定义 CUDA operator。",
    "detail_relative": "topics/01-pytorch-tensor-programming.md",
    "status_group": "pending",
    "has_p0_defense": false,
    "detail_html": "<h2>01｜PyTorch 与张量编程详细知识列表<\/h2>\n<blockquote>优先级：P0 当前状态：从零开始 目标熟练度：原理 L2 / 源码 L1 / 手写 L3 / 实验 L2 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>这不是完整的 PyTorch 课程。完成后应能把 Transformer 数学表达稳定地翻译成 PyTorch，实现时能主动检查 shape、dtype、device、layout 和推理语义，并能写出可信的正确性测试与基础 benchmark。<\/p>\n<p>若 Python 基础稳定，本主题预计需要约 12-18 小时专注练习。时间投入不等于完成；必须通过后文验收。<\/p>\n<h3>P0 详细知识列表<\/h3>\n<h4>Tensor 心智模型<\/h4>\n<ul>\n<li>tensor 的 <code>shape<\/code>、<code>ndim<\/code>、<code>dtype<\/code>、<code>device<\/code>；<\/li>\n<li>storage、stride、offset 与逻辑视图之间的关系；<\/li>\n<li>view 与 copy 的区别；<\/li>\n<li>连续与非连续 tensor；<\/li>\n<li>CPU/GPU tensor 的设备一致性；<\/li>\n<li>FP32、FP16、BF16 的最小数值直觉。<\/li>\n<\/ul>\n<h4>形状与数据变换<\/h4>\n<ul>\n<li>索引、切片和维度选择；<\/li>\n<li>broadcasting 规则；<\/li>\n<li><code>view<\/code>、<code>reshape<\/code>、<code>flatten<\/code>、<code>unsqueeze<\/code>、<code>squeeze<\/code>；<\/li>\n<li><code>transpose<\/code>、<code>permute<\/code>、<code>contiguous<\/code>；<\/li>\n<li><code>cat<\/code>、<code>stack<\/code>、<code>split<\/code>、<code>chunk<\/code>；<\/li>\n<li><code>expand<\/code> 与 <code>repeat<\/code> 的语义和内存差异。<\/li>\n<\/ul>\n<h4>Transformer 所需算子<\/h4>\n<ul>\n<li><code>matmul<\/code>、<code>bmm<\/code>、<code>einsum<\/code> 的批量矩阵乘语义；<\/li>\n<li>element-wise 运算和 reduction；<\/li>\n<li><code>softmax<\/code> 的维度选择与数值稳定直觉；<\/li>\n<li><code>triu<\/code>、布尔 mask、<code>masked_fill<\/code>；<\/li>\n<li><code>argmax<\/code>、<code>topk<\/code> 与最小采样操作；<\/li>\n<li>随机数种子和可复现性。<\/li>\n<\/ul>\n<h4>模型组件<\/h4>\n<ul>\n<li><code>nn.Module<\/code> 与 <code>forward<\/code>；<\/li>\n<li><code>Parameter<\/code>、buffer、普通 tensor 的区别；<\/li>\n<li><code>Linear<\/code>、<code>Embedding<\/code>、<code>LayerNorm/RMSNorm<\/code>；<\/li>\n<li><code>ModuleList<\/code> 和模块注册；<\/li>\n<li><code>state_dict<\/code> 的保存与加载；<\/li>\n<li><code>train()<\/code>、<code>eval()<\/code>、<code>no_grad()<\/code>、<code>inference_mode()<\/code> 的职责边界。<\/li>\n<\/ul>\n<h4>推理与测量<\/h4>\n<ul>\n<li>tensor 在 CPU 与 CUDA 之间移动；<\/li>\n<li>CUDA 操作的异步执行直觉；<\/li>\n<li>benchmark 的 warmup、同步、重复和统计；<\/li>\n<li><code>torch.cuda.memory_allocated()<\/code> 与 <code>memory_reserved()<\/code> 的基本区别；<\/li>\n<li>shape assertion、<code>torch.testing.assert_close<\/code> 和异常输入测试。<\/li>\n<\/ul>\n<h3>P1 补充<\/h3>\n<ul>\n<li>Autograd 计算图、leaf tensor、<code>requires_grad<\/code> 和最小 backward；<\/li>\n<li>Linear/MLP 的手工梯度对照；<\/li>\n<li>autocast 与混合精度推理；<\/li>\n<li>caching allocator 的 block 缓存、split/coalesce、碎片与 <code>empty_cache()<\/code> 边界；<\/li>\n<li><code>torch.utils.benchmark<\/code> 与 PyTorch Profiler；<\/li>\n<li>PyTorch SDPA 的参考接口、后端选择和 fallback 直觉。<\/li>\n<\/ul>\n<h3>P2 延后<\/h3>\n<ul>\n<li><code>torch.compile<\/code>、Dynamo、AOTAutograd、Inductor、graph break；<\/li>\n<li>DDP、FSDP 与完整训练工程；<\/li>\n<li>Dataset/DataLoader 性能调优；<\/li>\n<li>自定义 C++/CUDA operator 与 dispatcher；<\/li>\n<li>完整 Autograd 内部实现。<\/li>\n<\/ul>\n<h3>训练顺序与验收<\/h3>\n<h4>A. Tensor 与形状语言<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>在 <code>[B, S, H]<\/code> 和 <code>[B, N, S, D]<\/code> 之间拆头、换轴和合头；<\/li>\n<li>写出 <code>Q @ K.transpose(-2, -1)<\/code> 每一步的 shape；<\/li>\n<li>构造能广播到 Attention Scores 的 Causal Mask；<\/li>\n<li>用 <code>matmul<\/code>、<code>bmm<\/code>、<code>einsum<\/code> 表达等价的批量矩阵乘；<\/li>\n<li>制造非连续 tensor，观察 <code>view<\/code> 失败并解释 <code>reshape/contiguous<\/code> 的行为。<\/li>\n<\/ol>\n<p>通过标准：给出任意 <code>B/S/H/N/D<\/code>，能先推导形状，再写代码；不能依赖反复运行报错来猜维度。<\/p>\n<h4>B. Module 与推理组件<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>手写并测试 <code>RMSNorm<\/code>；<\/li>\n<li>建立包含 <code>Embedding<\/code>、<code>Linear<\/code> 和 <code>ModuleList<\/code> 的最小模型；<\/li>\n<li>注册一个 buffer 并解释它为何不是 parameter；<\/li>\n<li>保存、加载 <code>state_dict<\/code> 并验证输出一致；<\/li>\n<li>在 CPU 和可用 GPU 上保持 parameter、input、cache 的 device/dtype 一致。<\/li>\n<\/ol>\n<p>通过标准：能够从空文件组织一个可测试的 <code>nn.Module<\/code>，并解释 <code>eval()<\/code> 与禁用 Autograd 不是同一件事。<\/p>\n<h4>C. 正确性与性能工具<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>为 shape、dtype、device 和输出数值编写 assertions；<\/li>\n<li>使用 <code>torch.testing.assert_close<\/code> 对照两个实现；<\/li>\n<li>展示一次错误的 CUDA 朴素计时和修正后的计时；<\/li>\n<li>记录 warmup、同步、重复次数和输入形状；<\/li>\n<li>记录一次 allocated/reserved 的变化并给出谨慎解释。<\/li>\n<\/ol>\n<p>通过标准：不会根据单次 <code>time.time()<\/code> 或单个显存数字下性能结论。<\/p>\n<h3>面试手写出口<\/h3>\n<p>PyTorch 本身不单独以“背 API”验收，而以能否支持下列实现验收：<\/p>\n<ul>\n<li>10 分钟手写 RMSNorm；<\/li>\n<li>15 分钟完成带 mask 的 Scaled Dot-Product Attention；<\/li>\n<li>30 分钟完成 MHA；<\/li>\n<li>45 分钟完成 Pre-Norm Decoder Block；<\/li>\n<li>60 分钟完成简化 KV Cache Decode。<\/li>\n<\/ul>\n<p>这些题目的模型语义和完整要求记录在 <a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a>。<\/p>\n<h3>原理追问<\/h3>\n<ul>\n<li>tensor、storage、stride 和 view 分别是什么？<\/li>\n<li><code>view<\/code> 与 <code>reshape<\/code> 什么时候会复制？<\/li>\n<li>为什么 <code>transpose<\/code> 后经常需要 <code>contiguous<\/code>？它的代价是什么？<\/li>\n<li>broadcasting 会不会真实复制数据？<\/li>\n<li><code>matmul<\/code> 与 <code>bmm<\/code> 的 batch 语义有何不同？<\/li>\n<li>parameter、buffer、普通属性如何影响设备迁移和 <code>state_dict<\/code>？<\/li>\n<li><code>eval()<\/code>、<code>no_grad()<\/code>、<code>inference_mode()<\/code> 分别改变什么？<\/li>\n<li>CUDA 异步执行为什么会使朴素计时失真？<\/li>\n<li>allocated、reserved 和进程可见显存为什么可能不同？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一组独立 PyTorch tensor/module 练习及本地测试；<\/li>\n<li>shape、dtype、device、view/copy 的错误案例记录；<\/li>\n<li>RMSNorm 实现与参考结果对照；<\/li>\n<li>CPU 和可用 GPU benchmark；<\/li>\n<li>一次 15 分钟 tensor/Module 口头追问复盘；<\/li>\n<li>Transformer 领域手撕中没有因 PyTorch API 或 tensor shape 失败。<\/li>\n<\/ul>\n<h3>当前官方参考<\/h3>\n<ul>\n<li><a href=\"https://docs.pytorch.org/tutorials/beginner/basics/intro\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch Learn the Basics<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/tutorials/beginner/basics/tensor_tutorial\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch Tensor tutorial<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/docs/stable/generated/torch.nn.MultiheadAttention.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch MultiheadAttention<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch scaled dot-product attention<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/docs/stable/notes/cuda.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch CUDA semantics<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/tutorials/recipes/recipes/benchmark.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch benchmark recipe<\/a><\/li>\n<\/ul>",
    "search_text": "01 pytorch 与张量编程 p0 已敲定，待训练与验收 掌握表达 transformer 推理所需的 pytorch 基础，能够正确处理张量形状、内存布局、模型组件、推理模式和 gpu 测量，并为 attention、decoder block 与 kv cache 手写提供工具能力。 不系统学习数据集、训练循环、ddp/fsdp、`torch.compile` 或自定义 cuda operator。 # 01｜pytorch 与张量编程详细知识列表 > 优先级：p0 > > 当前状态：从零开始 > > 目标熟练度：原理 l2 / 源码 l1 / 手写 l3 / 实验 l2 > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 这不是完整的 pytorch 课程。完成后应能把 transformer 数学表达稳定地翻译成 pytorch，实现时能主动检查 shape、dtype、device、layout 和推理语义，并能写出可信的正确性测试与基础 benchmark。 若 python 基础稳定，本主题预计需要约 12-18 小时专注练习。时间投入不等于完成；必须通过后文验收。 ## p0 详细知识列表 ### tensor 心智模型 - tensor 的 `shape`、`ndim`、`dtype`、`device`； - storage、stride、offset 与逻辑视图之间的关系； - view 与 copy 的区别； - 连续与非连续 tensor； - cpu/gpu tensor 的设备一致性； - fp32、fp16、bf16 的最小数值直觉。 ### 形状与数据变换 - 索引、切片和维度选择； - broadcasting 规则； - `view`、`reshape`、`flatten`、`unsqueeze`、`squeeze`； - `transpose`、`permute`、`contiguous`； - `cat`、`stack`、`split`、`chunk`； - `expand` 与 `repeat` 的语义和内存差异。 ### transformer 所需算子 - `matmul`、`bmm`、`einsum` 的批量矩阵乘语义； - element-wise 运算和 reduction； - `softmax` 的维度选择与数值稳定直觉； - `triu`、布尔 mask、`masked_fill`； - `argmax`、`topk` 与最小采样操作； - 随机数种子和可复现性。 ### 模型组件 - `nn.module` 与 `forward`； - `parameter`、buffer、普通 tensor 的区别； - `linear`、`embedding`、`layernorm/rmsnorm`； - `modulelist` 和模块注册； - `state_dict` 的保存与加载； - `train()`、`eval()`、`no_grad()`、`inference_mode()` 的职责边界。 ### 推理与测量 - tensor 在 cpu 与 cuda 之间移动； - cuda 操作的异步执行直觉； - benchmark 的 warmup、同步、重复和统计； - `torch.cuda.memory_allocated()` 与 `memory_reserved()` 的基本区别； - shape assertion、`torch.testing.assert_close` 和异常输入测试。 ## p1 补充 - autograd 计算图、leaf tensor、`requires_grad` 和最小 backward； - linear/mlp 的手工梯度对照； - autocast 与混合精度推理； - caching allocator 的 block 缓存、split/coalesce、碎片与 `empty_cache()` 边界； - `torch.utils.benchmark` 与 pytorch profiler； - pytorch sdpa 的参考接口、后端选择和 fallback 直觉。 ## p2 延后 - `torch.compile`、dynamo、aotautograd、inductor、graph break； - ddp、fsdp 与完整训练工程； - dataset/dataloader 性能调优； - 自定义 c++/cuda operator 与 dispatcher； - 完整 autograd 内部实现。 ## 训练顺序与验收 ### a. tensor 与形状语言 必须完成： 1. 在 `[b, s, h]` 和 `[b, n, s, d]` 之间拆头、换轴和合头； 2. 写出 `q @ k.transpose(-2, -1)` 每一步的 shape； 3. 构造能广播到 attention scores 的 causal mask； 4. 用 `matmul`、`bmm`、`einsum` 表达等价的批量矩阵乘； 5. 制造非连续 tensor，观察 `view` 失败并解释 `reshape/contiguous` 的行为。 通过标准：给出任意 `b/s/h/n/d`，能先推导形状，再写代码；不能依赖反复运行报错来猜维度。 ### b. module 与推理组件 必须完成： 1. 手写并测试 `rmsnorm`； 2. 建立包含 `embedding`、`linear` 和 `modulelist` 的最小模型； 3. 注册一个 buffer 并解释它为何不是 parameter； 4. 保存、加载 `state_dict` 并验证输出一致； 5. 在 cpu 和可用 gpu 上保持 parameter、input、cache 的 device/dtype 一致。 通过标准：能够从空文件组织一个可测试的 `nn.module`，并解释 `eval()` 与禁用 autograd 不是同一件事。 ### c. 正确性与性能工具 必须完成： 1. 为 shape、dtype、device 和输出数值编写 assertions； 2. 使用 `torch.testing.assert_close` 对照两个实现； 3. 展示一次错误的 cuda 朴素计时和修正后的计时； 4. 记录 warmup、同步、重复次数和输入形状； 5. 记录一次 allocated/reserved 的变化并给出谨慎解释。 通过标准：不会根据单次 `time.time()` 或单个显存数字下性能结论。 ## 面试手写出口 pytorch 本身不单独以“背 api”验收，而以能否支持下列实现验收： - 10 分钟手写 rmsnorm； - 15 分钟完成带 mask 的 scaled dot-product attention； - 30 分钟完成 mha； - 45 分钟完成 pre-norm decoder block； - 60 分钟完成简化 kv cache decode。 这些题目的模型语义和完整要求记录在 [transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md)。 ## 原理追问 - tensor、storage、stride 和 view 分别是什么？ - `view` 与 `reshape` 什么时候会复制？ - 为什么 `transpose` 后经常需要 `contiguous`？它的代价是什么？ - broadcasting 会不会真实复制数据？ - `matmul` 与 `bmm` 的 batch 语义有何不同？ - parameter、buffer、普通属性如何影响设备迁移和 `state_dict`？ - `eval()`、`no_grad()`、`inference_mode()` 分别改变什么？ - cuda 异步执行为什么会使朴素计时失真？ - allocated、reserved 和进程可见显存为什么可能不同？ ## 完成证据 - 一组独立 pytorch tensor/module 练习及本地测试； - shape、dtype、device、view/copy 的错误案例记录； - rmsnorm 实现与参考结果对照； - cpu 和可用 gpu benchmark； - 一次 15 分钟 tensor/module 口头追问复盘； - transformer 领域手撕中没有因 pytorch api 或 tensor shape 失败。 ## 当前官方参考 - [pytorch learn the basics](https://docs.pytorch.org/tutorials/beginner/basics/intro) - [pytorch tensor tutorial](https://docs.pytorch.org/tutorials/beginner/basics/tensor_tutorial) - [pytorch multiheadattention](https://docs.pytorch.org/docs/stable/generated/torch.nn.multiheadattention.html) - [pytorch scaled dot-product attention](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html) - [pytorch cuda semantics](https://docs.pytorch.org/docs/stable/notes/cuda.html) - [pytorch benchmark recipe](https://docs.pytorch.org/tutorials/recipes/recipes/benchmark.html) "

    "detail_html": "<h2>02｜Transformer 推理原理与手撕详细知识列表<\/h2>\n<blockquote>优先级：P0 当前状态：原理具有旧笔记基础；张量级推导、源码、手写和实验待开始 目标熟练度：原理 L3 / 源码 L2 / 手写 L3 / 实验 L3 依赖：<a href=\"topics/01-pytorch-tensor-programming.md\">PyTorch 与张量编程<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能从 token 输入开始，沿 decoder-only Transformer 的每个张量和模块讲到 logits、采样与下一个 token；能够独立实现 Attention、Decoder Block 和 KV Cache Decode，并将实现连接到 Prefill/Decode、显存、带宽、PagedAttention 与 vLLM runtime。<\/p>\n<p>在 PyTorch 基础达标后，本主题预计需要约 25-35 小时专注练习。限时手写、输出一致性或连续追问未通过时，不视为完成。<\/p>\n<h3>当前基础与缺口<\/h3>\n<p>已有笔记证明以下主线曾经建立：<\/p>\n<ul>\n<li>Transformer 根据上下文预测下一个 token；<\/li>\n<li>Self-Attention 是内容相关的信息聚合；<\/li>\n<li>Causal Mask 约束自回归生成；<\/li>\n<li>Decode 反复使用历史 K/V，因此 KV Cache 用空间换计算；<\/li>\n<li>Block Manager、Block Table、PagedAttention 的基本职责边界。<\/li>\n<\/ul>\n<p>当前缺口：<\/p>\n<ul>\n<li>Q/K/V、Attention Scores、Context 的张量形状；<\/li>\n<li>RoPE、Residual、Norm、MLP 的准确执行顺序；<\/li>\n<li>Prefill/Decode 的计算形态和资源画像；<\/li>\n<li>MHA/MQA/GQA 的实现与 KV 容量差异；<\/li>\n<li>可运行实现、源码路径和可复现实验。<\/li>\n<\/ul>\n<p>旧笔记只作为起点，不作为当前已经掌握的证据。<\/p>\n<h3>P0 详细知识列表<\/h3>\n<h4>Decoder-only 主链路<\/h4>\n<ul>\n<li>Tokenizer、token IDs、Embedding 与 hidden states；<\/li>\n<li>Pre-Norm Decoder Layer；<\/li>\n<li>Attention、Residual、RMSNorm、SwiGLU MLP；<\/li>\n<li>Final Norm、LM Head、logits；<\/li>\n<li>greedy、temperature、top-k 的最小采样链路；<\/li>\n<li>自回归停止条件。<\/li>\n<\/ul>\n<h4>Tokenization、采样与输出处理防守子集<\/h4>\n<blockquote>子集目标：原理 L2 / 源码 L1 / 手写 L0 / 实验 L0 建议投入：2-4 小时。该子集不改变本主题整体的四维目标，也不增加独立手写或实验门槛。<\/blockquote>\n<p>需要能够从一次请求的输入边界讲到流式输出：<\/p>\n<pre><code class=\"language-text\">text / messages\n  -&gt; chat template 与特殊 token\n  -&gt; tokenizer / input_ids\n  -&gt; model logits\n  -&gt; logits processor / penalty\n  -&gt; temperature 与 top-k / top-p\n  -&gt; token selection\n  -&gt; EOS / stop token / stop string / max tokens\n  -&gt; incremental detokenize\n  -&gt; streaming response<\/code><\/pre>\n<p>原理要求：<\/p>\n<ul>\n<li>Tokenizer、词表、合并规则、token ID、特殊 token 和 OOV/byte fallback 的基本职责；<\/li>\n<li>chat template 会决定实际 prompt token 序列，模型 revision、tokenizer、template 和特殊 token 不一致可能改变输出或破坏 cache 兼容性；<\/li>\n<li>greedy 直接选择最大 logit/probability token；temperature 通过缩放 logits 改变分布尖锐程度；<\/li>\n<li>top-k 保留固定数量候选，top-p 保留累计概率达到阈值的最小候选集合；<\/li>\n<li>能解释 penalty/logits processor、temperature、候选截断、归一化和采样的概念顺序，并说明固定框架版本的真实顺序必须以源码为准；<\/li>\n<li>区分 EOS、stop token、stop string、最大生成长度和外部 abort/cancellation；stop string 可能跨 token 边界，增量 detokenize 还要处理不完整字符与输出缓冲；<\/li>\n<li>streaming 是逐步公开已完成输出，不代表模型一次前向产生了完整答案；调度、采样、detokenize 和网络发送可以位于不同执行阶段。<\/li>\n<\/ul>\n<p>源码只要求选择一个固定版本 vLLM，记录以下高层链路的入口、关键对象和职责，不要求精读采样 kernel：<\/p>\n<pre><code class=\"language-text\">request / SamplingParams\n  -&gt; tokenizer 与 prompt preprocessing\n  -&gt; model logits\n  -&gt; logits processing / sampler\n  -&gt; request output state\n  -&gt; detokenize / streaming response<\/code><\/pre>\n<p>结构化或约束解码只作为 P2 防守知识：知道 grammar、正则或 JSON schema 可以编译为 FSM/等价状态，根据当前状态屏蔽非法候选 token；能够说明状态推进、合法 token mask 构造、CPU 开销、同步和 batch 异质性可能影响吞吐。不要求阅读或实现 grammar compiler、FSM engine 或完整 structured output runtime。<\/p>\n<p>明确不要求：<\/p>\n<ul>\n<li>从空文件手写 top-k/top-p sampler、logits processor 或输出状态机；<\/li>\n<li>手写 CUDA/Triton Top-K、softmax 或采样 kernel；<\/li>\n<li>独立完成采样质量、吞吐或 structured output 性能实验；<\/li>\n<li>把按权重随机采样的 LeetCode 题当作 Serving sampler 的领域手撕验收。<\/li>\n<\/ul>\n<p>通过标准：完成一次 5-10 分钟脱稿口述，能够解释采样参数如何改变候选分布，画出 tokenizer 到 streaming response 的完整链路，并指出固定版本 vLLM 的主要源码入口。无需提交独立实现或实验结果。<\/p>\n<h4>Attention<\/h4>\n<ul>\n<li>Q/K/V 投影的数学语义与张量形状；<\/li>\n<li>Scaled Dot-Product Attention；<\/li>\n<li><code>1 / sqrt(D)<\/code> 缩放；<\/li>\n<li>Causal Mask 与 padding/length mask 的边界；<\/li>\n<li>多头拆分、独立计算、拼接与输出投影；<\/li>\n<li>MHA、MQA、GQA 的 head 映射；<\/li>\n<li>RoPE 作用于 Q/K 的位置与 position offset；<\/li>\n<li>Attention 计算复杂度、激活和访存直觉。<\/li>\n<\/ul>\n<h4>Decoder Layer 组件<\/h4>\n<ul>\n<li>Residual 的信息与梯度路径；<\/li>\n<li>Pre-Norm 与 Post-Norm；<\/li>\n<li>LayerNorm 与 RMSNorm 的计算和取舍；<\/li>\n<li>FFN/MLP 的位置维度独立计算；<\/li>\n<li>SwiGLU 的 gate/up/down 投影；<\/li>\n<li>多层堆叠时的 shape 与参数共享边界。<\/li>\n<\/ul>\n<h4>Prefill、Decode 与 KV Cache<\/h4>\n<ul>\n<li>Prefill 和 Decode 的输入形态；<\/li>\n<li>每层 K/V 的产生、布局、追加与读取；<\/li>\n<li>为什么缓存 K/V，不缓存历史 Q；<\/li>\n<li>无缓存 Decode 的重复计算；<\/li>\n<li>MHA/MQA/GQA 对单层 K/V 形状的影响；<\/li>\n<li>简化连续 tensor cache 的正确性；<\/li>\n<li>为什么 Prefill 更容易计算密集、Decode 更容易受带宽和容量制约。<\/li>\n<\/ul>\n<p>容量手算、block/page 管理、Prefix Cache、offload、驱逐和生命周期正确性统一归入 <a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>。<\/p>\n<h4>正确性与性能<\/h4>\n<ul>\n<li>手写实现与参考实现的数值对照；<\/li>\n<li>带缓存与无缓存 logits/token 一致；<\/li>\n<li>position offset、mask、dtype 对一致性的影响；<\/li>\n<li>naive Attention 与融合 SDPA 的职责边界；<\/li>\n<li>warmup、同步、输入形状、重复和显存统计；<\/li>\n<li>数学等价不代表浮点逐位一致。<\/li>\n<\/ul>\n<h3>P1 补充<\/h3>\n<ul>\n<li>Linear/MLP 的简化 backward；<\/li>\n<li>一个 Transformer Layer 的 Column/Row Parallel 切分；<\/li>\n<li>AllReduce/ReduceScatter/AllGather 出现的位置；<\/li>\n<li>FP16/BF16/FP32 的数值与吞吐 trade-off；<\/li>\n<li>FlashAttention 的 IO-aware 原理与 online softmax；<\/li>\n<li>阅读一个固定版本 Hugging Face Llama-family Decoder Layer；<\/li>\n<li>阅读固定版本 vLLM model executor、Attention layer 与 KV Cache 接口。<\/li>\n<\/ul>\n<h4>MLA Serving 防守子集<\/h4>\n<blockquote>子集目标：原理 L2 / 源码 L1 / 手写 L0 / 实验 L0 建议投入：与 Topic 03 的 MLA 缓存子集共享 3-5 小时。该子集不改变本主题整体的四维目标。<\/blockquote>\n<p>需要能够从张量形状解释 MLA，而不是只背“压缩 KV Cache”：<\/p>\n<ul>\n<li>对比 MHA/GQA 直接缓存 K/V 与 MLA 缓存低维 latent representation 的差异；<\/li>\n<li>解释 query 与 KV 的低秩投影、up-projection，以及为什么部分 RoPE 维度需要与可吸收部分解耦；<\/li>\n<li>从矩阵乘法结合律解释矩阵吸收：把可合并的投影权重预先组合，避免 Decode 时为历史 token 显式恢复完整 K/V；<\/li>\n<li>区分 Prefill 与 Decode：Prefill 仍要处理整段 token 的并行计算，Decode 更受每步读取历史缓存的表示与带宽影响；<\/li>\n<li>能说明缓存容量下降不自动等于端到端更快，实际收益还受到额外投影、kernel 支持、layout、batch 和硬件约束影响；<\/li>\n<li>能比较普通 MHA/GQA 与 MLA 的 <code>cached state -&gt; attention output<\/code> 数据路径，但不要求推导特定模型的全部超参数。<\/li>\n<\/ul>\n<p>源码只要求固定一个模型 revision 或推理框架版本，定位以下主链路的入口和关键张量：<\/p>\n<pre><code class=\"language-text\">hidden states\n  -&gt; query / latent KV projection\n  -&gt; decoupled RoPE path\n  -&gt; latent KV cache write/read\n  -&gt; absorbed Decode computation\n  -&gt; attention output projection<\/code><\/pre>\n<p>通过标准：能够完成一次 10-15 分钟脱稿讲解，画出 MHA/GQA 与 MLA 的缓存表示及 Decode 路径差异，并沿固定版本源码指出主要入口。不要求提交独立代码或实验结果。<\/p>\n<p>明确不要求：<\/p>\n<ul>\n<li>从空文件手写 MLA 或复现 DeepSeek 完整 Attention；<\/li>\n<li>阅读、实现或调优 FlashMLA/CUDA/Triton kernel；<\/li>\n<li>完成 MLA 性能 benchmark 或 DeepSeek 全架构源码巡游；<\/li>\n<li>把 MLA 描述为 ToolGap-KV 已支持的模型能力。<\/li>\n<\/ul>\n<h3>P2 延后<\/h3>\n<ul>\n<li>完整训练体系和优化器；<\/li>\n<li>Encoder-only 与 Encoder-Decoder 的实现细节；<\/li>\n<li>MoE、MLA 等模型变体的完整手写与 kernel 复现；<\/li>\n<li>从零手写 FlashAttention/PagedAttention CUDA 或 Triton kernel；<\/li>\n<li>编译器 lowering、kernel fusion 与调度器内部实现。<\/li>\n<\/ul>\n<h3>训练顺序与验收<\/h3>\n<h4>A. 张量契约<\/h4>\n<p>必须能够脱稿写出：<\/p>\n<pre><code class=\"language-text\">x:       [B, S, H]\nq:       [B, Nq, S, D]\nk/v:     [B, Nkv, T, D]\nscores:  [B, Nq, S, T]\ncontext: [B, Nq, S, D]\noutput:  [B, S, H]\nlogits:  [B, S, V]<\/code><\/pre>\n<p>通过标准：能够分别代入 Prefill 与单 token Decode，并解释 <code>S<\/code>、<code>T<\/code>、<code>Nq<\/code>、<code>Nkv<\/code> 的变化。<\/p>\n<h4>B. Attention 手撕<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>单头 Scaled Dot-Product Attention；<\/li>\n<li>带 Causal Mask 的 MHA；<\/li>\n<li>RoPE；<\/li>\n<li>MQA 与 GQA；<\/li>\n<li>与 PyTorch SDPA 或固定参考实现做数值对照。<\/li>\n<\/ol>\n<p>通过标准：30 分钟内从空文件完成 MHA forward；能解释缩放、mask、softmax 维度、拆头/合头、layout 和 GQA 映射。<\/p>\n<h4>C. Decoder Block 与生成<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>RMSNorm；<\/li>\n<li>SwiGLU MLP；<\/li>\n<li>Pre-Norm Decoder Block；<\/li>\n<li>Token Embedding、LM Head 和最小采样；<\/li>\n<li>无 KV Cache 的自回归生成。<\/li>\n<\/ol>\n<p>通过标准：45 分钟内完成简化 Decoder Block；90 分钟内拼出可运行的小型 decoder-only 生成链路。<\/p>\n<h4>D. KV Cache Decode<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>将完整前向拆成 Prefill 与 Decode；<\/li>\n<li>为每层保存 K/V；<\/li>\n<li>Decode 只投影新 token，并读取历史 K/V；<\/li>\n<li>实现 append 与预分配两种 cache；<\/li>\n<li>验证缓存前后 logits 与生成 token 一致；<\/li>\n<li>用公式和实际统计核对 KV Cache 容量。<\/li>\n<\/ol>\n<p>通过标准：60 分钟内完成给定接口的简化 KV Cache Decode；能够追踪一个新 token 穿过所有层时 K/V 如何产生、存放和读取。<\/p>\n<h4>E. 源码与实验<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>对比 naive Attention 与 PyTorch SDPA；<\/li>\n<li>比较不同 <code>B/S/H/Nq/Nkv<\/code> 的时延和显存；<\/li>\n<li>阅读一个固定版本真实模型前向；<\/li>\n<li>阅读固定版本 vLLM Attention/KV 接口；<\/li>\n<li>记录数学实现、融合算子和 runtime 的职责边界；<\/li>\n<li>完成一次限时手撕和一次 20 分钟连续追问。<\/li>\n<\/ol>\n<p>通过标准：所有源码结论记录版本和路径；所有性能结论记录环境、输入、命令、重复与已知限制。<\/p>\n<h3>必须通过的领域手撕<\/h3>\n<div class=\"table-wrap\"><table><thead><tr>\n<th>题目<\/th>\n<th>时间限制<\/th>\n<th>最低要求<\/th>\n<\/tr><\/thead><tbody>\n<tr>\n<td>RMSNorm<\/td>\n<td>10 分钟<\/td>\n<td>最后一维、epsilon、dtype 正确<\/td>\n<\/tr>\n<tr>\n<td>Causal Scaled Dot-Product Attention<\/td>\n<td>15 分钟<\/td>\n<td>shape、缩放、mask、softmax 正确<\/td>\n<\/tr>\n<tr>\n<td>Multi-Head Attention<\/td>\n<td>30 分钟<\/td>\n<td>QKV、拆头、Attention、合头、输出投影<\/td>\n<\/tr>\n<tr>\n<td>RoPE<\/td>\n<td>20 分钟<\/td>\n<td>正确旋转维度并处理 position offset<\/td>\n<\/tr>\n<tr>\n<td>GQA<\/td>\n<td>30 分钟<\/td>\n<td>query heads 与 KV heads 映射正确<\/td>\n<\/tr>\n<tr>\n<td>SwiGLU MLP<\/td>\n<td>15 分钟<\/td>\n<td>gate/up/down 和激活正确<\/td>\n<\/tr>\n<tr>\n<td>Pre-Norm Decoder Block<\/td>\n<td>45 分钟<\/td>\n<td>norm、残差、Attention、MLP 顺序正确<\/td>\n<\/tr>\n<tr>\n<td>KV Cache Decode<\/td>\n<td>60 分钟<\/td>\n<td>Prefill/Decode、cache 更新、输出一致<\/td>\n<\/tr>\n<tr>\n<td>简化 TP Transformer Layer<\/td>\n<td>60 分钟<\/td>\n<td>切分方式和 collective 位置正确；P1<\/td>\n<\/tr>\n<\/tbody><\/table><\/div>\n<h3>原理连续追问<\/h3>\n<h4>Attention 与形状<\/h4>\n<ul>\n<li>为什么 Attention 除以 <code>sqrt(D)<\/code>？不除会怎样？<\/li>\n<li>Causal Mask 在 Prefill 和单 token Decode 中分别是什么形态？<\/li>\n<li>为什么 MHA 需要拆头和输出投影？<\/li>\n<li>MQA/GQA 如何减少 KV Cache？质量和并行性代价是什么？<\/li>\n<li>RoPE 为什么作用于 Q/K？position offset 为什么影响增量 Decode？<\/li>\n<li>MLA 缓存的状态与 MHA/GQA 有何不同？为什么低秩表示可以减少历史缓存读取？<\/li>\n<li>什么是矩阵吸收？为什么解耦 RoPE 会影响哪些权重能够被吸收？<\/li>\n<\/ul>\n<h4>Layer 与模型<\/h4>\n<ul>\n<li>Pre-Norm 和 Post-Norm 的差异是什么？<\/li>\n<li>RMSNorm 舍弃了什么？为什么现代 LLM 常用它？<\/li>\n<li>MLP 为什么按 token 独立计算？SwiGLU 的三组投影是什么？<\/li>\n<li>Residual 解决了什么问题？它不解决什么问题？<\/li>\n<\/ul>\n<h4>Serving 与性能<\/h4>\n<ul>\n<li>Prefill 为什么更容易计算密集，Decode 为什么更容易受内存带宽限制？<\/li>\n<li>KV Cache 为什么只缓存 K/V？为什么不缓存 Q？<\/li>\n<li>naive Attention 与 SDPA/FlashAttention 的数学语义和执行实现如何区分？<\/li>\n<li>temperature、top-k、top-p 分别怎样改变候选分布，为什么 stop string 不能总被当作单个 token 处理？<\/li>\n<li>一次生成如何从 SamplingParams、logits 和 token selection 走到增量 detokenize 与流式返回？<\/li>\n<li>如果缓存输出不一致，应按什么顺序排查 mask、position、layout、dtype 和 cache 更新？<\/li>\n<li>MLA 为什么更直接优化 Decode 数据路径？哪些条件会让显存下降却没有得到端到端加速？<\/li>\n<\/ul>\n<h3>与 ToolGap-KV 的连接<\/h3>\n<ul>\n<li>本主题只负责 K/V 如何由模型产生、如何参与 Attention，以及简化连续 cache 的输出正确性；<\/li>\n<li>容量、block、共享、回收、offload/recompute 和故障语义见 <a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>；<\/li>\n<li>手写连续 tensor cache 不能被包装成已完成的 vLLM PagedAttention 或 ToolGap-KV 集成证据。<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>独立 Transformer 实现及本地测试；<\/li>\n<li>所有关键路径包含 shape assertions；<\/li>\n<li>手写 Attention 与参考实现数值一致；<\/li>\n<li>KV Cache 前后输出等价；<\/li>\n<li>CPU 与可用 GPU benchmark；<\/li>\n<li>一份固定版本模型和 vLLM 源码路径笔记；<\/li>\n<li>一次限时手撕记录；<\/li>\n<li>一次连续追问复盘，记录答错和修正；<\/li>\n<li>ToolGap-KV 相关表述没有越过仓库实际 claim state。<\/li>\n<\/ul>\n<h3>现有个人笔记<\/h3>\n<ul>\n<li><a href=\"https://app.notion.com/p/3725d315c09080e695f3d7fa7000b792\" target=\"_blank\" rel=\"noopener noreferrer\">Transformer 主笔记<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/3415d315c09081228447d3c7b927ac16\" target=\"_blank\" rel=\"noopener noreferrer\">Transformer 推理与 KV Cache 阶段学习记录<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/33e5d315c09081cbb56ae208cc775668\" target=\"_blank\" rel=\"noopener noreferrer\">面向 LLM Serving 的 Transformer 最小必要基础<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/33c5d315c0908143bfc3ef2cde8e5680\" target=\"_blank\" rel=\"noopener noreferrer\">Transformer 推理两阶段<\/a><\/li>\n<\/ul>\n<h3>当前官方参考<\/h3>\n<ul>\n<li><a href=\"https://docs.pytorch.org/docs/stable/generated/torch.nn.MultiheadAttention.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch MultiheadAttention<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch scaled dot-product attention<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/docs/stable/notes/cuda.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch CUDA semantics<\/a><\/li>\n<li><a href=\"https://docs.pytorch.org/tutorials/recipes/recipes/benchmark.html\" target=\"_blank\" rel=\"noopener noreferrer\">PyTorch benchmark recipe<\/a><\/li>\n<\/ul>",
    "search_text": "02 transformer 推理原理与手撕 p0 已敲定；原理具有旧笔记基础，手写与实验待开始 能从张量、模型、内存和 serving 四层讲清 decoder-only transformer，口述 tokenizer、采样、停止条件、detokenize 与 streaming 的完整链路，并独立手写 attention、rope、gqa、swiglu、decoder block 与 kv cache decode；对 mla 建立低秩缓存、解耦 rope、矩阵吸收及 prefill/decode 差异的防守能力。 不要求从零手写高性能 flashattention、pagedattention cuda/triton kernel，也不把完整训练体系纳入主线；输出处理子集和 mla 子集只要求有界的原理/源码能力，不增加 sampler、grammar engine、mla 或 kernel 手写及独立实验。 # 02｜transformer 推理原理与手撕详细知识列表 > 优先级：p0 > > 当前状态：原理具有旧笔记基础；张量级推导、源码、手写和实验待开始 > > 目标熟练度：原理 l3 / 源码 l2 / 手写 l3 / 实验 l3 > > 依赖：[pytorch 与张量编程](01-pytorch-tensor-programming.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能从 token 输入开始，沿 decoder-only transformer 的每个张量和模块讲到 logits、采样与下一个 token；能够独立实现 attention、decoder block 和 kv cache decode，并将实现连接到 prefill/decode、显存、带宽、pagedattention 与 vllm runtime。 在 pytorch 基础达标后，本主题预计需要约 25-35 小时专注练习。限时手写、输出一致性或连续追问未通过时，不视为完成。 ## 当前基础与缺口 已有笔记证明以下主线曾经建立： - transformer 根据上下文预测下一个 token； - self-attention 是内容相关的信息聚合； - causal mask 约束自回归生成； - decode 反复使用历史 k/v，因此 kv cache 用空间换计算； - block manager、block table、pagedattention 的基本职责边界。 当前缺口： - q/k/v、attention scores、context 的张量形状； - rope、residual、norm、mlp 的准确执行顺序； - prefill/decode 的计算形态和资源画像； - mha/mqa/gqa 的实现与 kv 容量差异； - 可运行实现、源码路径和可复现实验。 旧笔记只作为起点，不作为当前已经掌握的证据。 ## p0 详细知识列表 ### decoder-only 主链路 - tokenizer、token ids、embedding 与 hidden states； - pre-norm decoder layer； - attention、residual、rmsnorm、swiglu mlp； - final norm、lm head、logits； - greedy、temperature、top-k 的最小采样链路； - 自回归停止条件。 ### tokenization、采样与输出处理防守子集 > 子集目标：原理 l2 / 源码 l1 / 手写 l0 / 实验 l0 > > 建议投入：2-4 小时。该子集不改变本主题整体的四维目标，也不增加独立手写或实验门槛。 需要能够从一次请求的输入边界讲到流式输出： ```text text / messages -> chat template 与特殊 token -> tokenizer / input_ids -> model logits -> logits processor / penalty -> temperature 与 top-k / top-p -> token selection -> eos / stop token / stop string / max tokens -> incremental detokenize -> streaming response ``` 原理要求： - tokenizer、词表、合并规则、token id、特殊 token 和 oov/byte fallback 的基本职责； - chat template 会决定实际 prompt token 序列，模型 revision、tokenizer、template 和特殊 token 不一致可能改变输出或破坏 cache 兼容性； - greedy 直接选择最大 logit/probability token；temperature 通过缩放 logits 改变分布尖锐程度； - top-k 保留固定数量候选，top-p 保留累计概率达到阈值的最小候选集合； - 能解释 penalty/logits processor、temperature、候选截断、归一化和采样的概念顺序，并说明固定框架版本的真实顺序必须以源码为准； - 区分 eos、stop token、stop string、最大生成长度和外部 abort/cancellation；stop string 可能跨 token 边界，增量 detokenize 还要处理不完整字符与输出缓冲； - streaming 是逐步公开已完成输出，不代表模型一次前向产生了完整答案；调度、采样、detokenize 和网络发送可以位于不同执行阶段。 源码只要求选择一个固定版本 vllm，记录以下高层链路的入口、关键对象和职责，不要求精读采样 kernel： ```text request / samplingparams -> tokenizer 与 prompt preprocessing -> model logits -> logits processing / sampler -> request output state -> detokenize / streaming response ``` 结构化或约束解码只作为 p2 防守知识：知道 grammar、正则或 json schema 可以编译为 fsm/等价状态，根据当前状态屏蔽非法候选 token；能够说明状态推进、合法 token mask 构造、cpu 开销、同步和 batch 异质性可能影响吞吐。不要求阅读或实现 grammar compiler、fsm engine 或完整 structured output runtime。 明确不要求： - 从空文件手写 top-k/top-p sampler、logits processor 或输出状态机； - 手写 cuda/triton top-k、softmax 或采样 kernel； - 独立完成采样质量、吞吐或 structured output 性能实验； - 把按权重随机采样的 leetcode 题当作 serving sampler 的领域手撕验收。 通过标准：完成一次 5-10 分钟脱稿口述，能够解释采样参数如何改变候选分布，画出 tokenizer 到 streaming response 的完整链路，并指出固定版本 vllm 的主要源码入口。无需提交独立实现或实验结果。 ### attention - q/k/v 投影的数学语义与张量形状； - scaled dot-product attention； - `1 / sqrt(d)` 缩放； - causal mask 与 padding/length mask 的边界； - 多头拆分、独立计算、拼接与输出投影； - mha、mqa、gqa 的 head 映射； - rope 作用于 q/k 的位置与 position offset； - attention 计算复杂度、激活和访存直觉。 ### decoder layer 组件 - residual 的信息与梯度路径； - pre-norm 与 post-norm； - layernorm 与 rmsnorm 的计算和取舍； - ffn/mlp 的位置维度独立计算； - swiglu 的 gate/up/down 投影； - 多层堆叠时的 shape 与参数共享边界。 ### prefill、decode 与 kv cache - prefill 和 decode 的输入形态； - 每层 k/v 的产生、布局、追加与读取； - 为什么缓存 k/v，不缓存历史 q； - 无缓存 decode 的重复计算； - mha/mqa/gqa 对单层 k/v 形状的影响； - 简化连续 tensor cache 的正确性； - 为什么 prefill 更容易计算密集、decode 更容易受带宽和容量制约。 容量手算、block/page 管理、prefix cache、offload、驱逐和生命周期正确性统一归入 [kv cache 与内存系统](03-kv-cache-memory-system.md)。 ### 正确性与性能 - 手写实现与参考实现的数值对照； - 带缓存与无缓存 logits/token 一致； - position offset、mask、dtype 对一致性的影响； - naive attention 与融合 sdpa 的职责边界； - warmup、同步、输入形状、重复和显存统计； - 数学等价不代表浮点逐位一致。 ## p1 补充 - linear/mlp 的简化 backward； - 一个 transformer layer 的 column/row parallel 切分； - allreduce/reducescatter/allgather 出现的位置； - fp16/bf16/fp32 的数值与吞吐 trade-off； - flashattention 的 io-aware 原理与 online softmax； - 阅读一个固定版本 hugging face llama-family decoder layer； - 阅读固定版本 vllm model executor、attention layer 与 kv cache 接口。 ### mla serving 防守子集 > 子集目标：原理 l2 / 源码 l1 / 手写 l0 / 实验 l0 > > 建议投入：与 topic 03 的 mla 缓存子集共享 3-5 小时。该子集不改变本主题整体的四维目标。 需要能够从张量形状解释 mla，而不是只背“压缩 kv cache”： - 对比 mha/gqa 直接缓存 k/v 与 mla 缓存低维 latent representation 的差异； - 解释 query 与 kv 的低秩投影、up-projection，以及为什么部分 rope 维度需要与可吸收部分解耦； - 从矩阵乘法结合律解释矩阵吸收：把可合并的投影权重预先组合，避免 decode 时为历史 token 显式恢复完整 k/v； - 区分 prefill 与 decode：prefill 仍要处理整段 token 的并行计算，decode 更受每步读取历史缓存的表示与带宽影响； - 能说明缓存容量下降不自动等于端到端更快，实际收益还受到额外投影、kernel 支持、layout、batch 和硬件约束影响； - 能比较普通 mha/gqa 与 mla 的 `cached state -> attention output` 数据路径，但不要求推导特定模型的全部超参数。 源码只要求固定一个模型 revision 或推理框架版本，定位以下主链路的入口和关键张量： ```text hidden states -> query / latent kv projection -> decoupled rope path -> latent kv cache write/read -> absorbed decode computation -> attention output projection ``` 通过标准：能够完成一次 10-15 分钟脱稿讲解，画出 mha/gqa 与 mla 的缓存表示及 decode 路径差异，并沿固定版本源码指出主要入口。不要求提交独立代码或实验结果。 明确不要求： - 从空文件手写 mla 或复现 deepseek 完整 attention； - 阅读、实现或调优 flashmla/cuda/triton kernel； - 完成 mla 性能 benchmark 或 deepseek 全架构源码巡游； - 把 mla 描述为 toolgap-kv 已支持的模型能力。 ## p2 延后 - 完整训练体系和优化器； - encoder-only 与 encoder-decoder 的实现细节； - moe、mla 等模型变体的完整手写与 kernel 复现； - 从零手写 flashattention/pagedattention cuda 或 triton kernel； - 编译器 lowering、kernel fusion 与调度器内部实现。 ## 训练顺序与验收 ### a. 张量契约 必须能够脱稿写出： ```text x: [b, s, h] q: [b, nq, s, d] k/v: [b, nkv, t, d] scores: [b, nq, s, t] context: [b, nq, s, d] output: [b, s, h] logits: [b, s, v] ``` 通过标准：能够分别代入 prefill 与单 token decode，并解释 `s`、`t`、`nq`、`nkv` 的变化。 ### b. attention 手撕 必须完成： 1. 单头 scaled dot-product attention； 2. 带 causal mask 的 mha； 3. rope； 4. mqa 与 gqa； 5. 与 pytorch sdpa 或固定参考实现做数值对照。 通过标准：30 分钟内从空文件完成 mha forward；能解释缩放、mask、softmax 维度、拆头/合头、layout 和 gqa 映射。 ### c. decoder block 与生成 必须完成： 1. rmsnorm； 2. swiglu mlp； 3. pre-norm decoder block； 4. token embedding、lm head 和最小采样； 5. 无 kv cache 的自回归生成。 通过标准：45 分钟内完成简化 decoder block；90 分钟内拼出可运行的小型 decoder-only 生成链路。 ### d. kv cache decode 必须完成： 1. 将完整前向拆成 prefill 与 decode； 2. 为每层保存 k/v； 3. decode 只投影新 token，并读取历史 k/v； 4. 实现 append 与预分配两种 cache； 5. 验证缓存前后 logits 与生成 token 一致； 6. 用公式和实际统计核对 kv cache 容量。 通过标准：60 分钟内完成给定接口的简化 kv cache decode；能够追踪一个新 token 穿过所有层时 k/v 如何产生、存放和读取。 ### e. 源码与实验 必须完成： 1. 对比 naive attention 与 pytorch sdpa； 2. 比较不同 `b/s/h/nq/nkv` 的时延和显存； 3. 阅读一个固定版本真实模型前向； 4. 阅读固定版本 vllm attention/kv 接口； 5. 记录数学实现、融合算子和 runtime 的职责边界； 6. 完成一次限时手撕和一次 20 分钟连续追问。 通过标准：所有源码结论记录版本和路径；所有性能结论记录环境、输入、命令、重复与已知限制。 ## 必须通过的领域手撕 | 题目 | 时间限制 | 最低要求 | |---|---:|---| | rmsnorm | 10 分钟 | 最后一维、epsilon、dtype 正确 | | causal scaled dot-product attention | 15 分钟 | shape、缩放、mask、softmax 正确 | | multi-head attention | 30 分钟 | qkv、拆头、attention、合头、输出投影 | | rope | 20 分钟 | 正确旋转维度并处理 position offset | | gqa | 30 分钟 | query heads 与 kv heads 映射正确 | | swiglu mlp | 15 分钟 | gate/up/down 和激活正确 | | pre-norm decoder block | 45 分钟 | norm、残差、attention、mlp 顺序正确 | | kv cache decode | 60 分钟 | prefill/decode、cache 更新、输出一致 | | 简化 tp transformer layer | 60 分钟 | 切分方式和 collective 位置正确；p1 | ## 原理连续追问 ### attention 与形状 - 为什么 attention 除以 `sqrt(d)`？不除会怎样？ - causal mask 在 prefill 和单 token decode 中分别是什么形态？ - 为什么 mha 需要拆头和输出投影？ - mqa/gqa 如何减少 kv cache？质量和并行性代价是什么？ - rope 为什么作用于 q/k？position offset 为什么影响增量 decode？ - mla 缓存的状态与 mha/gqa 有何不同？为什么低秩表示可以减少历史缓存读取？ - 什么是矩阵吸收？为什么解耦 rope 会影响哪些权重能够被吸收？ ### layer 与模型 - pre-norm 和 post-norm 的差异是什么？ - rmsnorm 舍弃了什么？为什么现代 llm 常用它？ - mlp 为什么按 token 独立计算？swiglu 的三组投影是什么？ - residual 解决了什么问题？它不解决什么问题？ ### serving 与性能 - prefill 为什么更容易计算密集，decode 为什么更容易受内存带宽限制？ - kv cache 为什么只缓存 k/v？为什么不缓存 q？ - naive attention 与 sdpa/flashattention 的数学语义和执行实现如何区分？ - temperature、top-k、top-p 分别怎样改变候选分布，为什么 stop string 不能总被当作单个 token 处理？ - 一次生成如何从 samplingparams、logits 和 token selection 走到增量 detokenize 与流式返回？ - 如果缓存输出不一致，应按什么顺序排查 mask、position、layout、dtype 和 cache 更新？ - mla 为什么更直接优化 decode 数据路径？哪些条件会让显存下降却没有得到端到端加速？ ## 与 toolgap-kv 的连接 - 本主题只负责 k/v 如何由模型产生、如何参与 attention，以及简化连续 cache 的输出正确性； - 容量、block、共享、回收、offload/recompute 和故障语义见 [kv cache 与内存系统](03-kv-cache-memory-system.md)； - 手写连续 tensor cache 不能被包装成已完成的 vllm pagedattention 或 toolgap-kv 集成证据。 ## 完成证据 - 独立 transformer 实现及本地测试； - 所有关键路径包含 shape assertions； - 手写 attention 与参考实现数值一致； - kv cache 前后输出等价； - cpu 与可用 gpu benchmark； - 一份固定版本模型和 vllm 源码路径笔记； - 一次限时手撕记录； - 一次连续追问复盘，记录答错和修正； - toolgap-kv 相关表述没有越过仓库实际 claim state。 ## 现有个人笔记 - [transformer 主笔记](https://app.notion.com/p/3725d315c09080e695f3d7fa7000b792) - [transformer 推理与 kv cache 阶段学习记录](https://app.notion.com/p/3415d315c09081228447d3c7b927ac16) - [面向 llm serving 的 transformer 最小必要基础](https://app.notion.com/p/33e5d315c09081cbb56ae208cc775668) - [transformer 推理两阶段](https://app.notion.com/p/33c5d315c0908143bfc3ef2cde8e5680) ## 当前官方参考 - [pytorch multiheadattention](https://docs.pytorch.org/docs/stable/generated/torch.nn.multiheadattention.html) - [pytorch scaled dot-product attention](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html) - [pytorch cuda semantics](https://docs.pytorch.org/docs/stable/notes/cuda.html) - [pytorch benchmark recipe](https://docs.pytorch.org/tutorials/recipes/recipes/benchmark.html) "

    "detail_html": "<h2>03｜KV Cache 与内存系统详细知识列表<\/h2>\n<blockquote>优先级：P0 当前状态：已建立动机和 block 化直觉；容量、源码、系统手撕与实验未完成 目标熟练度：原理 L3 / 源码 L3 / 手写 L3 / 实验 L3 依赖：<a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能把 KV Cache 从“Attention 的缓存数组”提升为完整的 Serving 内存系统：能够手算容量、解释 block/page 布局、追踪请求生命周期、处理前缀共享和引用、设计驱逐与 offload/recompute 边界、分析异步失败，并沿固定版本 vLLM 源码说明哪些状态由谁拥有。<\/p>\n<p>本主题与 ToolGap-KV 直接相关，因此四个维度都要求 L3。文档理解不能替代真实源码、手写、测试和实验。<\/p>\n<h3>当前基础与缺口<\/h3>\n<p>已有个人笔记证明以下直觉曾经建立：<\/p>\n<ul>\n<li>Decode 会重复使用历史 K/V，缓存以显存换计算；<\/li>\n<li>上下文、输出长度、并发和模型规模会扩大 KV 压力；<\/li>\n<li>fixed-size block 缓解连续扩容、外部碎片和动态请求管理问题；<\/li>\n<li>Block Table 维护逻辑到物理映射，PagedAttention 消费非连续物理 block。<\/li>\n<\/ul>\n<p>但当前不能视为已经掌握：<\/p>\n<ul>\n<li>旧知识表中的 block 化条目曾标记 L2，但没有近期闭卷复述或实现证据；<\/li>\n<li>容量模型仍停留在旧的 L1 学习记录，面试题标准答案为空；<\/li>\n<li>分配、共享、回收、驱逐和 Prefix Cache 场景题尚未作答；<\/li>\n<li>Block Manager 手撕题尚未实现；<\/li>\n<li>没有固定版本 vLLM 源码路径和真实 GPU 实验。<\/li>\n<\/ul>\n<h3>职责边界<\/h3>\n<div class=\"table-wrap\"><table><thead><tr>\n<th>层次<\/th>\n<th>本知识地图中的职责<\/th>\n<\/tr><\/thead><tbody>\n<tr>\n<td>Transformer<\/td>\n<td>K/V 如何从 hidden states 产生，以及如何参与 Attention<\/td>\n<\/tr>\n<tr>\n<td>KV Cache 与内存系统<\/td>\n<td>容量、布局、分配、共享、回收、驱逐、迁移和正确性<\/td>\n<\/tr>\n<tr>\n<td>vLLM 物理数据面<\/td>\n<td>block residency/refcount、PagedAttention、模型执行和原生数据搬运<\/td>\n<\/tr>\n<tr>\n<td>ToolGap-KV<\/td>\n<td>候选人拥有的逻辑生命周期、epoch、动作编排、fallback、取消、清理和 DecisionTrace<\/td>\n<\/tr>\n<\/tbody><\/table><\/div>\n<p>手写 toy Block Manager 是学习证据，不等于已经修改 vLLM；ToolGap-KV 文档是 <code>roadmap<\/code>，不等于生命周期 runtime 已经 <code>shipped<\/code>。<\/p>\n<h3>源码与复现契约<\/h3>\n<h4>触发依据<\/h4>\n<ul>\n<li><strong>真题证据门槛已触发<\/strong>：现有题库多次出现 PagedAttention 原理与 vLLM PagedAttention，并出现 Block Manager 核心逻辑手写；这证明不能只背“分页减少碎片”的概念答案。但当前证据不等于每一道 PagedAttention 题都会追问生产源码。<\/li>\n<li><strong>核心模块门槛已触发<\/strong>：block table、物理块分配、共享引用和 Attention 读取路径共同构成 LLM Serving 的核心内存数据面，也是 ToolGap-KV 必须正确复用和划分所有权的依赖。<\/li>\n<\/ul>\n<h4>主实现与条件式对比<\/h4>\n<ul>\n<li><strong>主实现：vLLM<\/strong>。开始训练时固定一个 release/commit，以该版本的 scheduler、KV cache manager、block pool、attention metadata/kernel interface 和 connector 为真实锚点；不背诵跨版本类名。<\/li>\n<li><strong>对比实现：SGLang RadixAttention，按需加入<\/strong>。只比较前缀如何组织、匹配、共享和驱逐，以及这些选择与 vLLM Prefix Cache 的 trade-off；不要求把 SGLang 全部 KV 路径再精读一遍，也不把 RadixAttention 与 PagedAttention 当成互相替代的同一层机制。<\/li>\n<li>只有目标 JD 明确要求 SGLang、真题直接拷问其源码，或对比能够回答具体设计问题时，SGLang 才升级为必修完成项。<\/li>\n<\/ul>\n<h4>双层本地复现<\/h4>\n<ol>\n<li><strong>机制复现<\/strong>：实现 toy block pool、free queue、block table、引用计数、Copy-on-Write、OOM rollback 和取消清理；再写 block table 驱动的逻辑 K/V gather 或 Attention 伪实现。<\/li>\n<li><strong>真实映射<\/strong>：在固定版本 vLLM 上运行/trace 一次请求从调度、block 分配、Attention 消费到完成释放的路径，并验证 Prefix Cache hit/miss、输出等价和容量清理。<\/li>\n<\/ol>\n<p>完成标准：能够从入口沿真实对象解释所有权、控制流、数据流、不变量和 trade-off；留下固定 commit、源码路径图、toy 代码及测试、真实命令、原始结果和至少一个失败/负面案例。<\/p>\n<p>明确不要求：从零手写 PagedAttention CUDA/Triton kernel。非算子岗位需要讲清 kernel 接口、block table/metadata 如何到达 kernel、逻辑到物理寻址代价和主要性能瓶颈。<\/p>\n<h3>P0 详细知识列表<\/h3>\n<h4>容量与形状模型<\/h4>\n<ul>\n<li>单层 K/V 的逻辑形状；<\/li>\n<li>层数、总缓存 token 数、KV head 数、head dimension 和 dtype bytes；<\/li>\n<li>基础容量公式：<code>2 × layers × cached_tokens × kv_heads × head_dim × dtype_bytes<\/code>；<\/li>\n<li>batch 上界公式与实际变长请求总 token 公式的区别；<\/li>\n<li>MHA/MQA/GQA 对 KV 容量的影响；<\/li>\n<li>MLA 的 latent cache 与普通 K/V cache 在每 token 表示、RoPE 状态和容量公式上的差异；<\/li>\n<li>Tensor Parallel 后每 rank 的 KV 分片边界；<\/li>\n<li>block/page 分配、尾部内部碎片和元数据开销；<\/li>\n<li>模型权重、激活、CUDA graph 与 KV 预算之间的显存竞争；<\/li>\n<li>混合 Attention/滑动窗口模型使简单公式失真的原因。<\/li>\n<\/ul>\n<p>通过标准：能在 10-15 分钟内完成给定配置的每 token、每请求、每 block、每卡容量手算，并明确公式假设。<\/p>\n<h4>连续布局、block 与 PagedAttention<\/h4>\n<ul>\n<li>请求长度不可预知时连续预分配、按需扩容和重新复制的代价；<\/li>\n<li>内部碎片与外部碎片；<\/li>\n<li>logical block、physical block、block ID、block table；<\/li>\n<li>free block pool/queue 与按需分配；<\/li>\n<li>block size 对尾部浪费、元数据、哈希粒度和访存的 trade-off；<\/li>\n<li>PagedAttention 如何根据 block table 读取逻辑连续、物理离散的 K/V；<\/li>\n<li>KV block 与 CUDA thread block 不是同一概念；<\/li>\n<li>PagedAttention 内存管理思想与具体 GPU kernel 的职责边界。<\/li>\n<\/ul>\n<h4>请求生命周期与所有权<\/h4>\n<ul>\n<li>allocate、append/grow、touch、free、evict 的基本路径；<\/li>\n<li>request、sequence、prefix、logical lifecycle 与 physical block 的身份差异；<\/li>\n<li>block table 的增长和请求结束清理；<\/li>\n<li>引用计数保护仍在使用或共享的 block；<\/li>\n<li>共享前缀分叉后的 Copy-on-Write 边界；<\/li>\n<li>取消、超时、异常和进程退出时的资源清理；<\/li>\n<li>duplicate free、double resume、late completion 的幂等性；<\/li>\n<li>capacity 是否回到基线的泄漏检查。<\/li>\n<\/ul>\n<h4>Prefix Cache 与复用<\/h4>\n<ul>\n<li>普通 decode KV Cache 与跨请求 Prefix Cache 的区别；<\/li>\n<li>前缀命中的 key 必须包含 token 内容和兼容的模型/runtime 身份；<\/li>\n<li>block hash/match unit、父前缀与链式身份；<\/li>\n<li>区分前缀匹配粒度与物理 KV block 大小，并以固定版本实现为准；<\/li>\n<li>hash 碰撞、跨进程可复现性和多租户安全边界；<\/li>\n<li>命中 block 的引用、共享、触碰和驱逐保护；<\/li>\n<li>Prefix Cache 主要减少重复 Prefill，不直接减少新 token Decode；<\/li>\n<li>命中率、复用 token 数、TTFT、吞吐和容量占用的联合评估；<\/li>\n<li>路由到有缓存 worker 与路由到低负载 worker 的冲突。<\/li>\n<\/ul>\n<h4>Retain、Offload、Restore 与 Recompute<\/h4>\n<ul>\n<li>GPU retain、CPU offload/restore、recompute 的动作语义；<\/li>\n<li>KV bytes、有效传输带宽、排队、同步和分块开销；<\/li>\n<li>recompute 的 token 数、Prefill 吞吐和调度等待；<\/li>\n<li>Restore 与 Recompute 的 break-even 模型；<\/li>\n<li>异步 DMA、compute/transfer overlap 和真实尾延迟；<\/li>\n<li>HBM/CPU tier 容量水位、驱逐和回退；<\/li>\n<li>selective offload：共享长前缀与请求私有 decode token 的价值不同；<\/li>\n<li>未命中、部分数据、传输失败时回到权威 token 历史重新计算。<\/li>\n<\/ul>\n<h4>正确性与异步失败<\/h4>\n<ul>\n<li>KV 是由 token history 和兼容 runtime 配置派生的可重算状态；<\/li>\n<li>model、adapter、tokenizer、RoPE/position、dtype/layout 等兼容性边界；<\/li>\n<li>partial store/load 不得成为可复用完成态；<\/li>\n<li>lifecycle identity 与 monotonic epoch；<\/li>\n<li>取消期间完成、旧 epoch 完成和重复完成的 fencing；<\/li>\n<li>requested action、observed action、fallback reason 分离；<\/li>\n<li>failed materialization 不可见，安全终态是显式失败或 recompute；<\/li>\n<li>输出等价、引用归零和容量回收共同构成正确性证据。<\/li>\n<\/ul>\n<h4>调度与可观测性<\/h4>\n<ul>\n<li>KV capacity 与 scheduler admission/preemption 的关系；<\/li>\n<li>waiting/running/resumed 请求对 block 的不同需求；<\/li>\n<li>cache hit、matched tokens、recomputed tokens；<\/li>\n<li>store/restore queue depth、bytes、bandwidth 和等待时间；<\/li>\n<li>Prefill、restore、queue、first token 时间拆分；<\/li>\n<li>active request 与 resumed request 的 p50/p95/p99；<\/li>\n<li>requested/observed/fallback 的 DecisionTrace；<\/li>\n<li>只测平均 TTFT 无法证明系统设计正确。<\/li>\n<\/ul>\n<h3>P1 补充<\/h3>\n<ul>\n<li>cache-aware + load-aware 多 worker 路由；<\/li>\n<li>分布式 KV 的分片、所有权、路由、一致性和回源；<\/li>\n<li>Prefill/Decode disaggregation 与 KV transfer connector；<\/li>\n<li>GPU、CPU、SSD、远端内存的多级缓存；<\/li>\n<li>KV Cache FP8/INT8 量化、scale 和质量校验；<\/li>\n<li>多进程 hash 一致性与跨实例 Prefix Cache；<\/li>\n<li>sliding-window、cross-attention、hybrid model 的多种 KV cache spec；<\/li>\n<li>公平的 TTL/LRU/ARC 或 action-only baseline。<\/li>\n<\/ul>\n<h4>MLA 缓存表示防守子集<\/h4>\n<blockquote>子集目标：原理 L2 / 源码 L1 / 手写 L0 / 实验 L0 建议投入：与 Topic 02 的 MLA 模型语义共享 3-5 小时，不增加 Topic 03 的领域手撕或实验验收项。<\/blockquote>\n<p>需要从 KV 内存系统视角补全以下边界：<\/p>\n<ul>\n<li>普通 MHA/GQA 缓存完整或按 KV heads 缩减的 K/V，MLA 缓存低维 latent state 与单独保留的 RoPE 相关状态；<\/li>\n<li>容量比较必须写明模型配置、latent dimension、RoPE dimension、dtype、层数和 token 数，不能直接套用普通 <code>2 × kv_heads × head_dim<\/code> 公式；<\/li>\n<li>矩阵吸收改变 Decode 对缓存状态的读取与计算路径，但不改变 cache 仍需具备 position、model revision、dtype/layout 等兼容身份；<\/li>\n<li>block allocator 可以复用相同的生命周期原则，但每层 cache spec、block bytes、layout 和 Attention backend contract 可能不同；<\/li>\n<li>Prefix Cache、offload、restore 或跨实例传输必须保持 MLA cache representation 与目标执行路径兼容，不能只验证 token IDs 相同；<\/li>\n<li>混合层模型可能同时拥有 full attention、sliding-window 和 MLA 等不同 cache spec，容量与 block 规划必须按实际层类型累计。<\/li>\n<\/ul>\n<p>源码只要求沿一个固定版本定位模型配置到 cache spec、分配尺寸、Attention metadata 和 Decode cache read 的主要连接点。通过标准是能够画出普通 K/V 与 MLA latent cache 的物理表示差异，并解释一次兼容性拒绝场景。<\/p>\n<p>明确不要求修改 Block Manager、手写 MLA cache manager、运行 MLA benchmark 或精读 FlashMLA kernel。没有模型兼容性实现、真实运行和验证产物时，ToolGap-KV 的 MLA 支持只能是 <code>roadmap<\/code>，不能标记为 <code>shipped<\/code> 或 <code>experimentally validated<\/code>。<\/p>\n<h3>P2 延后<\/h3>\n<ul>\n<li>手写 PagedAttention CUDA/Triton kernel；<\/li>\n<li>RDMA/NIXL 协议和 NIC/GPU direct path 的底层实现；<\/li>\n<li>生产级分布式 KV Store；<\/li>\n<li>多节点故障域和跨地域一致性；<\/li>\n<li>未通过 ToolGap-KV Gate B 就提前实现动态策略 CT4。<\/li>\n<\/ul>\n<h3>训练顺序与验收<\/h3>\n<h4>A. 容量模型<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>写出 KV Cache 容量公式和全部变量；<\/li>\n<li>分别计算 MHA、GQA、MQA；<\/li>\n<li>从 batch 上界改写为变长请求总 token；<\/li>\n<li>计算一个 block 和尾部碎片；<\/li>\n<li>写一个容量计算器，并用手算样例测试。<\/li>\n<\/ol>\n<p>通过标准：公式、代码和实际 tensor <code>numel × element_size<\/code> 三者一致；能说明 block 元数据和 allocator 开销为什么不在基础公式内。<\/p>\n<h4>B. Toy Block Manager<\/h4>\n<p>必须实现：<\/p>\n<ol>\n<li>固定 block pool 与 free queue；<\/li>\n<li>request 到 physical block IDs 的 block table；<\/li>\n<li>allocate/append/free；<\/li>\n<li>引用计数与共享前缀；<\/li>\n<li>分叉写入时的 Copy-on-Write；<\/li>\n<li>OOM、取消和异常清理；<\/li>\n<li>不变量检查：无重复分配、无负 refcount、终态容量回到基线。<\/li>\n<\/ol>\n<p>通过标准：60 分钟完成给定接口的核心逻辑，随后用测试覆盖共享、扩容、释放、OOM rollback、duplicate free 和 cancellation。<\/p>\n<h4>C. Prefix Cache 索引<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>按 fixed-size token blocks 计算链式 key；<\/li>\n<li>查找最长完整 block 前缀；<\/li>\n<li>命中后增加引用并构造 block table；<\/li>\n<li>LRU 或明确的 free queue 驱逐顺序；<\/li>\n<li>模型/adapter/位置配置不兼容时拒绝复用；<\/li>\n<li>命中率、复用 token 和 eviction 指标。<\/li>\n<\/ol>\n<p>通过标准：能够解释为什么 Prefix Cache 不是字符串缓存，以及为什么 token 相同但 runtime identity 不兼容时仍不能复用。<\/p>\n<h4>D. 生命周期与失败状态机<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>requested、in-flight、observed、fallback、terminal 状态；<\/li>\n<li>lifecycle claim 与 epoch；<\/li>\n<li>late/duplicate completion fencing；<\/li>\n<li>restore failure 到 recompute；<\/li>\n<li>cancellation 与 cleanup；<\/li>\n<li>DecisionTrace。<\/li>\n<\/ol>\n<p>通过标准：状态转移测试和 deterministic fault test 通过；删除/绕过候选人 controller 后，相应行为必须消失，而不是只少了日志。<\/p>\n<h4>E. 真实源码与实验<\/h4>\n<p>必须完成：<\/p>\n<ol>\n<li>固定 vLLM release/commit；<\/li>\n<li>沿 scheduler、KV cache manager、block pool、attention 和 connector 画所有权图；<\/li>\n<li>trace 一次请求从调度、block 分配、attention metadata/kernel interface 到完成释放的路径；<\/li>\n<li>记录当前版本的真实类、方法和数据流，不依赖旧博客命名；<\/li>\n<li>比较 Prefix Cache hit/miss 的复用 token、TTFT 和输出；<\/li>\n<li>比较不同 block size 的容量浪费与运行指标；<\/li>\n<li>在真实路径测 retain/offload/recompute 的一条 break-even 或 dominance 边界；<\/li>\n<li>注入一次 restore/cancellation 失败并证明输出或显式终态、清理和容量正确。<\/li>\n<\/ol>\n<p>通过标准：每个结论都有固定版本、命令、原始结果和适用边界；没有 GPU 证据时保持 <code>roadmap<\/code> 或 <code>simulated<\/code>。<\/p>\n<h3>必须通过的领域手撕<\/h3>\n<div class=\"table-wrap\"><table><thead><tr>\n<th>题目<\/th>\n<th>时间限制<\/th>\n<th>最低要求<\/th>\n<\/tr><\/thead><tbody>\n<tr>\n<td>KV Cache 容量计算器<\/td>\n<td>15 分钟<\/td>\n<td>公式、GQA、dtype 和假设正确<\/td>\n<\/tr>\n<tr>\n<td>连续 KV Cache append/预分配<\/td>\n<td>30 分钟<\/td>\n<td>更新、位置、容量和输出正确<\/td>\n<\/tr>\n<tr>\n<td>Block Table 与 block allocator<\/td>\n<td>45 分钟<\/td>\n<td>分配、增长、回收和 OOM rollback<\/td>\n<\/tr>\n<tr>\n<td>引用计数与 Copy-on-Write<\/td>\n<td>45 分钟<\/td>\n<td>共享、分叉写、释放不变量正确<\/td>\n<\/tr>\n<tr>\n<td>简化 Block Manager<\/td>\n<td>60 分钟<\/td>\n<td>pool、table、refcount、清理和测试完整<\/td>\n<\/tr>\n<tr>\n<td>Prefix Cache 索引<\/td>\n<td>60 分钟<\/td>\n<td>链式 key、最长命中、引用和驱逐正确<\/td>\n<\/tr>\n<tr>\n<td>KV 生命周期状态机<\/td>\n<td>60 分钟<\/td>\n<td>epoch、幂等、失败、取消和 cleanup 正确<\/td>\n<\/tr>\n<\/tbody><\/table><\/div>\n<p>不要求手写 PagedAttention GPU kernel。面试中若要求“大概原理代码”，可以手写 block table 驱动的逻辑 gather/attention 伪实现，并明确它不是高性能 kernel。<\/p>\n<h3>原理连续追问<\/h3>\n<h4>容量与布局<\/h4>\n<ul>\n<li>给定模型配置，KV Cache 每 token 和总容量如何计算？<\/li>\n<li>为什么 <code>batch × max_seq_len<\/code> 常常高估或误导实际变长服务？<\/li>\n<li>block size 变大会改善什么、恶化什么？<\/li>\n<li>内部碎片和外部碎片在 KV 管理中分别是什么？<\/li>\n<li>为什么逻辑连续可以建立在物理不连续 block 上？<\/li>\n<li>为什么 MLA 不能直接套用普通 MHA/GQA 的 KV 容量公式？latent cache 还必须保留哪些位置相关状态？<\/li>\n<\/ul>\n<h4>Prefix Cache 与生命周期<\/h4>\n<ul>\n<li>普通 KV Cache 与 Prefix Cache 有何区别？<\/li>\n<li>block hash 应包含哪些身份？为什么只有 token IDs 不够？<\/li>\n<li>命中 block 为什么仍可能在 free/eviction queue 中？<\/li>\n<li>引用计数与 Copy-on-Write 分别保护什么？<\/li>\n<li>请求取消或失败时如何证明没有 block 泄漏？<\/li>\n<li>stale completion 为什么可能释放或复活错误的 block？<\/li>\n<\/ul>\n<h4>Offload 与系统设计<\/h4>\n<ul>\n<li>什么条件下 restore 比 recompute 更差？<\/li>\n<li>异步传输为什么仍可能恶化 active decode 的 p99？<\/li>\n<li>Prefix Cache 为什么主要优化 Prefill，不直接优化 Decode？<\/li>\n<li>cache-aware routing 为什么不能只追求命中率？<\/li>\n<li>CPU/SSD/remote tier 的容量提升分别引入哪些延迟与故障模式？<\/li>\n<li>如何区分 requested action、observed path 和 fallback？<\/li>\n<\/ul>\n<h4>源码与项目<\/h4>\n<ul>\n<li>当前固定版本 vLLM 中，scheduler、KV manager、block pool、attention 和 connector 分别拥有哪部分状态？<\/li>\n<li>为什么 ToolGap-KV 复用 vLLM physical data plane，而不是重写 Block Manager？<\/li>\n<li>什么证据才能证明候选人真的拥有 lifecycle semantics，而不只是加了日志？<\/li>\n<li>哪个缺失 contract 才足以证明需要 core patch？<\/li>\n<\/ul>\n<h3>与 ToolGap-KV 的连接<\/h3>\n<h4>CT1：集成边界<\/h4>\n<ul>\n<li>固定当前 vLLM 版本并审计最小扩展点；<\/li>\n<li>候选人 runtime 必须拥有真实 lifecycle transition 或 fallback；<\/li>\n<li>ordinary requests 保持默认路径；<\/li>\n<li>controller removal/bypass test 证明拥有行为，而不是只拥有 trace。<\/li>\n<\/ul>\n<h4>CT2：正确性与恢复<\/h4>\n<ul>\n<li>cache identity、epoch、shared block 与 logical claim 分离；<\/li>\n<li>partial restore、late completion、duplicate resume、cancellation；<\/li>\n<li>failed materialization 不可见；<\/li>\n<li>recompute 或显式 failure；<\/li>\n<li>输出、引用和容量清理共同验收。<\/li>\n<\/ul>\n<h4>CT3：定量边界<\/h4>\n<ul>\n<li>retain/offload/recompute 比较；<\/li>\n<li>context/KV size × transfer/recompute ratio × 一个压力条件；<\/li>\n<li>queue/store/restore/prefill/first-token 分解；<\/li>\n<li>一条 winning boundary 和一条 losing workload；<\/li>\n<li>raw runs、环境、重复和 exact command。<\/li>\n<\/ul>\n<p>CT4 动态策略只有 Gate B 通过后才能进入知识实践主线。<\/p>\n<h3>完成证据<\/h3>\n<ul>\n<li>KV 容量计算器和测试；<\/li>\n<li>toy Block Manager、Prefix Cache 与生命周期状态机；<\/li>\n<li>引用、COW、OOM、取消和 stale completion 的测试；<\/li>\n<li>固定版本 vLLM 所有权与源码路径图；<\/li>\n<li>Prefix Cache hit/miss 实验；<\/li>\n<li>retain/offload/recompute 边界实验；<\/li>\n<li>一次故障注入和容量回收证明；<\/li>\n<li>一次 60 分钟系统手撕；<\/li>\n<li>一次 30 分钟源码/系统连续追问；<\/li>\n<li>ToolGap-KV 的 claim state 与仓库证据一致。<\/li>\n<\/ul>\n<h3>现有个人笔记与真题<\/h3>\n<ul>\n<li><a href=\"https://app.notion.com/p/3735d315c09080c7bf8dee117009caa9\" target=\"_blank\" rel=\"noopener noreferrer\">KV Cache 主笔记<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/3415d315c09081228447d3c7b927ac16\" target=\"_blank\" rel=\"noopener noreferrer\">Transformer 推理与 KV Cache 阶段学习记录<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/3415d315c0908128a097d30049319454\" target=\"_blank\" rel=\"noopener noreferrer\">block 化管理 KV Cache<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/33c5d315c0908181a97cdb6ec403825b\" target=\"_blank\" rel=\"noopener noreferrer\">KV Cache 显存占用模型<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c090818d8076d6ff70e90b61\" target=\"_blank\" rel=\"noopener noreferrer\">KV Cache 的形状与显存占用如何计算<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39e5d315c090810aa65ee02d11b11aec\" target=\"_blank\" rel=\"noopener noreferrer\">推理服务中的 KV Cache 如何分配、复用、回收与驱逐<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c09081f29cbde3673af2af6b\" target=\"_blank\" rel=\"noopener noreferrer\">PagedAttention 的核心原理是什么，解决了什么内存问题<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c090819fa254c19c27d9af6c\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM PagedAttention 面试记录<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c09081d399bdfb48542ed90d\" target=\"_blank\" rel=\"noopener noreferrer\">手写 KV Cache / PagedAttention Block Manager 的核心逻辑<\/a><\/li>\n<li><a href=\"https://app.notion.com/p/39d5d315c090813ea1a2ec8028423ecc\" target=\"_blank\" rel=\"noopener noreferrer\">如何提高 KV Cache 命中率，并用树结构、Routing 与 Replay 管理复用<\/a><\/li>\n<\/ul>\n<h3>当前 vLLM 官方参考<\/h3>\n<p>以下 latest/stable 页面只用于定位当前概念。开始源码学习和项目实现前必须固定具体 release/commit。<\/p>\n<ul>\n<li><a href=\"https://docs.vllm.ai/en/stable/api/vllm/v1/core/block_pool/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM BlockPool API<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/latest/api/vllm/v1/kv_cache_interface/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM KV cache interface<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/v0.22.1/features/automatic_prefix_caching/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM Automatic Prefix Caching<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/v0.25.0/features/kv_offloading_usage/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM KV Offloading Usage Guide<\/a><\/li>\n<li><a href=\"https://docs.vllm.ai/en/latest/api/vllm/v1/kv_offload/base/\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM OffloadingManager API<\/a><\/li>\n<li><a href=\"https://github.com/sgl-project/sglang\" target=\"_blank\" rel=\"noopener noreferrer\">SGLang repository（RadixAttention 条件式对比入口）<\/a><\/li>\n<\/ul>",
    "search_text": "03 kv cache 与内存系统 p0 已建立动机和 block 化直觉；容量手算、源码、系统手撕与实验待完成 能从容量、布局、block 分配、前缀共享、引用与回收、驱逐、offload/recompute、异步失败和观测指标完整解释 kv cache 系统，并手写简化 block manager 与生命周期控制逻辑；能够比较普通 k/v 与 mla latent cache 的容量、layout 和兼容性边界。 不要求手写 pagedattention cuda/triton kernel；mla 缓存只做原理 l2 / 源码 l1 防守，不增加 cache manager 手写或 benchmark；分布式远端 kv、rdma 和多级存储放在 p1，不扩大 toolgap-kv 的 ct1-ct3 主线。 # 03｜kv cache 与内存系统详细知识列表 > 优先级：p0 > > 当前状态：已建立动机和 block 化直觉；容量、源码、系统手撕与实验未完成 > > 目标熟练度：原理 l3 / 源码 l3 / 手写 l3 / 实验 l3 > > 依赖：[transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能把 kv cache 从“attention 的缓存数组”提升为完整的 serving 内存系统：能够手算容量、解释 block/page 布局、追踪请求生命周期、处理前缀共享和引用、设计驱逐与 offload/recompute 边界、分析异步失败，并沿固定版本 vllm 源码说明哪些状态由谁拥有。 本主题与 toolgap-kv 直接相关，因此四个维度都要求 l3。文档理解不能替代真实源码、手写、测试和实验。 ## 当前基础与缺口 已有个人笔记证明以下直觉曾经建立： - decode 会重复使用历史 k/v，缓存以显存换计算； - 上下文、输出长度、并发和模型规模会扩大 kv 压力； - fixed-size block 缓解连续扩容、外部碎片和动态请求管理问题； - block table 维护逻辑到物理映射，pagedattention 消费非连续物理 block。 但当前不能视为已经掌握： - 旧知识表中的 block 化条目曾标记 l2，但没有近期闭卷复述或实现证据； - 容量模型仍停留在旧的 l1 学习记录，面试题标准答案为空； - 分配、共享、回收、驱逐和 prefix cache 场景题尚未作答； - block manager 手撕题尚未实现； - 没有固定版本 vllm 源码路径和真实 gpu 实验。 ## 职责边界 | 层次 | 本知识地图中的职责 | |---|---| | transformer | k/v 如何从 hidden states 产生，以及如何参与 attention | | kv cache 与内存系统 | 容量、布局、分配、共享、回收、驱逐、迁移和正确性 | | vllm 物理数据面 | block residency/refcount、pagedattention、模型执行和原生数据搬运 | | toolgap-kv | 候选人拥有的逻辑生命周期、epoch、动作编排、fallback、取消、清理和 decisiontrace | 手写 toy block manager 是学习证据，不等于已经修改 vllm；toolgap-kv 文档是 `roadmap`，不等于生命周期 runtime 已经 `shipped`。 ## 源码与复现契约 ### 触发依据 - **真题证据门槛已触发**：现有题库多次出现 pagedattention 原理与 vllm pagedattention，并出现 block manager 核心逻辑手写；这证明不能只背“分页减少碎片”的概念答案。但当前证据不等于每一道 pagedattention 题都会追问生产源码。 - **核心模块门槛已触发**：block table、物理块分配、共享引用和 attention 读取路径共同构成 llm serving 的核心内存数据面，也是 toolgap-kv 必须正确复用和划分所有权的依赖。 ### 主实现与条件式对比 - **主实现：vllm**。开始训练时固定一个 release/commit，以该版本的 scheduler、kv cache manager、block pool、attention metadata/kernel interface 和 connector 为真实锚点；不背诵跨版本类名。 - **对比实现：sglang radixattention，按需加入**。只比较前缀如何组织、匹配、共享和驱逐，以及这些选择与 vllm prefix cache 的 trade-off；不要求把 sglang 全部 kv 路径再精读一遍，也不把 radixattention 与 pagedattention 当成互相替代的同一层机制。 - 只有目标 jd 明确要求 sglang、真题直接拷问其源码，或对比能够回答具体设计问题时，sglang 才升级为必修完成项。 ### 双层本地复现 1. **机制复现**：实现 toy block pool、free queue、block table、引用计数、copy-on-write、oom rollback 和取消清理；再写 block table 驱动的逻辑 k/v gather 或 attention 伪实现。 2. **真实映射**：在固定版本 vllm 上运行/trace 一次请求从调度、block 分配、attention 消费到完成释放的路径，并验证 prefix cache hit/miss、输出等价和容量清理。 完成标准：能够从入口沿真实对象解释所有权、控制流、数据流、不变量和 trade-off；留下固定 commit、源码路径图、toy 代码及测试、真实命令、原始结果和至少一个失败/负面案例。 明确不要求：从零手写 pagedattention cuda/triton kernel。非算子岗位需要讲清 kernel 接口、block table/metadata 如何到达 kernel、逻辑到物理寻址代价和主要性能瓶颈。 ## p0 详细知识列表 ### 容量与形状模型 - 单层 k/v 的逻辑形状； - 层数、总缓存 token 数、kv head 数、head dimension 和 dtype bytes； - 基础容量公式：`2 × layers × cached_tokens × kv_heads × head_dim × dtype_bytes`； - batch 上界公式与实际变长请求总 token 公式的区别； - mha/mqa/gqa 对 kv 容量的影响； - mla 的 latent cache 与普通 k/v cache 在每 token 表示、rope 状态和容量公式上的差异； - tensor parallel 后每 rank 的 kv 分片边界； - block/page 分配、尾部内部碎片和元数据开销； - 模型权重、激活、cuda graph 与 kv 预算之间的显存竞争； - 混合 attention/滑动窗口模型使简单公式失真的原因。 通过标准：能在 10-15 分钟内完成给定配置的每 token、每请求、每 block、每卡容量手算，并明确公式假设。 ### 连续布局、block 与 pagedattention - 请求长度不可预知时连续预分配、按需扩容和重新复制的代价； - 内部碎片与外部碎片； - logical block、physical block、block id、block table； - free block pool/queue 与按需分配； - block size 对尾部浪费、元数据、哈希粒度和访存的 trade-off； - pagedattention 如何根据 block table 读取逻辑连续、物理离散的 k/v； - kv block 与 cuda thread block 不是同一概念； - pagedattention 内存管理思想与具体 gpu kernel 的职责边界。 ### 请求生命周期与所有权 - allocate、append/grow、touch、free、evict 的基本路径； - request、sequence、prefix、logical lifecycle 与 physical block 的身份差异； - block table 的增长和请求结束清理； - 引用计数保护仍在使用或共享的 block； - 共享前缀分叉后的 copy-on-write 边界； - 取消、超时、异常和进程退出时的资源清理； - duplicate free、double resume、late completion 的幂等性； - capacity 是否回到基线的泄漏检查。 ### prefix cache 与复用 - 普通 decode kv cache 与跨请求 prefix cache 的区别； - 前缀命中的 key 必须包含 token 内容和兼容的模型/runtime 身份； - block hash/match unit、父前缀与链式身份； - 区分前缀匹配粒度与物理 kv block 大小，并以固定版本实现为准； - hash 碰撞、跨进程可复现性和多租户安全边界； - 命中 block 的引用、共享、触碰和驱逐保护； - prefix cache 主要减少重复 prefill，不直接减少新 token decode； - 命中率、复用 token 数、ttft、吞吐和容量占用的联合评估； - 路由到有缓存 worker 与路由到低负载 worker 的冲突。 ### retain、offload、restore 与 recompute - gpu retain、cpu offload/restore、recompute 的动作语义； - kv bytes、有效传输带宽、排队、同步和分块开销； - recompute 的 token 数、prefill 吞吐和调度等待； - restore 与 recompute 的 break-even 模型； - 异步 dma、compute/transfer overlap 和真实尾延迟； - hbm/cpu tier 容量水位、驱逐和回退； - selective offload：共享长前缀与请求私有 decode token 的价值不同； - 未命中、部分数据、传输失败时回到权威 token 历史重新计算。 ### 正确性与异步失败 - kv 是由 token history 和兼容 runtime 配置派生的可重算状态； - model、adapter、tokenizer、rope/position、dtype/layout 等兼容性边界； - partial store/load 不得成为可复用完成态； - lifecycle identity 与 monotonic epoch； - 取消期间完成、旧 epoch 完成和重复完成的 fencing； - requested action、observed action、fallback reason 分离； - failed materialization 不可见，安全终态是显式失败或 recompute； - 输出等价、引用归零和容量回收共同构成正确性证据。 ### 调度与可观测性 - kv capacity 与 scheduler admission/preemption 的关系； - waiting/running/resumed 请求对 block 的不同需求； - cache hit、matched tokens、recomputed tokens； - store/restore queue depth、bytes、bandwidth 和等待时间； - prefill、restore、queue、first token 时间拆分； - active request 与 resumed request 的 p50/p95/p99； - requested/observed/fallback 的 decisiontrace； - 只测平均 ttft 无法证明系统设计正确。 ## p1 补充 - cache-aware + load-aware 多 worker 路由； - 分布式 kv 的分片、所有权、路由、一致性和回源； - prefill/decode disaggregation 与 kv transfer connector； - gpu、cpu、ssd、远端内存的多级缓存； - kv cache fp8/int8 量化、scale 和质量校验； - 多进程 hash 一致性与跨实例 prefix cache； - sliding-window、cross-attention、hybrid model 的多种 kv cache spec； - 公平的 ttl/lru/arc 或 action-only baseline。 ### mla 缓存表示防守子集 > 子集目标：原理 l2 / 源码 l1 / 手写 l0 / 实验 l0 > > 建议投入：与 topic 02 的 mla 模型语义共享 3-5 小时，不增加 topic 03 的领域手撕或实验验收项。 需要从 kv 内存系统视角补全以下边界： - 普通 mha/gqa 缓存完整或按 kv heads 缩减的 k/v，mla 缓存低维 latent state 与单独保留的 rope 相关状态； - 容量比较必须写明模型配置、latent dimension、rope dimension、dtype、层数和 token 数，不能直接套用普通 `2 × kv_heads × head_dim` 公式； - 矩阵吸收改变 decode 对缓存状态的读取与计算路径，但不改变 cache 仍需具备 position、model revision、dtype/layout 等兼容身份； - block allocator 可以复用相同的生命周期原则，但每层 cache spec、block bytes、layout 和 attention backend contract 可能不同； - prefix cache、offload、restore 或跨实例传输必须保持 mla cache representation 与目标执行路径兼容，不能只验证 token ids 相同； - 混合层模型可能同时拥有 full attention、sliding-window 和 mla 等不同 cache spec，容量与 block 规划必须按实际层类型累计。 源码只要求沿一个固定版本定位模型配置到 cache spec、分配尺寸、attention metadata 和 decode cache read 的主要连接点。通过标准是能够画出普通 k/v 与 mla latent cache 的物理表示差异，并解释一次兼容性拒绝场景。 明确不要求修改 block manager、手写 mla cache manager、运行 mla benchmark 或精读 flashmla kernel。没有模型兼容性实现、真实运行和验证产物时，toolgap-kv 的 mla 支持只能是 `roadmap`，不能标记为 `shipped` 或 `experimentally validated`。 ## p2 延后 - 手写 pagedattention cuda/triton kernel； - rdma/nixl 协议和 nic/gpu direct path 的底层实现； - 生产级分布式 kv store； - 多节点故障域和跨地域一致性； - 未通过 toolgap-kv gate b 就提前实现动态策略 ct4。 ## 训练顺序与验收 ### a. 容量模型 必须完成： 1. 写出 kv cache 容量公式和全部变量； 2. 分别计算 mha、gqa、mqa； 3. 从 batch 上界改写为变长请求总 token； 4. 计算一个 block 和尾部碎片； 5. 写一个容量计算器，并用手算样例测试。 通过标准：公式、代码和实际 tensor `numel × element_size` 三者一致；能说明 block 元数据和 allocator 开销为什么不在基础公式内。 ### b. toy block manager 必须实现： 1. 固定 block pool 与 free queue； 2. request 到 physical block ids 的 block table； 3. allocate/append/free； 4. 引用计数与共享前缀； 5. 分叉写入时的 copy-on-write； 6. oom、取消和异常清理； 7. 不变量检查：无重复分配、无负 refcount、终态容量回到基线。 通过标准：60 分钟完成给定接口的核心逻辑，随后用测试覆盖共享、扩容、释放、oom rollback、duplicate free 和 cancellation。 ### c. prefix cache 索引 必须完成： 1. 按 fixed-size token blocks 计算链式 key； 2. 查找最长完整 block 前缀； 3. 命中后增加引用并构造 block table； 4. lru 或明确的 free queue 驱逐顺序； 5. 模型/adapter/位置配置不兼容时拒绝复用； 6. 命中率、复用 token 和 eviction 指标。 通过标准：能够解释为什么 prefix cache 不是字符串缓存，以及为什么 token 相同但 runtime identity 不兼容时仍不能复用。 ### d. 生命周期与失败状态机 必须完成： 1. requested、in-flight、observed、fallback、terminal 状态； 2. lifecycle claim 与 epoch； 3. late/duplicate completion fencing； 4. restore failure 到 recompute； 5. cancellation 与 cleanup； 6. decisiontrace。 通过标准：状态转移测试和 deterministic fault test 通过；删除/绕过候选人 controller 后，相应行为必须消失，而不是只少了日志。 ### e. 真实源码与实验 必须完成： 1. 固定 vllm release/commit； 2. 沿 scheduler、kv cache manager、block pool、attention 和 connector 画所有权图； 3. trace 一次请求从调度、block 分配、attention metadata/kernel interface 到完成释放的路径； 4. 记录当前版本的真实类、方法和数据流，不依赖旧博客命名； 5. 比较 prefix cache hit/miss 的复用 token、ttft 和输出； 6. 比较不同 block size 的容量浪费与运行指标； 7. 在真实路径测 retain/offload/recompute 的一条 break-even 或 dominance 边界； 8. 注入一次 restore/cancellation 失败并证明输出或显式终态、清理和容量正确。 通过标准：每个结论都有固定版本、命令、原始结果和适用边界；没有 gpu 证据时保持 `roadmap` 或 `simulated`。 ## 必须通过的领域手撕 | 题目 | 时间限制 | 最低要求 | |---|---:|---| | kv cache 容量计算器 | 15 分钟 | 公式、gqa、dtype 和假设正确 | | 连续 kv cache append/预分配 | 30 分钟 | 更新、位置、容量和输出正确 | | block table 与 block allocator | 45 分钟 | 分配、增长、回收和 oom rollback | | 引用计数与 copy-on-write | 45 分钟 | 共享、分叉写、释放不变量正确 | | 简化 block manager | 60 分钟 | pool、table、refcount、清理和测试完整 | | prefix cache 索引 | 60 分钟 | 链式 key、最长命中、引用和驱逐正确 | | kv 生命周期状态机 | 60 分钟 | epoch、幂等、失败、取消和 cleanup 正确 | 不要求手写 pagedattention gpu kernel。面试中若要求“大概原理代码”，可以手写 block table 驱动的逻辑 gather/attention 伪实现，并明确它不是高性能 kernel。 ## 原理连续追问 ### 容量与布局 - 给定模型配置，kv cache 每 token 和总容量如何计算？ - 为什么 `batch × max_seq_len` 常常高估或误导实际变长服务？ - block size 变大会改善什么、恶化什么？ - 内部碎片和外部碎片在 kv 管理中分别是什么？ - 为什么逻辑连续可以建立在物理不连续 block 上？ - 为什么 mla 不能直接套用普通 mha/gqa 的 kv 容量公式？latent cache 还必须保留哪些位置相关状态？ ### prefix cache 与生命周期 - 普通 kv cache 与 prefix cache 有何区别？ - block hash 应包含哪些身份？为什么只有 token ids 不够？ - 命中 block 为什么仍可能在 free/eviction queue 中？ - 引用计数与 copy-on-write 分别保护什么？ - 请求取消或失败时如何证明没有 block 泄漏？ - stale completion 为什么可能释放或复活错误的 block？ ### offload 与系统设计 - 什么条件下 restore 比 recompute 更差？ - 异步传输为什么仍可能恶化 active decode 的 p99？ - prefix cache 为什么主要优化 prefill，不直接优化 decode？ - cache-aware routing 为什么不能只追求命中率？ - cpu/ssd/remote tier 的容量提升分别引入哪些延迟与故障模式？ - 如何区分 requested action、observed path 和 fallback？ ### 源码与项目 - 当前固定版本 vllm 中，scheduler、kv manager、block pool、attention 和 connector 分别拥有哪部分状态？ - 为什么 toolgap-kv 复用 vllm physical data plane，而不是重写 block manager？ - 什么证据才能证明候选人真的拥有 lifecycle semantics，而不只是加了日志？ - 哪个缺失 contract 才足以证明需要 core patch？ ## 与 toolgap-kv 的连接 ### ct1：集成边界 - 固定当前 vllm 版本并审计最小扩展点； - 候选人 runtime 必须拥有真实 lifecycle transition 或 fallback； - ordinary requests 保持默认路径； - controller removal/bypass test 证明拥有行为，而不是只拥有 trace。 ### ct2：正确性与恢复 - cache identity、epoch、shared block 与 logical claim 分离； - partial restore、late completion、duplicate resume、cancellation； - failed materialization 不可见； - recompute 或显式 failure； - 输出、引用和容量清理共同验收。 ### ct3：定量边界 - retain/offload/recompute 比较； - context/kv size × transfer/recompute ratio × 一个压力条件； - queue/store/restore/prefill/first-token 分解； - 一条 winning boundary 和一条 losing workload； - raw runs、环境、重复和 exact command。 ct4 动态策略只有 gate b 通过后才能进入知识实践主线。 ## 完成证据 - kv 容量计算器和测试； - toy block manager、prefix cache 与生命周期状态机； - 引用、cow、oom、取消和 stale completion 的测试； - 固定版本 vllm 所有权与源码路径图； - prefix cache hit/miss 实验； - retain/offload/recompute 边界实验； - 一次故障注入和容量回收证明； - 一次 60 分钟系统手撕； - 一次 30 分钟源码/系统连续追问； - toolgap-kv 的 claim state 与仓库证据一致。 ## 现有个人笔记与真题 - [kv cache 主笔记](https://app.notion.com/p/3735d315c09080c7bf8dee117009caa9) - [transformer 推理与 kv cache 阶段学习记录](https://app.notion.com/p/3415d315c09081228447d3c7b927ac16) - [block 化管理 kv cache](https://app.notion.com/p/3415d315c0908128a097d30049319454) - [kv cache 显存占用模型](https://app.notion.com/p/33c5d315c0908181a97cdb6ec403825b) - [kv cache 的形状与显存占用如何计算](https://app.notion.com/p/39d5d315c090818d8076d6ff70e90b61) - [推理服务中的 kv cache 如何分配、复用、回收与驱逐](https://app.notion.com/p/39e5d315c090810aa65ee02d11b11aec) - [pagedattention 的核心原理是什么，解决了什么内存问题](https://app.notion.com/p/39d5d315c09081f29cbde3673af2af6b) - [vllm pagedattention 面试记录](https://app.notion.com/p/39d5d315c090819fa254c19c27d9af6c) - [手写 kv cache / pagedattention block manager 的核心逻辑](https://app.notion.com/p/39d5d315c09081d399bdfb48542ed90d) - [如何提高 kv cache 命中率，并用树结构、routing 与 replay 管理复用](https://app.notion.com/p/39d5d315c090813ea1a2ec8028423ecc) ## 当前 vllm 官方参考 以下 latest/stable 页面只用于定位当前概念。开始源码学习和项目实现前必须固定具体 release/commit。 - [vllm blockpool api](https://docs.vllm.ai/en/stable/api/vllm/v1/core/block     "boundary": "聚焦单引擎 runtime；集群级路由、弹性伸缩和多租户控制面另设平台主题，不在此节点无限扩张。",

    "detail_html": "<h2>08｜多 GPU 模型执行与集合通信详细知识列表<\/h2>\n<blockquote>优先级：P1；包含面试启动前必须完成的 P0 防守子集 当前状态：已敲定 TP 主线和非通信内核边界，原理、源码、手写与实验均待完成 目标熟练度：原理 L3 / 源码 L2 / 手写 L2 / 实验 L2 依赖：<a href=\"topics/01-pytorch-tensor-programming.md\">PyTorch 与张量编程<\/a>、<a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 推理原理与手撕<\/a>、<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/05-performance-analysis-and-gpu-literacy.md\">性能分析与 GPU 最小认知<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能从模型容量、单 token 计算量、设备带宽和互连成本出发解释为什么需要多 GPU 模型执行；能够把 Tensor Parallel 映射到 Transformer 的 Linear、Attention、MLP、Embedding/LM Head 和 KV Cache，推导每个 rank 的张量形状与 collective 位置，并解释 TP degree 增加后为什么不一定加速。<\/p>\n<p>这是一个 TP 深入、其他并行方式建立比较能力的 P1 节点，预计集中投入约 12-20 小时。它不是通信库、分布式训练或集群控制面课程。<\/p>\n<h3>P0 防守要求<\/h3>\n<p>开始目标岗位面试前，应能脱稿回答以下问题：<\/p>\n<ol>\n<li>单 GPU 的模型容量、KV 容量或计算能力不足时，分别有哪些扩展方向；<\/li>\n<li>Tensor Parallel、Pipeline Parallel、Data Parallel 和 Expert Parallel 分别切分什么；<\/li>\n<li><code>rank<\/code>、<code>local_rank<\/code>、<code>world_size<\/code> 和 process group 分别表示什么；<\/li>\n<li>broadcast、all-reduce、all-gather、reduce-scatter 与 all-to-all 的输入输出语义；<\/li>\n<li>Column Parallel Linear 和 Row Parallel Linear 分别切 <code>W<\/code> 的哪个维度；<\/li>\n<li>为什么列并行输出可以暂时保持分片，而行并行输出需要对局部和做归并；<\/li>\n<li>Transformer MLP 如何组合列并行和行并行以减少中间 collective；<\/li>\n<li>Attention head 如何在 TP ranks 之间切分，GQA/MQA 会增加哪些整除和布局约束；<\/li>\n<li>TP degree 增大为什么可能因为小矩阵、同步和通信开销而变慢；<\/li>\n<li>PCIe、NVLink、跨 NUMA 或跨节点链路为什么会改变相同 TP 配置的表现。<\/li>\n<\/ol>\n<p>通过标准：完成一次 10-15 分钟连续追问，现场推导一次两路 Column/Row Parallel Linear 的 shape 和输出等价关系。P0 防守不要求写代码、运行多 GPU 或阅读 NCCL 源码。<\/p>\n<h3>P1 详细知识列表<\/h3>\n<h4>多 GPU 执行的第一性原理<\/h4>\n<ul>\n<li>模型权重、激活、临时 workspace 和 KV Cache 分别消耗什么容量；<\/li>\n<li>容量扩展、单请求延迟、总吞吐和并发容量是不同目标；<\/li>\n<li>模型并行通过切分单个模型解决容量或单请求计算问题；<\/li>\n<li>数据并行通过复制模型扩展独立请求吞吐，不减少单副本权重；<\/li>\n<li>并行收益取决于可并行计算是否覆盖通信、同步和调度开销；<\/li>\n<li>Prefill 的大矩阵与 Decode 的小 batch GEMM 对 TP 通信摊销能力不同；<\/li>\n<li>增加设备数会同时改变局部矩阵 shape、kernel 效率和通信比例；<\/li>\n<li>多 GPU 可以扩大可用模型或并发容量，但不等价于延迟线性下降。<\/li>\n<\/ul>\n<p>回答扩展问题时，先明确目标是“模型能否放下”“单请求是否更快”还是“集群吞吐是否更高”，避免把所有扩展方式混成同一种加速。<\/p>\n<h4>分布式运行时与集合通信语义<\/h4>\n<ul>\n<li>rank、local rank、world size、node rank 和 device mapping；<\/li>\n<li>默认 process group 与 TP/PP/DP/EP 子 group 的区别；<\/li>\n<li>point-to-point send/recv 与 collective 的使用边界；<\/li>\n<li>broadcast：一个 rank 的输入传播到 group 内所有 rank；<\/li>\n<li>all-reduce：对各 rank 同形张量做规约，并把结果返回所有 rank；<\/li>\n<li>all-gather：收集各 rank 分片，并让所有 rank 获得完整拼接结果；<\/li>\n<li>reduce-scatter：先规约再把结果分片到各 rank，可减少中间完整张量；<\/li>\n<li>all-to-all：每个 rank 向每个其他 rank 发送不同分片，常见于 Expert Parallel token dispatch；<\/li>\n<li>collective 要求的 shape、dtype、参与者顺序和 group 一致性；<\/li>\n<li>阻塞完成、异步 enqueue、stream 顺序和显式等待之间的区别；<\/li>\n<li>某个 rank 未进入 collective、调用顺序不一致或提前失败可能造成 hang，而不只是普通异常。<\/li>\n<\/ul>\n<p>只要求理解 ring/tree 的基本通信直觉和延迟-带宽权衡，不要求推导 NCCL 协议、channel、chunk 或底层 kernel。<\/p>\n<h4>Tensor Parallel：核心主线<\/h4>\n<p>以下公式采用 <code>Linear(X) = XW + b<\/code>，其中 <code>X<\/code> 为 <code>[..., I]<\/code>，<code>W<\/code> 为 <code>[I, O]<\/code>。<\/p>\n<h5>Column Parallel Linear<\/h5>\n<ul>\n<li>按输出维切分 <code>W = [W_0, ..., W_{p-1}]<\/code>，每个 <code>W_i<\/code> 为 <code>[I, O/p]<\/code>；<\/li>\n<li>每个 rank 计算 <code>Y_i = XW_i<\/code>，局部输出为 <code>[..., O/p]<\/code>；<\/li>\n<li>若下一层能够直接消费分片输出，可以延迟 all-gather；<\/li>\n<li>若所有 rank 都需要完整 <code>Y<\/code>，沿输出维 all-gather 得到 <code>concat(Y_i)<\/code>；<\/li>\n<li>bias 同样按输出维切分，每个 rank 只加自己的 bias shard。<\/li>\n<\/ul>\n<h5>Row Parallel Linear<\/h5>\n<ul>\n<li>按输入维切分 <code>W<\/code>，每个 <code>W_i<\/code> 为 <code>[I/p, O]<\/code>；<\/li>\n<li>输入也必须按最后一维切分为 <code>X_i<\/code>，每个 rank 计算局部部分和 <code>Z_i = X_iW_i<\/code>；<\/li>\n<li>完整输出满足 <code>Y = sum_i(Z_i) + b<\/code>，因此需要 all-reduce 或等价 reduce-scatter 路径；<\/li>\n<li>未切分 bias 只能在规约后加一次，不能让每个 rank 在规约前重复加入完整 bias。<\/li>\n<\/ul>\n<h5>Transformer 中的组合<\/h5>\n<ul>\n<li>MLP 的 gate/up projection 通常适合列并行，down projection 适合行并行；<\/li>\n<li>列并行中间激活直接进入行并行 down projection，可以避免中间 all-gather；<\/li>\n<li>Q/K/V projection 可按 head 或投影维切分，输出 projection 再规约；<\/li>\n<li>TP degree 必须与 attention heads、KV heads 或实现的复制策略兼容；<\/li>\n<li>MQA/GQA 下 query heads 与 KV heads 数量不同，KV head 可能被分片、复制或按 group 映射；<\/li>\n<li>Embedding/LM Head 可以使用 vocabulary parallel，局部 logits 需要按采样方式 gather 或做分布式规约；<\/li>\n<li>TP 下每个 rank 只持有与本地 KV heads 对应的 KV Cache，恢复、迁移或复用必须保留 layout 和 rank 身份；<\/li>\n<li>sequence length、hidden size、head count、KV head count 和 vocabulary size 的整除条件需要显式验证。<\/li>\n<\/ul>\n<h4>其他并行方式：比较能力<\/h4>\n<h5>Data Parallel<\/h5>\n<ul>\n<li>每个副本通常持有完整模型并处理不同请求；<\/li>\n<li>推理时不存在训练梯度 all-reduce，但路由、负载均衡和副本间 cache locality 会影响收益；<\/li>\n<li>数据并行扩大集群吞吐和并发容量，不解决单副本模型放不下的问题；<\/li>\n<li>replica routing、弹性和多租户治理归入后续控制面节点。<\/li>\n<\/ul>\n<h5>Pipeline Parallel<\/h5>\n<ul>\n<li>按层把模型切成多个 stage，激活通过 point-to-point 通信跨 stage；<\/li>\n<li>microbatch 可以填充流水线并提高吞吐，但会引入 bubble、排队和端到端延迟；<\/li>\n<li>自回归 Decode 的逐步依赖与小 batch 会限制流水线利用率；<\/li>\n<li>只要求比较适用条件，不要求手写流水线调度器或阅读生产 PP 源码。<\/li>\n<\/ul>\n<h5>Expert Parallel<\/h5>\n<ul>\n<li>MoE 把 experts 分布到不同 ranks，router 为 token 选择目标 expert；<\/li>\n<li>token dispatch/combine 常依赖 all-to-all；<\/li>\n<li>expert 热点、capacity、padding/dropping 和跨节点流量会影响负载与质量；<\/li>\n<li>只要求形成 all-to-all 与负载不均的工程直觉，不要求手写 MoE、router 或 fused expert kernel。<\/li>\n<\/ul>\n<h5>Sequence/Context Parallel<\/h5>\n<ul>\n<li>知道它们通过切分序列维或上下文相关状态缓解长序列的容量与计算压力；<\/li>\n<li>能说明它们与按 hidden/head 切分的 TP 不是同一维度；<\/li>\n<li>作为 P2 内容，不进入本节点的源码、手写和实验验收。<\/li>\n<\/ul>\n<h4>通信成本与拓扑边界<\/h4>\n<ul>\n<li>用 <code>T ≈ α × 通信轮次 + β × 传输字节<\/code> 建立 latency 与 bandwidth 成本直觉；<\/li>\n<li>关注 payload 大小、collective 次数、并行度和是否位于每个 decode step；<\/li>\n<li>计算与通信能否重叠取决于数据依赖、stream、buffer 生命周期和实现支持；<\/li>\n<li>小消息更容易被固定延迟和同步开销主导，大消息更容易受链路带宽限制；<\/li>\n<li>PCIe、NVLink、NVSwitch、NUMA 和跨节点网络只要求理解相对层级与拓扑影响；<\/li>\n<li>benchmark 必须记录设备型号、互连、拓扑、并行配置和运行时版本；<\/li>\n<li>GPU utilization 高不直接证明通信高效，TP 吞吐变差也不能仅凭直觉归因于 NCCL。<\/li>\n<\/ul>\n<h3>源码与复现契约<\/h3>\n<h4>触发依据<\/h4>\n<p>Tensor Parallel 是主流 LLM Serving 引擎的模型执行核心机制，且真实岗位会追问框架如何初始化并行组、分片模型和插入 collective。因此核心模块门槛触发，需要 toy 机制复现和真实框架映射。<\/p>\n<h4>主实现锚点<\/h4>\n<ul>\n<li>主实现选择 vLLM，并在开始学习时记录固定 release/commit；<\/li>\n<li>优先选择单机双 GPU、模型和 TP degree 均可稳定运行的版本与配置；<\/li>\n<li>第二实现只在 JD 明确要求或需要回答一个具体设计差异时加入；<\/li>\n<li>不为了框架覆盖同时精读 Megatron-LM、DeepSpeed、TensorRT-LLM 和 SGLang。<\/li>\n<\/ul>\n<h4>源码深度<\/h4>\n<p>需要能够沿固定版本定位以下路径：<\/p>\n<pre><code class=\"language-text\">CLI / engine parallel configuration\n  -&gt; distributed environment initialization\n  -&gt; TP/PP group and rank state\n  -&gt; worker / model executor construction\n  -&gt; model loading and parameter sharding\n  -&gt; parallel Linear / Attention layer\n  -&gt; collective invocation\n  -&gt; local KV Cache layout and model output<\/code><\/pre>\n<p>完成源码阅读后必须回答：<\/p>\n<ul>\n<li>TP size 如何从用户配置进入执行器和模型加载；<\/li>\n<li>rank、device 和 process group 在哪里建立并传递；<\/li>\n<li>权重是加载后切分、加载时分片，还是由 loader 映射到本地 shard；<\/li>\n<li>Column/Row Parallel Linear 的输入输出 contract 和 collective 在哪里发生；<\/li>\n<li>Attention heads 与 KV heads 如何映射到本地 rank；<\/li>\n<li>vocabulary parallel 或采样前 logits 如何处理；<\/li>\n<li>worker 失败或 collective 参与者不一致时，错误如何表现和传播；<\/li>\n<li>哪些能力来自 vLLM glue，哪些来自 PyTorch distributed/NCCL；<\/li>\n<li>为什么本节点停在 collective 接口与调用语义，而不进入 NCCL 内部实现。<\/li>\n<\/ul>\n<p>源码记录必须保存项目、release/commit、入口、关键对象、控制流图和已知版本差异，不能只记录类名列表。<\/p>\n<h3>手写 L2 契约<\/h3>\n<h4>必须完成的简化实现<\/h4>\n<p>从空文件实现一个单进程多 shard 的 TP Linear/MLP 练习：<\/p>\n<ol>\n<li>Column Parallel Linear：切分权重和 bias，分别计算 local output，再按输出维拼接；<\/li>\n<li>Row Parallel Linear：切分输入和权重，分别计算 partial sum，再求和并正确添加 bias；<\/li>\n<li>TP MLP：用列并行 up/gate 与行并行 down 组合，避免中间恢复完整张量；<\/li>\n<li>与未分片 <code>nn.Linear<\/code>/MLP 使用相同权重，验证输出数值一致；<\/li>\n<li>显式断言 hidden/intermediate size、world size 和 shard shape；<\/li>\n<li>至少覆盖一个非法整除、错误切分维或 bias 重复累加的失败测试。<\/li>\n<\/ol>\n<p>时间限制：45-60 分钟完成 Linear 核心；TP MLP 可以在后续 30 分钟内补齐。已有 <a href=\"topics/02-transformer-inference-and-handwriting.md\">Transformer 节点<\/a> 的“简化 TP Transformer Layer”可以复用同一份实现和测试，不重复计算完成度。<\/p>\n<p>通过标准不是能够调用 <code>torch.chunk<\/code>，而是能够先写出每个 shard 的数学关系和 shape，再实现并通过等价性测试。<\/p>\n<h4>不要求手写<\/h4>\n<ul>\n<li><code>torch.distributed<\/code> rendezvous、launcher 或 ProcessGroup；<\/li>\n<li>all-reduce/all-gather 的网络实现；<\/li>\n<li>NCCL communicator、ring/tree 或通信 kernel；<\/li>\n<li>完整多进程容错和生产模型加载器；<\/li>\n<li>完整分布式 Transformer。<\/li>\n<\/ul>\n<h3>实验 L2 契约<\/h3>\n<h4>语义实验<\/h4>\n<ul>\n<li>用单进程 shard 模拟验证 Column/Row Parallel Linear 数值等价；<\/li>\n<li>使用 CPU/Gloo 或真实 GPU/NCCL 运行最小 all-reduce、all-gather、reduce-scatter 示例；<\/li>\n<li>主动改变 tensor shape、world size 或 collective 类型中的至少一个变量；<\/li>\n<li>记录每个 rank 的输入、输出、shape、dtype 和 group；<\/li>\n<li>制造一次 collective 顺序或 shape contract 错误，记录失败或 hang 风险及安全终止方法。<\/li>\n<\/ul>\n<p>CPU/Gloo 结果只能证明 collective 语义和多进程控制流，标记为 <code>simulated<\/code> 或学习实验；不能外推 GPU/NCCL 的带宽、延迟或扩展效率。<\/p>\n<h4>真实 TP 实验<\/h4>\n<p>有单机双 GPU 条件时，在固定 vLLM 版本上完成 TP=1 与 TP=2 对照：<\/p>\n<ul>\n<li>固定模型 revision、dtype、workload、请求并发、输入/输出长度和测量窗口；<\/li>\n<li>记录 GPU 型号、显存、PCIe/NVLink 拓扑、驱动、CUDA、PyTorch、NCCL 和 vLLM 版本；<\/li>\n<li>记录每 rank 权重/KV/总显存以及模型是否能够在 TP=1 放下；<\/li>\n<li>记录 request/token throughput、TTFT、ITL/TPOT、端到端延迟和 p50/p95；<\/li>\n<li>计算 speedup 与 scaling efficiency，区分容量收益和速度收益；<\/li>\n<li>至少保留一个 TP=2 没有加速或发生退化的小模型、小 batch、短输出案例；<\/li>\n<li>用 profiler、runtime log 或源码路径说明可能的计算/通信边界，不做无证据的单因子归因。<\/li>\n<\/ul>\n<p>如果模型无法在 TP=1 放下，应把实验表述为容量扩展验证，不能伪造 TP=1 性能基线。没有双 GPU 时保留命令、脚本和待验证假设，节点的实验维度继续标记为待完成。<\/p>\n<h3>明确不要求<\/h3>\n<ul>\n<li>实现或修改 NCCL、Gloo、ProcessGroup、RDMA/NIXL；<\/li>\n<li>CUDA/Triton 通信或融合 kernel；<\/li>\n<li>NCCL channel、protocol、chunk、LL/LL128 等内部细节；<\/li>\n<li>完整 DDP、FSDP、ZeRO、optimizer state 或分布式训练容错；<\/li>\n<li>从零实现 PP scheduler、MoE router、expert kernel 或完整分布式模型执行器；<\/li>\n<li>多机多卡拓扑调优、通信计算重叠改造和大规模 benchmark；<\/li>\n<li>把 CPU/Gloo、单进程 shard 或纸面推导包装成 GPU 性能证据。<\/li>\n<\/ul>\n<h3>与后续控制面节点的边界<\/h3>\n<p>以下内容独立进入“分布式 Serving 与平台控制面”，不在本节点继续展开：<\/p>\n<ul>\n<li>Prefill/Decode disaggregation 与跨实例 KV transfer；<\/li>\n<li>replica routing、cache affinity、load balancing 和 admission；<\/li>\n<li>多节点部署、服务发现、健康检查、重试和容错；<\/li>\n<li>弹性伸缩、资源编排、多租户、配额和 SLO；<\/li>\n<li>Ray、Kubernetes 或其他平台控制面的具体实现。<\/li>\n<\/ul>\n<p>本节点回答“一个模型如何跨 GPU 执行”；后续节点回答“多个执行实例和资源如何组成在线 Serving 系统”。<\/p>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>TP 会改变 KV Cache 的本地 head layout、rank 身份、容量统计、格式兼容和跨 rank 完成条件，因此是解释未来多 GPU 生命周期问题的必要背景。<\/p>\n<p>但 ToolGap-KV CT1-CT3 当前仍限定为单引擎、TP=1。除非仓库存在真实多 GPU 接口、rank-aware lifecycle、兼容性测试和实验产物，否则：<\/p>\n<ul>\n<li>多 GPU、heterogeneous TP 和跨 rank completion 只能标记为 <code>roadmap<\/code>；<\/li>\n<li>单进程 shard 练习最多是学习验证，不是 ToolGap-KV <code>shipped<\/code> 能力；<\/li>\n<li>CPU/Gloo 结果不能标记为 GPU <code>experimentally validated<\/code>；<\/li>\n<li>不因学习 vLLM TP 源码而声称项目已经集成对应路径；<\/li>\n<li>TP layout 可以作为 manifest/compatibility 的未来字段，但不扩大 CT1-CT3 主线。<\/li>\n<\/ul>\n<h3>面试连续追问<\/h3>\n<ul>\n<li>为什么模型并行和数据并行解决的问题不同？<\/li>\n<li>TP 为什么能降低单卡权重占用？是否也按相同比例降低 KV Cache？<\/li>\n<li>Column Parallel 和 Row Parallel 分别如何切分 <code>W<\/code>？<\/li>\n<li>为什么 MLP 可以把列并行和行并行相邻组合？节省了哪次通信？<\/li>\n<li>Row Parallel 的 bias 为什么不能在 all-reduce 前由所有 ranks 重复加入？<\/li>\n<li>all-reduce 能否等价改写成 reduce-scatter 加 all-gather？为什么可能这样做？<\/li>\n<li>TP 下 Attention heads 和 KV heads 如何切？GQA 的 KV heads 小于 TP degree 怎么办？<\/li>\n<li>TP degree 从 2 增加到 8，单卡计算减少，为什么端到端延迟可能上升？<\/li>\n<li>Prefill 与 Decode 哪一个更容易摊销 collective？为什么？<\/li>\n<li>PP 为什么会有 bubble？自回归 Decode 为什么让它更棘手？<\/li>\n<li>EP 为什么常用 all-to-all？expert imbalance 会导致什么？<\/li>\n<li>为什么 CPU/Gloo benchmark 不能证明 NCCL 性能？<\/li>\n<li>你如何判断 TP=2 的收益来自模型终于能放下，还是实际执行变快？<\/li>\n<li>collective hang 常见的 contract 违反有哪些？如何安全定位？<\/li>\n<li>vLLM 在哪里创建并行组、切分权重并调用 collective？<\/li>\n<li>ToolGap-KV 为什么当前不能声称支持 heterogeneous TP？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一次通过的 P0 连续追问和一份 TP shape/通信手推记录；<\/li>\n<li>一张固定版本 vLLM 多 GPU 模型执行路径图；<\/li>\n<li>一份限时 TP Linear/MLP 实现及数值等价、shape 和失败测试；<\/li>\n<li>一次 collective 语义实验，记录每个 rank 的输入输出；<\/li>\n<li>有双 GPU 时完成 TP=1/TP=2 对照，并保留一个不加速案例；<\/li>\n<li>没有双 GPU 时明确保留实验缺口，不把 CPU/Gloo 结果外推为 GPU 结论；<\/li>\n<li>一份并行策略选择说明，区分容量、延迟、吞吐和通信目标；<\/li>\n<li>所有 ToolGap-KV 关联表述保持 <code>roadmap<\/code>、<code>shipped<\/code>、<code>experimentally validated<\/code>、<code>simulated<\/code> 的证据边界。<\/li>\n<\/ul>",
    "search_text": "08 多 gpu 模型执行与集合通信 p1；其中并行方式边界、tp 切分与 collective 语义属于面试启动前的 p0 防守要求 已敲定 tp 主线和非通信内核边界，原理、源码、手写与实验均待完成 能从容量、计算和通信约束解释 tp/dp/pp/ep，推导 transformer tp 的张量切分与 collective 位置，手写简化 tp linear/mlp，并沿固定版本 vllm 追踪多 gpu 模型执行路径。 tp 深入，dp/pp/ep 建立比较能力；不实现 nccl/rdma/processgroup 或通信 kernel，不学习完整分布式训练，也不把 pd 分离、跨节点 kv、路由和弹性塞入本节点。 # 08｜多 gpu 模型执行与集合通信详细知识列表 > 优先级：p1；包含面试启动前必须完成的 p0 防守子集 > > 当前状态：已敲定 tp 主线和非通信内核边界，原理、源码、手写与实验均待完成 > > 目标熟练度：原理 l3 / 源码 l2 / 手写 l2 / 实验 l2 > > 依赖：[pytorch 与张量编程](01-pytorch-tensor-programming.md)、[transformer 推理原理与手撕](02-transformer-inference-and-handwriting.md)、[kv cache 与内存系统](03-kv-cache-memory-system.md)、[性能分析与 gpu 最小认知](05-performance-analysis-and-gpu-literacy.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能从模型容量、单 token 计算量、设备带宽和互连成本出发解释为什么需要多 gpu 模型执行；能够把 tensor parallel 映射到 transformer 的 linear、attention、mlp、embedding/lm head 和 kv cache，推导每个 rank 的张量形状与 collective 位置，并解释 tp degree 增加后为什么不一定加速。 这是一个 tp 深入、其他并行方式建立比较能力的 p1 节点，预计集中投入约 12-20 小时。它不是通信库、分布式训练或集群控制面课程。 ## p0 防守要求 开始目标岗位面试前，应能脱稿回答以下问题： 1. 单 gpu 的模型容量、kv 容量或计算能力不足时，分别有哪些扩展方向； 2. tensor parallel、pipeline parallel、data parallel 和 expert parallel 分别切分什么； 3. `rank`、`local_rank`、`world_size` 和 process group 分别表示什么； 4. broadcast、all-reduce、all-gather、reduce-scatter 与 all-to-all 的输入输出语义； 5. column parallel linear 和 row parallel linear 分别切 `w` 的哪个维度； 6. 为什么列并行输出可以暂时保持分片，而行并行输出需要对局部和做归并； 7. transformer mlp 如何组合列并行和行并行以减少中间 collective； 8. attention head 如何在 tp ranks 之间切分，gqa/mqa 会增加哪些整除和布局约束； 9. tp degree 增大为什么可能因为小矩阵、同步和通信开销而变慢； 10. pcie、nvlink、跨 numa 或跨节点链路为什么会改变相同 tp 配置的表现。 通过标准：完成一次 10-15 分钟连续追问，现场推导一次两路 column/row parallel linear 的 shape 和输出等价关系。p0 防守不要求写代码、运行多 gpu 或阅读 nccl 源码。 ## p1 详细知识列表 ### 多 gpu 执行的第一性原理 - 模型权重、激活、临时 workspace 和 kv cache 分别消耗什么容量； - 容量扩展、单请求延迟、总吞吐和并发容量是不同目标； - 模型并行通过切分单个模型解决容量或单请求计算问题； - 数据并行通过复制模型扩展独立请求吞吐，不减少单副本权重； - 并行收益取决于可并行计算是否覆盖通信、同步和调度开销； - prefill 的大矩阵与 decode 的小 batch gemm 对 tp 通信摊销能力不同； - 增加设备数会同时改变局部矩阵 shape、kernel 效率和通信比例； - 多 gpu 可以扩大可用模型或并发容量，但不等价于延迟线性下降。 回答扩展问题时，先明确目标是“模型能否放下”“单请求是否更快”还是“集群吞吐是否更高”，避免把所有扩展方式混成同一种加速。 ### 分布式运行时与集合通信语义 - rank、local rank、world size、node rank 和 device mapping； - 默认 process group 与 tp/pp/dp/ep 子 group 的区别； - point-to-point send/recv 与 collective 的使用边界； - broadcast：一个 rank 的输入传播到 group 内所有 rank； - all-reduce：对各 rank 同形张量做规约，并把结果返回所有 rank； - all-gather：收集各 rank 分片，并让所有 rank 获得完整拼接结果； - reduce-scatter：先规约再把结果分片到各 rank，可减少中间完整张量； - all-to-all：每个 rank 向每个其他 rank 发送不同分片，常见于 expert parallel token dispatch； - collective 要求的 shape、dtype、参与者顺序和 group 一致性； - 阻塞完成、异步 enqueue、stream 顺序和显式等待之间的区别； - 某个 rank 未进入 collective、调用顺序不一致或提前失败可能造成 hang，而不只是普通异常。 只要求理解 ring/tree 的基本通信直觉和延迟-带宽权衡，不要求推导 nccl 协议、channel、chunk 或底层 kernel。 ### tensor parallel：核心主线 以下公式采用 `linear(x) = xw + b`，其中 `x` 为 `[..., i]`，`w` 为 `[i, o]`。 #### column parallel linear - 按输出维切分 `w = [w_0, ..., w_{p-1}]`，每个 `w_i` 为 `[i, o/p]`； - 每个 rank 计算 `y_i = xw_i`，局部输出为 `[..., o/p]`； - 若下一层能够直接消费分片输出，可以延迟 all-gather； - 若所有 rank 都需要完整 `y`，沿输出维 all-gather 得到 `concat(y_i)`； - bias 同样按输出维切分，每个 rank 只加自己的 bias shard。 #### row parallel linear - 按输入维切分 `w`，每个 `w_i` 为 `[i/p, o]`； - 输入也必须按最后一维切分为 `x_i`，每个 rank 计算局部部分和 `z_i = x_iw_i`； - 完整输出满足 `y = sum_i(z_i) + b`，因此需要 all-reduce 或等价 reduce-scatter 路径； - 未切分 bias 只能在规约后加一次，不能让每个 rank 在规约前重复加入完整 bias。 #### transformer 中的组合 - mlp 的 gate/up projection 通常适合列并行，down projection 适合行并行； - 列并行中间激活直接进入行并行 down projection，可以避免中间 all-gather； - q/k/v projection 可按 head 或投影维切分，输出 projection 再规约； - tp degree 必须与 attention heads、kv heads 或实现的复制策略兼容； - mqa/gqa 下 query heads 与 kv heads 数量不同，kv head 可能被分片、复制或按 group 映射； - embedding/lm head 可以使用 vocabulary parallel，局部 logits 需要按采样方式 gather 或做分布式规约； - tp 下每个 rank 只持有与本地 kv heads 对应的 kv cache，恢复、迁移或复用必须保留 layout 和 rank 身份； - sequence length、hidden size、head count、kv head count 和 vocabulary size 的整除条件需要显式验证。 ### 其他并行方式：比较能力 #### data parallel - 每个副本通常持有完整模型并处理不同请求； - 推理时不存在训练梯度 all-reduce，但路由、负载均衡和副本间 cache locality 会影响收益； - 数据并行扩大集群吞吐和并发容量，不解决单副本模型放不下的问题； - replica routing、弹性和多租户治理归入后续控制面节点。 #### pipeline parallel - 按层把模型切成多个 stage，激活通过 point-to-point 通信跨 stage； - microbatch 可以填充流水线并提高吞吐，但会引入 bubble、排队和端到端延迟； - 自回归 decode 的逐步依赖与小 batch 会限制流水线利用率； - 只要求比较适用条件，不要求手写流水线调度器或阅读生产 pp 源码。 #### expert parallel - moe 把 experts 分布到不同 ranks，router 为 token 选择目标 expert； - token dispatch/combine 常依赖 all-to-all； - expert 热点、capacity、padding/dropping 和跨节点流量会影响负载与质量； - 只要求形成 all-to-all 与负载不均的工程直觉，不要求手写 moe、router 或 fused expert kernel。 #### sequence/context parallel - 知道它们通过切分序列维或上下文相关状态缓解长序列的容量与计算压力； - 能说明它们与按 hidden/head 切分的 tp 不是同一维度； - 作为 p2 内容，不进入本节点的源码、手写和实验验收。 ### 通信成本与拓扑边界 - 用 `t ≈ α × 通信轮次 + β × 传输字节` 建立 latency 与 bandwidth 成本直觉； - 关注 payload 大小、collective 次数、并行度和是否位于每个 decode step； - 计算与通信能否重叠取决于数据依赖、stream、buffer 生命周期和实现支持； - 小消息更容易被固定延迟和同步开销主导，大消息更容易受链路带宽限制； - pcie、nvlink、nvswitch、numa 和跨节点网络只要求理解相对层级与拓扑影响； - benchmark 必须记录设备型号、互连、拓扑、并行配置和运行时版本； - gpu utilization 高不直接证明通信高效，tp 吞吐变差也不能仅凭直觉归因于 nccl。 ## 源码与复现契约 ### 触发依据 tensor parallel 是主流 llm serving 引擎的模型执行核心机制，且真实岗位会追问框架如何初始化并行组、分片模型和插入 collective。因此核心模块门槛触发，需要 toy 机制复现和真实框架映射。 ### 主实现锚点 - 主实现选择 vllm，并在开始学习时记录固定 release/commit； - 优先选择单机双 gpu、模型和 tp degree 均可稳定运行的版本与配置； - 第二实现只在 jd 明确要求或需要回答一个具体设计差异时加入； - 不为了框架覆盖同时精读 megatron-lm、deepspeed、tensorrt-llm 和 sglang。 ### 源码深度 需要能够沿固定版本定位以下路径： ```text cli / engine parallel configuration -> distributed environment initialization -> tp/pp group and rank state -> worker / model executor construction -> model loading and parameter sharding -> parallel linear / attention layer -> collective invocation -> local kv cache layout and model output ``` 完成源码阅读后必须回答： - tp size 如何从用户配置进入执行器和模型加载； - rank、device 和 process group 在哪里建立并传递； - 权重是加载后切分、加载时分片，还是由 loader 映射到本地 shard； - column/row parallel linear 的输入输出 contract 和 collective 在哪里发生； - attention heads 与 kv heads 如何映射到本地 rank； - vocabulary parallel 或采样前 logits 如何处理； - worker 失败或 collective 参与者不一致时，错误如何表现和传播； - 哪些能力来自 vllm glue，哪些来自 pytorch distributed/nccl； - 为什么本节点停在 collective 接口与调用语义，而不进入 nccl 内部实现。 源码记录必须保存项目、release/commit、入口、关键对象、控制流图和已知版本差异，不能只记录类名列表。 ## 手写 l2 契约 ### 必须完成的简化实现 从空文件实现一个单进程多 shard 的 tp linear/mlp 练习： 1. column parallel linear：切分权重和 bias，分别计算 local output，再按输出维拼接； 2. row parallel linear：切分输入和权重，分别计算 partial sum，再求和并正确添加 bias； 3. tp mlp：用列并行 up/gate 与行并行 down 组合，避免中间恢复完整张量； 4. 与未分片 `nn.linear`/mlp 使用相同权重，验证输出数值一致； 5. 显式断言 hidden/intermediate size、world size 和 shard shape； 6. 至少覆盖一个非法整除、错误切分维或 bias 重复累加的失败测试。 时间限制：45-60 分钟完成 linear 核心；tp mlp 可以在后续 30 分钟内补齐。已有 [transformer 节点](02-transformer-inference-and-handwriting.md) 的“简化 tp transformer layer”可以复用同一份实现和测试，不重复计算完成度。 通过标准不是能够调用 `torch.chunk`，而是能够先写出每个 shard 的数学关系和 shape，再实现并通过等价性测试。 ### 不要求手写 - `torch.distributed` rendezvous、launcher 或 processgroup； - all-reduce/all-gather 的网络实现； - nccl communicator、ring/tree 或通信 kernel； - 完整多进程容错和生产模型加载器； - 完整分布式 transformer。 ## 实验 l2 契约 ### 语义实验 - 用单进程 shard 模拟验证 column/row parallel linear 数值等价； - 使用 cpu/gloo 或真实 gpu/nccl 运行最小 all-reduce、all-gather、reduce-scatter 示例； - 主动改变 tensor shape、world size 或 collective 类型中的至少一个变量； - 记录每个 rank 的输入、输出、shape、dtype 和 group； - 制造一次 collective 顺序或 shape contract 错误，记录失败或 hang 风险及安全终止方法。 cpu/gloo 结果只能证明 collective 语义和多进程控制流，标记为 `simulated` 或学习实验；不能外推 gpu/nccl 的带宽、延迟或扩展效率。 ### 真实 tp 实验 有单机双 gpu 条件时，在固定 vllm 版本上完成 tp=1 与 tp=2 对照： - 固定模型 revision、dtype、workload、请求并发、输入/输出长度和测量窗口； - 记录 gpu 型号、显存、pcie/nvlink 拓扑、驱动、cuda、pytorch、nccl 和 vllm 版本； - 记录每 rank 权重/kv/总显存以及模型是否能够在 tp=1 放下； - 记录 request/token throughput、ttft、itl/tpot、端到端延迟和 p50/p95； - 计算 speedup 与 scaling efficiency，区分容量收益和速度收益； - 至少保留一个 tp=2 没有加速或发生退化的小模型、小 batch、短输出案例； - 用 profiler、runtime log 或源码路径说明可能的计算/通信边界，不做无证据的单因子归因。 如果模型无法在 tp=1 放下，应把实验表述为容量扩展验证，不能伪造 tp=1 性能基线。没有双 gpu 时保留命令、脚本和待验证假设，节点的实验维度继续标记为待完成。 ## 明确不要求 - 实现或修改 nccl、gloo、processgroup、rdma/nixl； - cuda/triton 通信或融合 kernel； - nccl channel、protocol、chunk、ll/ll128 等内部细节； - 完整 ddp、fsdp、zero、optimizer state 或分布式训练容错； - 从零实现 pp scheduler、moe router、expert kernel 或完整分布式模型执行器； - 多机多卡拓扑调优、通信计算重叠改造和大规模 benchmark； - 把 cpu/gloo、单进程 shard 或纸面推导包装成 gpu 性能证据。 ## 与后续控制面节点的边界 以下内容独立进入“分布式 serving 与平台控制面”，不在本节点继续展开： - prefill/decode disaggregation 与跨实例 kv transfer； - replica routing、cache affinity、load balancing 和 admission； - 多节点部署、服务发现、健康检查、重试和容错； - 弹性伸缩、资源编排、多租户、配额和 slo； - ray、kubernetes 或其他平台控制面的具体实现。 本节点回答“一个模型如何跨 gpu 执行”；后续节点回答“多个执行实例和资源如何组成在线 serving 系统”。 ## 与 toolgap-kv 的边界 tp 会改变 kv cache 的本地 head layout、rank 身份、容量统计、格式兼容和跨 rank 完成条件，因此是解释未来多 gpu 生命周期问题的必要背景。 但 toolgap-kv ct1-ct3 当前仍限定为单引擎、tp=1。除非仓库存在真实多 gpu 接口、rank-aware lifecycle、兼容性测试和实验产物，否则： - 多 gpu、heterogeneous tp 和跨 rank completion 只能标记为 `roadmap`； - 单进程 shard 练习最多是学习验证，不是 toolgap-kv `shipped` 能力； - cpu/gloo 结果不能标记为 gpu `experimentally validated`； - 不因学习 vllm tp 源码而声称项目已经集成对应路径； - tp layout 可以作为 manifest/compatibility 的未来字段，但不扩大 ct1-ct3 主线。 ## 面试连续追问 - 为什么模型并行和数据并行解决的问题不同？ - tp 为什么能降低单卡权重占用？是否也按相同比例降低 kv cache？ - column parallel 和 row parallel 分别如何切分 `w`？ - 为什么 mlp 可以把列并行和行并行相邻组合？节省了哪次通信？ - row parallel 的 bias 为什么不能在 all-reduce 前由所有 ranks 重复加入？ - all-reduce 能否等价改写成 reduce-scatter 加 all-gather？为什么可能这样做？ - tp 下 attention heads 和 kv heads 如何切？gqa 的 kv heads 小于 tp degree 怎么办？ - tp degree 从 2 增加到 8，单卡计算减少，为什么端到端延迟可能上升？ - prefill 与 decode 哪一个更容易摊销 collective？为什么？ - pp 为什么会有 bubble？自回归 decode 为什么让它更棘手？ - ep 为什么常用 all-to-all？expert imbalance 会导致什么？ - 为什么 cpu/gloo benchmark 不能证明 nccl 性能？ - 你如何判断 tp=2 的收益来自模型终于能放下，还是实际执行变快？ - collective hang 常见的 contract 违反有哪些？如何安全定位？ - vllm 在哪里创建并行组、切分权重并调用 collective？ - toolgap-kv 为什么当前不能声称支持 heterogeneous tp？ ## 完成证据 - 一次通过的 p0 连续追问和一份 tp shape/通信手推记录； - 一张固定版本 vllm 多 gpu 模型执行路径图； - 一份限时 tp linear/mlp 实现及数值等价、shape 和失败测试； - 一次 collective 语义实验，记录每个 rank 的输入输出； - 有双 gpu 时完成 tp=1/tp=2 对照，并保留一个不加速案例； - 没有双 gpu 时明确保留实验缺口，不把 cpu/gloo 结果外推为 gpu 结论； - 一份并行策略选择说明，区分容量、延迟、吞吐和通信目标； - 所有 toolgap-kv 关联表述保持 `roadmap`、`shipped`、`experimentally validated`、`simulated` 的证据边界。 "

    "detail_html": "<h2>09｜分布式 Serving 数据路径与 PD 分离详细知识列表<\/h2>\n<blockquote>优先级：P1；包含面试启动前必须完成的 P0 防守子集 当前状态：已敲定数据路径主线和非传输内核边界，原理、源码、手写与实验均待完成 目标熟练度：原理 L3 / 源码 L2 / 手写 L2 / 实验 L2 依赖：<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/04-llm-engine-scheduling.md\">LLM 推理引擎与调度<\/a>、<a href=\"topics/05-performance-analysis-and-gpu-literacy.md\">性能分析与实验方法<\/a>、<a href=\"topics/08-multi-gpu-model-execution-and-collectives.md\">多 GPU 模型执行与集合通信<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能沿以下链路解释一次请求，并同时画出数据流、状态流、资源所有权和指标流：<\/p>\n<pre><code class=\"language-text\">请求进入\n  -&gt; Prefill 实例排队和执行\n  -&gt; 产生 KV Cache\n  -&gt; 建立 KV 身份与目标位置\n  -&gt; 传输或发布 KV\n  -&gt; Decode 等待可见性完成\n  -&gt; 验证兼容性并接管\n  -&gt; 逐 token Decode\n  -&gt; 失败回退与资源清理<\/code><\/pre>\n<p>回答不能只画一条 Prefill Worker 到 Decode Worker 的传输箭头。必须解释谁拥有请求、谁拥有物理 KV、谁判断数据可读、Decode 在什么条件下准入，以及失败、取消或晚到完成时怎样保持状态一致。<\/p>\n<p>这是一个约 12-18 小时的 P1 节点。它回答“请求、KV Cache 和执行阶段怎样跨 Prefill/Decode 实例移动”；后续控制面节点回答“请求应该选择哪个实例，以及整个集群怎样治理”。<\/p>\n<h3>P0 防守要求<\/h3>\n<p>开始目标岗位面试前，应能脱稿回答以下问题：<\/p>\n<ol>\n<li>Prefill 与 Decode 在计算形态、显存访问、batch 方式和延迟目标上的差异；<\/li>\n<li>混部时，长 Prefill 为什么可能干扰已经运行的 Decode；<\/li>\n<li>PD 分离解决的是资源隔离和独立扩缩容，为什么不等于天然提升总吞吐；<\/li>\n<li>TTFT 如何拆成路由、排队、Prefill、KV transfer 和 Decode admission；<\/li>\n<li>TPOT/ITL 为什么主要受 Decode 资源池、batch 和调度影响；<\/li>\n<li>KV transfer 成本如何与重新 Prefill 的成本比较；<\/li>\n<li>KV 描述符至少需要哪些身份、范围、布局和兼容性信息；<\/li>\n<li>为什么 <code>transfer submitted<\/code>、<code>transfer complete<\/code> 与 <code>Decode visible<\/code> 是不同状态；<\/li>\n<li>部分传输、超时、Prefill/Decode Worker 失败、取消和晚到 completion 怎样处理；<\/li>\n<li>Prefill/Decode 资源比例失衡为什么会形成新的串联排队瓶颈；<\/li>\n<li>direct transfer、共享 KV 存储和中间传输服务各自增加哪些成本与故障面；<\/li>\n<li>哪些 workload 更可能获益，短请求或低负载为什么可能退化。<\/li>\n<\/ol>\n<p>P0 验收是一道 15 分钟连续场景题：设计两组 Prefill Worker、四组 Decode Worker 的在线服务。回答必须覆盖请求流、KV 交接、Decode 准入、资源所有权、失败回退、指标，以及关闭 PD 的条件；还要说明如何证明 TTFT 改善没有牺牲 TPOT、吞吐、goodput 或错误率。<\/p>\n<p>P0 不要求解释 RDMA、NIXL 或 GPU Direct 的底层实现。<\/p>\n<h3>P1 详细知识列表<\/h3>\n<h4>为什么分离 Prefill 与 Decode<\/h4>\n<ul>\n<li>Prefill 对完整 Prompt 做并行计算，Decode 逐步生成 token，两者的计算粒度和访存行为不同；<\/li>\n<li>Prefill 更容易形成大矩阵计算，Decode 的每步计算更小并反复读取权重与 KV；<\/li>\n<li>两者共用 GPU 时会竞争算力、带宽、显存容量、执行队列和 scheduler budget；<\/li>\n<li>分离后可以独立配置并扩缩 Prefill/Decode 资源池，并隔离部分尾延迟干扰；<\/li>\n<li>分离同时增加路由、排队、KV transfer、同步、目标容量预留和新故障面；<\/li>\n<li>PD 分离、Tensor/Pipeline Parallel 与 Chunked Prefill 解决的问题不同，可以组合但不能互相替代；<\/li>\n<li>判断收益时必须分别讨论 TTFT、TPOT/ITL、E2E latency、吞吐、goodput、成本和错误率；<\/li>\n<li>“资源隔离更强”“模型或并发终于放得下”和“相同资源下性能更高”是三种不同结论。<\/li>\n<\/ul>\n<h4>KV 怎样移动<\/h4>\n<ul>\n<li>Prefill Worker 需要描述模型、请求、token/位置范围、layer/block、KV dtype/layout 和并行配置；<\/li>\n<li>push 模式由来源主动发送，pull 模式由目标拉取，共享存储模式由双方通过共同位置发布与读取；<\/li>\n<li>direct GPU path、host staging 和远端 KV 存储具有不同的拷贝次数、带宽、固定延迟和故障边界；<\/li>\n<li>block、layer 或更大批次粒度会改变调度复杂度、内存峰值、流水化机会和失败恢复范围；<\/li>\n<li>transfer 成本可用固定开销、payload 字节、可用带宽、并发竞争和排队时间建立近似模型；<\/li>\n<li>传输与 Decode 是否能够重叠，取决于依赖范围、数据可见性、buffer 生命周期和实现支持；<\/li>\n<li>目标 KV 容量、传输队列和链路压力需要形成 backpressure，不能无限接收 handoff；<\/li>\n<li>GPU Direct、RDMA 和 NIXL 只要求理解接口位置、数据路径和 trade-off，不要求实现传输库或 kernel。<\/li>\n<\/ul>\n<h4>KV 怎样安全接管<\/h4>\n<ul>\n<li>request/session/turn/lifecycle epoch 用于区分同名请求、重试与旧异步事件；<\/li>\n<li>模型 revision、tokenizer/template、RoPE、KV dtype/layout 和 TP 配置属于兼容性契约；<\/li>\n<li><code>PREFILLING<\/code>、<code>TRANSFER_PENDING<\/code>、<code>TRANSFERRING<\/code>、<code>READY<\/code>、<code>CONSUMED<\/code>、<code>FAILED<\/code>、<code>CANCELLED<\/code> 表示不同逻辑事实；<\/li>\n<li>提交传输不代表完成，传输完成也不必然代表 Decode 已经看到完整且兼容的数据；<\/li>\n<li>completion 需要幂等；旧 epoch、重复、部分完成和取消后的晚到事件不能重新激活请求；<\/li>\n<li>Decode admission 必须等待身份、兼容性、完整性、可见性和目标容量条件同时满足；<\/li>\n<li>retry、reroute、retransfer 与 recompute 的选择取决于剩余数据、排队、源/目标健康和重新 Prefill 成本；<\/li>\n<li>请求逻辑所有权、handoff record 所有权和物理 KV block 所有权不是同一个概念；<\/li>\n<li>terminal state 之后必须清理临时容量、句柄、等待者和陈旧记录；<\/li>\n<li>同一份 KV 在共享语义未明确允许时不能被两个 Decode owner 非法接管。<\/li>\n<\/ul>\n<h4>串联队列与 Decode admission<\/h4>\n<ul>\n<li>请求会依次经过 Prefill queue、transfer queue 和 Decode queue，任何一段都可能主导尾延迟；<\/li>\n<li>Prefill/Decode pool 的配比需要考虑 Prompt 长度、输出长度、并发和设备差异；<\/li>\n<li>Decode admission 既要等待 KV ready，也要确认目标能够持续承担后续 token 生成；<\/li>\n<li>只看平均利用率可能掩盖某一池的长队列和另一池的空闲；<\/li>\n<li>静态配比实现简单但难适应 workload 漂移，动态配比增加反馈延迟、迁移和稳定性问题；<\/li>\n<li>backpressure、overload rejection 和 recompute fallback 会直接改变尾延迟和 goodput；<\/li>\n<li>本节点定义路由可消费的 readiness、容量、队列和失败信号，但不实现全局实例选择策略。<\/li>\n<\/ul>\n<h4>怎样证明收益<\/h4>\n<ul>\n<li>将 TTFT 分解为入口路由、各阶段排队、Prefill、KV transfer 和 Decode admission；<\/li>\n<li>同时记录 TPOT/ITL、E2E latency、request/token throughput 和 goodput；<\/li>\n<li>使用 p50/p95/p99、错误率、timeout、retry 和 fallback 率观察尾部与正确性；<\/li>\n<li>记录 Prefill/Decode utilization、队列长度、KV bytes、transfer 时间和有效带宽；<\/li>\n<li>co-located 与 disaggregated 对照必须固定总 GPU 数、模型副本预算和 workload；<\/li>\n<li>Prompt/Output 长度、并发、资源配比和拓扑都是实验变量，不能一次全部改变；<\/li>\n<li>至少保留一个获益案例和一个退化案例，并解释关闭 PD 的运行条件；<\/li>\n<li>一张 GPU 的 co-located 与两张 GPU 的 PD 只能作为容量或非等资源展示，不能直接声称 PD speedup。<\/li>\n<\/ul>\n<h3>源码 L2 契约<\/h3>\n<h4>触发依据<\/h4>\n<p>PD 分离是目标岗位常见的分布式推理机制，面试会继续追问 KV connector、Decode admission、失败处理和指标权衡。它同时满足真题/场景题价值与核心 Serving 模块门槛，因此必须建立固定实现的源码路径和真实框架运行证据。<\/p>\n<h4>主实现与阅读路径<\/h4>\n<p>主实现选择学习开始时固定 release/commit 的 vLLM，沿一条完整数据路径阅读：<\/p>\n<pre><code class=\"language-text\">PD 配置与角色初始化\n  -&gt; 请求进入 Prefill 实例\n  -&gt; Prefill 调度与模型执行\n  -&gt; KV connector / transfer metadata\n  -&gt; KV 保存或发送\n  -&gt; Decode 实例等待和加载\n  -&gt; KV ready 后进入 Decode\n  -&gt; completion / failure / cleanup<\/code><\/pre>\n<p>读完必须回答：<\/p>\n<ul>\n<li>Prefill 与 Decode 角色在哪里确定；<\/li>\n<li>transfer metadata 由谁创建并包含什么；<\/li>\n<li>scheduler 如何知道 KV 尚未 ready；<\/li>\n<li>connector、Block Manager、scheduler 和 model runner 的职责边界；<\/li>\n<li>completion 怎样进入控制流并改变 Decode admission；<\/li>\n<li>transfer 失败怎样阻塞、重试、回退或终止请求；<\/li>\n<li>本地 KV block identity 怎样映射到跨实例交接；<\/li>\n<li>哪些能力由 vLLM 提供，哪些由 connector 或外部传输系统提供；<\/li>\n<li>取消或超时后，怎样阻止晚到 completion 泄漏资源或恢复旧请求。<\/li>\n<\/ul>\n<p>源码笔记必须保存项目、release/commit、入口、关键对象、状态流、失败路径、已知版本差异和一张时序图。第二实现只从 SGLang、Dynamo、Mooncake 等选择一个，用于回答一个明确的架构差异；没有具体 JD 或 trade-off 问题时不增加第二套源码。<\/p>\n<h3>手写 L2 契约<\/h3>\n<h4>最小逻辑系统<\/h4>\n<p>从空文件实现一个不搬运真实 KV Tensor 的逻辑交接系统：<\/p>\n<ul>\n<li><code>KVIdentity<\/code>：模型、token/位置范围、KV dtype/layout 和并行配置；<\/li>\n<li><code>HandoffRecord<\/code>：request、epoch、来源、目标、状态和资源句柄；<\/li>\n<li><code>HandoffController<\/code>：合法状态转换、Decode admission、取消、fallback 和清理；<\/li>\n<li><code>FakeTransfer<\/code>：只模拟延迟、成功、失败和 completion，不实现网络。<\/li>\n<\/ul>\n<p>状态主路径为：<\/p>\n<pre><code class=\"language-text\">PREFILLING\n  -&gt; TRANSFER_PENDING\n  -&gt; TRANSFERRING\n  -&gt; READY\n  -&gt; CONSUMED\n\n任意非终态\n  -&gt; FAILED / CANCELLED\n  -&gt; RECOMPUTE_FALLBACK 或 CLEANED<\/code><\/pre>\n<p>必须通过以下测试：<\/p>\n<ol>\n<li>正常 Prefill-transfer-Decode 链路；<\/li>\n<li>KV 未 <code>READY<\/code> 时拒绝 Decode；<\/li>\n<li>重复 completion 保持幂等；<\/li>\n<li>旧 epoch completion 被拒绝；<\/li>\n<li>metadata 不兼容时触发 recompute；<\/li>\n<li>cancel 后晚到 completion 不能重新激活请求；<\/li>\n<li>失败后临时容量和句柄被清理；<\/li>\n<li>同一个 KV 不能被两个 Decode owner 非法接管。<\/li>\n<\/ol>\n<p>时间限制：45-60 分钟完成正常链路和基本状态机，再用 30-45 分钟补故障测试。通过标准是能够解释每个状态、所有者和不变量，而不是只写一个异步回调 demo。<\/p>\n<p>不要求手写 RPC、多进程、共享内存、RDMA、NIXL、真实 GPU buffer、生产 connector 或传输引擎。<\/p>\n<h3>实验 L2 契约<\/h3>\n<h4>逻辑正确性实验<\/h4>\n<p>使用可控 <code>FakeTransfer<\/code> 注入延迟、失败、重复完成、晚到完成和取消竞争，输出完整事件 trace。该结果只能标记为 <code>simulated<\/code>，不得用于证明真实 KV 传输性能、vLLM 集成或 ToolGap-KV 已交付能力。<\/p>\n<h4>真实框架实验<\/h4>\n<p>在固定版本 vLLM 上运行 co-located 与 disaggregated 对照，记录：<\/p>\n<ul>\n<li>模型 revision、dtype 和框架 commit；<\/li>\n<li>GPU、互连、网络和软件环境；<\/li>\n<li>Prefill/Decode 实例数和每实例并行配置；<\/li>\n<li>Prompt/Output 长度、并发、请求数和测量窗口；<\/li>\n<li>TTFT 分解、TPOT/ITL 和 E2E latency；<\/li>\n<li>request/token throughput、goodput 和 p50/p95；<\/li>\n<li>KV transfer bytes、时间、失败与 fallback；<\/li>\n<li>Prefill/Decode utilization 和各阶段队列时间。<\/li>\n<\/ul>\n<p>实验矩阵保持有界：一个长 Prompt 场景、一个短 Prompt 或低负载场景、一个中高并发场景。至少保留一个 PD 获益案例和一个退化案例。<\/p>\n<p>对照必须优先使用相同总 GPU 数、相同模型副本预算和相同 workload。如果 co-located 使用一张 GPU、PD 使用两张 GPU，差异只能标记为容量展示或非等资源比较，不能计算误导性 speedup。没有双 GPU 或可运行 connector 环境时，保留命令、配置、预期指标和待验证假设，实验维度继续标记为待完成。<\/p>\n<h3>与后续控制面节点的边界<\/h3>\n<p>本节点回答“请求与 KV 怎样跨 Prefill/Decode 实例安全移动”。后续“Serving 路由与平台控制面”回答：<\/p>\n<ul>\n<li>请求应该选择哪个 Prefill/Decode 实例；<\/li>\n<li>cache locality 与 load balance 怎样权衡；<\/li>\n<li>admission、backpressure、health check、retry 和 stale state 怎样在集群层治理；<\/li>\n<li>弹性、资源编排、多租户、配额和 SLO 怎样落地；<\/li>\n<li>Ray、Kubernetes 或其他平台接口需要掌握到什么深度。<\/li>\n<\/ul>\n<p>本节点只输出可供控制面消费的 readiness、容量、队列、transfer 和失败信号，不实现上述策略。<\/p>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>本节点可以复用 ToolGap-KV 中 lifecycle epoch、异步 completion fencing、兼容性检查、取消、fallback、cleanup 和 DecisionTrace 的思想，但两者不是同一个已交付系统：<\/p>\n<ul>\n<li>ToolGap-KV CT1-CT3 关注单引擎内 retain/offload/recompute 生命周期；<\/li>\n<li>本节点练习关注 Prefill 与 Decode 实例之间的 KV 交接；<\/li>\n<li>toy handoff 只能标记为 <code>simulated<\/code>；<\/li>\n<li>阅读 vLLM PD 源码不能标记为 ToolGap-KV <code>shipped<\/code>；<\/li>\n<li>只有项目真实拥有跨实例协议、集成测试和实验产物时，才能提升对应声明；<\/li>\n<li>不因概念相似就把 ToolGap-KV 主线扩大成分布式 KV 系统；<\/li>\n<li>同一份学习产物不能在 ToolGap-KV 和本节点中重复计算完成度。<\/li>\n<\/ul>\n<h3>明确不要求<\/h3>\n<ul>\n<li>实现 RDMA、NIXL、NCCL 或传输 kernel；<\/li>\n<li>精读 Mooncake、LMCache 等存储或传输引擎的内部实现；<\/li>\n<li>实现 Kubernetes/Ray 调度器、自动扩缩容或多租户平台；<\/li>\n<li>实现全局负载均衡、cache-aware routing 或集群准入控制；<\/li>\n<li>构建多节点容灾系统或大规模 benchmark 矩阵；<\/li>\n<li>把源码阅读、toy 状态机、fake transfer 或非等资源实验包装成项目已交付能力。<\/li>\n<\/ul>\n<h3>面试连续追问<\/h3>\n<ul>\n<li>Prefill 和 Decode 为什么适合使用不同的资源池？<\/li>\n<li>PD 分离为什么可能改善 TTFT，却同时让短请求变慢？<\/li>\n<li>KV transfer 与重新 Prefill 的成本分界怎样估算？<\/li>\n<li><code>transfer complete<\/code> 为什么不等于 Decode 可以直接开始？<\/li>\n<li>KV metadata 里缺少模型 revision、epoch 或 TP layout 会发生什么？<\/li>\n<li>Decode 在 admission 前必须验证哪些条件？<\/li>\n<li>Prefill 成功但 Decode Worker 失败时，应该重传、换实例还是重新 Prefill？<\/li>\n<li>cancel 与 completion 并发时怎样防止请求复活和资源泄漏？<\/li>\n<li>Prefill pool 与 Decode pool 比例失衡分别会出现什么队列症状？<\/li>\n<li>push、pull、共享存储三种模式的所有权和故障面有什么不同？<\/li>\n<li>怎样证明 TTFT 改善不是因为 PD 实验多用了一张 GPU？<\/li>\n<li>哪些指标能够区分 Prefill、transfer 和 Decode admission 瓶颈？<\/li>\n<li>为什么平均 GPU utilization 不能证明 PD 资源配比合理？<\/li>\n<li>vLLM 中 scheduler、connector、Block Manager 和 model runner 分别负责什么？<\/li>\n<li>ToolGap-KV 为什么当前不能声称支持跨实例 PD handoff？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一次通过的 P0 场景题，完整覆盖请求、KV、状态、所有权和指标流；<\/li>\n<li>一张固定版本 vLLM PD 数据路径与失败路径时序图；<\/li>\n<li>一份限时 <code>KVIdentity<\/code>、<code>HandoffRecord<\/code>、<code>HandoffController<\/code>、<code>FakeTransfer<\/code> 实现及八类测试；<\/li>\n<li>一份 fake-transfer 故障注入 trace，并明确标记为 <code>simulated<\/code>；<\/li>\n<li>有等资源双 GPU 条件时，完成 co-located/PD 三类 workload 对照并保留一个获益和一个退化案例；<\/li>\n<li>没有真实环境时保留实验缺口，不把模拟结果外推为框架集成或性能结论；<\/li>\n<li>一份开启或关闭 PD 的决策说明，能够根据 workload、队列、transfer 成本和 SLO 给出边界；<\/li>\n<li>所有 ToolGap-KV 关联表述保持 <code>roadmap<\/code>、<code>shipped<\/code>、<code>experimentally validated<\/code>、<code>simulated<\/code> 的证据边界。<\/li>\n<\/ul>",
    "search_text": "09 分布式 serving 数据路径与 pd 分离 p1；其中 prefill/decode 差异、kv 可信交接、失败回退和收益边界属于面试启动前的 p0 防守要求 已敲定数据路径主线和非传输内核边界，原理、源码、手写与实验均待完成 能沿请求、kv cache、状态、所有权和指标五条线解释一次 prefill/decode 分离服务，设计可信 kv handoff 与 decode admission，手写逻辑交接状态机，并用等资源实验判断 pd 分离的获益与退化条件。 聚焦 prefill/decode 数据路径、kv readiness、串联队列和失败回退；不实现 rdma/nixl/传输 kernel，也不把全局路由、cache-aware balancing、kubernetes/ray、弹性、多租户和 slo 控制面塞入本节点。 # 09｜分布式 serving 数据路径与 pd 分离详细知识列表 > 优先级：p1；包含面试启动前必须完成的 p0 防守子集 > > 当前状态：已敲定数据路径主线和非传输内核边界，原理、源码、手写与实验均待完成 > > 目标熟练度：原理 l3 / 源码 l2 / 手写 l2 / 实验 l2 > > 依赖：[kv cache 与内存系统](03-kv-cache-memory-system.md)、[llm 推理引擎与调度](04-llm-engine-scheduling.md)、[性能分析与实验方法](05-performance-analysis-and-gpu-literacy.md)、[多 gpu 模型执行与集合通信](08-multi-gpu-model-execution-and-collectives.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能沿以下链路解释一次请求，并同时画出数据流、状态流、资源所有权和指标流： ```text 请求进入 -> prefill 实例排队和执行 -> 产生 kv cache -> 建立 kv 身份与目标位置 -> 传输或发布 kv -> decode 等待可见性完成 -> 验证兼容性并接管 -> 逐 token decode -> 失败回退与资源清理 ``` 回答不能只画一条 prefill worker 到 decode worker 的传输箭头。必须解释谁拥有请求、谁拥有物理 kv、谁判断数据可读、decode 在什么条件下准入，以及失败、取消或晚到完成时怎样保持状态一致。 这是一个约 12-18 小时的 p1 节点。它回答“请求、kv cache 和执行阶段怎样跨 prefill/decode 实例移动”；后续控制面节点回答“请求应该选择哪个实例，以及整个集群怎样治理”。 ## p0 防守要求 开始目标岗位面试前，应能脱稿回答以下问题： 1. prefill 与 decode 在计算形态、显存访问、batch 方式和延迟目标上的差异； 2. 混部时，长 prefill 为什么可能干扰已经运行的 decode； 3. pd 分离解决的是资源隔离和独立扩缩容，为什么不等于天然提升总吞吐； 4. ttft 如何拆成路由、排队、prefill、kv transfer 和 decode admission； 5. tpot/itl 为什么主要受 decode 资源池、batch 和调度影响； 6. kv transfer 成本如何与重新 prefill 的成本比较； 7. kv 描述符至少需要哪些身份、范围、布局和兼容性信息； 8. 为什么 `transfer submitted`、`transfer complete` 与 `decode visible` 是不同状态； 9. 部分传输、超时、prefill/decode worker 失败、取消和晚到 completion 怎样处理； 10. prefill/decode 资源比例失衡为什么会形成新的串联排队瓶颈； 11. direct transfer、共享 kv 存储和中间传输服务各自增加哪些成本与故障面； 12. 哪些 workload 更可能获益，短请求或低负载为什么可能退化。 p0 验收是一道 15 分钟连续场景题：设计两组 prefill worker、四组 decode worker 的在线服务。回答必须覆盖请求流、kv 交接、decode 准入、资源所有权、失败回退、指标，以及关闭 pd 的条件；还要说明如何证明 ttft 改善没有牺牲 tpot、吞吐、goodput 或错误率。 p0 不要求解释 rdma、nixl 或 gpu direct 的底层实现。 ## p1 详细知识列表 ### 为什么分离 prefill 与 decode - prefill 对完整 prompt 做并行计算，decode 逐步生成 token，两者的计算粒度和访存行为不同； - prefill 更容易形成大矩阵计算，decode 的每步计算更小并反复读取权重与 kv； - 两者共用 gpu 时会竞争算力、带宽、显存容量、执行队列和 scheduler budget； - 分离后可以独立配置并扩缩 prefill/decode 资源池，并隔离部分尾延迟干扰； - 分离同时增加路由、排队、kv transfer、同步、目标容量预留和新故障面； - pd 分离、tensor/pipeline parallel 与 chunked prefill 解决的问题不同，可以组合但不能互相替代； - 判断收益时必须分别讨论 ttft、tpot/itl、e2e latency、吞吐、goodput、成本和错误率； - “资源隔离更强”“模型或并发终于放得下”和“相同资源下性能更高”是三种不同结论。 ### kv 怎样移动 - prefill worker 需要描述模型、请求、token/位置范围、layer/block、kv dtype/layout 和并行配置； - push 模式由来源主动发送，pull 模式由目标拉取，共享存储模式由双方通过共同位置发布与读取； - direct gpu path、host staging 和远端 kv 存储具有不同的拷贝次数、带宽、固定延迟和故障边界； - block、layer 或更大批次粒度会改变调度复杂度、内存峰值、流水化机会和失败恢复范围； - transfer 成本可用固定开销、payload 字节、可用带宽、并发竞争和排队时间建立近似模型； - 传输与 decode 是否能够重叠，取决于依赖范围、数据可见性、buffer 生命周期和实现支持； - 目标 kv 容量、传输队列和链路压力需要形成 backpressure，不能无限接收 handoff； - gpu direct、rdma 和 nixl 只要求理解接口位置、数据路径和 trade-off，不要求实现传输库或 kernel。 ### kv 怎样安全接管 - request/session/turn/lifecycle epoch 用于区分同名请求、重试与旧异步事件； - 模型 revision、tokenizer/template、rope、kv dtype/layout 和 tp 配置属于兼容性契约； - `prefilling`、`transfer_pending`、`transferring`、`ready`、`consumed`、`failed`、`cancelled` 表示不同逻辑事实； - 提交传输不代表完成，传输完成也不必然代表 decode 已经看到完整且兼容的数据； - completion 需要幂等；旧 epoch、重复、部分完成和取消后的晚到事件不能重新激活请求； - decode admission 必须等待身份、兼容性、完整性、可见性和目标容量条件同时满足； - retry、reroute、retransfer 与 recompute 的选择取决于剩余数据、排队、源/目标健康和重新 prefill 成本； - 请求逻辑所有权、handoff record 所有权和物理 kv block 所有权不是同一个概念； - terminal state 之后必须清理临时容量、句柄、等待者和陈旧记录； - 同一份 kv 在共享语义未明确允许时不能被两个 decode owner 非法接管。 ### 串联队列与 decode admission - 请求会依次经过 prefill queue、transfer queue 和 decode queue，任何一段都可能主导尾延迟； - prefill/decode pool 的配比需要考虑 prompt 长度、输出长度、并发和设备差异； - decode admission 既要等待 kv ready，也要确认目标能够持续承担后续 token 生成； - 只看平均利用率可能掩盖某一池的长队列和另一池的空闲； - 静态配比实现简单但难适应 workload 漂移，动态配比增加反馈延迟、迁移和稳定性问题； - backpressure、overload rejection 和 recompute fallback 会直接改变尾延迟和 goodput； - 本节点定义路由可消费的 readiness、容量、队列和失败信号，但不实现全局实例选择策略。 ### 怎样证明收益 - 将 ttft 分解为入口路由、各阶段排队、prefill、kv transfer 和 decode admission； - 同时记录 tpot/itl、e2e latency、request/token throughput 和 goodput； - 使用 p50/p95/p99、错误率、timeout、retry 和 fallback 率观察尾部与正确性； - 记录 prefill/decode utilization、队列长度、kv bytes、transfer 时间和有效带宽； - co-located 与 disaggregated 对照必须固定总 gpu 数、模型副本预算和 workload； - prompt/output 长度、并发、资源配比和拓扑都是实验变量，不能一次全部改变； - 至少保留一个获益案例和一个退化案例，并解释关闭 pd 的运行条件； - 一张 gpu 的 co-located 与两张 gpu 的 pd 只能作为容量或非等资源展示，不能直接声称 pd speedup。 ## 源码 l2 契约 ### 触发依据 pd 分离是目标岗位常见的分布式推理机制，面试会继续追问 kv connector、decode admission、失败处理和指标权衡。它同时满足真题/场景题价值与核心 serving 模块门槛，因此必须建立固定实现的源码路径和真实框架运行证据。 ### 主实现与阅读路径 主实现选择学习开始时固定 release/commit 的 vllm，沿一条完整数据路径阅读： ```text pd 配置与角色初始化 -> 请求进入 prefill 实例 -> prefill 调度与模型执行 -> kv connector / transfer metadata -> kv 保存或发送 -> decode 实例等待和加载 -> kv ready 后进入 decode -> completion / failure / cleanup ``` 读完必须回答： - prefill 与 decode 角色在哪里确定； - transfer metadata 由谁创建并包含什么； - scheduler 如何知道 kv 尚未 ready； - connector、block manager、scheduler 和 model runner 的职责边界； - completion 怎样进入控制流并改变 decode admission； - transfer 失败怎样阻塞、重试、回退或终止请求； - 本地 kv block identity 怎样映射到跨实例交接； - 哪些能力由 vllm 提供，哪些由 connector 或外部传输系统提供； - 取消或超时后，怎样阻止晚到 completion 泄漏资源或恢复旧请求。 源码笔记必须保存项目、release/commit、入口、关键对象、状态流、失败路径、已知版本差异和一张时序图。第二实现只从 sglang、dynamo、mooncake 等选择一个，用于回答一个明确的架构差异；没有具体 jd 或 trade-off 问题时不增加第二套源码。 ## 手写 l2 契约 ### 最小逻辑系统 从空文件实现一个不搬运真实 kv tensor 的逻辑交接系统： - `kvidentity`：模型、token/位置范围、kv dtype/layout 和并行配置； - `handoffrecord`：request、epoch、来源、目标、状态和资源句柄； - `handoffcontroller`：合法状态转换、decode admission、取消、fallback 和清理； - `faketransfer`：只模拟延迟、成功、失败和 completion，不实现网络。 状态主路径为： ```text prefilling -> transfer_pending -> transferring -> ready -> consumed 任意非终态 -> failed / cancelled -> recompute_fallback 或 cleaned ``` 必须通过以下测试： 1. 正常 prefill-transfer-decode 链路； 2. kv 未 `ready` 时拒绝 decode； 3. 重复 completion 保持幂等； 4. 旧 epoch completion 被拒绝； 5. metadata 不兼容时触发 recompute； 6. cancel 后晚到 completion 不能重新激活请求； 7. 失败后临时容量和句柄被清理； 8. 同一个 kv 不能被两个 decode owner 非法接管。 时间限制：45-60 分钟完成正常链路和基本状态机，再用 30-45 分钟补故障测试。通过标准是能够解释每个状态、所有者和不变量，而不是只写一个异步回调 demo。 不要求手写 rpc、多进程、共享内存、rdma、nixl、真实 gpu buffer、生产 connector 或传输引擎。 ## 实验 l2 契约 ### 逻辑正确性实验 使用可控 `faketransfer` 注入延迟、失败、重复完成、晚到完成和取消竞争，输出完整事件 trace。该结果只能标记为 `simulated`，不得用于证明真实 kv 传输性能、vllm 集成或 toolgap-kv 已交付能力。 ### 真实框架实验 在固定版本 vllm 上运行 co-located 与 disaggregated 对照，记录： - 模型 revision、dtype 和框架 commit； - gpu、互连、网络和软件环境； - prefill/decode 实例数和每实例并行配置； - prompt/output 长度、并发、请求数和测量窗口； - ttft 分解、tpot/itl 和 e2e latency； - request/token throughput、goodput 和 p50/p95； - kv transfer bytes、时间、失败与 fallback； - prefill/decode utilization 和各阶段队列时间。 实验矩阵保持有界：一个长 prompt 场景、一个短 prompt 或低负载场景、一个中高并发场景。至少保留一个 pd 获益案例和一个退化案例。 对照必须优先使用相同总 gpu 数、相同模型副本预算和相同 workload。如果 co-located 使用一张 gpu、pd 使用两张 gpu，差异只能标记为容量展示或非等资源比较，不能计算误导性 speedup。没有双 gpu 或可运行 connector 环境时，保留命令、配置、预期指标和待验证假设，实验维度继续标记为待完成。 ## 与后续控制面节点的边界 本节点回答“请求与 kv 怎样跨 prefill/decode 实例安全移动”。后续“serving 路由与平台控制面”回答： - 请求应该选择哪个 prefill/decode 实例； - cache locality 与 load balance 怎样权衡； - admission、backpressure、health check、retry 和 stale state 怎样在集群层治理； - 弹性、资源编排、多租户、配额和 slo 怎样落地； - ray、kubernetes 或其他平台接口需要掌握到什么深度。 本节点只输出可供控制面消费的 readiness、容量、队列、transfer 和失败信号，不实现上述策略。 ## 与 toolgap-kv 的边界 本节点可以复用 toolgap-kv 中 lifecycle epoch、异步 completion fencing、兼容性检查、取消、fallback、cleanup 和 decisiontrace 的思想，但两者不是同一个已交付系统： - toolgap-kv ct1-ct3 关注单引擎内 retain/offload/recompute 生命周期； - 本节点练习关注 prefill 与 decode 实例之间的 kv 交接； - toy handoff 只能标记为 `simulated`； - 阅读 vllm pd 源码不能标记为 toolgap-kv `shipped`； - 只有项目真实拥有跨实例协议、集成测试和实验产物时，才能提升对应声明； - 不因概念相似就把 toolgap-kv 主线扩大成分布式 kv 系统； - 同一份学习产物不能在 toolgap-kv 和本节点中重复计算完成度。 ## 明确不要求 - 实现 rdma、nixl、nccl 或传输 kernel； - 精读 mooncake、lmcache 等存储或传输引擎的内部实现； - 实现 kubernetes/ray 调度器、自动扩缩容或多租户平台； - 实现全局负载均衡、cache-aware routing 或集群准入控制； - 构建多节点容灾系统或大规模 benchmark 矩阵； - 把源码阅读、toy 状态机、fake transfer 或非等资源实验包装成项目已交付能力。 ## 面试连续追问 - prefill 和 decode 为什么适合使用不同的资源池？ - pd 分离为什么可能改善 ttft，却同时让短请求变慢？ - kv transfer 与重新 prefill 的成本分界怎样估算？ - `transfer complete` 为什么不等于 decode 可以直接开始？ - kv metadata 里缺少模型 revision、epoch 或 tp layout 会发生什么？ - decode 在 admission 前必须验证哪些条件？ - prefill 成功但 decode worker 失败时，应该重传、换实例还是重新 prefill？ - cancel 与 completion 并发时怎样防止请求复活和资源泄漏？ - prefill pool 与 decode pool 比例失衡分别会出现什么队列症状？ - push、pull、共享存储三种模式的所有权和故障面有什么不同？ - 怎样证明 ttft 改善不是因为 pd 实验多用了一张 gpu？ - 哪些指标能够区分 prefill、transfer 和 decode admission 瓶颈？ - 为什么平均 gpu utilization 不能证明 pd 资源配比合理？ - vllm 中 scheduler、connector、block manager 和 model runner 分别负责什么？ - toolgap-kv 为什么当前不能声称支持跨实例 pd handoff？ ## 完成证据 - 一次通过的 p0 场景题，完整覆盖请求、kv、状态、所有权和指标流； - 一张固定版本 vllm pd 数据路径与失败路径时序图； - 一份限时 `kvidentity`、`handoffrecord`、`handoffcontroller`、`faketransfer` 实现及八类测试； - 一份 fake-transfer 故障注入 trace，并明确标记为 `simulated`； - 有等资源双 gpu 条件时，完成 co-located/pd 三类 workload 对照并保留一个获益和一个退化案例； - 没有真实环境时保留实验缺口，不把模拟结果外推为框架集成或性能结论； - 一份开启或关闭 pd 的决策说明，能够根据 workload、队列、transfer 成本和 slo 给出边界； - 所有 toolgap-kv 关联表述保持 `roadmap`、`shipped`、`experimentally validated`、`simulated` 的证据边界。 "

    "detail_html": "<h2>10｜Serving 路由与平台控制面详细知识列表<\/h2>\n<blockquote>优先级：P1；包含面试启动前必须完成的 P0 防守子集 当前状态：已敲定源码主线和减负范围，原理、源码与手写待完成；实验维度不独立要求 目标熟练度：原理 L3 / 源码 L2 / 手写 L2 / 实验 L0 依赖：<a href=\"topics/03-kv-cache-memory-system.md\">KV Cache 与内存系统<\/a>、<a href=\"topics/04-llm-engine-scheduling.md\">LLM 推理引擎与调度<\/a>、<a href=\"topics/05-performance-analysis-and-gpu-literacy.md\">性能分析与实验方法<\/a>、<a href=\"topics/09-disaggregated-serving-data-path-and-pd.md\">分布式 Serving 数据路径与 PD 分离<\/a> 返回：<a href=\"AI_INFRA_INTERVIEW_READINESS.md\">AI Infra 面试就绪知识地图索引<\/a><\/blockquote>\n<h3>能力结果<\/h3>\n<p>完成后应能解释控制面怎样根据请求特征、Endpoint 状态、KV locality 和 SLO 选择执行实例，并在状态不完整、过载和故障条件下保持可解释、可降级的决策：<\/p>\n<pre><code class=\"language-text\">请求特征 + Endpoint 状态 + KV locality + SLO\n                    ↓\n        compatibility / health / freshness\n                    ↓\n          admission / overload 判断\n                    ↓\n    cache-aware + load-aware endpoint scoring\n                    ↓\n       endpoint selection / retry / fencing\n                    ↓\n              DecisionTrace<\/code><\/pre>\n<p>回答必须说明状态来源与新鲜度、硬过滤条件、软评分因子、无合法候选时的 fail-closed 行为，以及为什么不能只优化 cache hit 或平均 TTFT。<\/p>\n<p>这是一个约 6-10 小时的 P1 节点。实践主线是读通真实 Router 源码和手写 endpoint selection 核心，不建设第二套 Router 项目，也不设置独立性能实验。<\/p>\n<h3>与前序节点的 admission 边界<\/h3>\n<p>三个 admission 层次共享容量和状态信号，但决策所有权不同：<\/p>\n<ol>\n<li><a href=\"topics/04-llm-engine-scheduling.md\">LLM 推理引擎与调度<\/a> 负责单引擎内部 token/KV budget、batch 和 preemption；<\/li>\n<li><a href=\"topics/09-disaggregated-serving-data-path-and-pd.md\">分布式 Serving 数据路径与 PD 分离<\/a> 负责 KV ready 后 Decode 是否能够安全接管；<\/li>\n<li>本节点负责集群是否接收请求、哪些 Endpoint 合法、最终选择哪个 Endpoint，以及怎样治理过载和 retry。<\/li>\n<\/ol>\n<p>不能把三层 admission 都塞进一个 scheduler，也不能让 Router 直接拥有 engine block allocation 或 PD handoff 完成状态机。<\/p>\n<h3>P0 防守要求<\/h3>\n<p>开始目标岗位面试前，应能脱稿回答：<\/p>\n<ol>\n<li>Router、单引擎 scheduler 和集群 control plane 的职责边界；<\/li>\n<li>Round-robin、least-request、Power-of-Two、consistent hashing 与 prefix/cache-aware routing 的适用条件；<\/li>\n<li>缓存命中最高的实例为什么不一定是最佳实例；<\/li>\n<li>request-history 推断 locality 与 KV event/index 精确状态的成本差异；<\/li>\n<li>health 为什么要区分 liveness、readiness、overloaded 和 draining；<\/li>\n<li>事件延迟、丢失、乱序、重复和重启恢复为什么会让 Router 相信错误状态；<\/li>\n<li>admission、backpressure、排队和 overload rejection 的关系；<\/li>\n<li>retry 为什么可能造成重复执行、缓存污染和负载放大；<\/li>\n<li>request ID、attempt、epoch 和幂等语义怎样约束 retry；<\/li>\n<li>为什么只优化平均 TTFT 或 cache hit rate 可能损害 p95/p99、TPOT 和 Goodput@SLO；<\/li>\n<li>autoscaling 为什么不能只观察 GPU utilization；<\/li>\n<li>扩容延迟、模型加载、KV warming 和测量滞后为什么会形成不稳定反馈。<\/li>\n<\/ol>\n<p>P0 验收是一道 15 分钟连续场景题：<\/p>\n<blockquote>有 8 个 vLLM 实例，部分实例拥有请求前缀 KV，但队列更长；KV 状态事件存在 500 ms 延迟，同时一个实例正在 draining。设计路由、准入、重试和降级策略，并说明状态所有者、硬过滤条件、评分因子、fallback、指标和关闭 cache-aware 策略的条件。<\/blockquote>\n<p>回答不能只给出一个加权公式。必须先区分 eligibility 与 preference，并覆盖陈旧状态、无合法 Endpoint、retry amplification 和 locality 热点。<\/p>\n<h3>P1 详细知识列表<\/h3>\n<h4>路由策略与决策分层<\/h4>\n<ul>\n<li>Round-robin 状态成本低，但不感知负载和 KV locality；<\/li>\n<li>random 与 Power-of-Two 用较低状态成本换取不同程度的负载均衡；<\/li>\n<li>least-request/least-loaded 依赖足够新鲜且可比较的负载状态；<\/li>\n<li>consistent hashing/session affinity 可以增加会话或前缀复用，但可能制造热点；<\/li>\n<li>prefix/cache-aware routing 根据已有 KV 减少重复 Prefill，但要支付 locality 状态维护成本；<\/li>\n<li>eligibility 是 model/revision/parallel compatibility、health、freshness、quota 等硬约束；<\/li>\n<li>preference 是 locality、queue、capacity、cost 和 SLO 等软评分；<\/li>\n<li>硬过滤必须先于软评分，不能用高 locality 覆盖版本不兼容或实例不可读；<\/li>\n<li>score 应能拆成各因子并写入 DecisionTrace，避免只输出不可解释的总分；<\/li>\n<li>没有合法候选时应 reject、defer 或执行明确定义的 fallback，不能随意选一个实例。<\/li>\n<\/ul>\n<h4>状态来源、freshness 与 reconciliation<\/h4>\n<ul>\n<li>Endpoint discovery 只提供成员关系，不代表实例已经 ready；<\/li>\n<li>health、inflight/queue、KV capacity、model revision、TP config 和 locality 可能来自不同数据源；<\/li>\n<li>pull metrics、request history 和事件流具有不同的成本、时效与一致性；<\/li>\n<li>事件驱动 KV index 必须面对 duplicate、reorder、loss、restart 和 propagation lag；<\/li>\n<li>observed time、source epoch、worker incarnation 和 confidence 可以限制陈旧事实的影响；<\/li>\n<li>状态超过 freshness budget 时应降权或失效，不能继续假装它精确；<\/li>\n<li>reconciliation 用于重新对账事件索引与 Endpoint 当前状态；<\/li>\n<li>Router 通常只有观测状态，而没有强一致全局真相，因此不确定时应保守降级。<\/li>\n<\/ul>\n<h4>Cache locality 与负载冲突<\/h4>\n<ul>\n<li>KV 命中可以减少 Prefill，但长队列或容量紧张可能抵消收益；<\/li>\n<li>cache hit rate、cached token 数和真正避免的 Prefill 时间不是同一个指标；<\/li>\n<li>高复用前缀可能导致 affinity 热点，需要候选扩散和负载上限；<\/li>\n<li>短 Prompt、低复用或低负载时，维护精确 locality 的成本可能没有回报；<\/li>\n<li>queue length 需要结合请求阶段、Prompt/Output 长度和并行配置解释；<\/li>\n<li>routing score 只能使用请求进入时已经存在的信号，不能泄漏事后结果；<\/li>\n<li>tuned simple baseline 应优先于复杂策略，复杂状态没有稳定收益时应退回基线。<\/li>\n<\/ul>\n<h4>Admission、backpressure 与 retry<\/h4>\n<ul>\n<li>集群级 admission 判断是否存在满足模型、容量、健康和 SLO 的候选；<\/li>\n<li>backpressure 应从 Endpoint、Router 向上游入口传播，不能只在最底层无限排队；<\/li>\n<li>bounded queue、reject、defer、降级模型和 fallback 具有不同的调用方语义；<\/li>\n<li>overload 状态需要滞回或稳定窗口，避免 Endpoint 在 ready/not-ready 间抖动；<\/li>\n<li>retry 必须限制次数、总 deadline 和可重试错误类型；<\/li>\n<li>连接失败、请求未开始、部分输出和已执行但响应丢失具有不同的 retry 安全性；<\/li>\n<li>circuit breaker 隔离持续失败 Endpoint，half-open 探测也需要流量限制；<\/li>\n<li>draining 实例不接收新请求，但已有请求、KV 和连接需要明确完成或迁移规则；<\/li>\n<li>retry、reroute 和 recompute 都会消耗资源，错误恢复可能进一步放大过载。<\/li>\n<\/ul>\n<h4>SLO、观测与控制回路<\/h4>\n<ul>\n<li>分别理解 TTFT、TPOT/ITL、E2E latency、request/token throughput 和 Goodput@SLO；<\/li>\n<li>p50 不能替代 p95/p99，cache hit 不能替代端到端收益；<\/li>\n<li>Router 侧关注 routing latency、candidate count、filter reason、score breakdown、retry 和 rejection；<\/li>\n<li>Endpoint 侧关注 queue、inflight、KV utilization、model/role 和 health transition；<\/li>\n<li>DecisionTrace 保存输入状态版本、过滤理由、分数构成和最终动作；<\/li>\n<li>autoscaling 信号可以来自队列、arrival rate、token demand、SLO miss 和预测负载，而不只是 GPU utilization；<\/li>\n<li>冷启动、模型加载、topology placement 和 KV warming 会造成动作到效果的延迟；<\/li>\n<li>控制周期过短、状态滞后或同时修改多个变量可能产生振荡；<\/li>\n<li>autoscaling 只要求场景设计，不进入实现、源码或实验验收。<\/li>\n<\/ul>\n<h3>平台能力的非对称深度<\/h3>\n<h4>P1 场景能力<\/h4>\n<p>要求能够设计并解释：<\/p>\n<ul>\n<li>Endpoint discovery、状态汇聚和 freshness；<\/li>\n<li>worker failure、draining、灰度发布和版本兼容；<\/li>\n<li>autoscaling 的输入信号、冷启动和稳定性；<\/li>\n<li>topology、模型版本和 TP 配置约束下的 placement；<\/li>\n<li>多租户 namespace、quota、公平性和 cache isolation；<\/li>\n<li>路由 DecisionTrace、SLO dashboard 和故障归因。<\/li>\n<\/ul>\n<h4>P2 了解即可<\/h4>\n<ul>\n<li>Kubernetes CRD/controller reconciliation；<\/li>\n<li>Gateway API Inference Extension 的 InferencePool 与 Endpoint Picker；<\/li>\n<li>Ray Serve、AIBrix、llm-d 等平台的整体定位；<\/li>\n<li>leader election、etcd、一致性协议和跨地域容灾。<\/li>\n<\/ul>\n<p>这些内容用于回答平台场景题和识别系统边界，不产生源码、手写或实验验收要求。<\/p>\n<h3>源码 L2 契约<\/h3>\n<h4>主实现<\/h4>\n<p>固定学习开始时的 <a href=\"https://github.com/vllm-project/router\" target=\"_blank\" rel=\"noopener noreferrer\">vLLM Router<\/a> release/commit，沿以下路径阅读：<\/p>\n<pre><code class=\"language-text\">request parsing\n  -&gt; worker discovery / endpoint state\n  -&gt; candidate eligibility\n  -&gt; routing policy / scoring\n  -&gt; endpoint selection\n  -&gt; request forwarding\n  -&gt; retry / circuit breaker\n  -&gt; metrics and state update<\/code><\/pre>\n<p>读完必须回答：<\/p>\n<ul>\n<li>请求的 model、session/prefix 和 request ID 在哪里进入路由；<\/li>\n<li>worker/Endpoint 状态从哪里建立并更新；<\/li>\n<li>policy 接口的输入、输出和状态依赖是什么；<\/li>\n<li>Round-robin、Power-of-Two、consistent hashing 和 cache-aware 的选择路径；<\/li>\n<li>eligibility filter 与 ranking/scoring 是否分离；<\/li>\n<li>locality 与负载信号怎样组合或冲突；<\/li>\n<li>unhealthy、draining 或 circuit-open Endpoint 怎样被排除；<\/li>\n<li>retry 在哪些错误和请求阶段发生，怎样限制放大；<\/li>\n<li>metrics 和请求完成事件怎样更新路由状态；<\/li>\n<li>哪些职责属于 Router，哪些属于 vLLM engine、service discovery 或外部平台。<\/li>\n<\/ul>\n<p>源码笔记必须保存项目、release/commit、入口、关键对象、控制流、失败路径、已知版本差异和一张请求时序图。<\/p>\n<p>vLLM Router 核心包含 Rust，但不把 Rust、Tokio/async runtime、HTTP proxy 和所有部署集成扩展成新的学习节点。目标是完整讲清关键链路，而不是读遍整个仓库。<\/p>\n<h4>条件式架构对比<\/h4>\n<p>第二实现只阅读 <a href=\"https://github.com/llm-d/llm-d-kv-cache\" target=\"_blank\" rel=\"noopener noreferrer\">llm-d KV Cache Indexer<\/a> 的一个差异：vLLM KV events 怎样维护近实时 block locality，以及 locality scorer 怎样向 scheduler 输出每个 Endpoint 的命中分数。<\/p>\n<p>对比需要回答：<\/p>\n<ul>\n<li>request-history 推断和事件驱动精确索引分别需要什么状态；<\/li>\n<li>event loss、reorder、duplicate、restart 和 lag 怎样造成 false-locality；<\/li>\n<li>locality score 为什么仍需与 load-aware score 组合；<\/li>\n<li>精确索引的维护成本在什么 workload 下不值得。<\/li>\n<\/ul>\n<p>不精读完整 llm-d/Kubernetes 栈。<a href=\"https://gateway-api-inference-extension.sigs.k8s.io/api-types/inferencepool/\" target=\"_blank\" rel=\"noopener noreferrer\">Gateway API Inference Extension 的 InferencePool<\/a> 只用于理解 Endpoint Picker 和平台资源接口的边界。<\/p>\n<h3>手写 L2 契约<\/h3>\n<h4>最小核心代码<\/h4>\n<p>从空文件实现一个 Python 单进程核心函数：<\/p>\n<pre><code class=\"language-python\">choose_endpoint(request, endpoints) -&gt; RoutingDecision<\/code><\/pre>\n<p>最小数据对象：<\/p>\n<ul>\n<li><code>RequestContext<\/code>：request ID、model/revision、prefix/locality key、tenant 和 deadline；<\/li>\n<li><code>EndpointState<\/code>：Endpoint ID、model/revision、health、draining、observed time/epoch、queue/load、KV locality 和 capacity；<\/li>\n<li><code>RoutingDecision<\/code>：候选集、过滤原因、score breakdown、最终 Endpoint 或 reject/fallback。<\/li>\n<\/ul>\n<p>核心逻辑只包含：<\/p>\n<ol>\n<li>model/revision/parallel compatibility 过滤；<\/li>\n<li>unhealthy、not-ready 和 draining 过滤；<\/li>\n<li>state freshness/epoch 检查；<\/li>\n<li>cache locality 与 queue/load 的可解释综合评分；<\/li>\n<li>overload 或无合法 Endpoint 时 fail closed；<\/li>\n<li>输出每个候选的过滤理由、分数构成和最终选择。<\/li>\n<\/ol>\n<p>实现控制在约 100-150 行，30-45 分钟内完成。它是面试可讲清的核心大意代码，不是生产 Router。<\/p>\n<h4>五个表驱动测试<\/h4>\n<ol>\n<li>高 locality 与短 queue 冲突时，按冻结的评分规则选择；<\/li>\n<li>locality/Endpoint 状态过期后不能继续作为精确事实使用；<\/li>\n<li>unhealthy 或 draining Endpoint 被硬过滤；<\/li>\n<li>全部 Endpoint 过载时 fail closed；<\/li>\n<li>没有 model/revision 兼容实例时拒绝请求。<\/li>\n<\/ol>\n<p>如果面试只要求伪代码，可以先写数据结构、不变量和控制流；复习验收仍要求五个本地测试通过，防止代码只在正常路径成立。<\/p>\n<h4>不要求手写<\/h4>\n<ul>\n<li>HTTP proxy、流式转发和连接池；<\/li>\n<li>服务发现、分布式状态存储和事件 index；<\/li>\n<li>retry/circuit breaker 完整状态机；<\/li>\n<li>autoscaler、Kubernetes controller 或 Ray scheduler；<\/li>\n<li>生产认证、限流、配额和多租户控制面；<\/li>\n<li>learned routing 或预测模型。<\/li>\n<\/ul>\n<h3>实验 L0 契约<\/h3>\n<p>本节点不要求独立 trace simulator、workload replay、多实例 vLLM 实验或 Router 性能 benchmark。<\/p>\n<ul>\n<li>源码项目自带 example 可以运行，用于定位调用链，但不阻塞节点完成；<\/li>\n<li>mock Endpoint 只能辅助验证控制流，标记为 <code>simulated<\/code>；<\/li>\n<li>五个表驱动测试属于手写正确性验收，不提升实验等级；<\/li>\n<li>没有固定真实 workload、Endpoint 和测量产物时，不声称 TTFT、TPOT、hit rate 或 Goodput 改善；<\/li>\n<li>如果未来 JD 明确要求 Router/平台性能工程，再单独提升实验等级，不提前占用当前复习时间。<\/li>\n<\/ul>\n<h3>与 ToolGap-KV 的边界<\/h3>\n<p>本节点可以复用 ToolGap-KV 中 lifecycle epoch、freshness、compatibility、DecisionTrace、fail-closed 和 stale completion 防护的思想，也可以理解未来 retain/offload/recompute 怎样向 Router 暴露 locality/capacity 信号。<\/p>\n<p>但当前能力状态必须保持：<\/p>\n<ul>\n<li>ToolGap-KV CT1-CT3 是单引擎生命周期系统；<\/li>\n<li>router/control plane 仍是 <code>roadmap<\/code>；<\/li>\n<li>手写核心 Router 只能标记为 <code>simulated<\/code> 学习产物；<\/li>\n<li>阅读 vLLM Router 或 llm-d 不能标记为 ToolGap-KV <code>shipped<\/code>；<\/li>\n<li>不把 Topic 10 变成 ToolGap-KV 的新功能或 CT1-CT3 完成要求；<\/li>\n<li>只有真实多实例接口、集成测试和实验产物存在后，才能提升对应声明。<\/li>\n<\/ul>\n<h3>明确不要求<\/h3>\n<ul>\n<li>trace-driven simulator 和多策略 workload replay；<\/li>\n<li>两个以上真实 vLLM 实例及 TTFT/TPOT/Goodput 对照；<\/li>\n<li>Kubernetes controller、scheduler 或 autoscaler 实现；<\/li>\n<li>Ray Serve 内部调度源码；<\/li>\n<li>etcd、Raft、leader election 和分布式一致性实现；<\/li>\n<li>Envoy/HTTP proxy 数据面；<\/li>\n<li>生产级认证、计费、服务发现和跨地域容灾；<\/li>\n<li>learned router、强化学习或复杂预测模型；<\/li>\n<li>大规模多集群 benchmark；<\/li>\n<li>把源码阅读、example 或表驱动测试包装成 ToolGap-KV 已交付平台能力。<\/li>\n<\/ul>\n<h3>面试连续追问<\/h3>\n<ul>\n<li>Router、engine scheduler 和 control plane 分别拥有什么状态与决策权？<\/li>\n<li>Round-robin、Power-of-Two、consistent hashing 和 cache-aware routing 各自依赖什么状态？<\/li>\n<li>为什么 cache locality 最高的 Endpoint 不一定应该被选中？<\/li>\n<li>eligibility filter 为什么必须先于 score ranking？<\/li>\n<li>request-history inferred locality 与 KVEvents 精确索引怎样权衡？<\/li>\n<li>locality event 延迟 500 ms 时应怎样降级？<\/li>\n<li>liveness、readiness、overloaded 和 draining 有什么区别？<\/li>\n<li>所有 Endpoint 都过载时，为什么不能继续选队列最短的一个？<\/li>\n<li>retry 在流式生成已经输出部分 token 后为什么危险？<\/li>\n<li>circuit breaker 的 open 与 half-open 状态分别解决什么？<\/li>\n<li>cache hit rate 提高为什么可能没有改善 TTFT 或 Goodput？<\/li>\n<li>autoscaling 为什么不能只看 GPU utilization？<\/li>\n<li>模型加载和 KV warming 怎样影响 autoscaling 控制周期？<\/li>\n<li>vLLM Router 在哪里建立 Endpoint 状态、执行策略并处理 retry？<\/li>\n<li>llm-d 精确 locality index 怎样受到 event loss、reorder 和 restart 的影响？<\/li>\n<li>Kubernetes InferencePool 与 Endpoint Picker 的边界是什么？<\/li>\n<li>ToolGap-KV 为什么当前不能声称拥有 router/control-plane 能力？<\/li>\n<\/ul>\n<h3>完成证据<\/h3>\n<ul>\n<li>一次通过的 15 分钟 P0 场景题；<\/li>\n<li>一张固定版本 vLLM Router 请求链路和失败路径图；<\/li>\n<li>一份源码笔记，能够回答主源码路径的十类问题；<\/li>\n<li>一份 request-history 与 llm-d KVEvents/index 的架构差异说明；<\/li>\n<li>一份 30-45 分钟完成的 <code>choose_endpoint<\/code> 核心实现；<\/li>\n<li>五个表驱动测试全部通过；<\/li>\n<li>一份平台场景说明，覆盖 health、draining、retry、backpressure、autoscaling lag 和多租户边界；<\/li>\n<li>明确记录实验维度为 L0，不用 mock、example 或纸面指标冒充真实性能证据；<\/li>\n<li>所有 ToolGap-KV 关联表述保持 <code>roadmap<\/code>、<code>shipped<\/code>、<code>experimentally validated<\/code>、<code>simulated<\/code> 的证据边界。<\/li>\n<\/ul>",
    "search_text": "10 serving 路由与平台控制面 p1；其中路由策略边界、locality-load 权衡、健康与 freshness、集群准入、背压、retry 和 slo 属于面试启动前的 p0 防守要求 已敲定源码主线和减负范围，原理、源码与手写待完成；实验维度不独立要求 能根据请求、endpoint、kv locality 和 slo 解释集群路由决策，区分硬过滤与软评分，沿固定版本 vllm router 讲清完整链路，并限时手写可解释的 `choose_endpoint` 核心代码。 聚焦 endpoint eligibility、cache-aware + load-aware selection、admission/backpressure、health/freshness、retry 和 decisiontrace；不要求独立模拟器、多实例 vllm 实验、性能 benchmark、kubernetes/ray controller、autoscaler 或生产控制面实现。 # 10｜serving 路由与平台控制面详细知识列表 > 优先级：p1；包含面试启动前必须完成的 p0 防守子集 > > 当前状态：已敲定源码主线和减负范围，原理、源码与手写待完成；实验维度不独立要求 > > 目标熟练度：原理 l3 / 源码 l2 / 手写 l2 / 实验 l0 > > 依赖：[kv cache 与内存系统](03-kv-cache-memory-system.md)、[llm 推理引擎与调度](04-llm-engine-scheduling.md)、[性能分析与实验方法](05-performance-analysis-and-gpu-literacy.md)、[分布式 serving 数据路径与 pd 分离](09-disaggregated-serving-data-path-and-pd.md) > > 返回：[ai infra 面试就绪知识地图索引](../ai_infra_interview_readiness.md) ## 能力结果 完成后应能解释控制面怎样根据请求特征、endpoint 状态、kv locality 和 slo 选择执行实例，并在状态不完整、过载和故障条件下保持可解释、可降级的决策： ```text 请求特征 + endpoint 状态 + kv locality + slo ↓ compatibility / health / freshness ↓ admission / overload 判断 ↓ cache-aware + load-aware endpoint scoring ↓ endpoint selection / retry / fencing ↓ decisiontrace ``` 回答必须说明状态来源与新鲜度、硬过滤条件、软评分因子、无合法候选时的 fail-closed 行为，以及为什么不能只优化 cache hit 或平均 ttft。 这是一个约 6-10 小时的 p1 节点。实践主线是读通真实 router 源码和手写 endpoint selection 核心，不建设第二套 router 项目，也不设置独立性能实验。 ## 与前序节点的 admission 边界 三个 admission 层次共享容量和状态信号，但决策所有权不同： 1. [llm 推理引擎与调度](04-llm-engine-scheduling.md) 负责单引擎内部 token/kv budget、batch 和 preemption； 2. [分布式 serving 数据路径与 pd 分离](09-disaggregated-serving-data-path-and-pd.md) 负责 kv ready 后 decode 是否能够安全接管； 3. 本节点负责集群是否接收请求、哪些 endpoint 合法、最终选择哪个 endpoint，以及怎样治理过载和 retry。 不能把三层 admission 都塞进一个 scheduler，也不能让 router 直接拥有 engine block allocation 或 pd handoff 完成状态机。 ## p0 防守要求 开始目标岗位面试前，应能脱稿回答： 1. router、单引擎 scheduler 和集群 control plane 的职责边界； 2. round-robin、least-request、power-of-two、consistent hashing 与 prefix/cache-aware routing 的适用条件； 3. 缓存命中最高的实例为什么不一定是最佳实例； 4. request-history 推断 locality 与 kv event/index 精确状态的成本差异； 5. health 为什么要区分 liveness、readiness、overloaded 和 draining； 6. 事件延迟、丢失、乱序、重复和重启恢复为什么会让 router 相信错误状态； 7. admission、backpressure、排队和 overload rejection 的关系； 8. retry 为什么可能造成重复执行、缓存污染和负载放大； 9. request id、attempt、epoch 和幂等语义怎样约束 retry； 10. 为什么只优化平均 ttft 或 cache hit rate 可能损害 p95/p99、tpot 和 goodput@slo； 11. autoscaling 为什么不能只观察 gpu utilization； 12. 扩容延迟、模型加载、kv warming 和测量滞后为什么会形成不稳定反馈。 p0 验收是一道 15 分钟连续场景题： > 有 8 个 vllm 实例，部分实例拥有请求前缀 kv，但队列更长；kv 状态事件存在 500 ms 延迟，同时一个实例正在 draining。设计路由、准入、重试和降级策略，并说明状态所有者、硬过滤条件、评分因子、fallback、指标和关闭 cache-aware 策略的条件。 回答不能只给出一个加权公式。必须先区分 eligibility 与 preference，并覆盖陈旧状态、无合法 endpoint、retry amplification 和 locality 热点。 ## p1 详细知识列表 ### 路由策略与决策分层 - round-robin 状态成本低，但不感知负载和 kv locality； - random 与 power-of-two 用较低状态成本换取不同程度的负载均衡； - least-request/least-loaded 依赖足够新鲜且可比较的负载状态； - consistent hashing/session affinity 可以增加会话或前缀复用，但可能制造热点； - prefix/cache-aware routing 根据已有 kv 减少重复 prefill，但要支付 locality 状态维护成本； - eligibility 是 model/revision/parallel compatibility、health、freshness、quota 等硬约束； - preference 是 locality、queue、capacity、cost 和 slo 等软评分； - 硬过滤必须先于软评分，不能用高 locality 覆盖版本不兼容或实例不可读； - score 应能拆成各因子并写入 decisiontrace，避免只输出不可解释的总分； - 没有合法候选时应 reject、defer 或执行明确定义的 fallback，不能随意选一个实例。 ### 状态来源、freshness 与 reconciliation - endpoint discovery 只提供成员关系，不代表实例已经 ready； - health、inflight/queue、kv capacity、model revision、tp config 和 locality 可能来自不同数据源； - pull metrics、request history 和事件流具有不同的成本、时效与一致性； - 事件驱动 kv index 必须面对 duplicate、reorder、loss、restart 和 propagation lag； - observed time、source epoch、worker incarnation 和 confidence 可以限制陈旧事实的影响； - 状态超过 freshness budget 时应降权或失效，不能继续假装它精确； - reconciliation 用于重新对账事件索引与 endpoint 当前状态； - router 通常只有观测状态，而没有强一致全局真相，因此不确定时应保守降级。 ### cache locality 与负载冲突 - kv 命中可以减少 prefill，但长队列或容量紧张可能抵消收益； - cache hit rate、cached token 数和真正避免的 prefill 时间不是同一个指标； - 高复用前缀可能导致 affinity 热点，需要候选扩散和负载上限； - 短 prompt、低复用或低负载时，维护精确 locality 的成本可能没有回报； - queue length 需要结合请求阶段、prompt/output 长度和并行配置解释； - routing score 只能使用请求进入时已经存在的信号，不能泄漏事后结果； - tuned simple baseline 应优先于复杂策略，复杂状态没有稳定收益时应退回基线。 ### admission、backpressure 与 retry - 集群级 admission 判断是否存在满足模型、容量、健康和 slo 的候选； - backpressure 应从 endpoint、router 向上游入口传播，不能只在最底层无限排队； - bounded queue、reject、defer、降级模型和 fallback 具有不同的调用方语义； - overload 状态需要滞回或稳定窗口，避免 endpoint 在 ready/not-ready 间抖动； - retry 必须限制次数、总 deadline 和可重试错误类型； - 连接失败、请求未开始、部分输出和已执行但响应丢失具有不同的 retry 安全性； - circuit breaker 隔离持续失败 endpoint，half-open 探测也需要流量限制； - draining 实例不接收新请求，但已有请求、kv 和连接需要明确完成或迁移规则； - retry、reroute 和 recompute 都会消耗资源，错误恢复可能进一步放大过载。 ### slo、观测与控制回路 - 分别理解 ttft、tpot/itl、e2e latency、request/token throughput 和 goodput@slo； - p50 不能替代 p95/p99，cache hit 不能替代端到端收益； - router 侧关注 routing latency、candidate count、filter reason、score breakdown、retry 和 rejection； - endpoint 侧关注 queue、inflight、kv utilization、model/role 和 health transition； - decisiontrace 保存输入状态版本、过滤理由、分数构成和最终动作； - autoscaling 信号可以来自队列、arrival rate、token demand、slo miss 和预测负载，而不只是 gpu utilization； - 冷启动、模型加载、topology placement 和 kv warming 会造成动作到效果的延迟； - 控制周期过短、状态滞后或同时修改多个变量可能产生振荡； - autoscaling 只要求场景设计，不进入实现、源码或实验验收。 ## 平台能力的非对称深度 ### p1 场景能力 要求能够设计并解释： - endpoint discovery、状态汇聚和 freshness； - worker failure、draining、灰度发布和版本兼容； - autoscaling 的输入信号、冷启动和稳定性； - topology、模型版本和 tp 配置约束下的 placement； - 多租户 namespace、quota、公平性和 cache isolation； - 路由 decisiontrace、slo dashboard 和故障归因。 ### p2 了解即可 - kubernetes crd/controller reconciliation； - gateway api inference extension 的 inferencepool 与 endpoint picker； - ray serve、aibrix、llm-d 等平台的整体定位； - leader election、etcd、一致性协议和跨地域容灾。 这些内容用于回答平台场景题和识别系统边界，不产生源码、手写或实验验收要求。 ## 源码 l2 契约 ### 主实现 固定学习开始时的 [vllm router](https://github.com/vllm-project/router) release/commit，沿以下路径阅读： ```text request parsing -> worker discovery / endpoint state -> candidate eligibility -> routing policy / scoring -> endpoint selection -> request forwarding -> retry / circuit breaker -> metrics and state update ``` 读完必须回答： - 请求的 model、session/prefix 和 request id 在哪里进入路由； - worker/endpoint 状态从哪里建立并更新； - policy 接口的输入、输出和状态依赖是什么； - round-robin、power-of-two、consistent hashing 和 cache-aware 的选择路径； - eligibility filter 与 ranking/scoring 是否分离； - locality 与负载信号怎样组合或冲突； - unhealthy、draining 或 circuit-open endpoint 怎样被排除； - retry 在哪些错误和请求阶段发生，怎样限制放大； - metrics 和请求完成事件怎样更新路由状态； - 哪些职责属于 router，哪些属于 vllm engine、service discovery 或外部平台。 源码笔记必须保存项目、release/commit、入口、关键对象、控制流、失败路径、已知版本差异和一张请求时序图。 vllm router 核心包含 rust，但不把 rust、tokio/async runtime、http proxy 和所有部署集成扩展成新的学习节点。目标是完整讲清关键链路，而不是读遍整个仓库。 ### 条件式架构对比 第二实现只阅读 [llm-d kv cache indexer](https://github.com/llm-d/llm-d-kv-cache) 的一个差异：vllm kv events 怎样维护近实时 block locality，以及 locality scorer 怎样向 scheduler 输出每个 endpoint 的命中分数。 对比需要回答： - request-history 推断和事件驱动精确索引分别需要什么状态； - event loss、reorder、duplicate、restart 和 lag 怎样造成 false-locality； - locality score 为什么仍需与 load-aware score 组合； - 精确索引的维护成本在什么 workload 下不值得。 不精读完整 llm-d/kubernetes 栈。[gateway api inference extension 的 inferencepool](https://gateway-api-inference-extension.sigs.k8s.io/api-types/inferencepool/) 只用于理解 endpoint picker 和平台资源接口的边界。 ## 手写 l2 契约 ### 最小核心代码 从空文件实现一个 python 单进程核心函数： ```python choose_endpoint(request, endpoints) -> routingdecision ``` 最小数据对象： - `requestcontext`：request id、model/revision、prefix/locality key、tenant 和 deadline； - `endpointstate`：endpoint id、model/revision、health、draining、observed time/epoch、queue/load、kv locality 和 capacity； - `routingdecision`：候选集、过滤原因、score breakdown、最终 endpoint 或 reject/fallback。 核心逻辑只包含： 1. model/revision/parallel compatibility 过滤； 2. unhealthy、not-ready 和 draining 过滤； 3. state freshness/epoch 检查； 4. cache locality 与 queue/load 的可解释综合评分； 5. overload 或无合法 endpoint 时 fail closed； 6. 输出每个候选的过滤理由、分数构成和最终选择。 实现控制在约 100-150 行，30-45 分钟内完成。它是面试可讲清的核心大意代码，不是生产 router。 ### 五个表驱动测试 1. 高 locality 与短 queue 冲突时，按冻结的评分规则选择； 2. locality/endpoint 状态过期后不能继续作为精确事实使用； 3. unhealthy 或 draining endpoint 被硬过滤； 4. 全部 endpoint 过载时 fail closed； 5. 没有 model/revision 兼容实例时拒绝请求。 如果面试只要求伪代码，可以先写数据结构、不变量和控制流 处理 retry？ - llm-d 精确 locality index 怎样受到 event loss、reorder 和 restart 的影响？ - kubernetes inferencepool 与 endpoint picker 的边界是什么？ - toolgap-kv 为什么当前不能声称拥有 router/control-plane 能力？ ## 完成证据 - 一次通过的 15 分钟 p0 场景题； - 一张固定版本 vllm router 请求链路和失败路径图； - 一份源码笔记，能够回答主源码路径的十类问题； - 一份 request-history 与 llm-d kvevents/index 的架构差异说明； - 一份 30-45 分钟完成的 `choose_endpoint` 核心实现； - 五个表驱动测试全部通过； - 一份平台场景说明，覆盖 health、draining、retry、backpressure、autoscaling lag 和多租户边界； - 明确记录实验维度为 l0，不用 mock、example 或纸面指标冒充真实性能证据； - 所有 toolgap-kv 关联表述保持 `roadmap`、`shipped`、`experimentally validated`、`simulated` 的证据边界。 "
